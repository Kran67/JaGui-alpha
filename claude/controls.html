<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas GUI Framework</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; touch-action: none; }
  body { background: #1a1a2e; display: flex; flex-direction: column; font-family: system-ui; }

  /* ---- TOOLBAR ---- */
  #toolbar {
    background: rgba(0,0,0,0.6);
    width: 100%;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    z-index: 10;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar label { color: #aaa; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  #themeSelect {
    background: #2a2a4a; color: #ddd; border: 1px solid #555;
    border-radius: 4px; padding: 6px 8px; font-size: 12px; cursor: pointer;
    flex-shrink: 0; min-height: 34px;
    -webkit-appearance: none; appearance: none;
  }
  .tb-btn {
    background: #2a2a4a; color: #ccc; border: 1px solid #555;
    border-radius: 4px; padding: 6px 10px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s; white-space: nowrap;
    flex-shrink: 0; min-height: 34px; user-select: none;
    -webkit-user-select: none;
  }
  .tb-btn:hover, .tb-btn:active { background: #3a3a6a; color: #fff; border-color: #888; }

  /* Mobile: icon-only labels for space */
  @media (max-width: 480px) {
    .tb-btn { padding: 6px 8px; font-size: 11px; }
    .tb-label { display: none; }
  }

  /* ---- CANVAS ---- */
  #canvasContainer { flex: 1; width: 100%; position: relative; overflow: hidden; min-height: 0; }
  canvas { display: block; touch-action: none; cursor: default; outline: none; }

  /* ---- OVERLAYS ---- */
  #fps { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.35); font-size: 10px; font-family: monospace; pointer-events: none; }
  #info { position: fixed; bottom: 6px; left: 10px; color: rgba(255,255,255,0.25); font-size: 10px; font-family: monospace; pointer-events: none; }
  @media (max-width: 480px) { #info { display: none; } }

  /* ---- HIDDEN INPUT for mobile keyboard ---- */
  #mobileInput {
    position: fixed; top: -200px; left: 0;
    width: 1px; height: 1px; opacity: 0;
    border: none; outline: none; background: transparent;
    font-size: 16px; /* prevent iOS zoom */
  }
</style>
</head>
<body>
<div id="toolbar">
  <label class="tb-label">🎨</label>
  <select id="themeSelect">
    <option value="windows-xp">Windows XP</option>
    <option value="macos">macOS</option>
    <option value="windows-vista">Vista Aero</option>
    <option value="modern-dark">Dark</option>
  </select>
  <button class="tb-btn" onclick="openControlsWindow()">🎮 <span class="tb-label">Contrôles</span></button>
  <button class="tb-btn" onclick="openCalendarWindow()">📅 <span class="tb-label">Calendrier & Saisies</span></button>
  <button class="tb-btn" onclick="openContainersWindow()">🧩 <span class="tb-label">GroupBox & Rating</span></button>
  <button class="tb-btn" onclick="openPagesWindow()">📑 <span class="tb-label">PageControl</span></button>
  <button class="tb-btn" onclick="openTreeWindow()">🌳 <span class="tb-label">TreeView</span></button>
  <button class="tb-btn" onclick="openIdeWindow()">🪟 <span class="tb-label">Ribbon & Propriétés</span></button>
  <button class="tb-btn" onclick="openExplorerWindow()">🗂️ <span class="tb-label">Toolbar & ListView</span></button>
  <button class="tb-btn" onclick="openWidgetsWindow()">✨ <span class="tb-label">Widgets+ (Dialogues, Toast…)</span></button>
  <button class="tb-btn" onclick="openGaugesWindow()">🎛️ <span class="tb-label">Gauges</span></button>
  <button class="tb-btn" onclick="openSplitTileWindow()">🔲 <span class="tb-label">Splitter & TileView</span></button>
  <button class="tb-btn" id="debugHitBtn" onclick="toggleDebugHit()" title="Afficher les zones de hit-test">🎯 <span class="tb-label">HitTest</span></button>
  <button class="tb-btn" onclick="openAboutWindow()">ℹ️ <span class="tb-label">À propos</span></button>
</div>
<div id="canvasContainer">
  <canvas id="canvas" tabindex="0"></canvas>
</div>
<input id="mobileInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<div id="fps">FPS: --</div>
<div id="info">Canvas GUI Framework v1.0 — TypeScript + HTML Canvas</div>

// ---- TYPES ----
const _colorCSSCache0 = new Map();
function colorToCSS(c) {
  if (!c) return 'transparent';
  if (typeof c === 'string') return c;
  const a = c.a !== undefined ? c.a : 1;
  const key = c.r * 100000000 + c.g * 100000 + c.b * 1000 + Math.round(a * 999);
  let v = _colorCSSCache0.get(key);
  if (v === undefined) {
    v = a < 1 ? `rgba(${c.r},${c.g},${c.b},${a})` : `rgb(${c.r},${c.g},${c.b})`;
    if (_colorCSSCache0.size > 256) _colorCSSCache0.clear();
    _colorCSSCache0.set(key, v);
  }
  return v;
}
function hexToColor(hex) {
  let clean = hex.replace('#', '');
  if (clean.length === 3) clean = clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2];
  return { r: parseInt(clean.substring(0, 2), 16), g: parseInt(clean.substring(2, 4), 16), b: parseInt(clean.substring(4, 6), 16), a: 1 };
}
function _easeOut(t)      { return 1-(1-t)*(1-t); }
function _easeOutCubic(t) { return 1-(1-t)*(1-t)*(1-t); }
function _easeInOut(t)    { return t<0.5 ? 2*t*t : 1-2*(1-t)*(1-t); }
function _easeSpring(t)   { // slight overshoot
  const c4 = (2*Math.PI)/3;
  return t===0?0:t===1?1:Math.pow(2,-8*t)*Math.sin((t*10-0.75)*c4)+1;
}

// ── HitTest debug overlay ────────────────────────────────────

function rectContains(rect, x, y) {
  return x >= rect.x && x < rect.x + rect.width && y >= rect.y && y < rect.y + rect.height;
}
function rectIntersects(a, b) {
  return !(a.x + a.width <= b.x || b.x + b.width <= a.x || a.y + a.height <= b.y || b.y + b.height <= a.y);
}
function rectUnion(a, b) {
  const x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
  return { x, y, width: Math.max(a.x + a.width, b.x + b.width) - x, height: Math.max(a.y + a.height, b.y + b.height) - y };
}
function rectInflate(r, dx, dy) {
  const dxy = dy !== undefined ? dy : dx;
  return { x: r.x - dx, y: r.y - dxy, width: r.width + dx * 2, height: r.height + dxy * 2 };
}

// ---- THEMES ----
function fontToCSS(f) {
  return `${f.style||'normal'} ${f.weight||'normal'} ${f.size}px ${f.family}`;
}
function drawGradient(ctx, x, y, w, h, bg, vertical=true) {
  if (Array.isArray(bg)) {
    const grad = vertical ? ctx.createLinearGradient(x, y, x, y+h) : ctx.createLinearGradient(x, y, x+w, y);
    bg.forEach(s => grad.addColorStop(s.offset, colorToCSS(s.color)));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = colorToCSS(bg);
  }
}
function applyShadow(ctx, s) {
  if (s) { ctx.shadowOffsetX = s.x; ctx.shadowOffsetY = s.y; ctx.shadowBlur = s.blur; ctx.shadowColor = colorToCSS(s.color); }
}
function clearShadow(ctx) {
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
}
// r can be: number | {tl,tr,br,bl} | [tl,tr,br,bl]
function _resolveRadii(r, w, h) {
  const max = Math.max(0, Math.min(w, h) / 2);
  const clamp = v => Math.min(Math.max(v||0, 0), max);
  if (typeof r === 'number') { const c=clamp(r); return [c,c,c,c]; }
  if (Array.isArray(r)) return r.map(clamp);
  return [clamp(r.tl), clamp(r.tr), clamp(r.br), clamp(r.bl)];
}
// Test if point (px,py) is inside a rounded rect — matches drawRoundRect exactly
function pointInRoundRect(px, py, x, y, w, h, r) {
  if (px < x || px > x+w || py < y || py > y+h) return false;
  if (!r) return true;
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  // Check each corner: if point is in the corner bounding square, test circle
  // Top-left
  if (px < x+tl && py < y+tl && (px-x-tl)**2+(py-y-tl)**2 > tl*tl) return false;
  // Top-right
  if (px > x+w-tr && py < y+tr && (px-x-w+tr)**2+(py-y-tr)**2 > tr*tr) return false;
  // Bottom-right
  if (px > x+w-br && py > y+h-br && (px-x-w+br)**2+(py-y-h+br)**2 > br*br) return false;
  // Bottom-left
  if (px < x+bl && py > y+h-bl && (px-x-bl)**2+(py-y-h+bl)**2 > bl*bl) return false;
  return true;
}

function drawRoundRect(ctx, x, y, w, h, r) {
  if (w <= 0 || h <= 0) { ctx.beginPath(); return; }
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  ctx.beginPath();
  ctx.moveTo(x+tl, y);
  ctx.lineTo(x+w-tr, y);    ctx.arcTo(x+w, y,   x+w, y+tr,   tr);
  ctx.lineTo(x+w, y+h-br);  ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
  ctx.lineTo(x+bl, y+h);    ctx.arcTo(x,   y+h, x,   y+h-bl, bl);
  ctx.lineTo(x, y+tl);      ctx.arcTo(x,   y,   x+tl, y,     tl);
  ctx.closePath();
}

// Extract a single solid {r,g,b,a} color from a theme background token
// (string CSS, {r,g,b} object, or a gradient stop array → middle stop).
function _solid(bg) {
  if (bg == null) return null;
  if (typeof bg === 'string') return bg.startsWith('#') ? hexToColor(bg) : bg;
  if (Array.isArray(bg)) { const m = bg[Math.floor((bg.length-1)/2)] || bg[0]; return m ? _solid(m.color) : null; }
  return bg; // already a color object
}

function _lum(c) { c=_solid(c); return (0.299*c.r+0.587*c.g+0.114*c.b)/255; }

// All derived from the existing tokens (accent = slider.fill, surfaces from

// automatically — see ARCHITECTURE §7.

  for (const key in themes) {

    const hover     = _solid(T.listBox.item.hover);
    const onAccent  = _solid(T.dropdown.itemSelectedText) || hexToColor('#FFFFFF');
    const holiday   = dark ? hexToColor('#FF7B7B') : hexToColor('#C8322B');
    const gold      = hexToColor('#F5B301');

    T.calendar = {
      background: surface, border: T.listBox.border, radius: T.listBox.borderRadius || 4,
      font: T.label.font, headerText: text, navColor: text, navHover: _rgba(accent,0.18),

      stopped:false, defaultPrevented:false };
    this.emit(ev);
  }

  render(ctx) {
    const t = getTheme().dropdown, b = this.bounds, r = t.borderRadius;
    const style = !this.enabled ? t.disabled : this._open ? t.open : this._hovered ? t.hover : t.normal;
    ctx.save();
    drawGradient(ctx, b.x, b.y, b.width, b.height, this.background ?? style.background);
    drawRoundRect(ctx, b.x, b.y, b.width, b.height, r); ctx.fill();
    ctx.strokeStyle = colorToCSS(style.border.color); ctx.lineWidth = style.border.width;
    drawRoundRect(ctx, b.x+.5, b.y+.5, b.width-1, b.height-1, r); ctx.stroke();

    ctx.strokeStyle = colorToCSS(t.normal.border.color); ctx.lineWidth = 1;

    // Arrow points up when open-up, down when open-down, up when list visible above
    const arrowUp = this._open && this._openUp ? false : this._open;

  }

  _renderList(ctx) {
    const t = getTheme().dropdown;
    const lr = this._listRect();
    const { x: lx, y: ly, width: lw, height: lh, itemH, vis } = lr;
    ctx.save();
    if (t.listShadow) applyShadow(ctx, t.listShadow);

    ctx.beginPath(); ctx.rect(lx, ly, lw, lh); ctx.clip();
    ctx.font = fontToCSS(t.font);
    for (let i = 0; i < vis; i++) {
      const absI = this._scrollOffset + i;
      if (absI >= this.items.length) break;
      const iy = ly + i * itemH;
      const isSel = absI === this._selectedIndex;
      const isHov = absI === this._listHoverIndex;
      if (isSel) { ctx.fillStyle = colorToCSS(t.itemSelected); ctx.fillRect(lx, iy, lw, itemH); }
      else if (isHov) { ctx.fillStyle = colorToCSS(t.itemHover); ctx.fillRect(lx, iy, lw, itemH); }
      ctx.fillStyle = colorToCSS(isSel ? t.itemSelectedText : t.itemText);
      ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      ctx.fillText(this.items[absI], lx+8, iy+itemH/2);
    }
    // Scrollbar
    if (this.items.length > vis) {
      const sb = getTheme().listBox?.scrollBar || { track: {r:220,g:220,b:220,a:0.7}, thumb: {r:150,g:150,b:150,a:1}, thumbHover: {r:120,g:120,b:120,a:1}, thumbActive: {r:80,g:80,b:80,a:1}, width: 12, borderRadius: 4 };
      const sbW = sb.width;
      const sbX = lx + lw - sbW;
      const sbH = lh;
      const thumbH = Math.max(20, sbH * vis / this.items.length);
      const trackH = sbH - thumbH;
      const thumbY = (this._scrollOffset / Math.max(1, this.items.length - vis)) * trackH;
      // Track background
      ctx.fillStyle = colorToCSS(sb.track);
      ctx.fillRect(sbX, ly, sbW, sbH);
      // Thumb
      const thumbColor = this._scrollbarDragging ? sb.thumbActive : (this._listHoverIndex >= 0 ? sb.thumbHover : sb.thumb);
      ctx.fillStyle = colorToCSS(thumbColor);
      const rr = sb.borderRadius ?? 3;
      drawRoundRect(ctx, sbX + 2, ly + thumbY, sbW - 4, thumbH, rr);
      ctx.fill();
    }
    ctx.restore();
  }
}

class ProgressBar extends BaseWidget {

  get max(){return this._max;} set max(v){this._max=Math.max(1,v);this.markDirty();}

    }
    super.update(dt);

    const t=getTheme().progressBar, b=this.bounds, r=t.track.borderRadius;

    drawRoundRect(ctx,b.x,b.y,b.width,b.height,r); ctx.fill();
    ctx.strokeStyle=colorToCSS(t.track.border.color); ctx.lineWidth=t.track.border.width;

      const fw=(this._value/this._max)*(b.width-2);

    }
    ctx.restore();
  }

class Slider extends BaseWidget {
  /*
   * Mode simple:   sl.value / .min / .max / .step
   * Mode range:    sl.range=true  → sl.valueLow / sl.valueHigh
   * Tooltip:       sl.showTooltip (défaut: true)
   *                sl.tooltipFormat = v => string
   */
  constructor(bounds) {
    super(undefined, bounds);
    this._min=0; this._max=100; this._step=1; this._value=0;
    this._range=false; this._valueLow=20; this._valueHigh=80;
    this.showTooltip=true; this.tooltipFormat=null;
    this._hovered=false; this._hoveredThumb=null;
    this._dragging=false; this._dragThumb=null;
    this.vertical=false; this.cursor='pointer'; this.capturesDrag=true;
    this.on('mouseenter', ()=>{ this._hovered=true;  this.markDirty(); });
    this.on('mouseleave', ()=>{ this._hovered=false; this._hoveredThumb=null; this.markDirty(); });
    this.on('mousedown',  e=>{ if(this.enabled&&e.button===0) this._startDrag(e.x,e.y); });
    this.on('mouseup',    ()=>{ this._dragging=false; this._dragThumb=null; this.markDirty(); });
    this.on('mousemove',  e=>{ this._dragging ? this._doDrag(e.x,e.y) : this._updateHoverThumb(e.x,e.y); });
    // Molette : ajuste la valeur d'un pas (uniquement en mode simple, un seul thumb)
    this.on('scroll', e=>{
      if(!this.enabled||this._range) return;
      const dir=(e.deltaY||0)<0?1:-1;
      const nv=this._snap(this._value+dir*this._step);
      if(nv!==this._value){ this._value=nv; this._emit(); this.markDirty(); }
      e.stopPropagation?.();
    });
  }
  // ── single thumb ──
  get value(){ return this._value; }
  set value(v){ this._value=this._snap(v); this.markDirty(); }
  get min(){ return this._min; } set min(v){ this._min=v; this.markDirty(); }
  get max(){ return this._max; } set max(v){ this._max=v; this.markDirty(); }
  get step(){ return this._step; } set step(v){ this._step=v; this.markDirty(); }
  // ── range ──
  get range(){ return this._range; } set range(v){ this._range=v; this.markDirty(); }
  get valueLow(){ return this._valueLow; }
  set valueLow(v){ this._valueLow=this._snap(Math.min(v,this._valueHigh)); this.markDirty(); }
  get valueHigh(){ return this._valueHigh; }
  set valueHigh(v){ this._valueHigh=this._snap(Math.max(v,this._valueLow)); this.markDirty(); }
  // ── internals ──
  _snap(v){ return Math.round((Math.max(this._min,Math.min(this._max,v))-this._min)/this._step)*this._step+this._min; }
  _ratio(v){ return this._max===this._min?0:(v-this._min)/(this._max-this._min); }
  _fromRatio(r){ return this._snap(this._min+r*(this._max-this._min)); }
  _tr(){ const t=getTheme().slider,b=this.bounds,ts=t.thumb.size; return {x:b.x+ts/2,w:b.width-ts,t,ts}; }
  _thumbX(v){ const {x,w}=this._tr(); return x+this._ratio(v)*w; }
  _thumbHR(){ return getTheme().slider.thumb.size/2+5; }
  _updateHoverThumb(ax,ay){
    const prev=this._hoveredThumb; const r=this._thumbHR();
    const b=this.bounds; const cy=b.y+b.height/2;
    if(this._range){
      const xl=this._thumbX(this._valueLow),xh=this._thumbX(this._valueHigh);
      const dL=Math.abs(ax-xl),dH=Math.abs(ax-xh);
      if(dL<=r&&Math.abs(ay-cy)<=r+4) this._hoveredThumb='low';
      else if(dH<=r&&Math.abs(ay-cy)<=r+4) this._hoveredThumb='high';
      else this._hoveredThumb=null;
    } else {
      const xs=this._thumbX(this._value);
      this._hoveredThumb=(Math.abs(ax-xs)<=r&&Math.abs(ay-cy)<=r+4)?'single':null;
    }
    if(this._hoveredThumb!==prev) this.markDirty();
  }
  _startDrag(ax,ay){
    this._dragging=true;
    if(this._range){
      const xl=this._thumbX(this._valueLow),xh=this._thumbX(this._valueHigh);
      this._dragThumb=(Math.abs(ax-xl)<=Math.abs(ax-xh))?'low':'high';
    } else { this._dragThumb='single'; }
    this._doDrag(ax,ay);
  }
  _doDrag(ax,ay){
    const {x,w}=this._tr();
    const nv=this._fromRatio(Math.max(0,Math.min(1,(ax-x)/w)));
    if(this._dragThumb==='single'){ if(nv!==this._value){this._value=nv;this._emit();} }
    else if(this._dragThumb==='low'){ const c=Math.min(nv,this._valueHigh); if(c!==this._valueLow){this._valueLow=this._snap(c);this._emit();} }
    else if(this._dragThumb==='high'){ const c=Math.max(nv,this._valueLow); if(c!==this._valueHigh){this._valueHigh=this._snap(c);this._emit();} }

  }
  _emit(){
    const ev={type:'change',target:this,value:this._value,valueLow:this._valueLow,valueHigh:this._valueHigh,
      x:0,y:0,stopPropagation(){this.stopped=true;},preventDefault(){this.defaultPrevented=true;},stopped:false,defaultPrevented:false};
    this.emit(ev);
  }
  _fmt(v){ return this.tooltipFormat?this.tooltipFormat(v):Number.isInteger(v)?String(v):v.toFixed(1); }
  _drawThumb(ctx,cx,isActive,isHover){
    const {t,ts}=this._tr(); const b=this.bounds;
    const tc=isActive?t.thumb.active:isHover?t.thumb.hover:t.thumb.normal;
    ctx.fillStyle=colorToCSS(tc); ctx.strokeStyle=colorToCSS(t.thumb.border.color); ctx.lineWidth=t.thumb.border.width;
    drawRoundRect(ctx,cx-ts/2,b.y+(b.height-ts)/2,ts,ts,t.thumb.borderRadius); ctx.fill(); ctx.stroke();
  }
  _drawTip(ctx,cx,val){
    const tt=getTheme().tooltip; const b=this.bounds;
    const {t,ts}=this._tr();
    const label=this._fmt(val);
    ctx.font=fontToCSS(tt.font);
    const tw=ctx.measureText(label).width+tt.padding.x*2+2;
    const th=parseInt(tt.font.size)+tt.padding.y*2+2;
    const tx=Math.max(b.x,Math.min(b.x+b.width-tw,cx-tw/2));
    const tipY=b.y+(b.height-ts)/2-th-6;
    // box
    ctx.fillStyle=colorToCSS(tt.background); ctx.strokeStyle=colorToCSS(tt.border.color); ctx.lineWidth=tt.border.width;
    ctx.beginPath(); ctx.rect(tx,tipY,tw,th); ctx.fill(); ctx.stroke();
    // arrow (little triangle pointing down)
    const ax2=Math.max(tx+5,Math.min(tx+tw-5,cx));
    ctx.beginPath(); ctx.moveTo(ax2-6,tipY+th-2); ctx.lineTo(ax2,tipY+th+4); ctx.lineTo(ax2+6,tipY+th-2);
    ctx.closePath(); ctx.fillStyle=colorToCSS(tt.background); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ax2-4,tipY+th); ctx.lineTo(ax2,tipY+th+5); ctx.lineTo(ax2+4,tipY+th);
    ctx.strokeStyle=colorToCSS(tt.border.color); ctx.lineWidth=tt.border.width; ctx.stroke();
    // label
    ctx.fillStyle=colorToCSS(tt.text); ctx.textBaseline='middle';
    ctx.fillText(label,Math.ceil(tx+tt.padding.x),Math.ceil(tipY+th/2));
  }
  render(ctx){
    const {t,ts,x:tx,w:tw}=this._tr(); const b=this.bounds;
    const trackH=t.track.height; const ty=b.y+(b.height-trackH)/2;
    ctx.save();
    // track bg
    ctx.fillStyle=colorToCSS(t.track.background); ctx.strokeStyle=colorToCSS(t.track.border.color); ctx.lineWidth=t.track.border.width;
    ctx.beginPath(); ctx.rect(b.x,ty,b.width,trackH); ctx.fill(); ctx.stroke();
    // fill
    if(this._range){
      const xL=this._thumbX(this._valueLow),xH=this._thumbX(this._valueHigh);
      ctx.fillStyle=colorToCSS(t.fill.background); ctx.fillRect(xL,ty,xH-xL,trackH);
    } else {
      ctx.fillStyle=colorToCSS(t.fill.background);
      ctx.fillRect(b.x,ty,this._ratio(this._value)*tw+ts/2,trackH);
    }
    // thumbs
    if(this._range){
      this._drawThumb(ctx,this._thumbX(this._valueLow), this._dragThumb==='low',  this._hoveredThumb==='low');
      this._drawThumb(ctx,this._thumbX(this._valueHigh),this._dragThumb==='high', this._hoveredThumb==='high');
    } else {
      this._drawThumb(ctx,this._thumbX(this._value), this._dragThumb==='single', this._hoveredThumb==='single');
    }
    // tooltips
    if(this.showTooltip&&this.enabled){
      if(this._range){
        const showL=this._dragThumb==='low'  ||this._hoveredThumb==='low';
        const showH=this._dragThumb==='high' ||this._hoveredThumb==='high';
        if(showL) this._drawTip(ctx,this._thumbX(this._valueLow), this._valueLow);
        if(showH) this._drawTip(ctx,this._thumbX(this._valueHigh),this._valueHigh);
      } else {
        if(this._dragThumb==='single'||this._hoveredThumb==='single')
          this._drawTip(ctx,this._thumbX(this._value),this._value);
      }
    }
    ctx.restore();
  }
}

class ListBox extends BaseWidget {
  constructor(items, bounds) {
    super(undefined,bounds); 
    this.items=items||[]; 
    this._selectedIndex=-1; 
    this._hoverIndex=-1; 
    this._scrollY=0; 
    this._focused=false;
    this._scrollbarDragging=false;
    this._scrollbarHovered=false;
    this.background = null;
    
    this.on('focus',()=>{this._focused=true;this.markDirty();});
    this.on('blur',()=>{this._focused=false;this.markDirty();});
    
    this.on('mousemove',e=>{
      const t=getTheme().listBox;
      const itemH=t.itemHeight;
      const totalH=this.items.length*itemH;
      const hasScroll=totalH>this.bounds.height;
      
      if(hasScroll){
        const sb=t.scrollBar||{width:8};
        const sbX=this.bounds.x+this.bounds.width-sb.width;
        const sbY=this.bounds.y;
        const sbH=this.bounds.height;
        const thumbH=Math.max(20,sbH*(this.bounds.height/totalH));
        const thumbY=sbY+(this._scrollY/(totalH-this.bounds.height))*(sbH-thumbH);
        
        const wasHov=this._scrollbarHovered;
        this._scrollbarHovered=(e.x>=sbX&&e.x<sbX+sb.width&&e.y>=sbY&&e.y<sbY+sbH);
        if(wasHov!==this._scrollbarHovered)this.markDirty();
        
        if(this._scrollbarDragging){
          const ratio=(e.y-sbY-thumbH/2)/Math.max(1,sbH-thumbH);
          const ns=Math.max(0,Math.min(totalH-this.bounds.height,ratio*(totalH-this.bounds.height)));
          this._scrollY=ns;
          this.markDirty();
          return;
        }
      }
      
      const idx=this._itemAt(e.y);
      if(idx!==this._hoverIndex){this._hoverIndex=idx;this.markDirty();}
    });
    
    this.on('mouseleave',()=>{this._hoverIndex=-1;this._scrollbarHovered=false;this.markDirty();});
    
    this.on('click',e=>{
      const t=getTheme().listBox;
      const itemH=t.itemHeight;
      const totalH=this.items.length*itemH;
      const hasScroll=totalH>this.bounds.height;
      
      if(hasScroll){
        const sb=t.scrollBar||{width:8};
        const sbX=this.bounds.x+this.bounds.width-sb.width;
        if(e.x>=sbX&&e.x<sbX+sb.width){return;}
      }
      
      const idx=this._itemAt(e.y);
      if(idx>=0&&idx<this.items.length){this._selectedIndex=idx;this._emit();this.markDirty();}
    });
    
    const _doScroll=e=>{
      const t=getTheme().listBox;
      const itemH=t.itemHeight;
      const totalH=this.items.length*itemH;
      const ms=Math.max(0,totalH-this.bounds.height);
      const dir=(e.deltaY??e.delta??0)>0?itemH:-itemH;
      this._scrollY=Math.max(0,Math.min(ms,this._scrollY+dir));
      this.markDirty();
      e.stopPropagation?.();
    };
    this.on('wheel',_doScroll);
    this.on('scroll',_doScroll);
    
    this.on('mousedown',e=>{
      const t=getTheme().listBox;
      const itemH=t.itemHeight;
      const totalH=this.items.length*itemH;
      const hasScroll=totalH>this.bounds.height;
      
      if(hasScroll){
        const sb=t.scrollBar||{width:8};
        const sbX=this.bounds.x+this.bounds.width-sb.width;
        const sbY=this.bounds.y;
        const sbH=this.bounds.height;
        
        if(e.x>=sbX&&e.x<sbX+sb.width&&e.y>=sbY&&e.y<sbY+sbH){
          const thumbH=Math.max(20,sbH*(this.bounds.height/totalH));
          const trackH=sbH-thumbH;
          const thumbY=sbY+(this._scrollY/(totalH-this.bounds.height))*trackH;
          
          if(e.y>=thumbY&&e.y<thumbY+thumbH){
            this._scrollbarDragging=true;
            this.markDirty();
          }else{
            const ratio=(e.y-sbY-thumbH/2)/Math.max(1,trackH);
            const ns=Math.max(0,Math.min(totalH-this.bounds.height,ratio*(totalH-this.bounds.height)));
            this._scrollY=ns;
            this.markDirty();
          }
        }
      }
    });
    
    this.on('mouseup',()=>{
      if(this._scrollbarDragging){this._scrollbarDragging=false;this.markDirty();}
    });
    
    this.on('keydown',e=>{if(e.key==='ArrowUp'&&this._selectedIndex>0){this._selectedIndex--;this._emit();this.markDirty();}else if(e.key==='ArrowDown'&&this._selectedIndex<this.items.length-1){this._selectedIndex++;this._emit();this.markDirty();}});
  }
  
  get selectedIndex(){return this._selectedIndex;} 
  set selectedIndex(v){this._selectedIndex=v;this.markDirty();}
  get selectedValue(){return this.items[this._selectedIndex]??null;}
  
  _itemAt(ry){const t=getTheme().listBox,b=this.bounds;return Math.floor((ry-b.y+this._scrollY)/t.itemHeight);}
  
  _emit(){const ev={type:'change',target:this,x:0,y:0,stopPropagation(){this.stopped=true;},preventDefault(){this.defaultPrevented=true;},stopped:false,defaultPrevented:false};this.emit(ev);}
  
  render(ctx) {
    const t=getTheme().listBox, b=this.bounds, sb=t.scrollBar, r=t.borderRadius, itemH=t.itemHeight;
    const totalH=this.items.length*itemH, hasScroll=totalH>b.height, cw=hasScroll?b.width-sb.width:b.width;
    ctx.save();
    drawGradient(ctx, b.x, b.y, b.width, b.height, this.background ?? t.background);
    drawRoundRect(ctx,b.x,b.y,b.width,b.height,r); ctx.fill();
    ctx.beginPath(); ctx.rect(b.x,b.y,cw,b.height); ctx.clip();
    ctx.font=fontToCSS(t.font);

// ── ContainerWidget : base for widgets that host child widgets ─────────────
// Children live in this.children, positioned in the container's own coordinate

// generalised drag-coord path (WindowManager._widgetParentOrigin).

    // same approach as WindowContent) so a later widget can't paint over them.

    ctx.restore();

  _renderChild(ctx,c) {
    const eff=(c.opacity??1);

// ── ToolButton : flat button for toolbars (icon glyph + optional label) ─────
class ToolButton extends Button {
  constructor(opts={}) {
    super(opts.text ?? '', { x:0, y:0, width:opts.width ?? 0, height:opts.height ?? 28 });
    this.icon = opts.icon ?? null;          // emoji / glyph string
    this.minWidth = opts.minWidth ?? (this.text ? 0 : 28);
    this._padX = opts.padX ?? 8;
    if (opts.tooltip) this.tooltip = opts.tooltip;
    if (opts.toggled) this.toggled = true;
  }
  measureWidth() {
    _measureCtx.font = fontToCSS(getTheme().button.normal.font);
    let w = this._padX*2;
    if (this.icon) w += 18;
    if (this.text) w += _measureCtx.measureText(this.text).width + (this.icon?4:0);
    return Math.max(this.minWidth, Math.ceil(w));
  }

    else if (this.toggled)   { bg=_rgba(accent,0.20); bd=_rgba(accent,0.65); }
    else if (this._hovered)  { bg=_rgba(accent,0.13); bd=_rgba(accent,0.45); }
    ctx.save();
    if (bg) { ctx.fillStyle=colorToCSS(bg); drawRoundRect(ctx,b.x+1,b.y+1,b.width-2,b.height-2,4); ctx.fill(); }
    if (bd) { ctx.strokeStyle=colorToCSS(bd); ctx.lineWidth=1; drawRoundRect(ctx,b.x+1.5,b.y+1.5,b.width-3,b.height-3,4); ctx.stroke(); }

// ── SplitToolButton : ToolButton + a dropdown-arrow zone ────────────────────

  constructor(opts={}) {

  }

    this._items.forEach((it,i)=>{ if(it.kind==='stretch') stretches++; else fixed+=widths[i]; });

    const per=stretches ? Math.max(0, b.width-this.padding*2-fixed-gaps)/stretches : 0;
    let x=this.padding;
    this._items.forEach((it,i)=>{
      if (it.kind==='sep')     { it._x=x; x+=8+this.gap; return; }
      if (it.kind==='stretch') { x+=per+this.gap; return; }

// ── StatusBar : bottom bar with bevelled panels (text or any widget) + grip ─
class StatusBar extends ContainerWidget {
  constructor(bounds, opts={}) {
    super('statusbar_'+(++_idCounter), bounds);
    this.padding = opts.padding ?? 2;
    this.gap = opts.gap ?? 2;
    this.showGrip = opts.showGrip ?? true;
    this.bevel = opts.bevel ?? 'lowered';
    this._panels = [];   // {text,width(0=stretch),align,bevel,widget?,_x,_w}
    this.tabIndex = -1;
  }
  addPanel(opts={}) {
    const p={ text:opts.text??'', width:opts.width??0, align:opts.align??'left', bevel:opts.bevel??this.bevel, widget:null, _x:0,_w:0 };
    this._panels.push(p); this._relayout(); this.markDirty();
    return { setText:(v)=>{ p.text=v; this.markDirty(); }, get text(){return p.text;}, _panel:p };
  }
  addWidget(widget, opts={}) {
    this.addChild(widget);
    const p={ widget, width:opts.width??140, align:'left', bevel:opts.bevel??'none', _x:0,_w:0 };
    this._panels.push(p); this._relayout(); this.markDirty(); return widget;
  }
  setSize(w,h) { super.setSize(w,h); this._relayout(); }
  _relayout() {
    const b=this.bounds, gripW=this.showGrip?16:0;
    let fixed=0, stretch=0; for(const p of this._panels){ if(p.width>0) fixed+=p.width; else stretch++; }
    const gaps=this.gap*Math.max(0,this._panels.length-1);
    const per=stretch ? Math.max(40,(b.width-this.padding*2-gripW-fixed-gaps)/stretch) : 0;
    let x=this.padding;
    for (const p of this._panels) { const w=p.width>0?p.width:per; p._x=x; p._w=w;
      if (p.widget) { const ph=b.height-this.padding*2; p.widget.bounds.x=x+4; p.widget.bounds.y=this.padding+1; p.widget.bounds.width=Math.max(10,w-8); p.widget.bounds.height=Math.max(10,ph-2); }
      x+=w+this.gap;
    }
  }
  _renderSelf(ctx) {
    const b=this.bounds, base=_solid(getTheme().window.body.background), lab=getTheme().label;
    ctx.save();
    const g=ctx.createLinearGradient(0,b.y,0,b.y+b.height); g.addColorStop(0,colorToCSS(_mix(base,{r:255,g:255,b:255},0.35))); g.addColorStop(1,colorToCSS(base));
    ctx.fillStyle=g; ctx.fillRect(b.x,b.y,b.width,b.height);
    ctx.strokeStyle=colorToCSS(_mix(base,{r:255,g:255,b:255},0.6)); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(b.x,b.y+.5); ctx.lineTo(b.x+b.width,b.y+.5); ctx.stroke();
    ctx.font=fontToCSS(lab.font); ctx.textBaseline='middle';
    for (const p of this._panels) {
      const px=b.x+p._x, py=b.y+this.padding, pw=p._w, ph=b.height-this.padding*2;
      _drawBevel(ctx, px, py, pw, ph, p.bevel, base);
      if (!p.widget && p.text) {
        ctx.save(); ctx.beginPath(); ctx.rect(px+3,py,pw-6,ph); ctx.clip();
        ctx.fillStyle=colorToCSS(lab.text);
        ctx.textAlign = p.align==='right'?'right':p.align==='center'?'center':'left';
        const tx = p.align==='right'? px+pw-5 : p.align==='center'? px+pw/2 : px+5;
        ctx.fillText(p.text, tx, py+ph/2+1); ctx.restore();
      }
    }
    if (this.showGrip) {
      const gx=b.x+b.width-4, gy=b.y+b.height-4;
      for (let i=0;i<3;i++) for (let j=0;j<=i;j++) {
        ctx.fillStyle=colorToCSS(_mix(base,{r:0,g:0,b:0},0.30)); ctx.fillRect(gx-i*4, gy-j*4, 2,2);
        ctx.fillStyle=colorToCSS(_mix(base,{r:255,g:255,b:255},0.7)); ctx.fillRect(gx-i*4+0.6, gy-j*4+0.6, 1,1);
      }
    }
    ctx.restore();
  }
}

// ── ScrollBox : scrollable container for arbitrary widgets ──────────────────
// Holds any widgets; shows V/H scrollbars when content exceeds the viewport.
// Scroll offset is BAKED into each child's bounds (like WidgetListBox) so the
// framework hover/focus (_findInWidget) and drag continue to work unchanged.
class ScrollBox extends ContainerWidget {
  constructor(bounds, opts={}) {
    super('scrollbox_'+(++_idCounter), bounds);
    this.background = opts.background ?? null;   // null → suit le thème (listBox) au rendu
    this.borderRadius = opts.borderRadius ?? 0;
    this.border = opts.border ?? true;
    this._SB = opts.scrollbarSize ?? (getTheme().listBox.scrollBar.width||12);
    this._scrollX=0; this._scrollY=0; this._sbDrag=null; this._sbHover=null;
    this.tabIndex=0; this.capturesDrag=true; this.cursor='default';

    this.on('mousemove', e => this._onMove(e));
    this.on('mouseup',   () => { if(this._sbDrag){ this._sbDrag=null; this.markDirty(); } });
    this.on('mouseleave',() => { if(this._sbHover){ this._sbHover=null; this.markDirty(); } });
  }
  addChild(c) { super.addChild(c); c._sbx=c.bounds.x; c._sby=c.bounds.y; this._apply(); this.markDirty(); return c; }
  addWidget(c) { return this.addChild(c); }
  scrollTo(x,y) { this._scrollX=x; this._scrollY=y; this._apply(); this.markDirty(); }
  _contentSize() { let w=0,h=0; for(const c of this.children){ if(!c.visible)continue; const ox=c._sbx??c.bounds.x, oy=c._sby??c.bounds.y; w=Math.max(w,ox+c.bounds.width); h=Math.max(h,oy+c.bounds.height); } return { w, h }; }
  _bars() {
    const b=this.bounds, cs=this._contentSize(), SB=this._SB;
    const needV=cs.h>b.height; const needH=cs.w>b.width-(needV?SB:0); const nV=cs.h>b.height-(needH?SB:0);
    return { needV:nV, needH, SB, viewW:b.width-(nV?SB:0), viewH:b.height-(needH?SB:0), cw:cs.w, ch:cs.h };
  }
  _clamp() { const {viewW,viewH,cw,ch}=this._bars(); this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX)); this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY)); }

  _onScroll(e) {

  _onDown(e) {

  render(ctx) {
    const b=this.bounds, {needV,needH,viewW,viewH,cw,ch,SB}=this._bars();

    if (this.border) { ctx.strokeStyle=colorToCSS(getTheme().listBox.border.color); ctx.lineWidth=getTheme().listBox.border.width; drawRoundRect(ctx,b.x+.5,b.y+.5,b.width-1,b.height-1,this.borderRadius); ctx.stroke(); }
    ctx.save(); ctx.beginPath(); ctx.rect(b.x+1,b.y+1,viewW-2,viewH-2); ctx.clip();

    ctx.restore();
  }
}

// ── ListView : Windows-Explorer-style list with multiple view modes ─────────
// Modes: largeIcons | mediumIcons | smallIcons | list | details | tiles.
// items: [{ text, icon?(emoji), subtitle?, cells?:{key:value}, data? }]
// columns (details): [{ title, key, width, align? }] — key '__name' = the name+icon column.
class ListView extends BaseWidget {
  constructor(bounds, opts={}) {
    super('listview_'+(++_idCounter), bounds);
    this._items = (opts.items||[]).map(it => ({ text:it.text??'', icon:it.icon??'📄', subtitle:it.subtitle??'', cells:it.cells||{}, data:it.data }));
    this._cols = opts.columns || [ {title:'Nom',key:'__name',width:240}, {title:'Type',key:'type',width:120}, {title:'Taille',key:'size',width:90,align:'right'}, {title:'Modifié',key:'modified',width:150} ];
    this._view = opts.view || 'largeIcons';
    this.multiSelect = opts.multiSelect ?? true;
    this._sel=new Set(); this._focus=-1; this._hover=-1; this._anchor=0;
    this._scrollX=0; this._scrollY=0; this._sbDrag=null; this._sbHover=null;
    this._sortKey=null; this._sortDir=1; this._hdrHover=-1; this._marquee=null;
    this.tabIndex=0; this.capturesDrag=true; this.cursor='default'; this.background=null;
    this.on('mousemove', e=>this._onMove(e));
    this.on('mousedown', e=>this._onDown(e));
    this.on('mouseup',   ()=>{ this._sbDrag=null; if(this._marquee){ this._marquee=null; this.markDirty(); } });
    this.on('mouseleave',()=>{ if(this._hover!==-1||this._sbHover||this._hdrHover!==-1){this._hover=-1;this._sbHover=null;this._hdrHover=-1;this.markDirty();} });
    this.on('dblclick',  e=>{ const i=this._itemAt(e.x,e.y); if(i>=0) this._emit('activate',i); });
    this.on('scroll',    e=>this._onScroll(e));
    this.on('keydown',   e=>this._onKey(e));
  }
  // ── public API ──
  setView(v) { if(v===this._view)return; this._view=v; this._scrollX=this._scrollY=0; this.markDirty(); this._emit('viewchange'); }
  get view(){ return this._view; }
  setItems(items){ this._items=(items||[]).map(it=>({text:it.text??'',icon:it.icon??'📄',subtitle:it.subtitle??'',cells:it.cells||{},data:it.data})); this._sel.clear(); this._focus=-1; this._scrollX=this._scrollY=0; this.markDirty(); }
  get selectedIndices(){ return [...this._sel].sort((a,b)=>a-b); }
  get selectedItems(){ return this.selectedIndices.map(i=>this._items[i]); }

  // ── metrics & layout ──
  _metrics(){ const SB=getTheme().listBox.scrollBar.width||12; switch(this._view){
    case 'details':     return {mode:'rows', rowH:22, headerH:24, icon:16, SB};
    case 'list':        return {mode:'vflow', cellW:168, cellH:20, icon:16, SB};
    case 'smallIcons':  return {mode:'hflow', cellW:168, cellH:20, icon:16, SB};
    case 'mediumIcons': return {mode:'grid', cellW:88, cellH:74, icon:32, SB};
    case 'tiles':       return {mode:'tiles', cellW:198, cellH:54, icon:40, SB};
    default:            return {mode:'grid', cellW:106, cellH:92, icon:48, SB};   // largeIcons

  _layout(){
    const b=this.bounds, m=this._metrics(), n=this._items.length;
    let contentW=0, contentH=0, headerH=0, cols=1, rows=1; const SB=m.SB;
    if (m.mode==='rows') { headerH=m.headerH; const totW=this._cols.reduce((s,c)=>s+c.width,0);
      contentH=n*m.rowH; const needV0=contentH>b.height-headerH; contentW=Math.max(b.width-(needV0?SB:0), totW);
    } else if (m.mode==='vflow') { const viewH=b.height-(this._items.length?SB:0); rows=Math.max(1,Math.floor(viewH/m.cellH)); cols=Math.ceil(n/rows); contentW=cols*m.cellW; contentH=rows*m.cellH;
    } else { const needV0=true; const viewW=b.width-SB; cols=Math.max(1,Math.floor(viewW/m.cellW)); rows=Math.ceil(n/cols); contentW=cols*m.cellW; contentH=rows*m.cellH; }

  _vTrack(L){ if(!L.needV)return null; const b=this.bounds; return {x:b.x+L.viewW,y:b.y+L.headerH,w:L.SB,h:L.viewH}; }
  _hTrack(L){ if(!L.needH)return null; const b=this.bounds; return {x:b.x,y:b.y+L.headerH+L.viewH,w:L.viewW,h:L.SB}; }
  _onScroll(e){ const L=this._layout(); const dy=e.deltaY||0, dx=e.deltaX||0;

      if(e.y>=ty&&e.y<=ty+t.len) this._sbDrag={dir:'v',ss:this._scrollY,sm:e.y,tl:L.viewH,thl:t.len,max:t.max};
      else { this._scrollY=Math.max(0,Math.min(t.max,((e.y-v.y-t.len/2)/Math.max(1,L.viewH-t.len))*t.max)); this.markDirty(); } return; }

      {separator:true},
      {label:'Propriétés', icon:'ℹ️', disabled:n===0},
    ];

  }
  _onMove(e){

      const r=this._marqueeRect(); this._sel=new Set(this._marquee.base);
      for(let k=0;k<L.n;k++){ const c=this._cellRect(k,L); if(c.x<r.x+r.w&&c.x+c.w>r.x&&c.y<r.y+r.h&&c.y+c.h>r.y) this._sel.add(k); }

    }

    const v=this._vTrack(L), h=this._hTrack(L);

    if(sh!==this._sbHover){this._sbHover=sh;this.markDirty();}
    const hh = (L.m.mode==='rows'&&e.y<b.y+L.headerH) ? (this._hdrAt(e.x,L)?.key ?? -1) : -1;
    if(hh!==this._hdrHover){this._hdrHover=hh;this.markDirty();}

  _onKey(e){

    let nf=f;
    if(e.key==='ArrowDown') nf = (L.m.mode==='vflow'||L.m.mode==='rows')?f+1:f+L.cols;
    else if(e.key==='ArrowUp') nf = (L.m.mode==='vflow'||L.m.mode==='rows')?f-1:f-L.cols;
    else if(e.key==='ArrowRight') nf = (L.m.mode==='vflow')?f+L.rows:f+1;
    else if(e.key==='ArrowLeft') nf = (L.m.mode==='vflow')?f-L.rows:f-1;

  _scrollToItem(i){ const L=this._layout(); const r=this._cellRect(i,L);

  _sortItems(){ const k=this._sortKey, dir=this._sortDir; if(!k)return;

  render(ctx){
    const b=this.bounds, L=this._layout(), lb=getTheme().listBox, accent=_solid(getTheme().slider.fill.background), txt=_solid(lb.itemText.normal);

      if (rx+r.w<b.x||rx>b.x+L.viewW||ry+r.h<b.y+L.headerH||ry>b.y+L.headerH+L.viewH) continue;

    }

  _selBg(ctx,x,y,w,h,sel,hov,accent){ if(!sel&&!hov)return; ctx.fillStyle=colorToCSS(_rgba(accent, sel?0.26:0.12)); drawRoundRect(ctx,x+1,y+1,w-2,h-2,3); ctx.fill(); if(sel){ ctx.strokeStyle=colorToCSS(_rgba(accent,0.7)); ctx.lineWidth=1; drawRoundRect(ctx,x+1.5,y+1.5,w-3,h-3,3); ctx.stroke(); } }

    } else if (m.mode==='hflow'||m.mode==='vflow'){ this._selBg(ctx,x,y,w,h,sel,hov,accent);

      ctx.font=fontToCSS(lb.font); ctx.fillStyle=colorToCSS(txt); ctx.fillText(_ellip(ctx,it.text,w-m.icon-12), x+m.icon+8, y+h/2);

  _drawHeader(ctx,L,accent,txt,lb){ const b=this.bounds, hh=L.headerH, base=_solid(getTheme().window.body.background);

      ctx.fillStyle=colorToCSS(_rgba(_solid(getTheme().window.border.color),0.5)); ctx.fillRect(cx+c.width-0.5,b.y+3,1,hh-6);
      ctx.fillStyle=colorToCSS(txt); ctx.textAlign='left';
      ctx.save(); ctx.beginPath(); ctx.rect(cx+5,b.y,c.width-22,hh); ctx.clip(); ctx.fillText(c.title, cx+6, b.y+hh/2); ctx.restore();

}

// ════════════════════════════════════════════════════════════════════
// WindowContent — scrollbars H+V, show on hover
// ════════════════════════════════════════════════════════════════════
class WindowContent extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._scrollX = 0; this._scrollY = 0;
    this._SB = 12; this._hovered = false; this._sbDrag = null;
  }

  hitTest(x, y) {
    if (!this.visible) return false;
    if (this._anim && (this._anim.type==='close'||this._anim.type==='minimize')) return false;
    return rectContains(this.getAbsoluteBounds(), x, y);
  }

  _contentSize() {
    let maxX=0, maxY=0;
    for (const c of this.children) {
      if (!c.visible) continue;
      maxX = Math.max(maxX, c.bounds.x+c.bounds.width);
      maxY = Math.max(maxY, c.bounds.y+c.bounds.height);
    }
    return { w:maxX+10, h:maxY+10 };
  }

  _bars(b) {
    const cs=this._contentSize(), SB=this._SB;
    const needV=cs.h>b.height;
    const needH=cs.w>b.width-(needV?SB:0);
    return { needH, needV, SB,
      viewW:b.width-(needV?SB:0), viewH:b.height-(needH?SB:0), cw:cs.w, ch:cs.h };
  }

  _clamp(b) {
    const{viewW,viewH,cw,ch}=this._bars(b);
    this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX));
    this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY));
  }

  _thumbInfo(dir,viewSz,contentSz,scroll) {
    const len=Math.max(24,viewSz*Math.min(1,viewSz/contentSz));
    const maxScroll=Math.max(1,contentSz-viewSz);
    return { off:(scroll/maxScroll)*(viewSz-len), len, maxScroll };
  }

  _onScroll(ev) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,viewW,viewH,cw,ch}=this._bars(b);
    const dy=ev.deltaY||0, dx=ev.deltaX||0;
    if (dx!==0) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dx));
    } else if (ev.shiftKey||(!needV&&needH)) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    } else {
      if (needV)      this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY+dy));
      else if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    }
    this.markDirty();
  }

  _hitSB(ax,ay) {
    const b=this.bounds, ab=this.getAbsoluteBounds();
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    if (needV) {
      const tx=ab.x+viewW, ty=ab.y;
      if (ax>=tx&&ax<=tx+SB&&ay>=ty&&ay<=ty+viewH) {
        const ti=this._thumbInfo('v',viewH,ch,this._scrollY);
        return{dir:'v',trackStart:ty,trackLen:viewH,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    if (needH) {
      const tx=ab.x, ty=ab.y+viewH;
      if (ax>=tx&&ax<=tx+viewW&&ay>=ty&&ay<=ty+SB) {
        const ti=this._thumbInfo('h',viewW,cw,this._scrollX);
        return{dir:'h',trackStart:tx,trackLen:viewW,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    return null;
  }

  setHovered(v)        { if (this._hovered!==v){this._hovered=v;this.markDirty();} }
  isOverScrollbar(ax,ay){ return !!this._hitSB(ax,ay); }

  onMouseDownAbs(ax,ay) {
    const sb=this._hitSB(ax,ay); if (!sb) return false;
    this._clamp(this.bounds);
    const mousePos=sb.dir==='v'?ay:ax, curScroll=sb.dir==='v'?this._scrollY:this._scrollX;
    const inThumb=mousePos>=sb.trackStart+sb.thumbOff&&mousePos<=sb.trackStart+sb.thumbOff+sb.thumbLen;
    if (inThumb) {
      this._sbDrag={dir:sb.dir,startScroll:curScroll,startMouse:mousePos,
        trackLen:sb.trackLen,thumbLen:sb.thumbLen,maxScroll:sb.maxScroll};
    } else {
      const ratio=(mousePos-sb.trackStart-sb.thumbLen/2)/Math.max(1,sb.trackLen-sb.thumbLen);
      const ns=Math.max(0,Math.min(sb.maxScroll,ratio*sb.maxScroll));
      if (sb.dir==='v') this._scrollY=ns; else this._scrollX=ns;
      this.markDirty();
    }
    return true;
  }

  onMouseMoveAbs(ax,ay) {
    if (!this._sbDrag) return false;
    const d=this._sbDrag, pos=d.dir==='v'?ay:ax;
    const range=d.trackLen-d.thumbLen;
    const ns=d.startScroll+(range>0?(pos-d.startMouse)*d.maxScroll/range:0);
    if (d.dir==='v') this._scrollY=Math.max(0,Math.min(d.maxScroll,ns));
    else             this._scrollX=Math.max(0,Math.min(d.maxScroll,ns));
    this.markDirty(); return true;
  }

  onMouseUpAbs() { const had=!!this._sbDrag; this._sbDrag=null; return had; }

  dispatchEvent(ev) {
    // Handle scroll/wheel events specially - don't depend on hitTest
    if (ev.type === 'scroll' || ev.type === 'wheel') {
      // For scroll/wheel, distribute to all visible children at the event position
      const b = this.bounds;
      const lx = ev.x - b.x, ly = ev.y - b.y;
      const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
      
      for (const c of sorted) {
        if (!c.visible) continue;
        // Check if point is in child bounds
        const cb = c.bounds;
        if (lx >= cb.x && lx <= cb.x + cb.width && ly >= cb.y && ly <= cb.y + cb.height) {
          const re = { ...ev, x: lx, y: ly };
          c.dispatchEvent(re);
          // Don't break for scroll events - let them propagate
        }
      }
      // Also handle scroll at WindowContent level (e.g. for window scrollbars)
      this._onScroll(ev);
      return true;
    }
    
    // Default behavior for other events
    const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
    for (const c of sorted) {
      if (c.visible && c.hitTest(ev.x, ev.y)) {
        const re = { ...ev, x: ev.x - this.bounds.x, y: ev.y - this.bounds.y };
        c.dispatchEvent(re);
        if (ev.stopped) return true;
      }
    }
    this.emit(ev);
    return !ev.stopped;
  }

  render(ctx) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    const sx=this._scrollX, sy=this._scrollY;
    const showSB=this._hovered||!!this._sbDrag;
    const sorted=[...this.children].sort((a,b2)=>a.zIndex-b2.zIndex);

    // Children rendered in scrolled content space
    // ctx is in WINDOW space (absolute). Children bounds are in CONTENT space (0-based).
    // WindowContent.render is called with ctx translated to window origin (by GUIWindow.render).
    // So we need to position children at (b.x - sx + child.bounds.x, b.y - sy + child.bounds.y).
    ctx.save();
    ctx.beginPath(); ctx.rect(b.x,b.y,viewW,viewH); ctx.clip();
    ctx.translate(b.x-sx, b.y-sy);

    for (const child of sorted) {
      if (!child.visible) continue;
      const _noDS=child instanceof RadioButton||child instanceof Slider||child instanceof ListBox||child instanceof ProgressBar;
      const effOp=(!child.enabled&&_noDS?0.38:1)*(child.opacity??1);
      const needC=effOp<0.9999||child.tint!=null||!!child.rotation;
      if (needC) {
        const bw=Math.ceil(child.bounds.width),bh=Math.ceil(child.bounds.height);
        if (bw>0&&bh>0) {
          const off=new OffscreenCanvas(bw,bh); const octx=off.getContext('2d');
          octx.translate(-child.bounds.x,-child.bounds.y); child.render(octx);
          if (child.tint) {
            octx.setTransform(1,0,0,1,0,0); octx.globalCompositeOperation='source-atop';
            octx.fillStyle=`rgba(${child.tint.r},${child.tint.g},${child.tint.b},${child.tint.a??0.3})`;
            octx.fillRect(0,0,bw,bh);
          }
          ctx.save(); ctx.globalAlpha*=effOp;
          if (child.rotation) {
            const cx=child.bounds.x+bw/2,cy=child.bounds.y+bh/2;
            ctx.translate(cx,cy); ctx.rotate(child.rotation); ctx.drawImage(off,-bw/2,-bh/2);
          } else ctx.drawImage(off,child.bounds.x,child.bounds.y);
          ctx.restore();
        }
      } else child.render(ctx);
    }
    ctx.restore();

    if (showSB) {
      if (needV) this._drawBar(ctx,b,'v',viewW,viewH,sy,ch,SB);
      if (needH) this._drawBar(ctx,b,'h',viewW,viewH,sx,cw,SB);
      //if (needV&&needH){ctx.fillStyle='rgba(200,200,200,0.5)';ctx.fillRect(b.x+viewW,b.y+viewH,SB,SB);}
    }

    // Unclipped dropdowns
    for (const child of sorted) {
      if (!child.visible||!(child instanceof DropDown)||!child._open) continue;
      ctx.save(); ctx.translate(b.x-sx,b.y-sy); child._renderList(ctx); ctx.restore();
    }


    if (_debugHitTest) {
      ctx.save(); ctx.translate(b.x-sx,b.y-sy);
      for (const child of sorted) {
        if (!child.visible) continue;
        if (child.rotation) {
          const bx=child.bounds.x,by2=child.bounds.y,bw2=child.bounds.width,bh2=child.bounds.height;

    drawRoundRect(ctx, tx, ty, tw2, th2, t.borderRadius); ctx.fill();
    clearShadow(ctx);
    ctx.strokeStyle = colorToCSS(t.border.color); ctx.lineWidth = t.border.width;
    drawRoundRect(ctx, tx+.5, ty+.5, tw2-1, th2-1, t.borderRadius); ctx.stroke();
    ctx.fillStyle = colorToCSS(t.text); ctx.textBaseline = 'middle';
    ctx.fillText(text, tx+t.padding.x, ty+th2/2);
    ctx.restore();
  }
  scrollOpenDropDown(x,y,steps){
    for(let wi=this._windows.length-1;wi>=0;wi--){
      const win=this._windows[wi];if(!win.visible)continue;
      const wab=win.getAbsoluteBounds();
      const ca=win._contentArea;
      const dds=this._collectOpenDDs(ca.children||[]);
      for(const dd of dds){
        const lr=dd._listRect();
        const ax=wab.x+ca.bounds.x+lr.x,ay=wab.y+ca.bounds.y+lr.y;
        if(x>=ax&&x<=ax+lr.width&&y>=ay&&y<=ay+lr.height){
          const vis=Math.min(dd._maxVisibleItems,dd.items.length);
          dd._scrollOffset=Math.max(0,Math.min(dd._scrollOffset+steps,dd.items.length-vis));
          dd.markDirty();return true;
        }
      }
    }
    return false;
  }
  _collectOpenDDs(children){
    const r=[];
    for(const c of children){
      if(c._open===true)r.push(c);
      if(c.children&&c.children.length)r.push(...this._collectOpenDDs(c.children));
    }
    return r;
  }

}


class GUIEngine {
  constructor(canvas) {
    this._canvas=canvas;
    const ctx=canvas.getContext('2d'); if(!ctx)throw new Error('No 2D context');
    this._ctx=ctx;
    this._offscreen=document.createElement('canvas');
    this._offscreen.width=canvas.width; this._offscreen.height=canvas.height;
    this._offCtx=this._offscreen.getContext('2d');

    this._wm._cursorEl=canvas;
    this._wm._cursorEl=canvas;

    this._fps=0; this._frameCount=0; this._fpsTimer=0;

    wm._draggedWindow=null; wm._sbDragWin=null; this._mouseDown=false; wm._mouseDown=false;

    // ── Mouse (desktop) ────────────────────────────────────────────────────
    // mousedown on canvas only — starts interactions
    const _mods = e => ({ ctrlKey:e.ctrlKey, shiftKey:e.shiftKey, metaKey:e.metaKey, altKey:e.altKey });
    c.addEventListener('mousedown',e=>{

      try{ this._wm.handleMouseDown(x,y,e.button); }catch(err){ this._inputErr(err); }

    });

    window.addEventListener('mouseup',e=>{
      if(this._touchActive)return;
      const {x,y}=pos(e);
      if(this._mouseDown){

    });

    });

      }
    },{passive:false});

    c.addEventListener('touchend',e=>{
      e.preventDefault();
      if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
      _twoY=null;
      const ch=[...e.changedTouches].find(t=>t.identifier===_tid)||e.changedTouches[0];
      const {x,y}=posT(ch);

      setTimeout(()=>{this._wm.handleMouseMove(-999,-999);this._fullRedraw=true;},50);

    c.addEventListener('touchcancel',e=>{

    // ── Keyboard (desktop direct, mobile via hidden input) ─────────────────
    const _kd=e=>{
      // Ctrl+Shift+D: toggle dirty-rect debug overlay
      if (e.ctrlKey && e.shiftKey && (e.key === 'd' || e.key === 'D')) {

        this._fullRedraw = true;
        e.preventDefault();
        return;
      }
      // Ctrl+G: toggle grid lines overlay on all GridPanels
      if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === 'g' || e.key === 'G')) {

      this._wm.handleKey('keydown',e.key,e.keyCode,e.ctrlKey,e.shiftKey,e.altKey);

  start(){this._lastTime=performance.now();this._loop(this._lastTime);}
  _loop=ts=>{
   try {
    const dt=Math.min(ts-this._lastTime,50); this._lastTime=ts;
    this._fpsTimer+=dt; this._frameCount++;
    if(this._fpsTimer>=1000){this._fps=this._frameCount;this._frameCount=0;this._fpsTimer=0;}
    this._wm.update(dt);
    // Only redraw what is marked dirty (or the full canvas if forced).
    const dirty = this._fullRedraw
    ? { x: 0, y: 0, width: this._canvas.width, height: this._canvas.height }
    : this._wm.getDirtyRect();
    
    let dirtyRects = null;
    if (this.showDirtyRects) {
      dirtyRects = this._wm.collectDirtyRects([]);
    }
    
    if (dirty) {
      const x = Math.max(0, Math.floor(dirty.x));
      const y = Math.max(0, Math.floor(dirty.y));
      const w = Math.max(0, Math.min(this._canvas.width - x, Math.ceil(dirty.width)));
      const h = Math.max(0, Math.min(this._canvas.height - y, Math.ceil(dirty.height)));

      this._offCtx.save();
      this._offCtx.beginPath();
      this._offCtx.rect(x, y, w, h);
      this._offCtx.clip();
      this._offCtx.clearRect(x, y, w, h);
      this._wm.render(this._offCtx);

      // Ctrl+G grid overlay — drawn on top of everything
      if (this.showGridOverlay) {
        this._renderGridOverlay(this._offCtx);
      }

      this._offCtx.restore();

      this._wm.markClean();

      this._ctx.clearRect(x, y, w, h);
      this._ctx.drawImage(this._offscreen, x, y, w, h, x, y, w, h);

      if (dirtyRects && dirtyRects.length) {
        this._ctx.save();
        this._ctx.strokeStyle = 'rgba(255,0,0,0.8)';
        this._ctx.lineWidth = 1;
        this._ctx.fillStyle = 'rgba(255,0,0,0.15)';
        for (const r of dirtyRects) {
          const rx = Math.max(0, Math.floor(r.x));
          const ry = Math.max(0, Math.floor(r.y));
          const rw = Math.max(0, Math.min(this._canvas.width - rx, Math.ceil(r.width)));
          const rh = Math.max(0, Math.min(this._canvas.height - ry, Math.ceil(r.height)));
          this._ctx.fillRect(rx, ry, rw, rh);
          this._ctx.strokeRect(rx + 0.5, ry + 0.5, Math.max(0, rw - 1), Math.max(0, rh - 1));

   } catch(err) {

    // then keep the loop alive and force a clean full redraw next frame.

  // Recursively collect all visible GridPanels with their absolute positions
  _collectGridPanels(widget, absX, absY, result) {
    if (!widget || !widget.visible) return;
    const bx = absX + (widget.bounds?.x || 0);
    const by = absY + (widget.bounds?.y || 0);
    if (widget instanceof GridPanel && widget._rects) {
      result.push({ gp: widget, ax: absX, ay: absY });
    }
    for (const child of (widget.children || [])) {
      // WindowContent children are shifted by scroll
      const scrollX = widget._scrollX || 0;
      const scrollY = widget._scrollY || 0;
      this._collectGridPanels(child, bx - scrollX, by - scrollY, result);
    }
  }

  _renderGridOverlay(ctx) {
    const panels = [];
    for (const win of (this._wm._windows || [])) {
      if (!win.visible) continue;
      const wb = win.getAbsoluteBounds?.() || win.bounds;
      const ca = win._contentArea;
      if (ca) {
        const caAbsX = wb.x + ca.bounds.x;
        const caAbsY = wb.y + ca.bounds.y - (ca._scrollY || 0);
        for (const child of (ca.children || []))
          this._collectGridPanels(child, caAbsX, caAbsY, panels);
      }
    }
    if (panels.length === 0) return;

    ctx.save();

    for (const { gp, ax, ay } of panels) {
      if (!gp._rects || gp._dirty) continue;

      const px = ax + gp.bounds.x;
      const py = ay + gp.bounds.y;
      const pw = gp.bounds.width;
      const ph = gp.bounds.height;
      const pad = gp._pad ? gp._pad() : {t:0,r:0,b:0,l:0};
      const gap = gp._cGap ? gp._cGap() : (gp.gap || 0);
      const rGap = gp._rGap ? gp._rGap() : (gp.gap || 0);

      // Collect unique edges from rects
      const colEdges = new Set([pad.l, pw - pad.r]);
      const rowEdges = new Set([pad.t, ph - pad.b]);
      for (const r of gp._rects) {
        if (!r) continue;
        colEdges.add(r.x); colEdges.add(r.x + r.w);
        rowEdges.add(r.y); rowEdges.add(r.y + r.h);
      }
      const cols = [...colEdges].sort((a,b)=>a-b);
      const rows = [...rowEdges].sort((a,b)=>a-b);

      ctx.save();
      // Clip to panel
      ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

      // ── Draw lines only inside gaps (between cells) ──
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.55)';

      // Internal column separators — only draw the gap zone, not over cells
      for (let ci = 1; ci < cols.length - 1; ci++) {
        const ex = px + cols[ci];
        // Is this edge a right-edge of a cell? → gap starts here
        // Draw dashed line through the gap width
        const gapW = gap > 0 ? gap : 1;
        ctx.beginPath();
        ctx.moveTo(ex - gapW/2 + 0.5, py + pad.t);
        ctx.lineTo(ex - gapW/2 + 0.5, py + ph - pad.b);
        ctx.stroke();
      }

      // Internal row separators
      for (let ri = 1; ri < rows.length - 1; ri++) {
        const ey = py + rows[ri];
        const gapH = rGap > 0 ? rGap : 1;
        ctx.beginPath();
        ctx.moveTo(px + pad.l, ey - gapH/2 + 0.5);
        ctx.lineTo(px + pw - pad.r, ey - gapH/2 + 0.5);
        ctx.stroke();
      }

      // ── Panel outer border ──
      ctx.setLineDash([5, 3]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.8)';
      ctx.strokeRect(px + pad.l + 0.75, py + pad.t + 0.75,
                     pw - pad.l - pad.r - 1.5, ph - pad.t - pad.b - 1.5);
      ctx.setLineDash([]);

      // ── Size annotations — outside the panel, in the padding zone ──
      ctx.font = 'bold 8px monospace';
      ctx.fillStyle = 'rgba(50, 50, 180, 0.9)';
      ctx.textBaseline = 'bottom';
      ctx.textAlign = 'center';

      // Column widths above each column (in top padding)
      if (pad.t >= 9) {
        for (let ci = 0; ci < cols.length - 1; ci++) {
          const cw2 = cols[ci+1] - cols[ci];
          if (cw2 < 20) continue;
          const midX = px + cols[ci] + cw2/2;
          ctx.fillText(`${Math.round(cw2)}`, midX, py + pad.t - 1);
        }
      }

      // Row heights in left padding
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      if (pad.l >= 10) {
        for (let ri = 0; ri < rows.length - 1; ri++) {
          const rh2 = rows[ri+1] - rows[ri];
          if (rh2 < 10) continue;
          const midY = py + rows[ri] + rh2/2;
          ctx.fillText(`${Math.round(rh2)}`, px + pad.l - 2, midY);
        }
      }

      ctx.restore();
    }

    // Legend badge
    ctx.save();
    const lx = 8, ly = this._canvas.height - 22;
    ctx.fillStyle = 'rgba(20,20,60,0.8)';
    ctx.beginPath(); ctx.roundRect(lx, ly, 228, 16, 4); ctx.fill();
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = 'rgba(180,180,255,1)';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('⊞ Grid overlay actif — Ctrl+G pour désactiver', lx+6, ly+8);
    ctx.restore();

    ctx.restore();
  }

  get fps(){return this._fps;}
}

// ── Palettes dérivées pour les nouveaux widgets (suit le thème actif) ───────
function _augmentExtraThemes() {
  for (const key in themes) {
    const T = themes[key];
    const dark    = _lum(T.window.body.background) < 0.45;
    const accent  = _solid(T.slider.fill.background) || _solid(T.button.toggled.background);
    const text    = _solid(T.label.text);
    const subtle  = _solid(T.label.disabledText);
    const surface = _solid(T.listBox.background);
    const border  = _solid(T.listBox.border.color);
    const onAccent= _solid(T.dropdown.itemSelectedText) || hexToColor('#FFFFFF');

    T.toggleSwitch = {
      trackOff: dark ? _mix(surface,{r:0,g:0,b:0},0.25) : _mix(border,{r:255,g:255,b:255},0.2),
      trackOn:  accent, knob: hexToColor('#FFFFFF'),
      knobShadow: { x:0, y:1, blur:3, color:{r:0,g:0,b:0,a:0.35} },
    };
    T.menuBar = {
      background: _rgba(border, dark?0.16:0.08), text, font: T.label.font,
      hoverBg: _rgba(accent,0.18), hoverText: text, openBg: _rgba(accent,0.30),
    };
    T.accordion = {
      headerBg: _rgba(border, dark?0.22:0.10), headerHover: _rgba(accent,0.16),
      headerText: text, font: { ...T.label.font, weight:'bold' },
      border: T.listBox.border, body: _rgba(surface, dark?0.5:1), chevron: subtle,
    };
    T.toast = {
      background: dark ? _mix(surface,{r:255,g:255,b:255},0.06) : surface,
      text, font: T.label.font, shadow: { x:0, y:4, blur:16, color:{r:0,g:0,b:0,a:0.35} },
      border: T.listBox.border, radius: 8,
      accent: { info: hexToColor('#3A8DDE'), success: hexToColor('#2Fa45a'),
                warning: hexToColor('#F5A623'), error: hexToColor('#E0463C') },
    };
    T.messageDlg = {
      titleBar: T.window.titleBar, titleText: _solid(T.window.titleBar.text),
      body: T.window.body.background, border: T.window.border,
      radius: T.window.borderRadius || 6, text, font: T.label.font,
      shadow: T.window.shadow || { x:0, y:10, blur:30, color:{r:0,g:0,b:0,a:0.5} },
      onAccent,
    };
  }
}
_augmentExtraThemes();

// ── ToggleSwitch : interrupteur on/off animé ────────────────────────────────
class ToggleSwitch extends BaseWidget {
  constructor(bounds, opts={}) {
    super('toggle_'+(++_idCounter), bounds);
    this._checked = !!opts.checked;
    this._hovered = false; this.cursor = 'pointer'; this.tabIndex = 0;
    this.label  = opts.label  ?? '';
    this.onText = opts.onText ?? '';   // texte affiché quand ON (si pas de label)
    this.offText= opts.offText?? '';   // texte affiché quand OFF
    this.trackW = opts.trackWidth ?? 46;
    this._focused = false;
    this._anim  = this._checked ? 1 : 0;
    this.on('mouseenter', () => { this._hovered=true;  this.markDirty(); });
    this.on('mouseleave', () => { this._hovered=false; this.markDirty(); });
    this.on('focus', () => { this._focused=true;  this.markDirty(); });
    this.on('blur',  () => { this._focused=false; this.markDirty(); });
    this.on('click',   () => { if (this.enabled) { this.checked=!this._checked; this._emit(); } });
    this.on('keydown', e => { if (this.enabled && (e.key===' '||e.key==='Enter'||e.key==='Spacebar')) { this.checked=!this._checked; this._emit(); e.preventDefault?.(); } });
  }
  get checked() { return this._checked; }
  set checked(v) { v=!!v; if (v!==this._checked) { this._checked=v; this.markDirty(); } }
  _emit() { this.emit({ type:'change', target:this, checked:this._checked, x:0, y:0,
    stopPropagation(){this.stopped=true;}, preventDefault(){this.defaultPrevented=true;}, stopped:false, defaultPrevented:false }); }
  update(dt) {

// ── MessageDlg : dialogue modal paramétrable (base des autres dialogues) ─────
const MessageType = { CUSTOM:'custom', INFORMATION:'information', WARNING:'warning', ERROR:'error', CONFIRMATION:'confirmation' };
function _dlgWrapLines(text, maxW, font) {
  _measureCtx.font = font;

  for (const para of String(text).split('\n')) {
    const words=para.split(' '); let cur='';
    for (const w of words) { const test=cur?cur+' '+w:w; if(_measureCtx.measureText(test).width<=maxW) cur=test; else { if(cur)out.push(cur); cur=w; } }
    out.push(cur);
  }
  return out;
}
function _drawDlgIcon(ctx, type, cx, cy, r) {
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';

    ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(r*1.1)}px system-ui`; ctx.fillText('!', cx, cy+r*0.2);
    ctx.restore(); return;
  }
  let bg, glyph;
  if (type==='error') { bg='#E0463C'; glyph='✕'; }
  else if (type==='information') { bg='#3A8DDE'; glyph='i'; }
  else if (type==='confirmation') { bg='#5B7CE0'; glyph='?'; }
  else { ctx.restore(); return; }
  ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(r*1.25)}px Georgia, system-ui`; ctx.fillText(glyph, cx, cy+r*0.06);
  ctx.restore();
}

  // opts: { caption, message, dlgType, buttons:[{text,result,isDefault,isCancel}], input, inputValue, inputMask }
  constructor(opts={}) {
    super(opts.caption ?? 'Message', { x:0, y:0, width:360, height:160 });

function installToasts(wm) {

  wm.update=function(dt){
    _upd(dt); const arr=wm._toasts; if(!arr.length) return; let changed=false;

      if (!n.dying) { if(n.anim<1){ n.anim=Math.min(1,n.anim+dt/180); changed=true; } if(n.age>=n.dur) n.dying=true; }
      else { n.anim-=dt/220; changed=true; if(n.anim<=0) n._dead=true; }
    }
    if (arr.some(n=>n._dead)) { wm._toasts=arr.filter(n=>!n._dead); changed=true; }
    if (changed) wm.markDirty();
  };
  const _ren=wm.render.bind(wm);

  };

    show(message, opts={}) { const n={ message, type:opts.type??'info', dur:opts.duration??3400, age:0, anim:0, dying:false, w:300, h:52 }; wm._toasts.push(n); wm.markDirty(); return n; },

    warning(m,o={}){ return this.show(m,{...o,type:'warning'}); },
    error(m,o={}){ return this.show(m,{...o,type:'error'}); },

}

// ── Adaptive window sizing ───────────────────────────────────────────────
// Returns { w, h, x, y } that fits the current viewport
function winBounds(desiredW, desiredH, offsetX=0, offsetY=0) {
  const vw = canvas.width, vh = canvas.height;
  const margin = isTouchDevice() ? 8 : 20;
  const w = Math.min(desiredW, vw - margin*2);
  const h = Math.min(desiredH, vh - margin*2);
  const x = Math.max(margin, Math.min(offsetX || Math.floor((vw-w)/2), vw-w-margin));
  const y = Math.max(margin, Math.min(offsetY || Math.floor((vh-h)/2), vh-h-margin));
  return {x, y, width:w, height:h};
}

let engine = null;

function resizeCanvas() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  if (engine) {
    engine.windowManager.bounds.width  = canvas.width;
    engine.windowManager.bounds.height = canvas.height;
    engine._offscreen.width  = canvas.width;
    engine._offscreen.height = canvas.height;
    engine._fullRedraw = true;
    // Nudge any windows that are now out of bounds back into view
    for (const win of engine.windowManager.windows) {
      const b = win.bounds, m = 10;
      if (b.x + b.width  > canvas.width  - m) win.bounds.x = Math.max(m, canvas.width  - b.width  - m);
      if (b.y + b.height > canvas.height - m) win.bounds.y = Math.max(m, canvas.height - b.height - m);
      if (b.x < m) win.bounds.x = m;
      if (b.y < m) win.bounds.y = m;
    }
  }
}

window.openGaugesWindow = function() {
  const cell = 168, pad = 12, cols = 5, rows = 3;
  const cw = cols*cell + (cols+1)*pad;
  const b = winBounds(cw + 28, rows*cell + (rows+1)*pad + 56, 60, 40);
  const w = new GUIWindow('🎛️ Gauges — vitesse, horloges, marine & avionique', b);
  const ca = w.contentArea;

  // 5×3 grid matching the reference screenshot
  const defs = [
    Speed1Gauge, Speed2Gauge, Speed3Gauge, WoodClockGauge, BlackClockGauge,
    SystemClockGauge, BoatDirectionGauge, Gas1Gauge, Gas2Gauge, AirSpeedGauge,
    AltimeterGauge, AltitudeGauge, HeadingGauge, TurnCoordinatorGauge, VerticalSpeedGauge,
  ];
  const gauges = [];
  defs.forEach((Cls, i) => {
    const c = i % cols, r = (i / cols) | 0;
    const g = new Cls({ x: pad + c*(cell+pad), y: pad + r*(cell+pad), width: cell, height: cell });
    ca.addChild(g); gauges.push(g);
  });

  // Initial demo values (≈ screenshot)
  const G = {}; defs.forEach((Cls,i)=>G[Cls.name]=gauges[i]);
  G.Speed1Gauge._dispValue=G.Speed1Gauge.value=99;
  G.Speed2Gauge._dispValue=G.Speed2Gauge.value=10;
  G.Speed3Gauge._dispValue=G.Speed3Gauge.value=10;
  G.BoatDirectionGauge.value=300; G.BoatDirectionGauge.value1=120; G.BoatDirectionGauge.value2=240;
  G.Gas1Gauge.value=62; G.Gas2Gauge.value=7; G.AirSpeedGauge.value=250;
  G.AltimeterGauge.value=6280; G.AltitudeGauge.value=12; G.AltitudeGauge.rollAngle=-12;
  G.HeadingGauge.value=35; G.TurnCoordinatorGauge.value=2.5; G.TurnCoordinatorGauge.turnQuality=2;
  G.VerticalSpeedGauge.value=2;

  // Animation driver — retarget needles periodically (eased tween does the rest).
  const rnd = (a,bb)=>a+Math.random()*(bb-a);
  const timer = setInterval(() => {
    if (!engine.windowManager.windows.includes(w)) { clearInterval(timer); return; }
    G.Speed1Gauge.setValue(rnd(0,120)); G.Speed2Gauge.setValue(rnd(0,100)); G.Speed3Gauge.setValue(rnd(0,100));
    G.BoatDirectionGauge.value=rnd(0,360); G.BoatDirectionGauge.value1=rnd(0,360); G.BoatDirectionGauge.value2=rnd(0,360); G.BoatDirectionGauge.markDirty();
    G.Gas1Gauge.setValue(rnd(0,100)); G.Gas2Gauge.setValue(rnd(0,10)); G.AirSpeedGauge.setValue(rnd(40,700));
    G.AltimeterGauge.setValue(rnd(0,9000)); G.AltitudeGauge.setValue(rnd(-40,40)); G.AltitudeGauge.rollAngle=rnd(-25,25);
    G.HeadingGauge.setValue(rnd(0,360)); G.TurnCoordinatorGauge.setValue(rnd(-5,5)); G.TurnCoordinatorGauge.turnQuality=rnd(-8,8);
    G.VerticalSpeedGauge.setValue(rnd(-6,6));
  }, 2400);

  w._updateLayout();
  engine.windowManager.addWindow(w);
};

  ca.addChild(split);
  const tg1 = new ToggleSwitch({ x:200, y:y+4, width:130, height:24 }, { label:'Wi-Fi', checked:true });
  const tg2 = new ToggleSwitch({ x:340, y:y+4, width:150, height:24 }, { onText:'Activé', offText:'Désactivé' });
  tg1.on('change', e => toasts.info('Wi-Fi ' + (e.checked?'activé':'désactivé')));
  ca.addChild(tg1); ca.addChild(tg2);
  y += 42; sep();

  // ── MaskedTextBox ───────────────────────────────────────────────────────────
  head('MaskedTextBox');
  ca.addChild(new Label('Téléphone', { x:10, y, width:120, height:18 }));
  ca.addChild(new Label('Date', { x:10+bw2+10, y, width:120, height:18 }));
  y += 20;
  const mPhone = new MaskedTextBox({ x:10, y, width:bw2, height:30 }, { mask:'(99) 99 99 99 99' });
  const mDate  = new MaskedTextBox({ x:10+bw2+10, y, width:bw2, height:30 }, { mask:'99/99/9999' });
  ca.addChild(mPhone); ca.addChild(mDate);
  y += 38; sep();

  // ── AutoComplete & MultiSelect ──────────────────────────────────────────────
  head('AutoComplete & MultiSelect');
  const langs = ['JavaScript','TypeScript','Python','Rust','Go','C++','C#','Java','Kotlin','Swift','Ruby','PHP','Elixir','Haskell'];
  ca.addChild(new Label('Autocomplétion (1 choix)', { x:10, y, width:bw2, height:18 }));
  ca.addChild(new Label('Sélection multiple', { x:10+bw2+10, y, width:bw2, height:18 }));
  y += 20;
  const ac = new AutoComplete(langs, { x:10, y, width:bw2, height:30 }, { placeholder:'Tapez pour filtrer…' });
  const ms = new AutoComplete(langs, { x:10+bw2+10, y, width:bw2, height:30 }, { multiple:true, selected:[0,3] });
  ac.on('change', () => toasts.info('Choisi : ' + ac.value));
  ca.addChild(ac); ca.addChild(ms);
  y += 40; sep();

  // ── Accordion ───────────────────────────────────────────────────────────────
  head('Accordion');
  const acc = new Accordion({ x:10, y, width:cw, height:10 }, { multiExpand:false });
  const pGen = new Panel({ x:0, y:0, width:cw, height:96 });
  pGen.addChild(new Label('Profil utilisateur', { x:12, y:10, width:cw-24, height:18 }));
  pGen.addChild(new CheckBox('Recevoir la newsletter', { x:12, y:34, width:cw-24, height:24 }));
  const accTg = new ToggleSwitch({ x:12, y:62, width:200, height:24 }, { label:'Profil public', checked:true });
  pGen.addChild(accTg);
  const pNotif = new Panel({ x:0, y:0, width:cw, height:80 });
  pNotif.addChild(new Label('Volume des notifications', { x:12, y:10, width:cw-24, height:18 }));
  const accSl = new Slider({ x:12, y:36, width:cw-40, height:28 }); accSl.value=60; pNotif.addChild(accSl);
  const pAbout = new Panel({ x:0, y:0, width:cw, height:64 });
  const al=new Label('Accordion — sections repliables hébergeant de vrais widgets du framework.', { x:12, y:10, width:cw-24, height:44 });
  al.wordWrap=true; al.verticalAlign='top'; pAbout.addChild(al);
  acc.addSection('Général', pGen, { icon:'⚙️', expanded:true });
  acc.addSection('Notifications', pNotif, { icon:'🔔' });
  acc.addSection('À propos', pAbout, { icon:'ℹ️' });
  ca.addChild(acc);
  y += acc.bounds.height + 8; sep();

  // ── Toast ───────────────────────────────────────────────────────────────────
  head('Toast (notifications)');
  const tbw = Math.floor((cw-30)/4);
  [['Info','info'],['Succès','success'],['Alerte','warning'],['Erreur','error']].forEach(([label,type],i)=>{
    const btn=new Button(label, { x:10+i*(tbw+10), y, width:tbw, height:30 });
    btn.on('click', () => toasts.show(`Notification ${label.toLowerCase()} — ${new Date().toLocaleTimeString('fr-FR')}`, { type }));
    ca.addChild(btn);
  });
  y += 40;

  // recalcule la hauteur de l'accordéon quand il s'anime → MAJ scroll du content
  const origUpd = acc.update.bind(acc);
  acc.update = function(dt){ const h0=this.bounds.height; origUpd(dt); if(this.bounds.height!==h0) ca.markDirty(); };

  w._updateLayout();
  engine.windowManager.addWindow(w);
};

window.openSplitTileWindow = function() {
  const b = winBounds(660, 580, 60, 40);
  const w = new GUIWindow('🔲 Splitter & TileView', b);
  const ca = w.contentArea;
  const cw = b.width - 28;
  const head = (txt, y) => { const l = new Label(txt, { x:10, y, width:cw, height:20 }); l.font = { family:'Segoe UI,system-ui,Arial', size:13, weight:'bold' }; ca.addChild(l); return l; };

  // ── TileView : window switcher (miniatures + active centre window) ──────────
  head('TileView — sélecteur de fenêtres (cliquez une miniature)', 8);
  const status = new Label('Active : Fenêtre 1', { x:10, y:31, width:cw-170, height:18 });
  status.color = null; ca.addChild(status);
  const dockDD = new DropDown(['Strip à gauche','Strip à droite','Strip en haut','Strip en bas'], { x:cw-140, y:28, width:150, height:26 });
  const dockMap = ['left','right','top','bottom']; dockDD.selectedIndex = 0; ca.addChild(dockDD);

  const palette = ['#7b61ff','#59a14f','#f28e2b','#4e79a7','#e15759','#76b7b2','#b07aa1','#edc948','#9c755f'];
  const wins = palette.map((c, i) => ({ label: String(i + 1), title: 'Fenêtre ' + (i + 1), color: c }));
  const tvH = 300;
  const tv = new TileView(wins, { x:10, y:54, width:cw, height:tvH }, { dock:'left' });
  dockDD.on('change', () => { tv.dock = dockMap[dockDD.selectedIndex]; tv.markDirty(); });
  tv.on('change', e => { status.text = 'Active : ' + (e.activeWindow?.title ?? '—'); status.markDirty(); });
  ca.addChild(tv);

  // ── Splitter : horizontal divider demo ─────────────────────────────────────
  const hY = 54 + tvH + 18, barW = 6;
  head('Splitter — glissez la barre pour redimensionner', hY);
  const paneBg1 = { r:120, g:140, b:175, a:0.16 }, paneBg2 = { r:120, g:140, b:175, a:0.28 };
  const hTop = new Panel({ x:10, y:hY+24, width:cw, height:60 }, { background:paneBg1, borderRadius:6 });
  const hbar = new Splitter({ x:10, y:hY+84, width:cw, height:barW }, { orientation:'horizontal', min1:32, min2:32 });
  const hBot = new Panel({ x:10, y:hY+90, width:cw, height:60 }, { background:paneBg2, borderRadius:6 });
  const mkCentered = (txt) => { const l = new Label(txt, { x:0, y:0, width:cw, height:60 }); l.align='center'; l.verticalAlign='middle'; return l; };
  const lT = mkCentered('Panneau supérieur'); const lB = mkCentered('Panneau inférieur');
  hTop.addChild(lT); hBot.addChild(lB);
  hbar.bind(hTop, hBot);
  hbar.on('resize', () => { lT.setSize(hTop.bounds.width, hTop.bounds.height); lB.setSize(hBot.bounds.width, hBot.bounds.height); });
  ca.addChild(hTop); ca.addChild(hBot); ca.addChild(hbar);

  w._updateLayout();
  engine.windowManager.addWindow(w);
};

// ── Debug hit-test toggle ─────────────────────────────────────
window.toggleDebugHit = function() {
  _debugHitTest = !_debugHitTest;
  const btn = document.getElementById('debugHitBtn');
  if (btn) btn.style.outline = _debugHitTest ? '2px solid #f80' : '';
  engine.windowManager.markDirty();
};

// ── Launch default windows ────────────────────────────────────────────────
openControlsWindow();

engine.start();
</script>

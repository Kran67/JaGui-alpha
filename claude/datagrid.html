      headerC:   {x:b.x+leftW,   y:b.y,           w:bodyW,  h:headerH},
      // Fixed column left body
      fixedLeft: {x:b.x,         y:b.y+headerH,   w:leftW,  h:bodyH},
      // Main scrollable body
      body:      {x:b.x+leftW,   y:b.y+headerH,   w:bodyW,  h:bodyH},
      // Fixed column right body
      fixedRight:{x:b.x+leftW+bodyW, y:b.y+headerH, w:rightW, h:bodyH},
      // Fixed corner bottom-left
      cornerBL:  {x:b.x,         y:b.y+headerH+bodyH, w:leftW,  h:footerH},
      // Scrollable footer center
      footerC:   {x:b.x+leftW,   y:b.y+headerH+bodyH, w:bodyW,  h:footerH},
      // Fixed corner bottom-right
      cornerBR:  {x:b.x+leftW+bodyW, y:b.y+headerH+bodyH, w:rightW, h:footerH},
      // Scrollbars
      sbV:       {x:b.x+leftW+bodyW+rightW, y:b.y+headerH, w:SB, h:bodyH+footerH+SB},
      sbH:       {x:b.x+leftW,   y:b.y+headerH+bodyH+footerH, w:bodyW, h:SB},
      // Pagination
      pagin:     {x:b.x, y:b.y+headerH+bodyH+footerH+SB, w:b.width-toolW, h:paginH},
      // Tool panel
      tool:      {x:b.x+b.width-toolW, y:b.y, w:toolW, h:b.height-paginH},
      leftW, rightW, bodyW, bodyH, headerH, footerH, paginH
    };
  }

  // ══ Data pipeline ═════════════════════════════════════════════
  _invalidate() {
    this._processedRows = null;
    this._pivotFlatCols = null;
    this._pivotHeaderRows = null;
    this._pivotRows = null;
    this._page = 0;
  }

  _getCellValue(row, colDef) {
    if (!colDef) return null;
    if (row._isPivotRow) return row[colDef.field] ?? null;
    if (row._isGroup) return colDef.field===this._groupBy[row._level]?row._groupKey:row._agg?.[colDef.field];
    if (row._isTree && row._isVirtualTree) return row._agg?.[colDef.field] ?? null;
    if (colDef.valueGetter) return colDef.valueGetter(row);
    return row[colDef.field];
  }

  _formatValue(value, row, colDef) {
    if (colDef?.valueFormatter) return colDef.valueFormatter(value, row);
    if (value==null) return '';
    return String(value);
  }

  _applyFilter(value, fval) {
    const v = value==null?'':String(value).toLowerCase();
    const q = (fval.value||'').toLowerCase();
    switch(fval.type||'contains') {
      case 'contains':    return v.includes(q);
      case 'notContains': return !v.includes(q);
      case 'equals':      return v===q;
      case 'notEquals':   return v!==q;
      case 'startsWith':  return v.startsWith(q);
      case 'endsWith':    return v.endsWith(q);
      case 'greaterThan': return parseFloat(value)>parseFloat(fval.value);
      case 'lessThan':    return parseFloat(value)<parseFloat(fval.value);
      case 'blank':       return v==='';
      case 'notBlank':    return v!=='';
      case 'set':         return !fval.values||fval.values.length===0||fval.values.includes(String(value));
      default: return true;
    }
  }

  _getProcessedRows() {
    if (this._pivotMode && this._pivotCols.length && this._valueCols.length) {
      if (this._pivotRows) return this._pivotRows;
      this._buildPivotData();
      return this._pivotRows;
    }
    if (this._processedRows) return this._processedRows;
    const cols = this._getFlatCols();

    // 1. Filter
    let rows = this.rowData;
    if (this._globalFilter.trim()) {
      const q = this._globalFilter.toLowerCase();
      rows = rows.filter(r => cols.some(c => {
        const v = this._getCellValue(r,c);
        return v!=null && String(v).toLowerCase().includes(q);
      }));
    }
    for (const [field, fval] of Object.entries(this._filters)) {
      if (!fval?.active) continue;
      const col = cols.find(c=>c.field===field);
      if (!col) continue;
      rows = rows.filter(r => this._applyFilter(this._getCellValue(r,col), fval));
    }

    // 2. Tree data
    if (this.treeData && this.getDataPath) {
      this._processedRows = this._buildTree(rows);
      return this._processedRows;
    }

    // 3. Sort
    if (this._sortState.length > 0) {
      rows = [...rows];
      for (let i=this._sortState.length-1; i>=0; i--) {
        const {field,dir} = this._sortState[i];
        const col = cols.find(c=>c.field===field);
        if (!col) continue;
        rows.sort((a,b) => {
          const av=this._getCellValue(a,col), bv=this._getCellValue(b,col);
          if (av==null&&bv==null) return 0;
          if (av==null) return dir==='asc'?-1:1;
          if (bv==null) return dir==='asc'?1:-1;
          const cmp = typeof av==='number'&&typeof bv==='number' ? av-bv : String(av).localeCompare(String(bv));
          return dir==='asc'?cmp:-cmp;
        });
      }
    }

    // 4. Grouping
    if (this._groupBy.length > 0) {
      this._processedRows = this._buildGroups(rows, this._groupBy, 0, '');
      return this._processedRows;
    }

    this._processedRows = rows;
    return rows;
  }

  _buildGroups(rows, groupFields, level, parentKey) {
    const field = groupFields[level];
    const col   = this._getFlatCols().find(c=>c.field===field);
    const map   = new Map();
    for (const r of rows) {
      const v = col ? this._getCellValue(r, col) : r[field];
      const k = v==null?'(blank)':String(v);
      if (!map.has(k)) map.set(k,[]);
      map.get(k).push(r);
    }

    const result = [];
    for (const [key, children] of map) {
      const groupKey = parentKey ? parentKey+'→'+key : key;
      const expanded = this._groupState[groupKey] !== false; // default expanded
      this._groupState[groupKey] = expanded;

      // Aggregation row
      const agg = this._aggregate(children);
      const groupRow = {
        _isGroup:true, _level:level, _groupKey:key, _fullKey:groupKey,
        _count:children.length, _expanded:expanded, _agg:agg, _field:field
      };
      result.push(groupRow);

      if (expanded) {
        if (level < groupFields.length-1) {
          result.push(...this._buildGroups(children, groupFields, level+1, groupKey));
        } else {
          result.push(...children);
        }
      }
    }
    return result;
  }

  _aggregate(rows) {
    const agg = {};
    for (const col of this._getFlatCols()) {
      if (!col.aggFunc) continue;
      const vals = rows.map(r => this._getCellValue(r,col)).filter(v=>v!=null&&!isNaN(v));
      if (col.aggFunc==='sum')   agg[col.field] = vals.reduce((s,v)=>s+v,0);
      if (col.aggFunc==='avg')   agg[col.field] = vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:null;
      if (col.aggFunc==='count') agg[col.field] = rows.length;
      if (col.aggFunc==='min')   agg[col.field] = vals.length?Math.min(...vals):null;
      if (col.aggFunc==='max')   agg[col.field] = vals.length?Math.max(...vals):null;
      if (typeof col.aggFunc==='function') agg[col.field] = col.aggFunc(rows, col);
    }
    return agg;
  }

  _buildTree(rows) {
    // Build tree from flat data using getDataPath
    // nodeMap: pathStr → {row|null, path, children, isVirtual}
    const nodeMap = new Map();

    for (const row of rows) {
      const path = this.getDataPath(row);
      const key  = path.join('/');
      // Ensure all ancestor virtual nodes exist
      for (let len = 1; len < path.length; len++) {
        const ancestorKey = path.slice(0, len).join('/');
        if (!nodeMap.has(ancestorKey)) {
          nodeMap.set(ancestorKey, {row:null, path:path.slice(0,len), children:[], isVirtual:true, label:path[len-1]});
        }
      }
      // Leaf node (real row)
      nodeMap.set(key, {row, path, children:[], isVirtual:false, label:path[path.length-1]});
    }

    // Build hierarchy
    const roots = [];
    for (const [pathStr, node] of nodeMap) {
      if (node.path.length <= 1) { roots.push(node); continue; }
      const parentKey = node.path.slice(0,-1).join('/');
      const parent = nodeMap.get(parentKey);
      if (parent) { if (!parent.children.includes(node)) parent.children.push(node); }
      else roots.push(node);
    }

    // Flatten with expand/collapse
    const result = [];
    const flatten = (nodes, depth) => {
      for (const node of nodes) {
        const key = node.path.join('/');
        const expanded = this._treeState[key] !== false;
        this._treeState[key] = expanded;
        if (node.isVirtual) {
          // Virtual group node — no real row data
          result.push({
            _isTree:true, _isVirtualTree:true, _level:depth, _treeKey:key,
            _hasChildren:node.children.length>0, _expanded:expanded,
            _treeLabel:node.label
          });
        } else {
          // Leaf node — spread real row data
          result.push({...node.row, _isTree:true, _isVirtualTree:false, _level:depth, _treeKey:key,
                       _hasChildren:node.children.length>0, _expanded:expanded,
                       _treeLabel:node.label});
        }
        if (expanded && node.children.length>0) flatten(node.children, depth+1);
      }
    };
    flatten(roots, 0);
    return result;
  }

  // ══ Pivot ══════════════════════════════════════════════════════

  /**
   * Construit _pivotFlatCols, _pivotHeaderRows, _colWidths, _colOffsets
   * à partir de _groupBy, _pivotCols, _valueCols et des valeurs distinctes dans rowData.
   */
  _buildPivotSchema() {
    const groupFields  = this._groupBy.length ? this._groupBy : [];
    const pivotFields  = this._pivotCols;   // ex: ['dept']
    const valueDefs    = this._valueCols;   // ex: [{field:'salary',aggFunc:'sum',headerName:'Salaire'}]

    // 1. Colonnes fixes (row-group labels)
    const fixedCols = groupFields.map(f => {
      const orig = this._findOrigColByField(f);
      return { field:f, headerName: orig?.headerName || f, width: orig?.width || 120,
               sortable:false, filter:false, _isPivotFixed:true };
    });

    // 2. Valeurs distinctes pour chaque pivot field (dans l'ordre d'apparition)
    const pivotValues = {};   // field → [val, ...]
    for (const pf of pivotFields) {
      const seen = new Set();
      const vals = [];
      for (const row of this.rowData) {
        const v = row[pf]; const k = v==null?'(vide)':String(v);
        if (!seen.has(k)) { seen.add(k); vals.push(k); }
      }
      vals.sort((a,b) => a.localeCompare(b, undefined, {numeric:true}));
      pivotValues[pf] = vals;
    }

    // 3. Générer les colonnes leaf : une par (combinaison pivot vals × value col)
    //    Pour simplifier avec plusieurs pivot fields : produit cartésien
    const combos = this._cartesian(pivotFields.map(pf => pivotValues[pf]));
    // combos = [ ['Engineering'], ['Marketing'], ... ] (si 1 pivot field)
    // ou [ ['Engineering','Alpha'], ... ] (si 2 pivot fields)

    const dynCols = [];
    for (const combo of combos) {
      for (const vd of valueDefs) {
        const orig = this._findOrigColByField(vd.field);
        const comboKey = combo.join('|');
        const lbl = combo.join(' / ') + (valueDefs.length > 1 ? ' · ' + (vd.headerName || vd.field) : '');
        dynCols.push({
          field: `_pv_${comboKey}_${vd.field}`,
          headerName: lbl,
          width: vd.width || orig?.width || 100,
          align: vd.align || orig?.align || 'right',
          sortable: false, filter: false, resizable: true,
          _isPivotDyn: true,
          _pivotCombo: combo,
          _pivotField: vd.field,
          _pivotAggFunc: vd.aggFunc || orig?.aggFunc || 'sum',
          valueFormatter: vd.valueFormatter || orig?.valueFormatter || null,
        });
      }
    }

    const allCols = [...fixedCols, ...dynCols];

    // Appliquer la visibilité persistée
    for (const col of allCols) {
      if (this._pivotColHidden.has(col.field)) {
        col.hide = this._pivotColHidden.get(col.field);
      }
    }

    // Recalculer widths/offsets en tenant compte des hide
    const widths  = allCols.map(c => c.hide===true ? 0 : (c.width || 100));
    const offsets = [];
    let ox = 0;
    for (const w of widths) { offsets.push(ox); ox += w; }

    this._pivotFlatCols = allCols;
    this._colWidths     = widths;
    this._colOffsets    = offsets;

    // 5. Construire header rows (2 niveaux si 1 pivot field + multi valueCols, 3 si 2 pivot fields)
    //    Niveau 0 : colonnes fixes (rowspan total) + groupes par 1er pivot value
    //    Niveau 1 (si >1 valueCols) : colonnes value
    //    Pour pivot multi-field : autant de niveaux que pivot fields + 1 si multi valueCols
    const hasMultiVal = valueDefs.length > 1;
    const nPivotLevels = pivotFields.length;
    const totalLevels  = nPivotLevels + (hasMultiVal ? 1 : 0);
    const depth        = Math.max(1, totalLevels);

    const hRows = Array.from({length: depth}, () => []);

    // Colonnes fixes : rowspan = depth
    for (let fi = 0; fi < fixedCols.length; fi++) {
      const col = fixedCols[fi];
      const ci  = fi;
      hRows[0].push({ col, ci, label: col.headerName, colspan:1, rowspan:depth,
                      x: offsets[ci], w: widths[ci] });
    }

    const fixedCount = fixedCols.length;

    // Colonnes dynamiques : construire hiérarchie pivot niveau par niveau
    // Grouper par combo[0], puis combo[1], ..., puis value col
    if (depth === 1) {
      // Cas simple : 1 pivot field, 1 value col → 1 seul niveau
      for (let di = 0; di < dynCols.length; di++) {
        const col = dynCols[di];
        const ci  = fixedCount + di;
        hRows[0].push({ col, ci, label: col.headerName, colspan:1, rowspan:1,
                        x: offsets[ci], w: widths[ci] });
      }
    } else {
      // Multi-niveaux
      this._buildPivotHeaderLevel(hRows, dynCols, fixedCount, offsets, widths, pivotFields, valueDefs, combos, hasMultiVal, depth);
    }

    this._pivotHeaderRows = hRows;
    this._headerRowDefs   = null; // force recalcul si on désactive pivot
  }

  _buildPivotHeaderLevel(hRows, dynCols, fixedCount, offsets, widths, pivotFields, valueDefs, combos, hasMultiVal, depth) {
    // Pour chaque niveau pivot, grouper les combos
    // Niveau 0 → grouper par combo[0]
    // Niveau 1 → grouper par combo[1] (si existe), etc.
    // Dernier niveau → valueDefs (si hasMultiVal)

    const nPivotLevels = pivotFields.length;

    // On parcourt niveau par niveau
    for (let lvl = 0; lvl < nPivotLevels; lvl++) {
      // Regrouper les dynCols consécutives par même valeur combo[lvl]
      let i = 0;
      while (i < dynCols.length) {
        const comboVal = dynCols[i]._pivotCombo[lvl];
        let j = i;
        while (j < dynCols.length && dynCols[j]._pivotCombo[lvl] === comboVal) j++;
        // dynCols[i..j-1] ont le même combo[lvl]
        const ci0  = fixedCount + i;
        const ciE  = fixedCount + j - 1;
        const totalW = offsets[ciE] + widths[ciE] - offsets[ci0];
        const colspan = j - i;
        const rowspan = 1;

        // Si c'est le dernier pivot level ET hasMultiVal → rowspan=1, sinon rowspan adapté
        hRows[lvl].push({
          label: comboVal, colspan, rowspan,
          x: offsets[ci0], w: totalW, ci: ci0,
          _isPivotGroupHeader: true,
        });
        i = j;
      }
    }

    // Si hasMultiVal : dernier niveau = noms des value cols, répétés pour chaque combo
    if (hasMultiVal) {
      for (let di = 0; di < dynCols.length; di++) {
        const col = dynCols[di];
        const ci  = fixedCount + di;
        hRows[depth - 1].push({ col, ci, label: col._pivotField || col.headerName,
                                 colspan:1, rowspan:1, x: offsets[ci], w: widths[ci] });
      }
    } else {
      // Pas de multi valueCols → les dynCols sont au dernier niveau pivot
      if (nPivotLevels < depth) {
        for (let di = 0; di < dynCols.length; di++) {
          const col = dynCols[di];
          const ci  = fixedCount + di;
          hRows[depth - 1].push({ col, ci, label: col.headerName,
                                   colspan:1, rowspan:1, x: offsets[ci], w: widths[ci] });
        }
      }
    }
  }

  /** Produit cartésien d'un tableau de tableaux */
  _cartesian(arrays) {
    if (!arrays.length) return [[]];
    return arrays.reduce((acc, arr) =>
      acc.flatMap(prefix => arr.map(v => [...prefix, v])),
    [[]]);
  }

  _findOrigColByField(field) {
    // Cherche dans columnDefs (récursif) la col avec ce field
    const search = (defs) => {
      for (const d of defs) {
        if (d instanceof DGColumnGroup || d.children) {
          const found = search(d.children || []);
          if (found) return found;
        } else if (d.field === field) return d;
      }
      return null;
    };
    return search(this.columnDefs);
  }

  /**
   * Construit _pivotRows : une ligne par combinaison de _groupBy values,
   * avec pour chaque col pivot dynamique la valeur agrégée correspondante.
   */
  _buildPivotData() {
    this._buildPivotSchema(); // s'assure que _pivotFlatCols est dispo

    const groupFields = this._groupBy.length ? this._groupBy : [];
    const pivotFields = this._pivotCols;
    const valueDefs   = this._valueCols;
    const flatCols    = this._pivotFlatCols;
    const dynCols     = flatCols.filter(c => c._isPivotDyn);

    // Filtrer les données source (filtre global + colonnes)
    let sourceRows = this.rowData;
    if (this._globalFilter.trim()) {
      const q = this._globalFilter.toLowerCase();
      sourceRows = sourceRows.filter(r =>
        Object.values(r).some(v => v != null && String(v).toLowerCase().includes(q))
      );
    }

    if (groupFields.length === 0) {
      // Pas de groupBy → une seule ligne "Total"
      const pivotRow = { _isPivotRow: true, _groupKey: 'Total' };
      for (const dc of dynCols) {
        const matchRows = sourceRows.filter(r =>
          dc._pivotCombo.every((val, i) => {
            const v = r[pivotFields[i]];
            return (v == null ? '(vide)' : String(v)) === val;
          })
        );
        pivotRow[dc.field] = this._pivotAgg(matchRows, dc._pivotField, dc._pivotAggFunc);
      }
      this._pivotRows = [pivotRow];
      return;
    }

    // Grouper par groupFields
    const map = new Map();
    for (const row of sourceRows) {
      const key = groupFields.map(f => { const v=row[f]; return v==null?'(vide)':String(v); }).join('||');
      if (!map.has(key)) map.set(key, []);
      map.get(key).push(row);
    }

    const result = [];
    for (const [key, members] of map) {
      const vals = key.split('||');
      const pivotRow = { _isPivotRow: true };
      groupFields.forEach((f, i) => { pivotRow[f] = vals[i]; });
      pivotRow._groupKey  = vals[0];
      pivotRow._count     = members.length;

      for (const dc of dynCols) {
        const matchRows = members.filter(r =>
          dc._pivotCombo.every((val, i) => {
            const v = r[pivotFields[i]];
            return (v == null ? '(vide)' : String(v)) === val;
          })
        );
        pivotRow[dc.field] = this._pivotAgg(matchRows, dc._pivotField, dc._pivotAggFunc);
      }
      result.push(pivotRow);
    }

    // Tri par première colonne de groupe
    result.sort((a, b) => String(a[groupFields[0]] || '').localeCompare(String(b[groupFields[0]] || ''), undefined, {numeric:true}));

    // Ligne Total
    const totalRow = { _isPivotRow: true, _isPivotTotal: true };
    if (groupFields.length) totalRow[groupFields[0]] = 'TOTAL';
    for (const dc of dynCols) {
      const allMatch = sourceRows.filter(r =>
        dc._pivotCombo.every((val, i) => {
          const v = r[pivotFields[i]];
          return (v == null ? '(vide)' : String(v)) === val;
        })
      );
      totalRow[dc.field] = this._pivotAgg(allMatch, dc._pivotField, dc._pivotAggFunc);
    }
    result.push(totalRow);

    this._pivotRows = result;
  }

  _pivotAgg(rows, field, aggFunc) {
    const vals = rows.map(r => r[field]).filter(v => v != null && !isNaN(v)).map(Number);
    if (!vals.length) return null;
    switch (aggFunc) {
      case 'sum':   return vals.reduce((s,v) => s+v, 0);
      case 'avg':   return vals.reduce((s,v) => s+v, 0) / vals.length;
      case 'count': return rows.length;
      case 'min':   return Math.min(...vals);
      case 'max':   return Math.max(...vals);
      default:
        if (typeof aggFunc === 'function') return aggFunc(rows, field);
        return vals.reduce((s,v) => s+v, 0);
    }
  }

  _buildFooterRows() {
    if (!this.showFooter || this.footerDefs.length===0) return [];
    const rows  = this._getProcessedRows().filter(r=>!r._isGroup);
    const cols  = this._getFlatCols();
    return this.footerDefs.map(row => {
      const cells = {};
      for (const fd of (Array.isArray(row) ? row : [row])) {
        const col = cols.find(c=>c.field===fd.field);
        if (col) {
          const vals = rows.map(r=>this._getCellValue(r,col)).filter(v=>v!=null&&!isNaN(v));
          let val;
          switch(fd.aggFunc) {
            case 'sum':   val=vals.reduce((s,v)=>s+v,0); break;
            case 'avg':   val=vals.length?vals.reduce((s,v)=>s+v,0)/vals.length:null; break;
            case 'count': val=rows.length; break;
            case 'min':   val=Math.min(...vals); break;
            case 'max':   val=Math.max(...vals); break;
            default:      val=fd.value!=null?fd.value:(fd.label||''); break;
          }
          if (fd.valueFormatter) val=fd.valueFormatter(val);
          cells[fd.field]={value:val, colspan:fd.colspan||1, align:fd.align};
        }
      }
      return {cells};
    });
  }

  _getDisplayRows() {
    let rows = this._getProcessedRows();
    return rows;
  }

  _getPageRows() {
    const all = this._getDisplayRows();
    if (!this.pagination) return all;
    return all.slice(this._page*this.pageSize, (this._page+1)*this.pageSize);
  }

  // ══ Theme ═════════════════════════════════════════════════════
  _dgTheme() {
    // Palette entièrement dérivée du thème actif (cf. Gantt `_buildPalette`),
    // pour suivre les 4 thèmes et non un simple binaire clair/sombre.
    const t = getTheme();
    const lb = t.listBox, win = t.window, sb = t.scrollBar, acc = t.slider.fill.background;
    const txt = (lb.itemText && lb.itemText.normal) || t.label.text;
    const tint = (c, a) => colorToCSS(Object.assign({}, c, {a}));
    return {
      bg:         colorToCSS(lb.background),
      hdrBg:      colorToCSS(win.body.background),
      hdrText:    colorToCSS(t.label.text),
      rowAlt:     tint(txt, 0.04),
      rowHov:     tint(acc, 0.10),
      rowSel:     tint(acc, 0.20),
      selText:    colorToCSS(txt),
      border:     colorToCSS(lb.border.color),
      cellBorder: tint(txt, 0.12),
      text:       colorToCSS(txt),
      groupBg:    tint(acc, 0.08),
      groupText:  tint(txt, 0.85),
      pinnedBg:   tint(acc, 0.06),
      sbTrack:    colorToCSS(sb.track),
      sbThumb:    colorToCSS(sb.thumb),
      filterBg:   colorToCSS(win.body.background),
      footerBg:   tint(acc, 0.06),
      footerText: colorToCSS(t.label.text),
      toolBg:     colorToCSS(win.body.background),
      accent:     colorToCSS(acc),
      font:       (t.label && t.label.font) || {family:'Tahoma,Arial',size:11},
    };
  }

  // ══ Rendering ═════════════════════════════════════════════════
  render(ctx) {
    this._computeColWidths();
    const b   = this.bounds;
    const dg  = this._dgTheme();
    const z   = this._zones();
    const rows = this._getPageRows();
    const footerRows = this._buildFooterRows();
    const {left, center, right} = this._getZoneCols();
    const headerRowDefs = this._buildHeaderRows();

    ctx.save();
    ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height); ctx.clip();

    // Background
    ctx.fillStyle = dg.bg;
    ctx.fillRect(b.x, b.y, b.width, b.height);

    // ── Header zones ──────────────────────────────────────────
    if (z.cornerTL.w > 0) this._renderHeaderZone(ctx, z.cornerTL, left,   headerRowDefs, dg, 0);
    if (z.cornerTR.w > 0) this._renderHeaderZone(ctx, z.cornerTR, right,  headerRowDefs, dg, 0);
    this._renderHeaderZone(ctx, z.headerC, center, headerRowDefs, dg, this._scrollX);

    // ── Body zones ────────────────────────────────────────────
    if (z.fixedLeft.w > 0)  this._renderBodyZone(ctx, z.fixedLeft,  left,   rows, dg, 0,            this._scrollY, true);
    if (z.fixedRight.w > 0) this._renderBodyZone(ctx, z.fixedRight, right,  rows, dg, 0,            this._scrollY, true);
    this._renderBodyZone(ctx, z.body, center, rows, dg, this._scrollX, this._scrollY, false);

    // ── Footer zones ─────────────────────────────────────────
    if (this.showFooter && footerRows.length > 0) {
      if (z.cornerBL.w > 0) this._renderFooterZone(ctx, z.cornerBL, left,   footerRows, dg, 0);
      if (z.cornerBR.w > 0) this._renderFooterZone(ctx, z.cornerBR, right,  footerRows, dg, 0);
      this._renderFooterZone(ctx, z.footerC, center, footerRows, dg, this._scrollX);
    }

    // ── Scrollbars ────────────────────────────────────────────
    this._renderScrollbars(ctx, z, rows, dg);

    // ── Pagination ────────────────────────────────────────────
    if (this.pagination) this._renderPagination(ctx, z, dg);

    // ── Tool panel ────────────────────────────────────────────
    if (this._toolPanelOpen) this._renderToolPanel(ctx, z, dg);

    // ── Editor overlay ────────────────────────────────────────
    if (this._editingCell) this._renderEditor(ctx, z, dg);

    // ── Outer border ─────────────────────────────────────────
    ctx.strokeStyle = dg.border; ctx.lineWidth = 1;
    ctx.strokeRect(b.x+0.5, b.y+0.5, b.width-1, b.height-1);

    // ── Pinned zone separator lines (stop before scrollbar/pagination) ──────
    const sepBottom = b.y + z.headerH + z.bodyH + z.footerH;
    if (z.leftW > 0) {
      ctx.strokeStyle = dg.accent; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(b.x+z.leftW, b.y); ctx.lineTo(b.x+z.leftW, sepBottom); ctx.stroke();
    }
    if (z.rightW > 0) {
      ctx.strokeStyle = dg.accent; ctx.lineWidth = 2;
      const rx = b.x + z.leftW + z.bodyW;
      ctx.beginPath(); ctx.moveTo(rx, b.y); ctx.lineTo(rx, sepBottom); ctx.stroke();
    }

    // ── Filter popup (on top of everything) ──────────────────
    if (this._filterPopup) this._renderFilterPopup(ctx, dg);

    ctx.restore();
  }

  _renderHeaderZone(ctx, zone, zoneCols, headerRowDefs, dg, scrollX) {
    if (zone.w <= 0 || zone.h <= 0) return;
    ctx.save();
    ctx.beginPath(); ctx.rect(zone.x, zone.y, zone.w, zone.h); ctx.clip();

    const isPinned = scrollX === 0;
    ctx.fillStyle = isPinned ? dg.pinnedBg : dg.hdrBg;
    ctx.fillRect(zone.x, zone.y, zone.w, zone.h);

    const f = dg.font;
    ctx.textBaseline = 'middle';

    for (let ri = 0; ri < headerRowDefs.length; ri++) {
      const hy = zone.y + ri * this.headerHeight;

      for (const cell of headerRowDefs[ri]) {
        const ci   = cell.ci;
        const col  = cell.col;
        // Is this cell in our zone?
        const inZone = zoneCols.some(e => e.ci === ci || (cell.group && zoneCols.some(e2 => e2.ci >= ci && e2.ci < ci+cell.colspan)));
        if (!inZone && !cell.group && !cell._isPivotGroupHeader) continue;
        if (cell.group) {
          // Check if any leaf is in zone
          const zoneIdxs = new Set(zoneCols.map(e=>e.ci));
          const leafsInZone = this._getLeafCols(cell.group).map(c=>this._getFlatCols().indexOf(c)).filter(i=>zoneIdxs.has(i));
          if (leafsInZone.length===0) continue;
        }

        const realCx = zone.x + (cell.x - (zoneCols[0]?.x||0)) - scrollX;
        const cellH = cell.rowspan * this.headerHeight;

        // Cell bg
        ctx.fillStyle = dg.hdrBg;
        ctx.fillRect(realCx, hy, cell.w, cellH);

        // Sort indicator for leaf columns
        let label = cell.label;
        if (col && !cell.group) {
          const sort = this._sortState.find(s=>s.field===col.field);
          if (sort) label += sort.dir==='asc'?' ▲':' ▼';
          if (this._filters[col.field]?.active) {
            ctx.fillStyle = dg.accent;
            ctx.beginPath(); ctx.arc(realCx+cell.w-8, hy+8, 3, 0, Math.PI*2); ctx.fill();
          }
        }

        // Checkbox header
        if (col?.checkboxSelection && this.rowSelection==='multiple') {
          const allRows = this._getPageRows().filter(r=>!r._isGroup);
          const allSel  = allRows.length>0 && allRows.every(r=>this._selectedRows.has(r));
          this._drawCheckbox(ctx, realCx+(cell.w-14)/2, hy+(cellH-14)/2, 14, allSel, dg);
        } else if (cell._isPivotGroupHeader) {
          ctx.font = `bold ${f.size}px ${f.family}`;
          ctx.fillStyle = dg.accent;
          ctx.textAlign = 'center';
          ctx.fillText(cell.label, realCx + cell.w/2, hy + cellH/2);
          ctx.textAlign = 'left';
        } else {
          ctx.font = `bold ${f.size}px ${f.family}`;
          ctx.fillStyle = dg.hdrText;
          ctx.textAlign = cell.group ? 'center' : 'left';
          const hasFilterIcon = col && !cell.group && col.filter !== false;
          const iconW = hasFilterIcon ? 14 : 0;
          const tx = cell.group ? realCx + cell.w/2 : realCx + 8;
          ctx.fillText(label, tx, hy + cellH/2);
          ctx.textAlign = 'left';
          // Filter icon ▾ at right of header cell
          if (hasFilterIcon) {
            const isActive = this._filters[col.field]?.active;
            ctx.fillStyle = isActive ? dg.accent : dg.hdrText + '80';
            ctx.font = `${f.size + 1}px ${f.family}`;
            ctx.textAlign = 'center';
            ctx.fillText('▾', realCx + cell.w - 9, hy + cellH/2);
            ctx.textAlign = 'left';
          }
        }

        // Borders
        ctx.strokeStyle = dg.border; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(realCx+cell.w-0.5, hy); ctx.lineTo(realCx+cell.w-0.5, hy+cellH); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(realCx, hy+cellH-0.5); ctx.lineTo(realCx+cell.w, hy+cellH-0.5); ctx.stroke();
      }
    }

    // Filter row
    if (this.showFilterRow) {
      const fy = zone.y + headerRowDefs.length * this.headerHeight;
      ctx.fillStyle = dg.filterBg;
      ctx.fillRect(zone.x, fy, zone.w, this.filterRowHeight);
      ctx.strokeStyle = dg.border; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(zone.x, fy+this.filterRowHeight-0.5); ctx.lineTo(zone.x+zone.w, fy+this.filterRowHeight-0.5); ctx.stroke();

      for (const entry of zoneCols) {
        const {col, ci} = entry;
        if (col.filter===false || col.checkboxSelection) continue;
        const cx2 = zone.x + (entry.x-(zoneCols[0]?.x||0)) - scrollX;
        const cw  = entry.w;
        if (cx2+cw < zone.x || cx2 > zone.x+zone.w) continue;
        const fval = this._filters[col.field];
        const active = fval?.active;
        const pad = 3;
        ctx.fillStyle = active ? dg.bg : dg.filterBg;
        ctx.strokeStyle = active ? dg.accent : dg.border;
        ctx.lineWidth = active ? 1.5 : 1;
        ctx.beginPath(); ctx.roundRect(cx2+pad, fy+pad, cw-pad*2-16, this.filterRowHeight-pad*2, 3);
        ctx.fill(); ctx.stroke();
        ctx.font = `${f.size}px ${f.family}`; ctx.textBaseline = 'middle';
        ctx.fillStyle = fval?.value ? dg.text : dg.hdrText+'60';
        ctx.fillText(fval?.value || '🔍', cx2+pad+4, fy+this.filterRowHeight/2);
        ctx.fillStyle = active ? dg.accent : dg.hdrText;
        ctx.fillText('▾', cx2+cw-14, fy+this.filterRowHeight/2);
      }
    }

    ctx.restore();
  }

  _renderBodyZone(ctx, zone, zoneCols, rows, dg, scrollX, scrollY, isPinned) {
    if (zone.w <= 0 || zone.h <= 0) return;
    ctx.save();
    ctx.beginPath(); ctx.rect(zone.x, zone.y, zone.w, zone.h); ctx.clip();

    if (isPinned) {
      ctx.fillStyle = dg.pinnedBg;
      ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
    }

    const rh = this.rowHeight;
    const startRow = Math.floor(scrollY / rh);
    const endRow   = Math.min(rows.length, startRow + Math.ceil(zone.h / rh) + 1);
    const f = dg.font;

    for (let ri = startRow; ri < endRow; ri++) {
      const row = rows[ri];
      const ry  = zone.y + ri * rh - scrollY;
      if (ry > zone.y + zone.h) break;

      const isSel  = !row._isGroup && this._selectedRows.has(row);
      const isHov  = ri === this._hoverRow;
      const isGroup= row._isGroup || (row._isTree && row._isVirtualTree);

      // Row background
      let bg = isPinned ? dg.pinnedBg : (ri%2===1 ? dg.rowAlt : dg.bg);
      if (isGroup) bg = dg.groupBg;
      if (row._isPivotTotal) bg = dg.footerBg;
      if (isHov && !isSel && !isGroup && !row._isPivotTotal) bg = dg.rowHov;
      if (isSel) bg = dg.rowSel;
      ctx.fillStyle = bg;
      ctx.fillRect(zone.x, ry, zone.w, rh);

      // Group row
      if (isGroup) {
        this._renderGroupRow(ctx, row, zone, zoneCols, scrollX, ry, rh, dg, f);
        ctx.strokeStyle = dg.border; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(zone.x, ry+rh-0.5); ctx.lineTo(zone.x+zone.w, ry+rh-0.5); ctx.stroke();
        continue;
      }

      // Row bottom border
      ctx.strokeStyle = dg.cellBorder; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(zone.x, ry+rh-0.5); ctx.lineTo(zone.x+zone.w, ry+rh-0.5); ctx.stroke();

      // Cells
      for (const entry of zoneCols) {
        const {col, ci} = entry;
        const cx = zone.x+(entry.x-(zoneCols[0]?.x||0))-scrollX;
        const cw = entry.w;
        if (cx+cw < zone.x || cx > zone.x+zone.w) continue;
        if (this._editingCell && this._editingCell.rowIdx===ri && this._editingCell.colIdx===ci) continue;

        ctx.save();
        ctx.beginPath(); ctx.rect(Math.max(cx,zone.x), ry, Math.min(cw, zone.x+zone.w-cx), rh); ctx.clip();
        this._renderCell(ctx, row, ri, col, ci, cx, ry, cw, rh, dg, isSel, f);
        ctx.restore();

        // Cell right border
        ctx.strokeStyle = dg.cellBorder; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx+cw-0.5, ry); ctx.lineTo(cx+cw-0.5, ry+rh); ctx.stroke();
      }
    }

    // Empty state
    if (rows.length===0) {
      ctx.fillStyle = dg.hdrText; ctx.font = `12px ${f.family}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Aucune donnée', zone.x+zone.w/2, zone.y+zone.h/2);
      ctx.textAlign = 'left';
    }

    ctx.restore();
  }

  _renderGroupRow(ctx, row, zone, zoneCols, scrollX, ry, rh, dg, f) {
    const firstEntry = zoneCols[0];
    if (!firstEntry) return;
    // Offset cx to first non-checkbox col so text aligns with leaf cell text
    const cbEntry = zoneCols.find(e=>e.col.checkboxSelection);
    const cbW = cbEntry ? cbEntry.w : 0;
    const cx = zone.x+(firstEntry.x-(zoneCols[0]?.x||0))-scrollX + cbW;
    const level = row._level||0;
    const indent = level * 16 + 8;
    const isTree = row._isTree;

    const tx = cx + indent;
    const ty = ry + rh/2;
    const hasChildren = row._hasChildren !== false;
    if (hasChildren) {
      ctx.fillStyle = dg.groupText;
      ctx.beginPath();
      if (row._expanded) {
        ctx.moveTo(tx+2, ty-3); ctx.lineTo(tx+10, ty-3); ctx.lineTo(tx+6, ty+3);
      } else {
        ctx.moveTo(tx+2, ty-4); ctx.lineTo(tx+9, ty); ctx.lineTo(tx+2, ty+4);
      }
      ctx.fill();
    }

    ctx.font = `bold ${f.size}px ${f.family}`;
    ctx.fillStyle = dg.groupText;
    ctx.textBaseline = 'middle';
    const label = isTree
      ? (row._treeLabel || '')
      : `${row._field}: ${row._groupKey} (${row._count} lignes)`;
    ctx.fillText(label, tx + (hasChildren ? 16 : 4), ry+rh/2);

    for (const entry of zoneCols.slice(1)) {
      const {col} = entry;
      if (!col.aggFunc || !row._agg?.[col.field]) continue;
      const acx = zone.x+(entry.x-(zoneCols[0]?.x||0))-scrollX;
      const val = this._formatValue(row._agg[col.field], row, col);
      ctx.font = `bold ${f.size}px ${f.family}`;
      ctx.fillStyle = dg.accent;
      ctx.textAlign = col.align||'right';
      ctx.fillText(val, col.align==='right'?acx+entry.w-8:acx+8, ry+rh/2);
      ctx.textAlign = 'left';
    }
  }

  _renderCell(ctx, row, ri, col, ci, cx, ry, cw, rh, dg, isSel, f) {
    const value = this._getCellValue(row, col);
    const style = col.cellStyle ? col.cellStyle(value, row, col) : null;

    // Tree indent for first col
    let indent = 0;
    const flatCols = this._getFlatCols();
    const firstTreeColIdx = flatCols.findIndex(c=>!c.checkboxSelection && c.pinned!=='right');
    const isTreeFirstCol = row._isTree && !row._isVirtualTree && ci===firstTreeColIdx;
    if (isTreeFirstCol) {
      indent = (row._level||0) * 16;
    }

    if (style?.background) { ctx.fillStyle=style.background; ctx.fillRect(cx,ry,cw,rh); }

    if (col.checkboxSelection) {
      this._drawCheckbox(ctx, cx+(cw-14)/2, ry+(rh-14)/2, 14, isSel, dg); return;
    }

    if (col.cellRenderer && !row._isPivotRow) { col.cellRenderer(value,row,col,ctx,cx+indent,ry,cw-indent,rh,isSel); return; }

    let text = this._formatValue(value, row, col);
    // Pour les colonnes pivot dynamiques : formatter numérique par défaut
    if (col._isPivotDyn && value != null && col.valueFormatter) {
      text = col.valueFormatter(value, row);
    } else if (col._isPivotDyn && value != null && typeof value === 'number') {
      const agg = col._pivotAggFunc;
      if (agg === 'avg') text = value.toFixed(1);
      else if (agg === 'sum') text = value.toLocaleString('fr-FR');
      else text = String(Math.round(value * 100) / 100);
    }

    const isPivotTotal = row._isPivotTotal;
    ctx.fillStyle = style?.color||(isSel?dg.selText:(isPivotTotal?dg.footerText:dg.text));
    const fWeight = (style?.fontWeight || (isPivotTotal ? 'bold' : ''));
    ctx.font = fWeight ? `${fWeight} ${f.size}px ${f.family}` : `${f.size}px ${f.family}`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = col.align||'left';
    const tx = col.align==='right' ? cx+cw-8 : col.align==='center' ? cx+cw/2 : cx+8+indent;
    ctx.fillText(text, tx, ry+rh/2);
    ctx.textAlign = 'left';
  }

  _renderFooterZone(ctx, zone, zoneCols, footerRows, dg, scrollX) {
    if (zone.w<=0||zone.h<=0) return;
    ctx.save();
    ctx.beginPath(); ctx.rect(zone.x, zone.y, zone.w, zone.h); ctx.clip();
    const f = dg.font;

    for (let fi=0; fi<footerRows.length; fi++) {
      const frow = footerRows[fi];
      const fy   = zone.y + fi*this.footerHeight;
      ctx.fillStyle = dg.footerBg;
      ctx.fillRect(zone.x, fy, zone.w, this.footerHeight);
      ctx.strokeStyle = dg.border; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(zone.x, fy-0.5); ctx.lineTo(zone.x+zone.w, fy-0.5); ctx.stroke();

      ctx.font = `bold ${f.size}px ${f.family}`;
      ctx.textBaseline = 'middle';

      let skipCols = 0;
      for (const entry of zoneCols) {
        if (skipCols>0) { skipCols--; continue; }
        const {col, ci} = entry;
        const fcell = frow.cells[col.field];
        const cx2 = zone.x+(entry.x-(zoneCols[0]?.x||0))-scrollX;
        // Compute real colspan width by summing actual column widths
        const colspan = fcell?.colspan||1;
        let cw = 0;
        const zoneArr = zoneCols;
        const entryIdx = zoneArr.indexOf(entry);
        for (let k=0; k<colspan && entryIdx+k<zoneArr.length; k++) cw += zoneArr[entryIdx+k].w;
        if (cw === 0) cw = entry.w;

        if (cx2+cw < zone.x || cx2 > zone.x+zone.w) { skipCols=colspan-1; continue; }

        if (fcell && fcell.value !== '') {
          ctx.fillStyle = dg.footerText;
          const align = fcell.align||col.align||'right';
          ctx.textAlign = align;
          const tx = align==='right' ? cx2+cw-8 : align==='center' ? cx2+cw/2 : cx2+8;
          ctx.save();
          ctx.beginPath(); ctx.rect(Math.max(cx2,zone.x), fy, Math.min(cw, zone.x+zone.w-cx2), this.footerHeight); ctx.clip();
          ctx.fillText(String(fcell.value??''), tx, fy+this.footerHeight/2);
          ctx.restore();
          ctx.textAlign='left';
        }
        skipCols = colspan-1;

        ctx.strokeStyle = dg.cellBorder; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(cx2+entry.w-0.5, fy); ctx.lineTo(cx2+entry.w-0.5, fy+this.footerHeight); ctx.stroke();
      }
    }
    ctx.restore();
  }

  _renderScrollbars(ctx, z, rows, dg) {
    const totalH = rows.length * this.rowHeight;
    const totalW = this._totalColWidth() - this._leftPinnedWidth() - this._rightPinnedWidth();
    const SB = this._SB;

    // Vertical
    if (totalH > z.bodyH && z.sbV.h > 0) {
      ctx.fillStyle = dg.sbTrack; ctx.fillRect(z.sbV.x, z.sbV.y, z.sbV.w, z.sbV.h);
      const th = Math.max(20, z.bodyH*z.bodyH/totalH);
      const ty = z.sbV.y + (z.sbV.h-th)*this._scrollY/Math.max(1,totalH-z.bodyH);
      ctx.fillStyle = dg.sbThumb;
      ctx.beginPath(); ctx.roundRect(z.sbV.x+2, ty, SB-4, th, 3); ctx.fill();
    }

    // Horizontal
    if (totalW > z.bodyW && z.sbH.h > 0) {
      ctx.fillStyle = dg.sbTrack; ctx.fillRect(z.sbH.x, z.sbH.y, z.sbH.w, z.sbH.h);
      const tw = Math.max(20, z.bodyW*z.bodyW/totalW);
      const tx2 = z.sbH.x + (z.sbH.w-tw)*this._scrollX/Math.max(1,totalW-z.bodyW);
      ctx.fillStyle = dg.sbThumb;
      ctx.beginPath(); ctx.roundRect(tx2, z.sbH.y+2, tw, SB-4, 3); ctx.fill();
    }
  }

  _renderPagination(ctx, z, dg) {
    const p = z.pagin;
    const f = dg.font;
    const all = this._getDisplayRows().filter(r=>!r._isGroup);
    const total = all.length;
    const pages = Math.max(1, Math.ceil(total/this.pageSize));

    ctx.fillStyle = dg.hdrBg; ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = dg.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(p.x,p.y+0.5); ctx.lineTo(p.x+p.w,p.y+0.5); ctx.stroke();

    ctx.font=`${f.size}px ${f.family}`; ctx.fillStyle=dg.text; ctx.textBaseline='middle';
    const cy = p.y+p.h/2;
    const start = this._page*this.pageSize+1;
    const end   = Math.min(total,(this._page+1)*this.pageSize);
    ctx.fillText(`${start}–${end} sur ${total}`, p.x+10, cy);

    const btnW=24, btnH=20, gap=4;
    const btns=['«','‹',String(this._page+1),'›','»'];
    let bx = p.x+p.w/2-(btns.length*(btnW+gap))/2;
    this._paginBtns=[];
    for (let i=0;i<btns.length;i++) {
      const disabled=(i<=1&&this._page===0)||(i>=3&&this._page>=pages-1);
      ctx.fillStyle=disabled?dg.sbTrack:dg.bg;
      ctx.strokeStyle=dg.border; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(bx,cy-btnH/2,btnW,btnH,3); ctx.fill(); ctx.stroke();
      ctx.fillStyle=disabled?dg.hdrText+'80':dg.text;
      ctx.textAlign='center'; ctx.fillText(btns[i],bx+btnW/2,cy); ctx.textAlign='left';
      this._paginBtns.push({x:bx,y:cy-btnH/2,w:btnW,h:btnH,action:['first','prev','','next','last'][i]});
      bx+=btnW+gap;
    }
    ctx.fillStyle=dg.hdrText;
    ctx.fillText(`Page ${this._page+1}/${pages}`, p.x+p.w-80, cy);
  }

  _renderToolPanel(ctx, z, dg) {
    const tp = z.tool;
    if (tp.w<=0) return;
    ctx.fillStyle = dg.toolBg; ctx.fillRect(tp.x, tp.y, tp.w, tp.h);
    ctx.strokeStyle = dg.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(tp.x+0.5,tp.y); ctx.lineTo(tp.x+0.5,tp.y+tp.h); ctx.stroke();

    const f = dg.font;
    ctx.font=`bold ${f.size+1}px ${f.family}`; ctx.fillStyle=dg.hdrText;
    ctx.textBaseline='middle';

    // Tab bar
    const panels = this.toolPanels||[];
    const tabW   = tp.w/Math.max(1,panels.length);
    this._toolTabs = panels.map((p,i)=>({panel:p, x:tp.x+i*tabW, y:tp.y, w:tabW, h:28}));
    for (const tab of this._toolTabs) {
      const active = tab.panel===this._toolPanelOpen;
      ctx.fillStyle = active?dg.hdrBg:dg.toolBg;
      ctx.fillRect(tab.x, tab.y, tab.w, tab.h);
      ctx.strokeStyle=dg.border; ctx.lineWidth=1;
      ctx.strokeRect(tab.x+0.5,tab.y+0.5,tab.w-1,tab.h-1);
      const icons={columns:'☰',filters:'🔍',stats:'📊',custom:'⚙'};
      ctx.fillStyle=dg.text; ctx.textAlign='center';
      ctx.fillText((icons[tab.panel]||'?')+' '+tab.panel, tab.x+tab.w/2, tab.y+14);
      ctx.textAlign='left';
    }

    const contentY = tp.y+28;
    const contentH = tp.h-28;
    ctx.beginPath(); ctx.rect(tp.x, contentY, tp.w, contentH); ctx.clip();

    ctx.font=`${f.size}px ${f.family}`;
    let cy = contentY+8;

    if (this._toolPanelOpen==='columns') {
      ctx.fillStyle=dg.hdrText; ctx.fillText('Afficher/Masquer colonnes', tp.x+8, cy); cy+=20;
      for (const col of this._getFlatCols()) {
        if (col.checkboxSelection) continue;
        const visible = col.hide!==true;
        this._drawCheckbox(ctx, tp.x+8, cy, 14, visible, dg);
        ctx.fillStyle=dg.text; ctx.fillText(col.headerName||col.field, tp.x+28, cy+7); cy+=22;
      }
    } else if (this._toolPanelOpen==='filters') {
      ctx.fillStyle=dg.hdrText; ctx.fillText('Filtres actifs', tp.x+8, cy); cy+=20;
      let any=false;
      for (const [field,fval] of Object.entries(this._filters)) {
        if (!fval?.active) continue; any=true;
        const col=this._getFlatCols().find(c=>c.field===field);
        ctx.fillStyle=dg.text;
        ctx.fillText(`${col?.headerName||field}: ${fval.value}`, tp.x+8, cy); cy+=20;
      }
      if (!any) { ctx.fillStyle=dg.hdrText; ctx.fillText('Aucun filtre actif', tp.x+8, cy); }
    } else if (this._toolPanelOpen==='stats') {
      ctx.fillStyle=dg.hdrText; ctx.fillText('Statistiques', tp.x+8, cy); cy+=20;
      const rows=this._getProcessedRows().filter(r=>!r._isGroup);
      ctx.fillText(`Lignes: ${rows.length}`, tp.x+8, cy); cy+=18;
      ctx.fillText(`Sélectionnés: ${this._selectedRows.size}`, tp.x+8, cy); cy+=18;
      for (const col of this._getFlatCols()) {
        if (col.checkboxSelection||!col.field) continue;
        const vals=rows.map(r=>this._getCellValue(r,col)).filter(v=>typeof v==='number');
        if (vals.length===0) continue;
        ctx.fillStyle=dg.hdrText; ctx.font=`bold ${f.size}px ${f.family}`;
        ctx.fillText(col.headerName||col.field, tp.x+8, cy); cy+=16;
        ctx.font=`${f.size-1}px ${f.family}`; ctx.fillStyle=dg.text;
        const sum=vals.reduce((s,v)=>s+v,0);
        ctx.fillText(`Min:${Math.min(...vals).toFixed(1)} Max:${Math.max(...vals).toFixed(1)}`, tp.x+12, cy); cy+=14;
        ctx.fillText(`Moy:${(sum/vals.length).toFixed(1)} Σ:${sum.toFixed(1)}`, tp.x+12, cy); cy+=18;
        if (cy > contentY+contentH-20) break;
      }
    }
  }

  _renderEditor(ctx, z, dg) {
    const ec = this._editingCell;
    if (!ec?.widget) return;
    const {left,center,right} = this._getZoneCols();
    const cols = this._getFlatCols();
    const col  = cols[ec.colIdx];
    const zone = col?.pinned==='left' ? z.fixedLeft : col?.pinned==='right' ? z.fixedRight : z.body;
    const scrollX = (col?.pinned==='left'||col?.pinned==='right') ? 0 : this._scrollX;
    const zoneCols = col?.pinned==='left' ? left : col?.pinned==='right' ? right : center;
    const entry = zoneCols.find(e=>e.ci===ec.colIdx);
    if (!entry) return;

    const cx = zone.x+(entry.x-(zoneCols[0]?.x||0))-scrollX;
    const ry = zone.y + ec.rowIdx*this.rowHeight - this._scrollY;
    const cw = entry.w;
    const rh = this.rowHeight;

    ec.widget.bounds.x=cx+1; ec.widget.bounds.y=ry+1;
    ec.widget.bounds.width=cw-2; ec.widget.bounds.height=rh-2;

    ctx.save();
    ctx.beginPath(); ctx.rect(Math.max(cx,zone.x), Math.max(ry,zone.y), cw, rh); ctx.clip();
    ec.widget.render(ctx);
    ctx.restore();

    ctx.strokeStyle=dg.accent; ctx.lineWidth=2;
    ctx.strokeRect(cx+0.5, ry+0.5, cw-1, rh-1);
  }

  _renderFilterPopup(ctx, dg) {
    const fp = this._filterPopup;
    if (!fp) return;
    const col  = this._getFlatCols()[fp.colIdx];
    const fval = this._filters[col.field]||{};
    const pw=200, ph=200;
    const b = this.bounds;
    const px=Math.min(fp.x, b.x+b.width-pw-8);
    const py=Math.min(fp.y, b.y+b.height-ph-8);

    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.2)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
    ctx.fillStyle=dg.bg;
    ctx.beginPath(); ctx.roundRect(px,py,pw,ph,6); ctx.fill();
    ctx.restore();
    ctx.strokeStyle=dg.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(px+0.5,py+0.5,pw-1,ph-1,6); ctx.stroke();

    const f=dg.font;
    ctx.font=`bold ${f.size}px ${f.family}`; ctx.fillStyle=dg.hdrText; ctx.textBaseline='middle';
    ctx.fillText('Filtre: '+(col.headerName||col.field), px+10, py+16);

    const types    =['contains','notContains','equals','notEquals','startsWith','endsWith','greaterThan','lessThan','blank','notBlank'];
    const typeLbls =['Contient','Ne contient pas','Égal à','Différent de','Commence par','Finit par','Sup. à','Inf. à','Vide','Non vide'];
    const curIdx   = types.indexOf(fval.type||'contains');
    ctx.font=`${f.size}px ${f.family}`;
    ctx.fillStyle=dg.filterBg; ctx.strokeStyle=dg.border; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(px+8,py+30,pw-16,22,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle=dg.text; ctx.fillText(typeLbls[curIdx]||'Contient', px+14, py+41);
    ctx.fillText('▾', px+pw-20, py+41);

    ctx.fillStyle=dg.bg; ctx.strokeStyle=dg.accent; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(px+8,py+60,pw-16,22,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle=fval.value?dg.text:dg.hdrText+'60';
    ctx.fillText(fval.value||'Valeur…', px+14, py+71);

    const btnY=py+ph-36;
    ['Réinitialiser','Appliquer'].forEach((lbl,i)=>{
      const bx=px+8+i*(pw/2-8), bw2=pw/2-16;
      ctx.fillStyle=i===1?dg.accent:dg.filterBg; ctx.strokeStyle=dg.border; ctx.lineWidth=1;
      ctx.beginPath(); ctx.roundRect(bx,btnY,bw2,24,4); ctx.fill(); ctx.stroke();
      ctx.fillStyle=i===1?'#FFF':dg.text; ctx.textAlign='center';
      ctx.fillText(lbl,bx+bw2/2,btnY+12); ctx.textAlign='left';
    });
    this._fpRect     ={x:px,y:py,w:pw,h:ph};
    this._fpTypeRect ={x:px+8,y:py+30,w:pw-16,h:22};
    this._fpValRect  ={x:px+8,y:py+60,w:pw-16,h:22};
    this._fpResetBtn ={x:px+8,y:btnY,w:pw/2-16,h:24};
    this._fpApplyBtn ={x:px+8+pw/2-8,y:btnY,w:pw/2-16,h:24};
  }

  _drawCheckbox(ctx, x, y, size, checked, dg) {
    ctx.strokeStyle=dg.border; ctx.lineWidth=1.5;
    ctx.fillStyle=checked?dg.accent:dg.bg;
    ctx.beginPath(); ctx.roundRect(x,y,size,size,3); ctx.fill(); ctx.stroke();
    if (checked) {
      ctx.strokeStyle='#FFF'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+3,y+size/2); ctx.lineTo(x+size/2-1,y+size-4); ctx.lineTo(x+size-3,y+3); ctx.stroke();
    }
  }

  // ══ Hit testing ════════════════════════════════════════════════
  hitTest(x,y) { return this.visible && this.enabled && rectContains(this.bounds,x,y); }

  _rowAt(x,y) {
    const z = this._zones();
    const headerH = this._headerTotalH();
    if (y < this.bounds.y+headerH) return -1;
    // Check which zone
    let scrollX = this._scrollX, zoneX = z.body.x, zoneW = z.body.w;
    if (x < this.bounds.x + z.leftW) { scrollX=0; zoneX=this.bounds.x; zoneW=z.leftW; }
    else if (x > this.bounds.x + z.leftW + z.bodyW) { scrollX=0; zoneX=this.bounds.x+z.leftW+z.bodyW; zoneW=z.rightW; }
    if (y > z.body.y+z.bodyH) return -1;
    return Math.floor((y - this.bounds.y - headerH + this._scrollY) / this.rowHeight);
  }

  _colAt(x,y) {
    this._computeColWidths();
    const {left,center,right} = this._getZoneCols();
    const z = this._zones();
    let zoneCols, scrollX, zoneOrigin;
    if (x < this.bounds.x + z.leftW) {
      zoneCols=left; scrollX=0; zoneOrigin=this.bounds.x;
    } else if (x > this.bounds.x + z.leftW + z.bodyW) {
      zoneCols=right; scrollX=0; zoneOrigin=this.bounds.x+z.leftW+z.bodyW;
    } else {
      zoneCols=center; scrollX=this._scrollX; zoneOrigin=this.bounds.x+z.leftW;
    }

    for (const entry of zoneCols) {
      const cx = zoneOrigin + (entry.x-(zoneCols[0]?.x||0)) - scrollX;
      if (x >= cx && x < cx+entry.w) return entry.ci;
    }
    return -1;
  }

  _isInHeader(y)    { return y >= this.bounds.y && y < this.bounds.y+this._headerTotalH()-( this.showFilterRow?this.filterRowHeight:0); }
  _isInFilterRow(y) { return this.showFilterRow && y>=this.bounds.y+this.bounds.height-this._headerTotalH()+this._headerTotalH()-this.filterRowHeight && y<this.bounds.y+this._headerTotalH(); }
  _isInPagination(y){ return this.pagination && y>=this.bounds.y+this.bounds.height-this._paginH; }
  _isInToolPanel(x) { return this._toolPanelOpen && x>=this.bounds.x+this.bounds.width-this._toolPanelW; }

  _isOnResizeHandle(x, ci) {
    const cols = this._getFlatCols();
    this._computeColWidths();
    const z = this._zones();
    const col = cols[ci];
    let zoneX = z.body.x, zoneW = z.bodyW, scrollX = this._scrollX, zoneCols = this._getZoneCols().center;
    if (col.pinned==='left')  { zoneX=this.bounds.x;             zoneW=z.leftW;  scrollX=0; zoneCols=this._getZoneCols().left; }
    if (col.pinned==='right') { zoneX=this.bounds.x+z.leftW+z.bodyW; zoneW=z.rightW; scrollX=0; zoneCols=this._getZoneCols().right; }
    const entry = zoneCols.find(e=>e.ci===ci);
    if (!entry) return false;
    const cx = zoneX+(entry.x-(zoneCols[0]?.x||0))-scrollX;
    const handleX = cx + entry.w;
    // Handle must be within the zone bounds
    if (handleX < zoneX || handleX > zoneX + zoneW) return false;
    return Math.abs(x - handleX) <= 4;
  }

  // ══ Events ════════════════════════════════════════════════════
  dispatchEvent(ev) {
    if (!this.visible||!this.enabled) return false;
    const {type,x,y} = ev;

    // Close filter popup on outside click
    if ((type==='mousedown'||type==='click') && this._filterPopup) {
      const r=this._fpRect;
      if (!r||x<r.x||x>r.x+r.w||y<r.y||y>r.y+r.h) {
        this._filterPopup=null; this.markDirty();
      }
    }

    // Forward to editor
    if (this._editingCell?.widget) {
      const w=this._editingCell.widget;
      if (rectContains(w.bounds,x,y)||type==='keydown') {
        const re={...ev}; w.dispatchEvent(re);
        if (re.stopped){ev.stopped=true;return true;}
      }
      if (type==='mousedown'&&!rectContains(w.bounds,x,y)) this._commitEdit();
    }

    if (type==='mousemove')  return this._onMouseMove(ev);
    if (type==='mousedown')  return this._onMouseDown(ev);
    if (type==='mouseup')    return this._onMouseUp(ev);
    if (type==='click')      return this._onClick(ev);
    if (type==='dblclick')   return this._onDblClick(ev);
    if (type==='scroll'||type==='wheel') return this._onScroll(ev);
    if (type==='keydown')    return this._onKeyDown(ev);
    if (type==='mouseleave') { this._hoverRow=-1; this.markDirty(); return false; }
    this.emit(ev); return !ev.stopped;
  }

  _onMouseMove(ev) {
    const {x,y}=ev;
    const z=this._zones();

    if (this._resizingCol!==null) {
      const dx=x-this._resizeStartX;
      const newW=Math.max(this.columnDefs.find?.(c=>c.field===this._getFlatCols()[this._resizingCol]?.field)?.minWidth||40, this._resizeStartW+dx);
      this._colWidths[this._resizingCol]=newW;
      let ox=0; this._colOffsets=[];
      for (const w2 of this._colWidths){this._colOffsets.push(ox);ox+=w2;}
      this._headerRowDefs=null;
      if(this.cursorEl)this.cursorEl.style.cursor='col-resize';
      this.markDirty(); return true;
    }

    if (this._sbDragV) {
      const rows=this._getPageRows(), totalH=rows.length*this.rowHeight;
      const dy=y-this._sbDragV.startY, ratio=dy/Math.max(1,z.bodyH-this._sbDragV.thumbH);
      this._scrollY=Math.max(0,Math.min(totalH-z.bodyH,this._sbDragV.startScroll+ratio*(totalH-z.bodyH)));
      this.markDirty(); return true;
    }
    if (this._sbDragH) {
      const totalW=this._totalColWidth()-this._leftPinnedWidth()-this._rightPinnedWidth();
      const dx=x-this._sbDragH.startX, ratio=dx/Math.max(1,z.bodyW-this._sbDragH.thumbW);
      this._scrollX=Math.max(0,Math.min(totalW-z.bodyW,this._sbDragH.startScroll+ratio*(totalW-z.bodyW)));
      this.markDirty(); return true;
    }

    if (this._isInToolPanel(x)) { if(this.cursorEl)this.cursorEl.style.cursor='default'; return true; }

    const ri=this._rowAt(x,y);
    if (ri!==this._hoverRow){this._hoverRow=ri;this.markDirty();}

    if (this._isInHeader(y)) {
      let onResize=false;
      for (let ci=0;ci<this._getFlatCols().length;ci++) {
        if(this._getFlatCols()[ci].resizable!==false && this._isOnResizeHandle(x,ci)){onResize=true;break;}
      }
      if(this.cursorEl)this.cursorEl.style.cursor=onResize?'col-resize':'default';
    } else {
      if(this.cursorEl)this.cursorEl.style.cursor='default';
    }
    return false;
  }

  _onMouseDown(ev) {
    const {x,y}=ev; const z=this._zones();

    // Tool panel takes priority over everything
    if (this._isInToolPanel(x)) {
      // Tab bar
      if (this._toolTabs) {
        for (const tab of this._toolTabs) {
          if (x>=tab.x&&x<=tab.x+tab.w&&y>=tab.y&&y<=tab.y+tab.h) {
            this._toolPanelOpen = this._toolPanelOpen===tab.panel ? null : tab.panel;
            this.markDirty(); ev.stopped=true; return true;
          }
        }
      }
      // Column visibility toggle — cy must match _renderToolPanel exactly
      if (this._toolPanelOpen==='columns') {
        const tp = z.tool;
        const contentY = tp.y+28;
        let cy = contentY+8+20; // header text height
        for (const col of this._getFlatCols()) {
          if (col.checkboxSelection) continue;
          if (x>=tp.x+8&&x<=tp.x+22&&y>=cy&&y<=cy+14) {
            if (this._pivotMode) {
              // Persister dans _pivotColHidden, puis régénérer uniquement le schéma
              const newHide = col.hide !== true;
              this._pivotColHidden.set(col.field, newHide);
              this._pivotFlatCols = null;
              this._pivotHeaderRows = null;
              // Reconstruire le schéma immédiatement pour que _colWidths soit à jour
              this._buildPivotSchema();
            } else {
              col.hide=!col.hide;
              this._flatCols=null; this._colWidths=null; this._colOffsets=null; this._headerRowDefs=null;
              this._invalidate();
            }
            this.markDirty(); ev.stopped=true; return true;
          }
          cy+=22;
        }
      }
      ev.stopped=true; return true;
    }

    // Scrollbar V
    if (x>=z.sbV.x&&x<=z.sbV.x+z.sbV.w&&y>=z.sbV.y&&y<=z.sbV.y+z.sbV.h) {
      const rows=this._getPageRows(),totalH=rows.length*this.rowHeight;
      const thumbH=Math.max(20,z.bodyH*z.bodyH/totalH);
      this._sbDragV={startY:y,startScroll:this._scrollY,thumbH}; ev.stopped=true; return true;
    }
    // Scrollbar H
    if (x>=z.sbH.x&&x<=z.sbH.x+z.sbH.w&&y>=z.sbH.y&&y<=z.sbH.y+z.sbH.h) {
      const totalW=this._totalColWidth()-this._leftPinnedWidth()-this._rightPinnedWidth();
      const thumbW=Math.max(20,z.bodyW*z.bodyW/totalW);
      this._sbDragH={startX:x,startScroll:this._scrollX,thumbW}; ev.stopped=true; return true;
    }
    // Column resize
    if (this._isInHeader(y)) {
      for (let ci=0;ci<this._getFlatCols().length;ci++) {
        if(this._getFlatCols()[ci].resizable!==false&&this._isOnResizeHandle(x,ci)) {
          this._resizingCol=ci; this._resizeStartX=x; this._resizeStartW=this._colWidths[ci];
          ev.stopped=true; return true;
        }
      }
    }
    // Filter popup buttons
    if (this._filterPopup) {
      const col=this._getFlatCols()[this._filterPopup.colIdx];
      if (this._fpApplyBtn&&rectContains(this._fpApplyBtn,x,y)) {
        if (!this._filters[col.field]) this._filters[col.field]={};
        this._filters[col.field].active=true; this._invalidate();
        this._filterPopup=null; this.markDirty(); ev.stopped=true; return true;
      }
      if (this._fpResetBtn&&rectContains(this._fpResetBtn,x,y)) {
        delete this._filters[col.field]; this._invalidate();
        this._filterPopup=null; this.markDirty(); ev.stopped=true; return true;
      }
      if (this._fpValRect&&rectContains(this._fpValRect,x,y)) {
        this._startFilterEdit2(this._filterPopup.colIdx); ev.stopped=true; return true;
      }
      ev.stopped=true; return true;
    }
    ev.stopped=true; return true;
  }

  _onMouseUp(ev) {
    this._resizingCol=null; this._sbDragV=null; this._sbDragH=null;
    if(this.cursorEl)this.cursorEl.style.cursor='default';
    return false;
  }

  _onClick(ev) {
    const {x,y}=ev; const z=this._zones();

    if (this._isInToolPanel(x)) { ev.stopped=true; return true; }

    // Pagination
    if (this._isInPagination(y)&&this._paginBtns) {
      for (const btn of this._paginBtns) {
        if (x>=btn.x&&x<=btn.x+btn.w&&y>=btn.y&&y<=btn.y+btn.h&&btn.action) {
          const pages=Math.ceil(this._getDisplayRows().filter(r=>!r._isGroup).length/this.pageSize);
          if (btn.action==='first') this.setPage(0);
          else if (btn.action==='prev')  this.setPage(this._page-1);
          else if (btn.action==='next')  this.setPage(this._page+1);
          else if (btn.action==='last')  this.setPage(pages-1);
          ev.stopped=true; return true;
        }
      }
    }

    // Header
    if (this._isInHeader(y)) {
      const ci=this._colAt(x,y);
      if (ci<0) return false;
      const col=this._getFlatCols()[ci];
      if (col.checkboxSelection) { this._toggleSelectAll(); ev.stopped=true; return true; }
      // Filter button
      const entry=this._getZoneCols().center.find(e=>e.ci===ci)||this._getZoneCols().left.find(e=>e.ci===ci)||this._getZoneCols().right.find(e=>e.ci===ci);
      const scrollX=col.pinned==='left'||col.pinned==='right'?0:this._scrollX;
      const zone=col.pinned==='left'?this.bounds.x:col.pinned==='right'?this.bounds.x+z.leftW+z.bodyW:this.bounds.x+z.leftW;
      const zoneCols=col.pinned==='left'?this._getZoneCols().left:col.pinned==='right'?this._getZoneCols().right:this._getZoneCols().center;
      if (entry) {
        const cx=zone+(entry.x-(zoneCols[0]?.x||0))-scrollX;
        if (x>=cx+entry.w-20&&col.filter!==false) {
          this._filterPopup={colIdx:ci,x:cx,y:this.bounds.y+this._headerTotalH()};
          this.markDirty(); ev.stopped=true; return true;
        }
      }
      if (col.sortable!==false) {
        const existing=this._sortState.find(s=>s.field===col.field);
        if (ev.shiftKey) {
          if (existing) { if(existing.dir==='asc')existing.dir='desc'; else this._sortState=this._sortState.filter(s=>s.field!==col.field); }
          else this._sortState.push({field:col.field,dir:'asc'});
        } else {
          this._sortState=[{field:col.field,dir:existing?.dir==='asc'?'desc':'asc'}];
        }
        this._sortedRows=null; this._processedRows=null; this._page=0;
        this.markDirty(); ev.stopped=true; return true;
      }
    }

    // Filter row
    if (this.showFilterRow && y>=this.bounds.y+this._headerTotalH()-this.filterRowHeight && y<this.bounds.y+this._headerTotalH()) {
      const ci=this._colAt(x,y);
      if (ci>=0) {
        const col=this._getFlatCols()[ci];
        if (col.filter!==false) { this._startFilterEdit(ci); ev.stopped=true; return true; }
      }
    }

    // Row click
    const ri=this._rowAt(x,y);
    const rows=this._getPageRows();
    if (ri>=0&&ri<rows.length) {
      const row=rows[ri];
      const ci=this._colAt(x,y);
      const col=ci>=0?this._getFlatCols()[ci]:null;

      // Group expand/collapse
      if (row._isGroup || (row._isTree && row._isVirtualTree)) {
        const key=row._fullKey||row._treeKey;
        if (row._isGroup) {
          row._expanded=!row._expanded;
          this._groupState[key]=row._expanded;
        } else {
          row._expanded=!row._expanded;
          this._treeState[key]=row._expanded;
        }
        this._processedRows=null; this.markDirty();
        if(this.onRowGroupOpened)this.onRowGroupOpened(row);
        ev.stopped=true; return true;
      }

      if (col?.checkboxSelection) { this._toggleRowSelection(row); ev.stopped=true; return true; }

      if (this.rowSelection) {
        if (this.rowSelection==='single'||!ev.ctrlKey) this._selectedRows.clear();
        if (this._selectedRows.has(row)) this._selectedRows.delete(row);
        else this._selectedRows.add(row);
        if(this.onSelectionChanged)this.onSelectionChanged([...this._selectedRows]);
        this.markDirty();
      }
      if(this.onRowClick)this.onRowClick(row,ri);
      if(this.onCellClick&&col)this.onCellClick(row,col,this._getCellValue(row,col));
      ev.stopped=true; return true;
    }
    return false;
  }

  _onDblClick(ev) {
    const {x,y}=ev;
    if (this._isInHeader(y)) return false;
    const ri=this._rowAt(x,y), ci=this._colAt(x,y);
    const rows=this._getPageRows();
    if (ri>=0&&ri<rows.length&&ci>=0) {
      const row=rows[ri]; const col=this._getFlatCols()[ci];
      if (row._isGroup||row._isTree) return false;
      const editable=typeof col.editable==='function'?col.editable(row,col):col.editable;
      if (editable!==false&&!col.checkboxSelection) {
        this._startEdit(ri,ci,row,col); ev.stopped=true; return true;
      }
    }
    return false;
  }

  _onScroll(ev) {
    if (this._isInToolPanel(ev.x)) return false;
    const z=this._zones();
    const rows=this._getPageRows();
    const totalH=rows.length*this.rowHeight;
    const totalW=this._totalColWidth()-this._leftPinnedWidth()-this._rightPinnedWidth();
    if (ev.shiftKey) {
      // Shift+wheel: horizontal if visible, else vertical
      if (totalW > z.bodyW)
        this._scrollX=Math.max(0,Math.min(Math.max(0,totalW-z.bodyW),this._scrollX+(ev.deltaY||0)));
      else
        this._scrollY=Math.max(0,Math.min(Math.max(0,totalH-z.bodyH),this._scrollY+(ev.deltaY||0)));
    } else {
      this._scrollY=Math.max(0,Math.min(Math.max(0,totalH-z.bodyH),this._scrollY+(ev.deltaY||0)));
      this._scrollX=Math.max(0,Math.min(Math.max(0,totalW-z.bodyW),this._scrollX+(ev.deltaX||0)));
    }
    this.markDirty(); ev.stopped=true; return true;
  }

  _onKeyDown(ev) {
    if (this._editingCell) {
      if (ev.key==='Escape'){this._cancelEdit();ev.stopped=true;return true;}
      if (ev.key==='Enter'||ev.key==='Tab'){this._commitEdit();ev.stopped=true;return true;}
      return false;
    }
    if (ev.key==='Escape'){this._filterPopup=null;this.markDirty();}
    return false;
  }

  // ══ Editing ═══════════════════════════════════════════════════
  _startEdit(ri,ci,row,col) {
    this._commitEdit();
    const value=this._getCellValue(row,col);
    let widget=null;
    const et=col.cellEditor||'text';
    if (et==='checkbox') {
      widget=new CheckBox('',{x:0,y:0,width:60,height:this.rowHeight});
      widget.checked=!!value;
    } else if (et==='dropdown'||(et&&typeof et==='object'&&et.component==='dropdown')) {
      const params=col.cellEditorParams||et.params||{};
      const vals=params.values||[];
      widget=new DropDown(vals,{x:0,y:0,width:60,height:this.rowHeight});
      const idx=vals.indexOf(String(value)); widget.selectedIndex=idx>=0?idx:0;
    } else {
      widget=new TextBox({x:0,y:0,width:60,height:this.rowHeight});
      widget.value=value!=null?String(value):'';
    }
    widget.parent=this;
    this._editingCell={rowIdx:ri,colIdx:ci,row,col,widget,originalValue:value};
    this.markDirty();
    setTimeout(()=>{if(widget.focus)widget.focus();},10);
  }

  _commitEdit() {
    if (!this._editingCell) return;
    const {rowIdx,colIdx,row,col,widget,originalValue}=this._editingCell;
    this._editingCell=null;
    let newValue;
    if (widget instanceof CheckBox) newValue=widget.checked;
    else if (widget instanceof DropDown) newValue=widget.selectedValue;
    else if (widget instanceof TextBox) newValue=widget.value;
    else newValue=originalValue;
    if (col.type==='number'||typeof originalValue==='number') {
      const n=parseFloat(newValue); newValue=isNaN(n)?originalValue:n;
    }
    if (newValue!==originalValue) {
      if (!col.valueGetter&&col.field) row[col.field]=newValue;
      this._invalidate();
      if(this.onCellValueChanged)this.onCellValueChanged(row,col,originalValue,newValue);
    }
    this.markDirty();
  }

  _cancelEdit() { this._editingCell=null; this.markDirty(); }

  _startFilterEdit(ci) {
    const col=this._getFlatCols()[ci];
    if (!this._filters[col.field]) this._filters[col.field]={value:'',type:'contains',active:false};
    const z=this._zones();
    const entry=(this._getZoneCols().left.find(e=>e.ci===ci)||this._getZoneCols().center.find(e=>e.ci===ci)||this._getZoneCols().right.find(e=>e.ci===ci));
    if (!entry) return;
    const scrollX=col.pinned?0:this._scrollX;
    const zoneX=col.pinned==='left'?this.bounds.x:col.pinned==='right'?this.bounds.x+z.leftW+z.bodyW:this.bounds.x+z.leftW;
    const zoneCols=col.pinned==='left'?this._getZoneCols().left:col.pinned==='right'?this._getZoneCols().right:this._getZoneCols().center;
    const cx=zoneX+(entry.x-(zoneCols[0]?.x||0))-scrollX;
    const fy=this.bounds.y+this._headerTotalH()-this.filterRowHeight;
    const tb=new TextBox({x:cx+4,y:fy+3,width:entry.w-22,height:this.filterRowHeight-6});
    tb.value=this._filters[col.field].value||'';
    tb.parent=this;
    tb.on('change',()=>{
      this._filters[col.field].value=tb.value;
      this._filters[col.field].active=tb.value.length>0;
      this._invalidate(); this.markDirty();
    });
    this._editingCell={rowIdx:-1,colIdx:ci,row:null,col,widget:tb,originalValue:tb.value};
    this.markDirty();
    setTimeout(()=>{if(tb.focus)tb.focus();},10);
  }

  _startFilterEdit2(ci) {
    const col=this._getFlatCols()[ci];
    if (!this._filters[col.field]) this._filters[col.field]={value:'',type:'contains',active:false};
    const fp=this._filterPopup;
    const tb=new TextBox({x:this._fpValRect.x,y:this._fpValRect.y,width:this._fpValRect.w,height:this._fpValRect.h});
    tb.value=this._filters[col.field].value||'';
    tb.parent=this;
    tb.on('change',()=>{this._filters[col.field].value=tb.value;this.markDirty();});
    this._editingCell={rowIdx:-2,colIdx:ci,row:null,col,widget:tb,originalValue:tb.value};
    this.markDirty();
    setTimeout(()=>{if(tb.focus)tb.focus();},10);
  }

  // ══ Selection ═════════════════════════════════════════════════
  _toggleRowSelection(row) {
    if(this._selectedRows.has(row))this._selectedRows.delete(row);
    else { if(this.rowSelection==='single')this._selectedRows.clear(); this._selectedRows.add(row); }
    if(this.onSelectionChanged)this.onSelectionChanged([...this._selectedRows]);
    this.markDirty();
  }

  _toggleSelectAll() {
    const rows=this._getPageRows().filter(r=>!r._isGroup);
    const allSel=rows.every(r=>this._selectedRows.has(r));
    if(allSel)rows.forEach(r=>this._selectedRows.delete(r));
    else rows.forEach(r=>this._selectedRows.add(r));
    if(this.onSelectionChanged)this.onSelectionChanged([...this._selectedRows]);
    this.markDirty();
  }

  update(dt) { super.update(dt); }
}

// ── Detect touch device ──────────────────────────────────────────────────
const isTouchDevice = () => navigator.maxTouchPoints > 0 || 'ontouchstart' in window;

// ── Adaptive window sizing ───────────────────────────────────────────────
// Returns { w, h, x, y } that fits the current viewport
function winBounds(desiredW, desiredH, offsetX=0, offsetY=0) {
  const vw = canvas.width, vh = canvas.height;
  const margin = isTouchDevice() ? 8 : 20;
  const w = Math.min(desiredW, vw - margin*2);
  const h = Math.min(desiredH, vh - margin*2);
  const x = Math.max(margin, Math.min(offsetX || Math.floor((vw-w)/2), vw-w-margin));
  const y = Math.max(margin, Math.min(offsetY || Math.floor((vh-h)/2), vh-h-margin));
  return {x, y, width:w, height:h};
}

// ── Canvas resize ─────────────────────────────────────────────────────────
let engine = null;

function resizeCanvas() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  if (engine) {
    engine.windowManager.bounds.width  = canvas.width;
    engine.windowManager.bounds.height = canvas.height;
    engine._offscreen.width  = canvas.width;
    engine._offscreen.height = canvas.height;
    engine._fullRedraw = true;
    // Nudge any windows that are now out of bounds back into view
    for (const win of engine.windowManager.windows) {
      const b = win.bounds, m = 10;
      if (b.x + b.width  > canvas.width  - m) win.bounds.x = Math.max(m, canvas.width  - b.width  - m);
      if (b.y + b.height > canvas.height - m) win.bounds.y = Math.max(m, canvas.height - b.height - m);
      if (b.x < m) win.bounds.x = m;
      if (b.y < m) win.bounds.y = m;
    }
  }
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

engine = new GUIEngine(canvas);

// ── Mobile keyboard via hidden input ─────────────────────────────────────
// When a TextBox/TextArea is focused, proxy the hidden input's events
mobileInput.addEventListener('input', e => {
  // On mobile, 'input' fires with e.data = the new character(s)
  if (!e.data) return;
  for (const ch of e.data) {
    engine.windowManager.handleKey('keydown', ch, ch.charCodeAt(0), false, false, false);
    engine._fullRedraw = true;
  }
  // Clear so next input isn't cumulative
  mobileInput.value = '';
});

mobileInput.addEventListener('keydown', e => {
  // Handle special keys: Backspace, Enter, Arrow*
  const specials = ['Backspace','Delete','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','Tab'];
  if (specials.includes(e.key)) {
    e.preventDefault();
    engine.windowManager.handleKey('keydown', e.key, e.keyCode, e.ctrlKey, e.shiftKey, e.altKey);
    engine._fullRedraw = true;
  }
});

// Focus hidden input whenever a TextBox / TextArea gains canvas focus
// Patch _setFocus on WindowManager
const _origSetFocus = engine.windowManager._setFocus.bind(engine.windowManager);
engine.windowManager._setFocus = function(widget) {
  _origSetFocus(widget);
  if (isTouchDevice() && (widget instanceof TextBox || widget instanceof TextArea)) {
    mobileInput.value = '';
    mobileInput.focus({ preventScroll: true });
  }
};

  const countries = ['France','Allemagne','Espagne','Italie','UK','Belgique','Suisse'];
  const fnames = ['Alice','Bob','Charlie','Diana','Eve','Frank','Grace','Henry','Iris','Jack','Kate','Leo','Mia','Noah','Olivia','Paul','Quinn','Rose','Sam','Tina'];
  const lnames = ['Martin','Dupont','Bernard','Leroy','Moreau','Simon','Laurent','Michel','Garcia','David'];
  const rows   = Array.from({length:1000},(_,i)=>({
    id:     i+1,
    name:   fnames[i%fnames.length]+' '+lnames[i%lnames.length],
    age:    18+Math.floor(Math.random()*50),
    dept:   depts[i%depts.length],
    team:   teams[i%teams.length],
    salary: 30000+Math.floor(Math.random()*90000),
    bonus:  Math.floor(Math.random()*30),
    active: Math.random()>0.3,
    score:  Math.floor(Math.random()*100),
    country:countries[i%countries.length],
    // Tree path for tree mode
    _path:  [depts[i%depts.length], teams[i%teams.length], fnames[i%fnames.length]+' '+lnames[i%lnames.length]],
  }));
  dg.setRowData(rows);

  // ── Callbacks ────────────────────────────────────────────────
  dg.onSelectionChanged = sel => {
    selLabel.text = sel.length+' sélectionné(s)';
    selLabel.markDirty();
  };
  dg.onCellValueChanged = (row,col,ov,nv) => console.log(`[DG] ${col.field}: ${ov}→${nv}`);

  // ── Toolbar wiring ───────────────────────────────────────────
  searchBox.on('change', () => { dg._globalFilter=searchBox.value; dg._invalidate(); dg.markDirty(); engine.windowManager.markDirty(); });

  filterBtn.on('click', () => { dg.showFilterRow=!dg.showFilterRow; filterBtn.text=dg.showFilterRow?'Filtres ✓':'Filtres'; dg.markDirty(); engine.windowManager.markDirty(); });

  footerBtn.on('click', () => { dg.showFooter=!dg.showFooter; footerBtn.text=dg.showFooter?'Footer ✓':'Footer'; dg.markDirty(); engine.windowManager.markDirty(); });

  let groupOn=false, treeOn=false;
  groupBtn.on('click', () => {
    groupOn=!groupOn; treeOn=false; pivotOn=false;
    dg.treeData=false; dg.setPivotMode(false);
    dg.setGroupBy(groupOn?['dept','team']:[]);
    groupBtn.text=groupOn?'Grouper ✓':'Grouper';
    treeBtn.text='Arbre'; pivotBtn.text='Pivot';
    dg.markDirty(); engine.windowManager.markDirty();
  });

  treeBtn.on('click', () => {
    treeOn=!treeOn; groupOn=false; pivotOn=false; dg.setGroupBy([]);
    dg.treeData=treeOn;
    dg.getDataPath=treeOn?(row=>row._path):null;
    dg._pivotMode=false;
    treeBtn.text=treeOn?'Arbre ✓':'Arbre';
    groupBtn.text='Grouper'; pivotBtn.text='Pivot';
    dg._invalidate(); dg.markDirty(); engine.windowManager.markDirty();
  });

  let pivotOn = false;
  pivotBtn.on('click', () => {
    pivotOn = !pivotOn;
    groupOn = false; treeOn = false;
    dg.treeData = false;
    dg.getDataPath = null;
    dg.setGroupBy([]);

    if (pivotOn) {
      dg.setPivotCols(['dept']);
      dg.setValueCols([
        { field:'salary', aggFunc:'sum', headerName:'Salaire',
          valueFormatter: v => v != null ? new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v) : '—' },
        { field:'bonus',  aggFunc:'avg', headerName:'Bonus %',
          valueFormatter: v => v != null ? v.toFixed(1)+'%' : '—' },
      ]);
      dg.setGroupBy(['team']);
      dg.setPivotMode(true);
    } else {
      dg.setPivotMode(false);
      dg.setGroupBy([]);
    }
    pivotBtn.text = pivotOn ? 'Pivot ✓' : 'Pivot';
    groupBtn.text = 'Grouper'; treeBtn.text = 'Arbre';
    dg.markDirty(); engine.windowManager.markDirty();
  });

  let paginOn=false;
  paginBtn.on('click', () => {
    paginOn=!paginOn; dg.pagination=paginOn; dg._page=0;
    paginBtn.text=paginOn?'Pagination ✓':'Pagination';
    dg.markDirty(); engine.windowManager.markDirty();
  });

  toolBtn.on('click', () => {
    dg._toolPanelOpen = dg._toolPanelOpen ? null : 'columns';
    toolBtn.text = dg._toolPanelOpen ? '⚙ Panels ✓' : '⚙ Panels';
    dg.markDirty(); engine.windowManager.markDirty();
  });

  ca.addChild(dg);
  w._updateLayout();
  engine.windowManager.addWindow(w);
}

// ── Launch default windows ────────────────────────────────────────────────
openDataGridWindow();

engine.start();
</script>
</body>
</html>

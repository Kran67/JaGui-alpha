<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas GUI Framework</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; touch-action: none; }
  body { background: #1a1a2e; display: flex; flex-direction: column; font-family: system-ui; }

  /* ---- TOOLBAR ---- */
  #toolbar {
    background: rgba(0,0,0,0.6);
    width: 100%;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    z-index: 10;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar label { color: #aaa; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  #themeSelect {
    background: #2a2a4a; color: #ddd; border: 1px solid #555;
    border-radius: 4px; padding: 6px 8px; font-size: 12px; cursor: pointer;
    flex-shrink: 0; min-height: 34px;
    -webkit-appearance: none; appearance: none;
  }
  .tb-btn {
    background: #2a2a4a; color: #ccc; border: 1px solid #555;
    border-radius: 4px; padding: 6px 10px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s; white-space: nowrap;
    flex-shrink: 0; min-height: 34px; user-select: none;
    -webkit-user-select: none;
  }
  .tb-btn:hover, .tb-btn:active { background: #3a3a6a; color: #fff; border-color: #888; }

  /* Mobile: icon-only labels for space */
  @media (max-width: 480px) {
    .tb-btn { padding: 6px 8px; font-size: 11px; }
    .tb-label { display: none; }
  }

  /* ---- CANVAS ---- */
  #canvasContainer { flex: 1; width: 100%; position: relative; overflow: hidden; min-height: 0; }
  canvas { display: block; touch-action: none; cursor: default; outline: none; }

  /* ---- OVERLAYS ---- */
  #fps { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.35); font-size: 10px; font-family: monospace; pointer-events: none; }
  #info { position: fixed; bottom: 6px; left: 10px; color: rgba(255,255,255,0.25); font-size: 10px; font-family: monospace; pointer-events: none; }
  @media (max-width: 480px) { #info { display: none; } }

  /* ---- HIDDEN INPUT for mobile keyboard ---- */
  #mobileInput {
    position: fixed; top: -200px; left: 0;
    width: 1px; height: 1px; opacity: 0;
    border: none; outline: none; background: transparent;
    font-size: 16px; /* prevent iOS zoom */
  }
</style>
</head>
<body>
<div id="toolbar">
  <label class="tb-label">🎨</label>
  <select id="themeSelect">
    <option value="windows-xp">Windows XP</option>
    <option value="macos">macOS</option>
    <option value="windows-vista">Vista Aero</option>
    <option value="modern-dark">Dark</option>
  </select>
  <button class="tb-btn" id="debugHitBtn" onclick="toggleDebugHit()" title="Afficher les zones de hit-test">🎯 <span class="tb-label">HitTest</span></button>
  <button class="tb-btn" onclick="openAboutWindow()">ℹ️ <span class="tb-label">À propos</span></button>
  <button class="tb-btn" onclick="openDataGridWindow()">📊 <span class="tb-label">DataGrid</span></button>
</div>
<div id="canvasContainer">
  <canvas id="canvas" tabindex="0"></canvas>
</div>
<input id="mobileInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<div id="fps">FPS: --</div>
<div id="info">Canvas GUI Framework v1.0 — TypeScript + HTML Canvas</div>

<script type="module">
// ============================================================
// CANVAS GUI FRAMEWORK - Bundled inline version
// ============================================================

// ---- TYPES ----
const _colorCSSCache0 = new Map();
function colorToCSS(c) {
  if (!c) return 'transparent';
  if (typeof c === 'string') return c;
  const a = c.a !== undefined ? c.a : 1;
  const key = c.r * 100000000 + c.g * 100000 + c.b * 1000 + Math.round(a * 999);
  let v = _colorCSSCache0.get(key);
  if (v === undefined) {
    v = a < 1 ? `rgba(${c.r},${c.g},${c.b},${a})` : `rgb(${c.r},${c.g},${c.b})`;
    if (_colorCSSCache0.size > 256) _colorCSSCache0.clear();
    _colorCSSCache0.set(key, v);
  }
  return v;
}
function hexToColor(hex) {
  let clean = hex.replace('#', '');
  if (clean.length === 3) clean = clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2];
  return { r: parseInt(clean.substring(0, 2), 16), g: parseInt(clean.substring(2, 4), 16), b: parseInt(clean.substring(4, 6), 16), a: 1 };
}
function _easeOut(t)      { return 1-(1-t)*(1-t); }
function _easeOutCubic(t) { return 1-(1-t)*(1-t)*(1-t); }
function _easeInOut(t)    { return t<0.5 ? 2*t*t : 1-2*(1-t)*(1-t); }
function _easeSpring(t)   { // slight overshoot
  const c4 = (2*Math.PI)/3;
  return t===0?0:t===1?1:Math.pow(2,-8*t)*Math.sin((t*10-0.75)*c4)+1;
}
function _animStyle() {
  return 'bmw:' + _bmwPick();
}

// ============================================================
// BURN-MY-WINDOWS EFFECTS — WebGL + Canvas2D
// Re-implementations inspired by https://github.com/Schneegans/Burn-My-Windows (GPL-3.0)
// ============================================================
// ── BMW WebGL helpers ──────────────────────────────────────────
function _bmwTex(gl,img,ex){
  const t=ex||gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);return t;
}
function _bmwU(gl,prog,name){return gl.getUniformLocation(prog,name);}
const _BMW_VERT=`attribute vec2 aPos;varying vec2 vUV;void main(){vUV=aPos*.5+.5;gl_Position=vec4(aPos,0,1);}`;

// Common GLSL library (ported from common.glsl) embedded as a string prefix
const _BMW_COMMON=`
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
uniform float uP;   // uProgress 0->1
uniform float uDur; // duration seconds
uniform float uW,uH;// window pixel size
uniform bool uOpen; // true if opening

// iTexCoord: window-space (0,0)=top-left (1,1)=bottom-right
#define iTexCoord vec2(vUV.x, 1.0-vUV.y)

// --- hash / noise (MIT, David Hoskins) ---
float hash11(float p){p=fract(p*.1031);p*=p+33.33;p*=p+p;return fract(p);}
float hash12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
vec2  hash22(vec2 p){vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xx+p3.yz)*p3.zy);}

// --- simplex 2D (MIT, Inigo Quilez) ---
float simplex2D(vec2 p){
  const float K1=0.366025404,K2=0.211324865;
  vec2 i=floor(p+(p.x+p.y)*K1);
  vec2 a=p-i+(i.x+i.y)*K2;
  float m=step(a.y,a.x);
  vec2 o=vec2(m,1.-m),b=a-o+K2,c=a-1.+2.*K2;
  vec3 h=max(.5-vec3(dot(a,a),dot(b,b),dot(c,c)),0.);
  vec3 n=h*h*h*h*vec3(dot(a,-1.+2.*hash22(i)),dot(b,-1.+2.*hash22(i+o)),dot(c,-1.+2.*hash22(i+1.)));
  return .5+.5*dot(n,vec3(70.));}
float simplex2DFractal(vec2 p){
  mat2 m=mat2(1.6,1.2,-1.2,1.6);
  float f=.5*simplex2D(p);p=m*p;f+=.25*simplex2D(p);p=m*p;
  f+=.125*simplex2D(p);p=m*p;f+=.0625*simplex2D(p);return f;}

// --- easing ---
float easeOutQuad(float x){return -x*(x-2.);}
float easeInQuad(float x){return x*x;}

// --- compositing ---
vec4 alphaOver(vec4 under,vec4 over){
  float a=mix(under.a,1.,over.a);
  if(a==0.)return vec4(0.);
  return vec4(mix(under.rgb*under.a,over.rgb,over.a)/a,a);}

// --- color helpers ---
vec3 tritone(float v,vec3 s,vec3 m,vec3 h){
  if(v<.5)return mix(s,m,smoothstep(0.,1.,v*2.));
  return mix(m,h,smoothstep(0.,1.,v*2.-1.));}

// --- getInputColor: straight alpha from texture (Y already flipped via iTexCoord) ---
vec4 getInputColor(vec2 uv){
  vec4 c=texture2D(uTex,uv);
  if(c.a>0.)c.rgb/=c.a;
  return c;}

// --- edge masks ---
float getEdgeMask(vec2 uv,vec2 maxUV,float fw){
  float mask=1.;
  mask*=smoothstep(0.,1.,clamp(uv.x/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp(uv.y/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp((maxUV.x-uv.x)/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp((maxUV.y-uv.y)/fw,0.,1.));
  return mask;}
float getAbsoluteEdgeMask(float fp,float offset){
  float padding=max(0.,0.-fp*offset);
  vec2 uv2=iTexCoord*vec2(uW,uH)-padding;
  return getEdgeMask(uv2,vec2(uW,uH)-2.*padding,fp);}
float getRelativeEdgeMask(float fa){return getEdgeMask(iTexCoord,vec2(1.),fa);}

// --- setOutputColor: premultiplied output ---
void setOutputColor(vec4 c){gl_FragColor=vec4(c.rgb*c.a,c.a);}

// --- whirl ---
vec2 whirl(vec2 coords,float warping,float rotation){
  float angle=pow(1.-length(coords),2.)*warping+rotation;
  return vec2(dot(coords,vec2(cos(angle),-sin(angle))),dot(coords,vec2(sin(angle),cos(angle))));}

// --- uProgress aliases ---
#define uProgress uP
#define uDuration uDur
#define uForOpening uOpen
#define uSize vec2(uW,uH)
`;

function _bmwGL(w,h,fragBody){
  const oc=new OffscreenCanvas(Math.max(1,w|0),Math.max(1,h|0));
  const gl=oc.getContext('webgl',{premultipliedAlpha:false,alpha:true});
  if(!gl)return null;
  const mk=(type,src)=>{
    const sh=gl.createShader(type);gl.shaderSource(sh,src);gl.compileShader(sh);
    if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error('Shader err:',gl.getShaderInfoLog(sh));
    return sh;};
  const prog=gl.createProgram();
  gl.attachShader(prog,mk(gl.VERTEX_SHADER,_BMW_VERT));
  gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,_BMW_COMMON+fragBody));
  gl.linkProgram(prog);gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  gl.enable(gl.BLEND);gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.viewport(0,0,w|0,h|0);
  return {gl,oc,prog,tex:null,w,h};
}

// Shared uniform setup for standard effects
function _bmwStdUniforms(st,p,t,isOpen){
  st.gl.uniform1f(st.uP,p);
  st.gl.uniform1f(st.uDur,t/1000);
  st.gl.uniform1i(st.uOpen,isOpen?1:0);
  st.gl.uniform1f(st.uW,st.w);
  st.gl.uniform1f(st.uH,st.h);
}
function _bmwGetStdLocs(gl,prog){
  return {
    uP:  _bmwU(gl,prog,'uP'),
    uDur:_bmwU(gl,prog,'uDur'),
    uOpen:_bmwU(gl,prog,'uOpen'),
    uW:  _bmwU(gl,prog,'uW'),
    uH:  _bmwU(gl,prog,'uH'),
    uTex:_bmwU(gl,prog,'uTex'),
  };
}

const BMW={};

// ── FIRE 🔥 ───────────────────────────────────────────────────────────────
BMW.fire={duration:{open:700,close:800},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float vn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    float fbm(vec2 p){mat2 m=mat2(1.6,1.2,-1.2,1.6);
      float f=.5*vn(p);p=m*p;f+=.25*vn(p);p=m*p;f+=.125*vn(p);p=m*p;f+=.0625*vn(p);return f;}
    vec4 fireColor(float v){
      vec4 c0=vec4(.298,.200,.098,0.),c1=vec4(.706,.216,.118,.7),
           c2=vec4(1.,.298,.149,.9),c3=vec4(1.,.651,.098,1.),c4=vec4(1.,1.,1.,1.);
      if(v<.2) return mix(c0,c1,vec4(v/.2));
      if(v<.35) return mix(c1,c2,vec4((v-.2)/.15));
      if(v<.5)  return mix(c2,c3,vec4((v-.35)/.15));
      if(v<.8)  return mix(c3,c4,vec4((v-.5)/.3));
      return c4;}

    float edgeFade(vec2 uv,float w){
      return smoothstep(0.,w,uv.x)*smoothstep(0.,w,1.-uv.x)*smoothstep(0.,w,uv.y)*smoothstep(0.,w,1.-uv.y);}
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float prog=uP*uP*(2.-uP);
      float burnP=clamp(prog/.4,0.,1.),afterP=clamp((prog-.4)/.6,0.,1.);
      float t=uv.y*(1.-.1);
      float winMask=1.-clamp((burnP-t)/.1,0.,1.);
      float effMask=clamp(t*(1.-winMask)/max(burnP,.001),0.,1.);
      if(prog>.4){float fade=sqrt(1.-afterP*afterP);effMask*=mix(1.,1.-t,afterP)*fade;}
      effMask*=edgeFade(uv,.10);
      vec2 nuv=uv; nuv.y+=prog*.8*.5;
      float noise=fbm(nuv*4.)*effMask;
      vec4 fire=fireColor(noise);
      vec4 win=texture2D(uTex,uv);
      if(win.a>0.) win.rgb/=win.a;
      win.a*=winMask;
      vec4 col=alphaOver(win,fire);
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── TV 📺 ─────────────────────────────────────────────────────────────────
BMW.tv={duration:{open:400,close:400},make(bw,bh){
  const st=_bmwGL(bw,bh,`    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float prog=uP*(2.-uP);
      float scale=1./mix(1.,.5,prog)-1.;
      vec2 coords=uv; coords.y=coords.y*(scale+1.)-scale*.5;
      float tbP=smoothstep(0.,1.,clamp(prog/.7,0.,1.));
      float lrP=smoothstep(0.,1.,clamp((prog-.6)/.4,0.,1.));
      float ffP=smoothstep(0.,1.,clamp((prog-.9)/.1,0.,1.));
      float tb=coords.y*2.; tb=tb<1.?tb:2.-tb;
      float lr=coords.x*2.; lr=lr<1.?lr:2.-lr;
      float tbM=1.-smoothstep(0.,1.,clamp((tbP-tb)/.01,0.,1.));
      float lrM=1.-smoothstep(0.,1.,clamp((lrP-lr)/.01,0.,1.));
      float ffM=1.-smoothstep(0.,1.,ffP);
      float mask=tbM*lrM*ffM;
      vec4 col=texture2D(uTex,vec2(coords.x,1.-coords.y));
      if(col.a>0.) col.rgb/=col.a;
      col.a*=mask;
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── GLITCH ⚡ ──────────────────────────────────────────────────────────────
BMW.glitch={duration:{open:400,close:400},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP*uP;
      float time=progress*uT*300.;
      float displace=1000.*progress/800.;
      float yPos=uv.y*800.;
      float noise=clamp(sn(vec2(time*.001,yPos*.002))-.5,0.,1.);
      noise+=(sn(vec2(time*.01,yPos*.05))-.5)*.15;
      float xPos=clamp(uv.x-displace*noise*noise,0.,1.);
      vec4 col=texture2D(uTex,vec2(xPos,1.-uv.y));
      if(col.a>0.) col.rgb/=col.a;
      float offset=.1*noise*displace;
      float g=texture2D(uTex,vec2(clamp(xPos+offset,0.,1.),1.-uv.y)).g;
      float b2=texture2D(uTex,vec2(clamp(xPos-offset,0.,1.),1.-uv.y)).b;
      col.g=mix(col.g,g,.25); col.b=mix(col.b,b2,.25);
      float fadeDelay=1.5;
      float alpha=clamp(noise+1.+fadeDelay-(3.+fadeDelay)*progress,0.,1.);
      col.a*=alpha;
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── HEXAGON 🔷 ────────────────────────────────────────────────────────────
BMW.hexagon={duration:{open:600,close:600},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    vec4 getHex(vec2 p){
      float el=sqrt(4./3.);
      vec2 sc=vec2(3.*el,2.),a=mod(p,sc)-sc*.5,b=mod(p+sc*.5,sc)-sc*.5;
      vec2 aa=abs(a),ba=abs(b);
      float dA=max(aa.x/el+aa.y*.5,aa.y),dB=max(ba.x/el+ba.y*.5,ba.y);
      float dist=1.-min(dA,dB);
      float glow=min(dot(a,a),dot(b,b))/1.5;
      return vec4(dA<dB?a:b,dist,glow);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float noise=sn(uv*3.+vec2(uT*.001));
      float p=clamp(mix(noise-1.,noise+1.,uP),0.,1.);
      float glowP=smoothstep(0.,1.,clamp(p/.5,0.,1.));
      float tileP=smoothstep(0.,1.,clamp((p-.5)/.5,0.,1.));
      vec2 ts=0.1*vec2(800.,600.)/3.;
      vec4 hex=getHex(uv*ts);
      vec4 col=vec4(0.);
      if(tileP<hex.z){
        vec2 off=tileP*hex.xy/ts/(1.-max(tileP,.001));
        col=texture2D(uTex,clamp(uv+off,0.,1.));
        if(col.a>0.) col.rgb/=col.a;
        float ga=glowP*(pow(hex.w,20.)*10.+pow(hex.w,10.)*5.+pow(hex.w,2.)*.5)*col.a;
        col.rgb+=vec3(.4,.8,1.)*ga;
        float la=glowP*(1.-smoothstep(.005,.01,hex.z))*col.a;
        col.rgb=mix(col.rgb,vec3(.6,.9,1.),la*.5);}
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);

BMW.matrix={duration:{open:1200,close:1200},make(bw,bh){
  const LETTER_SIZE=18,TRAIL_LENGTH=0.2,FADE_WIDTH=150;
  const KANA='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  const cols=Math.ceil(bw/LETTER_SIZE);
  const rows=Math.ceil(bh/LETTER_SIZE)+2;
  const colData=[];
  for(let c=0;c<cols;c++) colData.push({
    delay:Math.random(),speed:1.5+Math.random()*.5,
    letters:Array.from({length:rows},()=>KANA[Math.floor(Math.random()*KANA.length)])
  });
  return {colData,LETTER_SIZE,TRAIL_LENGTH,FADE_WIDTH,cols,rows,KANA};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{colData,LETTER_SIZE,TRAIL_LENGTH,FADE_WIDTH,cols,rows,KANA}=st;
  const w=b.width,h=b.height;
  const tmp=new OffscreenCanvas(w,h);
  const g=tmp.getContext('2d');
  const FINAL_FADE=0.8;
  const finalFade=1-Math.max(0,Math.min(1,(p-FINAL_FADE)/(1-FINAL_FADE)));
  for(let c=0;c<cols;c++){
    const cd=colData[c];
    const x=c*LETTER_SIZE;
    const distToDrop=(p*2-cd.delay)*cd.speed;
    const winAlpha=1-Math.min(1,Math.max(0,h*distToDrop)/FADE_WIDTH);
    g.save();g.globalAlpha=winAlpha;
    g.drawImage(off,x,0,LETTER_SIZE,h,x,0,LETTER_SIZE,h);
    g.restore();
    g.font=`${LETTER_SIZE-1}px monospace`;
    for(let r=0;r<rows;r++){
      const yFrac=r*LETTER_SIZE/h;
      const dist2=distToDrop-yFrac;
      let rainAlpha=dist2>=0?Math.exp(-dist2/TRAIL_LENGTH):0;
      rainAlpha*=finalFade;
      if(rainAlpha<0.01) continue;
      const isTip=dist2<0.05&&dist2>=0;
      if(Math.random()<.03) cd.letters[r]=KANA[Math.floor(Math.random()*KANA.length)];
      g.save();
      g.globalAlpha=rainAlpha;
      g.fillStyle=isTip?`rgb(180,255,180)`:`rgb(0,${Math.floor(200*rainAlpha+55)},0)`;
      g.fillText(cd.letters[r]||'ア',x+1,r*LETTER_SIZE+LETTER_SIZE-2);
      g.restore();
    }
  }
  ctx.drawImage(tmp,b.x,b.y);}};

BMW.incinerate={duration:{open:800,close:1000},make(bw,bh){

// ── BROKEN GLASS 🔮 ───────────────────────────────────────────────────────
BMW.glass={duration:{open:700,close:800},make(bw,bh){
  const N=28,LAYERS=5;
  const shards=[];
  for(let i=0;i<N;i++){
    const cx=.1+.8*Math.random(),cy=.1+.8*Math.random();
    const dx=cx-.5,dy=cy-.5,len=Math.sqrt(dx*dx+dy*dy)||.01;
    shards.push({cx,cy,vx:dx/len,vy:dy/len,
      layer:i%LAYERS,rot:(Math.random()-.5)*.4});
  }
  return {shards,N,LAYERS};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{shards}=st;
  const w=b.width,h=b.height;
  ctx.save();
  for(let i=0;i<shards.length;i++){
    const sd=shards[i];
    const layerF=(sd.layer+2)/7;
    const blow=p*layerF*.4;
    const gravity=.1*(sd.layer+1)*p*p;
    const tx=sd.vx*blow,ty=sd.vy*blow+gravity;
    const rot=(i%2===0?1:-1)*.2*p;
    const threshold=Math.pow(p+.1,2);
    if(sd.layer/5>1-threshold+.2*(Math.sin(i*7.3)*.5+.5)) continue;
    const px=(sd.cx+tx)*w,py=(sd.cy+ty)*h;
    const R=Math.min(w,h)*.13;
    ctx.save();
    ctx.translate(b.x+px,b.y+py);
    ctx.rotate(rot+sd.rot*p);
    ctx.beginPath();
    const sides=5+i%3;
    for(let k=0;k<sides;k++){
      const a=k*Math.PI*2/sides+(i*.7);
      k===0?ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R):ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R);
    }
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(off,-px,-py,w,h);
    ctx.restore();
  }
  ctx.restore();}};

// ── TV GLITCH 📺⚡ ─────────────────────────────────────────────────────────
// TV squash + glitch noise (tv-glitch.frag)
BMW.tv_glitch={duration:{open:600,close:600},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}

      float lrM=1.-smoothstep(0.,1.,clamp((lrP-lr)/.01,0.,1.));

// ── PORTAL 🌀 ─────────────────────────────────────────────────────────────
// Whirling portal opens, window shrinks through it (portal.frag)
BMW.portal={duration:{open:1200,close:1200},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}

    uniform float uT;

      lc1+=d1*.1;

      color=mix(color,vec4(uColor*.3,alpha),n1>.6?1.:0.);
      vec2 lc2=whirl(coords-wobble*.15,.75*warping,rotation*.75);
      vec2 d2=vec2(sn(lc2*12.2+uSeed)-.5,sn(lc2*12.2+uSeed+vec2(7.89,123.))-.5);

      wc/=mix(1.,.3,wpe);

      vec4 win=texture2D(uTex,clamp(wc,0.,1.));

// ── AURA GLOW ✨ ──────────────────────────────────────────────────────────
// Chromatic glow crops window into circle (aura-glow.frag)
BMW.aura_glow={duration:{open:700,close:700},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP; // opening 0->1
      // scale UV from 1:1 aspect toward window UV
      vec2 uv2=uv;
      vec2 oneToOne=uv-.5;
      if(800.>600.) oneToOne.y*=600./800.;
      else oneToOne.x*=800./600.;
      oneToOne+=.5;
      uv2=mix(oneToOne,uv2,progress);
      // gradient shape: circle->square
      float shape=mix(2.,100.,pow(progress,5.));
      float gradient=pow(abs(uv2.x-.5)*2.,shape)+pow(abs(uv2.y-.5)*2.,shape);
      gradient+=sn(uv+vec2(.3,.7))*.5;
      // glow overlay
      float glowMask=(progress-gradient)/(.3+.1);
      glowMask=1.-clamp(glowMask,0.,1.);
      float fadeOut=min(1.,(1.-progress)*4.);
      glowMask*=fadeOut<0.?0.:sqrt(fadeOut);
      // window color (opening: scale from 1.1->1.0)
      vec2 wuv=(uv-.5)*mix(1.1,1.0,progress*(2.-progress))+.5;
      vec4 win=texture2D(uTex,clamp(wuv,0.,1.));
      if(win.a>0.) win.rgb/=win.a;
      glowMask*=win.a;
      // rainbow glow color
      vec3 glowColor=cos(progress*5.+uv2.xyx+vec3(0.,2.,4.)).xyz;
      glowColor=clamp(glowColor*1.2,0.,1.);
      win.rgb+=glowColor*glowMask;
      // crop to circle/shape
      float softCrop=1.-smoothstep(progress-.5,progress+.5,gradient);
      float hardCrop=1.-smoothstep(progress-.05,progress+.05,gradient);
      float cropMask=mix(softCrop,hardCrop,.5);
      cropMask*=min(1.,progress*2.);
      cropMask=max(cropMask,1.-sqrt(fadeOut));
      win.a*=cropMask;
      gl_FragColor=vec4(win.rgb*win.a,win.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── T-REX 🦖 ──────────────────────────────────────────────────────────────
// Scratch/claw marks reveal destruction (trex.frag) — Canvas2D approx
BMW.trex={duration:{open:800,close:1000},make(bw,bh){
  // Generate claw scratch lines
  const claws=[];
  for(let i=0;i<5;i++){
    const cx=.2+.6*Math.random(),cy=.1+.4*Math.random();
    const angle=-Math.PI/4+(Math.random()-.5)*.6;
    const len=.4+.4*Math.random();
    claws.push({cx,cy,angle,len,delay:i/5*.6,
      lines:Array.from({length:3+Math.floor(Math.random()*3)},(_,j)=>({
        ox:(j-(1))*0.02,oy:j*.01,w:1.5+Math.random()*2
      }))});
  }
  return {claws};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{claws}=st;
  const w=b.width,h=b.height;
  // warp window
  const tmp=new OffscreenCanvas(w,h);
  const g=tmp.getContext('2d');
  const warp=p*.15;
  g.save();
  g.translate(w/2,h/2);
  g.scale(1+warp*.5,1+warp*.5);
  g.translate(-w/2,-h/2);
  g.drawImage(off,0,0,w,h);
  g.restore();
  // clip out scratched regions
  const scratch=new OffscreenCanvas(w,h);
  const sg=scratch.getContext('2d');
  sg.drawImage(tmp,0,0);
  for(const cl of claws){
    const localP=Math.max(0,Math.min(1,(p-cl.delay)/(1-cl.delay)));
    if(localP<=0) continue;
    const px=cl.cx*w,py=cl.cy*h;
    const dx=Math.cos(cl.angle)*cl.len*w,dy=Math.sin(cl.angle)*cl.len*h;
    for(const ln of cl.lines){
      sg.save();
      sg.globalCompositeOperation='destination-out';
      sg.beginPath();
      sg.moveTo(px+ln.ox*w,py+ln.oy*h);
      sg.lineTo(px+dx*localP+ln.ox*w,py+dy*localP+ln.oy*h);
      sg.lineWidth=ln.w*(1+p*3);
      sg.strokeStyle='rgba(0,0,0,1)';
      sg.stroke();
      sg.restore();
      // flash on scratch front
      if(localP<.98){
        const fx=px+dx*localP+ln.ox*w,fy=py+dy*localP+ln.oy*h;
        sg.save();sg.globalCompositeOperation='source-over';
        const gr=scratch.getContext('2d').createRadialGradient(fx,fy,0,fx,fy,8);
        gr.addColorStop(0,'rgba(255,200,100,0.9)');
        gr.addColorStop(1,'rgba(255,100,50,0)');
        sg.fillStyle=gr;sg.beginPath();sg.arc(fx,fy,8,0,Math.PI*2);sg.fill();
        sg.restore();
      }
    }
  }
  // fade remaining shards
  const fadeP=Math.max(0,(p-.4)/.6);
  ctx.save();
  ctx.globalAlpha=Math.sqrt(1-fadeP*fadeP);
  ctx.drawImage(scratch,b.x,b.y);
  ctx.restore();}};

// ── PAINT BRUSH 🖌️ ────────────────────────────────────────────────────────
// Procedural paint-brush reveal (paint-brush.frag approx)
BMW.paint_brush={duration:{open:600,close:600},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float vn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    float fbm(vec2 p){mat2 m=mat2(1.6,1.2,-1.2,1.6);
      float f=.5*vn(p);p=m*p;f+=.25*vn(p);p=m*p;f+=.125*vn(p);p=m*p;f+=.0625*vn(p);return f;}
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      // brush-like reveal: angled stripes with fbm variation
      float brush=fbm(uv*vec2(3.,8.)+vec2(.7,.3));
      brush=brush*.7+uv.x*.3; // slight horizontal sweep
      float mask=step(brush,uP);
      vec4 col=texture2D(uTex,uv);
      if(col.a>0.) col.rgb/=col.a;
      // paint-style shadow on edge
      float shadow=0.;
      for(float i=1.;i<=5.;i++){
        vec2 sUV=uv-vec2(0.,i*.006);
        float sb=fbm(sUV*vec2(3.,8.)+vec2(.7,.3));
        sb=sb*.7+sUV.x*.3;
        if(step(sb,uP)>0.&&mask==0.) shadow=max(shadow,(1.-i/5.)*.3);}
      if(mask==0.){col=vec4(0.,0.,0.,shadow);}
      else{col.a*=mask;}
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── MUSHROOM 🍄 ───────────────────────────────────────────────────────────
// 8-bit scale + sparks + rays + 5-point stars (mushroom.frag)
BMW.mushroom={duration:{open:900,close:900},make(bw,bh){
  return {seed:[Math.random(),Math.random()]};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const w=b.width,h=b.height;
  const prog=p;
  // 8-bit scale steps
  const steps=[.25,.5,.25,.5,.25,.5,1.,.25,.5,1.];
  const stepIdx=Math.min(9,Math.floor(prog*10));
  const scale8=steps[stepIdx];
  // smooth scale
  const scaleS=prog<.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
  const scale=scaleS*.8+scale8*.2;
  // draw scaled window
  const sw=w*scale,sh=h*scale;
  ctx.save();
  ctx.drawImage(off,b.x+(w-sw)/2,b.y+(h-sh)/2,sw,sh);
  ctx.restore();
  // draw sparks (4-pointed stars) flying up
  const N=8;
  const colors=['#ff9','#f90','#ff0','#fff'];
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++){
    const f=i/N;
    const sx=(Math.sin(st.seed[0]*13.3*f+t*.001)*.6+.5);
    const yStart=1+(.5+f*.5);
    const sy=Math.max(0,Math.min(1,yStart-prog*(2+f)));
    if(sy<=0||sy>=1) continue;
    const fade=sy*(1-sy)*4;
    const px=b.x+sx*w,py=b.y+sy*h;
    const r=Math.max(1,(3+4*f)*fade*2);
    ctx.fillStyle=colors[i%colors.length];
    ctx.globalAlpha=fade*.8;
    ctx.beginPath();
    // 4-pointed star
    for(let k=0;k<8;k++){
      const a=k*Math.PI/4;
      const rr=(k%2===0)?r:r*.4;
      k===0?ctx.moveTo(px+Math.cos(a)*rr,py+Math.sin(a)*rr)
           :ctx.lineTo(px+Math.cos(a)*rr,py+Math.sin(a)*rr);
    }
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
  // draw rays (vertical shimmer)
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const rayAlpha=Math.sin(prog*Math.PI)*.3;
  if(rayAlpha>0.01){
    for(let r=0;r<6;r++){
      const rx=b.x+w*((r+.5)/6);
      const gr=ctx.createLinearGradient(rx,b.y,rx,b.y+h);
      gr.addColorStop(0,'rgba(255,200,100,0)');
      gr.addColorStop(.5,`rgba(255,200,100,${rayAlpha})`);
      gr.addColorStop(1,'rgba(255,200,100,0)');
      ctx.fillStyle=gr;
      ctx.fillRect(rx-3,b.y,6,h);
    }
  }
  ctx.restore();}};

// ── TEAM ROCKET 🚀 ────────────────────────────────────────────────────────
// Window warps/shrinks toward sparkle point (team-rocket.frag)
BMW.team_rocket={duration:{open:700,close:700},make(bw,bh){
  const st=_bmwGL(bw,bh,`    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP;
      float SPLIT=.6;
      float scalep=clamp(progress/(SPLIT+.1),0.,1.);
      scalep=scalep*(2.-scalep);
      float sparkp=clamp((progress-(SPLIT-.1))/(1.-(SPLIT-.1)),0.,1.);
      // target position (upper-right sparkle)
      vec2 target=vec2(.3,-.3);
      vec2 scaleOffset=target*.5*scalep;
      vec2 uv2=uv*2.-1.;
      uv2-=scaleOffset/vec2(1.,.8)*scalep;
      uv2/=max(.001,1.-scalep);
      uv2=uv2*.5+.5;
      vec4 col=texture2D(uTex,clamp(uv2,0.,1.));
      if(col.a>0.) col.rgb/=col.a;
      // sparkle flash
      float sparkFade=-1.*pow((sparkp-.5)/.5,2.)+1.;
      float sparkR=length(uv-vec2(.5+.3*.5,.5-.3*.5));
      float spark=sparkFade*max(0.,1.-sparkR*8.);
      col.rgb+=vec3(spark);col.a=max(col.a,spark);
      col=clamp(col,0.,1.);
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── HitTest debug overlay ────────────────────────────────────
let _debugHitTest = false;

function rectContains(rect, x, y) {
  return x >= rect.x && x < rect.x + rect.width && y >= rect.y && y < rect.y + rect.height;
}
function rectIntersects(a, b) {
  return !(a.x + a.width <= b.x || b.x + b.width <= a.x || a.y + a.height <= b.y || b.y + b.height <= a.y);
}
function rectUnion(a, b) {
  const x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
  return { x, y, width: Math.max(a.x + a.width, b.x + b.width) - x, height: Math.max(a.y + a.height, b.y + b.height) - y };
}
function rectInflate(r, dx, dy) {
  const dxy = dy !== undefined ? dy : dx;
  return { x: r.x - dx, y: r.y - dxy, width: r.width + dx * 2, height: r.height + dxy * 2 };
}

// ---- THEMES ----
function fontToCSS(f) {
  return `${f.style||'normal'} ${f.weight||'normal'} ${f.size}px ${f.family}`;
}
function drawGradient(ctx, x, y, w, h, bg, vertical=true) {
  if (Array.isArray(bg)) {
    const grad = vertical ? ctx.createLinearGradient(x, y, x, y+h) : ctx.createLinearGradient(x, y, x+w, y);
    bg.forEach(s => grad.addColorStop(s.offset, colorToCSS(s.color)));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = colorToCSS(bg);
  }
}
function applyShadow(ctx, s) {
  if (s) { ctx.shadowOffsetX = s.x; ctx.shadowOffsetY = s.y; ctx.shadowBlur = s.blur; ctx.shadowColor = colorToCSS(s.color); }
}
function clearShadow(ctx) {
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
}
// r can be: number | {tl,tr,br,bl} | [tl,tr,br,bl]
function _resolveRadii(r, w, h) {
  const max = Math.max(0, Math.min(w, h) / 2);
  const clamp = v => Math.min(Math.max(v||0, 0), max);
  if (typeof r === 'number') { const c=clamp(r); return [c,c,c,c]; }
  if (Array.isArray(r)) return r.map(clamp);
  return [clamp(r.tl), clamp(r.tr), clamp(r.br), clamp(r.bl)];
}
// Test if point (px,py) is inside a rounded rect — matches drawRoundRect exactly
function pointInRoundRect(px, py, x, y, w, h, r) {
  if (px < x || px > x+w || py < y || py > y+h) return false;
  if (!r) return true;
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  // Check each corner: if point is in the corner bounding square, test circle
  // Top-left
  if (px < x+tl && py < y+tl && (px-x-tl)**2+(py-y-tl)**2 > tl*tl) return false;
  // Top-right
  if (px > x+w-tr && py < y+tr && (px-x-w+tr)**2+(py-y-tr)**2 > tr*tr) return false;
  // Bottom-right
  if (px > x+w-br && py > y+h-br && (px-x-w+br)**2+(py-y-h+br)**2 > br*br) return false;
  // Bottom-left
  if (px < x+bl && py > y+h-bl && (px-x-bl)**2+(py-y-h+bl)**2 > bl*bl) return false;
  return true;
}

function drawRoundRect(ctx, x, y, w, h, r) {
  if (w <= 0 || h <= 0) { ctx.beginPath(); return; }
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  ctx.beginPath();
  ctx.moveTo(x+tl, y);
  ctx.lineTo(x+w-tr, y);    ctx.arcTo(x+w, y,   x+w, y+tr,   tr);
  ctx.lineTo(x+w, y+h-br);  ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
  ctx.lineTo(x+bl, y+h);    ctx.arcTo(x,   y+h, x,   y+h-bl, bl);
  ctx.lineTo(x, y+tl);      ctx.arcTo(x,   y,   x+tl, y,     tl);
  ctx.closePath();
}

class Label extends BaseWidget {
  /*
   * Properties:
   *   text          string (supports \n)
   *   align         'left'|'center'|'right'|'justify'
   *   verticalAlign 'top'|'middle'|'bottom'
   *   wordWrap      bool  (auto-wrap at bounds.width)
   *   lineHeight    number (px, 0 = auto from font size)
   *   color         CSS string | null (uses theme)
   *   background    color-value | gradient-array | null
   *   borderRadius  number | {tl,tr,br,bl} | [tl,tr,br,bl]
   *   padding       {x,y} in px  (default {x:0,y:0})
   *   font          {family,size} | null (uses theme)
   *   autoSize      false | 'width' | 'height' | 'both'
   *                 Ajuste bounds après chaque rendu pour coller au contenu.
   *                 En mode 'width', wordWrap est ignoré (le texte fixe la largeur).
   *                 En mode 'height', la largeur est fixe (wordWrap peut s'appliquer).
   */
  constructor(text, bounds) {
    super(undefined, bounds);
    this.text          = text;
    this.align         = 'left';
    this.verticalAlign = 'middle';
    this.wordWrap      = false;
    this.lineHeight    = 0;
    this.color         = null;
    this.background    = null;
    this.borderRadius  = 0;
    this.padding       = { x:0, y:0 };
    this.font          = null;
    this.autoSize      = false; // false | 'width' | 'height' | 'both'
  }

  // ── Mesure la taille idéale sans modifier les bounds ─────────────────────
  measureSize(ctx) {
    const t   = getTheme().label;
    const fnt = this.font ?? t.font;
    ctx.font  = fontToCSS(fnt);
    const fsize = typeof fnt.size === 'number' ? fnt.size : parseInt(fnt.size);
    const lh    = this.lineHeight > 0 ? this.lineHeight : fsize * 1.4;
    const px = this.padding.x, py = this.padding.y;

    // Pour mesurer la largeur on ne wrap pas (on veut la largeur naturelle)
    const raw   = String(this.text ?? '').split('\n');
    const lines = (this.wordWrap && this.autoSize !== 'width' && this.autoSize !== 'both')
                  ? this._getLines(ctx, this.bounds)
                  : raw;

    const maxLineW = lines.reduce((m, l) => Math.max(m, ctx.measureText(l).width), 0);
    return {
      width:  Math.ceil(maxLineW) + px * 2,
      height: Math.ceil(lines.length * lh) + py * 2,
      lines,
      lh,
    };
  }

  // Split text into lines, with optional word-wrap
  _getLines(ctx, b) {
    const raw = String(this.text ?? '').split('\n');
    if (!this.wordWrap) return raw;
    const maxW = b.width - this.padding.x * 2;
    const lines = [];
    for (const para of raw) {
      const words = para.split(' ');
      let cur = '';
      for (const w of words) {
        const test = cur ? cur + ' ' + w : w;
        if (ctx.measureText(test).width <= maxW) { cur = test; }
        else { if (cur) lines.push(cur); cur = w; }
      }
      lines.push(cur);
    }
    return lines;
  }

  render(ctx) {
    const t  = getTheme().label;
    const px = this.padding.x, py = this.padding.y;
    ctx.save();

    // Font (doit être posé avant measureSize / _getLines)
    const fnt = this.font ?? t.font;
    ctx.font  = fontToCSS(fnt);
    const fsize = typeof fnt.size === 'number' ? fnt.size : parseInt(fnt.size);
    const lh    = this.lineHeight > 0 ? this.lineHeight : fsize * 1.4;

    // ── AutoSize : ajuste bounds avant le rendu ───────────────────────────
    if (this.autoSize) {
      const m = this.measureSize(ctx);
      let changed = false;
      if ((this.autoSize === 'width' || this.autoSize === 'both') && this.bounds.width !== m.width) {
        this.bounds.width = m.width; changed = true;
      }
      if ((this.autoSize === 'height' || this.autoSize === 'both') && this.bounds.height !== m.height) {

      }
      if (changed) this.markDirty();

    const b = this.bounds;

    // Background
    if (this.background !== null) {
      drawGradient(ctx, b.x, b.y, b.width, b.height, this.background);
      drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius);
      ctx.fill();
    }

    // Clip to bounds
    ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height); ctx.clip();

    const lines  = this._getLines(ctx, b);
    const totalH = lines.length * lh;

    // Color
    const textColor = this.color != null
      ? (typeof this.color === 'string' ? this.color : colorToCSS(this.color))
      : colorToCSS(this.enabled ? t.text : t.disabledText);

    // Vertical origin
    let originY;
    if      (this.verticalAlign === 'top')    originY = b.y + py + lh / 2;
    else if (this.verticalAlign === 'bottom') originY = b.y + b.height - py - totalH + lh / 2;
    else                                      originY = b.y + (b.height - totalH) / 2 + lh / 2;

    ctx.textBaseline = 'middle';

    lines.forEach((line, i) => {
      const lineY  = originY + i * lh;
      const innerW = b.width - px * 2;

      if (this.align === 'justify' && i < lines.length - 1 && line.trim()) {
        const words = line.split(' ');
        if (words.length > 1) {
          const totalWordW = words.reduce((acc, w) => acc + ctx.measureText(w).width, 0);
          const gap = (innerW - totalWordW) / (words.length - 1);
          let cx = b.x + px;
          ctx.fillStyle = textColor;
          words.forEach(w => { ctx.fillText(w, cx, lineY); cx += ctx.measureText(w).width + gap; });

        }
      }

      let tx;
      if      (this.align === 'center') { ctx.textAlign = 'center'; tx = b.x + b.width / 2; }
      else if (this.align === 'right')  { ctx.textAlign = 'right';  tx = b.x + b.width - px; }
      else                              { ctx.textAlign = 'left';   tx = b.x + px; }

      ctx.fillStyle = textColor;
      ctx.fillText(line, tx, lineY);
    });

    ctx.restore();
  }

class DropDown extends BaseWidget {
  constructor(items, bounds) {
    super(undefined, bounds);
    this.items = items || [];
    this._selectedIndex = -1;
    this._hovered = false;
    this._open = false;
    this._openUp = false;  // direction flag
    this._listHoverIndex = -1;
    this._maxVisibleItems = 8;  // max rows before scrolling
    this._scrollOffset = 0;     // first visible item index
    this._scrollbarDragging = false;
    this._scrollbarThumbPos = 0;
    this.cursor = 'pointer';
    this.background = null;
    this.on('mouseenter', () => { this._hovered = true;  this.markDirty(); });
    this.on('mouseleave', () => { this._hovered = false; this.markDirty(); });
    this.on('click', e => {
      if (!this.enabled) return;
      if (this._open) {
        const idx = this._itemAt(e.x, e.y);
        if (idx >= 0) { this._selectedIndex = idx; this._open = false; this._emit(); }
        else this._open = false;
      } else {
        this._open = true;
        this._decideDirection();
        // Scroll to show selected item
        if (this._selectedIndex >= 0) {
          const vis = Math.min(this._maxVisibleItems, this.items.length);
          this._scrollOffset = Math.max(0, Math.min(this._selectedIndex - Math.floor(vis/2), this.items.length - vis));
        } else {
          this._scrollOffset = 0;
        }
      }
      this.markDirty();
    });
    this.on('mousemove', e => {
      if (this._open) {
        const idx = this._itemAt(e.x, e.y);
        if (idx !== this._listHoverIndex) { this._listHoverIndex = idx; this.markDirty(); }
        if (this._scrollbarDragging) {
          const lr = this._listRect();
          const sbY = e.y - lr.y;
          const sbH = lr.height;
          const itemCount = this.items.length;
          const vis = Math.min(this._maxVisibleItems, itemCount);
          const thumbH = Math.max(20, sbH * vis / itemCount);
          const trackH = sbH - thumbH;
          const ratio = trackH > 0 ? Math.max(0, Math.min(1, (sbY - thumbH/2) / trackH)) : 0;
          this._scrollOffset = Math.round(ratio * (itemCount - vis));
          this.markDirty();
        }
      }
    });
    const _doScroll = e => {
      if (!this._open) return;
      const dir = (e.deltaY ?? e.delta ?? 0) > 0 ? 1 : -1;
      const vis = Math.min(this._maxVisibleItems, this.items.length);
      this._scrollOffset = Math.max(0, Math.min(this._scrollOffset + dir, this.items.length - vis));
      this.markDirty();
      e.stopPropagation?.();
    };
    this.on('wheel',  _doScroll);
    this.on('scroll', _doScroll);
    this.on('mousedown', e => {
      if (!this._open) return;
      const lr = this._listRect();
      const sbW = 12;
      const sbX = lr.x + lr.width - sbW;
      if (e.x >= sbX && e.x < sbX + sbW) {
        const sbY = e.y - lr.y;
        const sbH = lr.height;
        const itemCount = this.items.length;
        const vis = Math.min(this._maxVisibleItems, itemCount);
        if (itemCount > vis) {
          const thumbH = Math.max(20, sbH * vis / itemCount);
          const trackH = sbH - thumbH;
          const thumbY = (this._scrollOffset / (itemCount - vis)) * trackH;

    });
  }

  set selectedIndex(v) { this._selectedIndex = v; this.markDirty(); }
  get selectedValue() { return this.items[this._selectedIndex] ?? null; }
  get isOpen() { return this._open; }
  close() { if (this._open) { this._open = false; this.markDirty(); } }

  // Decide whether to open upward or downward based on available space
  _decideDirection() {
    const b = this.bounds;
    const itemH = 22;
    const vis = Math.min(this._maxVisibleItems, this.items.length);
    const listH = vis * itemH;
    // Walk up the parent chain to get absolute Y of the widget
    let absY = b.y;
    let node = this.parent;
    while (node) { absY += node.bounds ? node.bounds.y : 0; node = node.parent; }

    let root = this.parent;
    while (root && root.parent) root = root.parent;
    const canvasH = root ? root.bounds.height : 600;

    const spaceBelow = canvasH - (absY + b.height);

  _listRect() {
    const b = this.bounds;
    const itemH = 22;
    const vis = Math.min(this._maxVisibleItems, this.items.length);
    const listH = vis * itemH;
    const ly = this._openUp ? b.y - listH : b.y + b.height;
    return { x: b.x, y: ly, width: b.width, height: listH, itemH, vis };
  }

  hitTest(x, y) {
    if (!this.visible) return false;
    const b = this.bounds;
    if (rectContains(b, x, y)) return true;
    if (this._open) {
      const r = this._listRect();
      return rectContains(r, x, y);
    }
    return false;
  }

  _itemAt(rx, ry) {
    if (!this._open) return -1;

  }

  render(ctx) {

    const style = !this.enabled ? t.disabled : this._open ? t.open : this._hovered ? t.hover : t.normal;
    ctx.save();
    drawGradient(ctx, b.x, b.y, b.width, b.height, this.background ?? style.background);
    drawRoundRect(ctx, b.x, b.y, b.width, b.height, r); ctx.fill();
    ctx.strokeStyle = colorToCSS(style.border.color); ctx.lineWidth = style.border.width;
    drawRoundRect(ctx, b.x+.5, b.y+.5, b.width-1, b.height-1, r); ctx.stroke();

    ctx.strokeStyle = colorToCSS(t.normal.border.color); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x+b.width-arrW, b.y+2); ctx.lineTo(b.x+b.width-arrW, b.y+b.height-2); ctx.stroke();

    if (arrowUp) { ctx.moveTo(ax-5,ay+3); ctx.lineTo(ax,ay-3); ctx.lineTo(ax+5,ay+3); }
    else          { ctx.moveTo(ax-5,ay-3); ctx.lineTo(ax,ay+3); ctx.lineTo(ax+5,ay-3); }
    ctx.fill();
    ctx.beginPath(); ctx.rect(b.x+4, b.y, b.width-arrW-8, b.height); ctx.clip();
    ctx.font = fontToCSS(t.font);
    ctx.fillStyle = colorToCSS(this.enabled ? t.normal.text : t.disabled.text);
    ctx.textBaseline = 'middle';
    ctx.fillText(this._selectedIndex >= 0 ? this.items[this._selectedIndex] : '', b.x+6, b.y+b.height/2);
    ctx.restore();
    if (this._open && this.items.length > 0) this._renderList(ctx);
  }

  _renderList(ctx) {
    const t = getTheme().dropdown;
    const lr = this._listRect();
    const { x: lx, y: ly, width: lw, height: lh, itemH, vis } = lr;
    ctx.save();
    if (t.listShadow) applyShadow(ctx, t.listShadow);
    ctx.fillStyle = colorToCSS(t.listBackground);
    drawRoundRect(ctx, lx, ly, lw, lh, t.borderRadius); ctx.fill();
    clearShadow(ctx);
    ctx.strokeStyle = colorToCSS(t.listBorder.color); ctx.lineWidth = t.listBorder.width;
    drawRoundRect(ctx, lx+.5, ly+.5, lw-1, lh-1, t.borderRadius); ctx.stroke();
    ctx.beginPath(); ctx.rect(lx, ly, lw, lh); ctx.clip();

  }

// WindowContent — scrollbars H+V, show on hover
// ════════════════════════════════════════════════════════════════════
class WindowContent extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._scrollX = 0; this._scrollY = 0;
    this._SB = 12; this._hovered = false; this._sbDrag = null;
  }

  hitTest(x, y) {
    if (!this.visible) return false;
    if (this._anim && (this._anim.type==='close'||this._anim.type==='minimize')) return false;
    return rectContains(this.getAbsoluteBounds(), x, y);
  }

  _contentSize() {
    let maxX=0, maxY=0;
    for (const c of this.children) {
      if (!c.visible) continue;
      maxX = Math.max(maxX, c.bounds.x+c.bounds.width);
      maxY = Math.max(maxY, c.bounds.y+c.bounds.height);
    }
    return { w:maxX+10, h:maxY+10 };
  }

  _bars(b) {
    const cs=this._contentSize(), SB=this._SB;
    const needV=cs.h>b.height;
    const needH=cs.w>b.width-(needV?SB:0);
    return { needH, needV, SB,
      viewW:b.width-(needV?SB:0), viewH:b.height-(needH?SB:0), cw:cs.w, ch:cs.h };
  }

  _clamp(b) {
    const{viewW,viewH,cw,ch}=this._bars(b);
    this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX));
    this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY));
  }

  _thumbInfo(dir,viewSz,contentSz,scroll) {
    const len=Math.max(24,viewSz*Math.min(1,viewSz/contentSz));
    const maxScroll=Math.max(1,contentSz-viewSz);
    return { off:(scroll/maxScroll)*(viewSz-len), len, maxScroll };

    const b=this.bounds; this._clamp(b);
    const{needH,needV,viewW,viewH,cw,ch}=this._bars(b);

      if (needV)      this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY+dy));

class WindowManager extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._windows = []; this._activeWindow = null; this._focusedWidget = null;
    this._hoveredWidget = null; this._draggedWindow = null;
    this._tooltipWidget = null; this._tooltipTimer = 0;
    this._tooltipVisible = false; this._tooltipPos = { x:0, y:0 };
    this._tooltipAppearTime = 0; this._tooltipAppearDuration = 300;
    this._tooltipFadingOut = false; this._tooltipFadeDuration = 150;
    this._mousePos = { x:0, y:0 };
    this._mouseDown = false;
  }

  addWindow(win) {
    this._windows.push(win); win.parent=this; this._activate(win);
    const style = _animStyle();  // 'bmw:effectname'
    const effName = style.split(':')[1];
    const eff = BMW[effName];
    const dur = eff ? eff.duration.open : 300;
    win._bmwEffName = effName;
    win._bmwState = null;  // lazy-init on first render
    win._anim = { style, type:'open', t:0, duration:dur, p:0 };
    win._animScale = 1; win._animOpacity = 1;
    this.markDirty();
  }
  removeWindow(win) {
    const i = this._windows.indexOf(win);
    if (i < 0) return;
    this._windows.splice(i, 1); win.parent = null;
    if (this._activeWindow === win) {
      this._activeWindow = this._windows.length > 0 ? this._windows[this._windows.length-1] : null;
      if (this._activeWindow) this._activeWindow.active = true;
    }
    this.markDirty();
  }
  get windows() { return [...this._windows]; }

  _activate(win) {
    if (this._activeWindow && this._activeWindow !== win) this._activeWindow.active = false;
    win.active = true; this._activeWindow = win;
    const i = this._windows.indexOf(win);
    if (i >= 0 && i < this._windows.length-1) { this._windows.splice(i,1); this._windows.push(win); }
    this.markDirty();
  }

  handleMouseDown(x, y, button) {
    this._mousePos = { x, y }; this._mouseDown = true;
    const topWin = this._getWinAt(x, y);
    if (topWin && topWin !== this._activeWindow) this._activate(topWin);
    if (!topWin) {
      // Click outside all windows — close any open dropdown
      for (const win of this._windows)
        for (const child of win._contentArea.children)
          if (child instanceof DropDown && child._open) child.close();
      return;
    }

    const ev = this._mkEv('mousedown', x, y, button);
    const hitClose = topWin._hitBtn(topWin._closeBtn, x, y);
    const hitMin   = topWin._hitBtn(topWin._minBtn,   x, y);
    const hitMax   = topWin._hitBtn(topWin._maxBtn,   x, y);

    // Dispatch mousedown into the window (handles content children + title bar btns)
    topWin.dispatchEvent(ev);

    // Start window drag/resize only if no title bar button was hit and event not consumed
    if (!hitClose && !hitMin && !hitMax && !ev.stopped) {

      const ca = topWin._contentArea;
      if (ca.hitTest(x, y) && ca.onMouseDownAbs(x, y)) {
        this._sbDragWin = topWin;
        return;
      }
      topWin.startDrag(x, y, button);
      if (topWin.isDragging) this._draggedWindow = topWin;
    }

    // Track dragging widget ONLY for widgets that explicitly opt-in (e.g. Slider)
    // Exclude widgets embedded inside HtmlLabel: their coords live in HtmlLabel-space,
    // and HtmlLabel._capturedWidget already handles drag delivery correctly.
    const target = this._getDeepestInWindow(topWin, x, y);
    if (target) {
      if (target.tabIndex >= 0) this._setFocus(target);
      if (target.capturesDrag && !target._embeddedInHtmlLabel) {
        this._draggedWidget = target;
        this._draggedWidgetWin = topWin;
      }
    }
  }

  handleMouseUp(x, y, button) {
    this._mouseDown = false;
    const wasWindowDrag = !!this._draggedWindow;

    if (this._draggedWindow) {
      this._draggedWindow.endDrag();
      this._draggedWindow = null;
    }
    // Release scrollbar drag
    if (this._sbDragWin) {
      this._sbDragWin._contentArea.onMouseUpAbs();
      this._sbDragWin = null;
    }

    if (this._draggedWidget && this._draggedWidgetWin) {

      const ca  = this._draggedWidgetWin._contentArea;
      const relX = x - wab.x - ca.bounds.x;
      const relY = y - wab.y - ca.bounds.y;

    const topWin = this._getWinAt(x, y);
    if (topWin) {
      topWin.dispatchEvent(this._mkEv('mouseup', x, y, button));

      // Skip only if the window itself was being dragged/resized
      if (!wasWindowDrag) {

      }

  handleMouseMove(x, y) {
    this._mousePos = { x, y };

    if (this._sbDragWin) {
      this._sbDragWin._contentArea.onMouseMoveAbs(x, y);

    }

    // Update hover state on WindowContent — only the topmost window under cursor
    const topForHover = this._getWinAt(x, y);

      if (!win.visible) continue;
      const ca = win._contentArea;
      ca.setHovered(win === topForHover && ca.hitTest(x, y));

    // Normal: hover tracking
    const newHov = this._getDeepest(x, y);

      if (newHov)              newHov.emit(this._mkEv('mouseenter', x, y));
      this._hoveredWidget = newHov;

      if (this._tooltipVisible) {

      } else {

      }

    const topWin = this._getWinAt(x, y);

      const ca = topWin._contentArea;
      if (ca.hitTest(x, y) && ca.isOverScrollbar(x, y)) {

        } else if (newHov && newHov.cursor && newHov.cursor !== 'default') {

        } else {
          if(this._cursorEl)this._cursorEl.style.cursor = 'default';
        }
      }
      topWin.dispatchEvent(this._mkEv('mousemove', x, y));
    } else {
      if(this._cursorEl)this._cursorEl.style.cursor = 'default';
    }

  handleWheel(x, y, deltaX, deltaY, shiftKey) {
    const topWin = this._getWinAt(x, y);

    }
  }

  handleDblClick(x, y) {
    const topWin = this._getWinAt(x, y);

  }

  handleKey(type, key, code, ctrl, shift, alt) {

      preventDefault()  { this.defaultPrevented=true; },

      stopPropagation() { this.stopped=true; },
      preventDefault()  { this.defaultPrevented=true; },
      stopped:false, defaultPrevented:false };

  _getDeepest(x, y) {

  _getDeepestInWindow(win, ax, ay) {

    if (win._hitBtn(win._closeBtn, ax, ay)) return win._closeBtn;
    if (win._hitBtn(win._minBtn,   ax, ay)) return win._minBtn;

      'n-resize':'n-resize','s-resize':'s-resize',
      'e-resize':'e-resize','w-resize':'w-resize','ne-resize':'ne-resize',
      'nw-resize':'nw-resize','se-resize':'se-resize','sw-resize':'sw-resize',

    const c=this._canvas;
    const pos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};};
    const posT=t=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};};

    // ── Mouse (desktop) ────────────────────────────────────────────────────
    // mousedown on canvas only — starts interactions
    c.addEventListener('mousedown',e=>{
      if(this._touchActive)return;
      c.focus({preventScroll:true});
      const {x,y}=pos(e);
      this._mouseDown=true;
      this._wm.handleMouseDown(x,y,e.button);
      this._fullRedraw=true;
    });
    // mouseup / mousemove on window so drag keeps working outside canvas
    window.addEventListener('mouseup',e=>{
      if(this._touchActive)return;
      const {x,y}=pos(e);
      if(this._mouseDown){
        this._mouseDown=false;
        this._wm.handleMouseUp(x,y,e.button);
        this._fullRedraw=true;
      }
    });
    window.addEventListener('mousemove',e=>{
      if(this._touchActive)return;
      const {x,y}=pos(e);
      this._wm.handleMouseMove(x,y);
      this._fullRedraw=true;
    });
    c.addEventListener('dblclick', e=>{if(this._touchActive)return;const {x,y}=pos(e);this._wm.handleDblClick(x,y);this._fullRedraw=true;});
    c.addEventListener('wheel',e=>{e.preventDefault();const {x,y}=pos(e);this._wm.handleWheel(x,y,e.deltaX||0,e.deltaY,e.shiftKey);this._fullRedraw=true;},{passive:false});
    c.addEventListener('contextmenu',e=>e.preventDefault());
    c.addEventListener('mouseleave',()=>{
      for (const win of this._wm._windows) { if (win.visible) win._contentArea.setHovered(false); }
      this._fullRedraw=true;
    });

    // ── Touch (mobile / tablet) ────────────────────────────────────────────
    let _tid=null,_ts=null,_lastTap=0,_lastPos={x:0,y:0},_twoY=null,_lpTimer=null;
    this._touchActive=false;

    c.addEventListener('touchstart',e=>{
      e.preventDefault();
      this._touchActive=true;
      if(e.touches.length===1){
        const t=e.touches[0]; const {x,y}=posT(t);
        _tid=t.identifier; _ts={x,y};
        if(_lpTimer)clearTimeout(_lpTimer);
        _lpTimer=setTimeout(()=>{ _lpTimer=null; },600);
        this._ddScrollAcc=0;this._wm.handleMouseDown(x,y,0); this._fullRedraw=true;
        const now=Date.now();
        if(now-_lastTap<320&&Math.abs(x-_lastPos.x)<24&&Math.abs(y-_lastPos.y)<24){
          this._wm.handleDblClick(x,y); this._fullRedraw=true;
        }
        _lastTap=now; _lastPos={x,y};
      } else if(e.touches.length===2){
        if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
        if(_ts)this._wm.handleMouseUp(_ts.x,_ts.y,0);
        _twoY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      }
    },{passive:false});

    c.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(e.touches.length===1){
        const t=[...e.touches].find(t=>t.identifier===_tid)||e.touches[0];
        const {x,y}=posT(t);
        if(_lpTimer&&_ts&&(Math.abs(x-_ts.x)>8||Math.abs(y-_ts.y)>8)){clearTimeout(_lpTimer);_lpTimer=null;}
        // Touch-scroll open DropDown list
        if(_ts && this._wm.scrollOpenDropDown){
          const _dy=y-_ts.y;
          this._ddScrollAcc=(this._ddScrollAcc||0)+_dy;
          if(Math.abs(this._ddScrollAcc)>=22){
            const _steps=-Math.round(this._ddScrollAcc/22);
            if(this._wm.scrollOpenDropDown(x,y,_steps)){
              this._ddScrollAcc=0;_ts={x,y};this._fullRedraw=true;return;
            }
            this._ddScrollAcc=0;
          }
        }
        this._wm.handleMouseMove(x,y); this._fullRedraw=true;
      } else if(e.touches.length===2){
        const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
        const r=c.getBoundingClientRect(),sx=c.width/r.width,sy2=c.height/r.height;
        if(_twoY!==null){this._wm.handleWheel((cx-r.left)*sx,(cy-r.top)*sy2,(cy-_twoY)*-4);this._fullRedraw=true;}
        _twoY=cy;
      }
    },{passive:false});

    c.addEventListener('touchend',e=>{
      e.preventDefault();
      if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
      _twoY=null;
      const ch=[...e.changedTouches].find(t=>t.identifier===_tid)||e.changedTouches[0];
      const {x,y}=posT(ch);
      this._wm.handleMouseUp(x,y,0);
      // Dismiss hover state after touch
      setTimeout(()=>{this._wm.handleMouseMove(-999,-999);this._fullRedraw=true;},50);
      _tid=null; _ts=null;
      setTimeout(()=>{this._touchActive=false;},300);
      this._fullRedraw=true;
    },{passive:false});

    c.addEventListener('touchcancel',e=>{
      if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
      _twoY=null; _tid=null; _ts=null; this._touchActive=false; this._fullRedraw=true;
    },{passive:false});

    // ── Keyboard (desktop direct, mobile via hidden input) ─────────────────
    const _kd=e=>{
      // Ctrl+Shift+D: toggle dirty-rect debug overlay
      if (e.ctrlKey && e.shiftKey && (e.key === 'd' || e.key === 'D')) {
        this.showDirtyRects = !this.showDirtyRects;
        this._fullRedraw = true;
        e.preventDefault();
        return;
      }
      // Ctrl+G: toggle grid lines overlay on all GridPanels
      if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === 'g' || e.key === 'G')) {
        this.showGridOverlay = !this.showGridOverlay;
        this._fullRedraw = true;
        e.preventDefault();
        return;
      }

      this._wm.handleKey('keydown',e.key,e.keyCode,e.ctrlKey,e.shiftKey,e.altKey);
      this._fullRedraw=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.key))e.preventDefault();
    };
    window.addEventListener('keydown',_kd);
    window.addEventListener('keyup',e=>this._wm.handleKey('keyup',e.key,e.keyCode,e.ctrlKey,e.shiftKey,e.altKey));
  }


  start(){this._lastTime=performance.now();this._loop(this._lastTime);}
  _loop=ts=>{
    const dt=Math.min(ts-this._lastTime,50); this._lastTime=ts;
    this._fpsTimer+=dt; this._frameCount++;
    if(this._fpsTimer>=1000){this._fps=this._frameCount;this._frameCount=0;this._fpsTimer=0;}
    this._wm.update(dt);
    // Only redraw what is marked dirty (or the full canvas if forced).
    const dirty = this._fullRedraw
    ? { x: 0, y: 0, width: this._canvas.width, height: this._canvas.height }
    : this._wm.getDirtyRect();
    
    let dirtyRects = null;
    if (this.showDirtyRects) {
      dirtyRects = this._wm.collectDirtyRects([]);
    }
    
    if (dirty) {
      const x = Math.max(0, Math.floor(dirty.x));
      const y = Math.max(0, Math.floor(dirty.y));
      const w = Math.max(0, Math.min(this._canvas.width - x, Math.ceil(dirty.width)));
      const h = Math.max(0, Math.min(this._canvas.height - y, Math.ceil(dirty.height)));

      this._offCtx.save();
      this._offCtx.beginPath();
      this._offCtx.rect(x, y, w, h);
      this._offCtx.clip();
      this._offCtx.clearRect(x, y, w, h);
      this._wm.render(this._offCtx);

      // Ctrl+G grid overlay — drawn on top of everything
      if (this.showGridOverlay) {
        this._renderGridOverlay(this._offCtx);
      }

      this._offCtx.restore();

      this._wm.markClean();

      this._ctx.clearRect(x, y, w, h);
      this._ctx.drawImage(this._offscreen, x, y, w, h, x, y, w, h);

      if (dirtyRects && dirtyRects.length) {
        this._ctx.save();
        this._ctx.strokeStyle = 'rgba(255,0,0,0.8)';
        this._ctx.lineWidth = 1;
        this._ctx.fillStyle = 'rgba(255,0,0,0.15)';
        for (const r of dirtyRects) {
          const rx = Math.max(0, Math.floor(r.x));
          const ry = Math.max(0, Math.floor(r.y));
          const rw = Math.max(0, Math.min(this._canvas.width - rx, Math.ceil(r.width)));
          const rh = Math.max(0, Math.min(this._canvas.height - ry, Math.ceil(r.height)));
          this._ctx.fillRect(rx, ry, rw, rh);
          this._ctx.strokeRect(rx + 0.5, ry + 0.5, Math.max(0, rw - 1), Math.max(0, rh - 1));
        }
        this._ctx.restore();
      }
    }

    this._fullRedraw = false;
    this._rafId=requestAnimationFrame(this._loop);
  };
  // Recursively collect all visible GridPanels with their absolute positions
  _collectGridPanels(widget, absX, absY, result) {
    if (!widget || !widget.visible) return;
    const bx = absX + (widget.bounds?.x || 0);
    const by = absY + (widget.bounds?.y || 0);
    if (widget instanceof GridPanel && widget._rects) {
      result.push({ gp: widget, ax: absX, ay: absY });
    }
    for (const child of (widget.children || [])) {
      // WindowContent children are shifted by scroll
      const scrollX = widget._scrollX || 0;
      const scrollY = widget._scrollY || 0;
      this._collectGridPanels(child, bx - scrollX, by - scrollY, result);
    }
  }

  _renderGridOverlay(ctx) {
    const panels = [];
    for (const win of (this._wm._windows || [])) {
      if (!win.visible) continue;
      const wb = win.getAbsoluteBounds?.() || win.bounds;
      const ca = win._contentArea;
      if (ca) {
        const caAbsX = wb.x + ca.bounds.x;
        const caAbsY = wb.y + ca.bounds.y - (ca._scrollY || 0);
        for (const child of (ca.children || []))
          this._collectGridPanels(child, caAbsX, caAbsY, panels);
      }
    }
    if (panels.length === 0) return;

    ctx.save();

    for (const { gp, ax, ay } of panels) {
      if (!gp._rects || gp._dirty) continue;

      const px = ax + gp.bounds.x;
      const py = ay + gp.bounds.y;
      const pw = gp.bounds.width;
      const ph = gp.bounds.height;
      const pad = gp._pad ? gp._pad() : {t:0,r:0,b:0,l:0};
      const gap = gp._cGap ? gp._cGap() : (gp.gap || 0);
      const rGap = gp._rGap ? gp._rGap() : (gp.gap || 0);

      // Collect unique edges from rects
      const colEdges = new Set([pad.l, pw - pad.r]);
      const rowEdges = new Set([pad.t, ph - pad.b]);
      for (const r of gp._rects) {
        if (!r) continue;
        colEdges.add(r.x); colEdges.add(r.x + r.w);
        rowEdges.add(r.y); rowEdges.add(r.y + r.h);
      }
      const cols = [...colEdges].sort((a,b)=>a-b);
      const rows = [...rowEdges].sort((a,b)=>a-b);

      ctx.save();
      // Clip to panel
      ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

      // ── Draw lines only inside gaps (between cells) ──
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.55)';

      // Internal column separators — only draw the gap zone, not over cells
      for (let ci = 1; ci < cols.length - 1; ci++) {
        const ex = px + cols[ci];
        // Is this edge a right-edge of a cell? → gap starts here
        // Draw dashed line through the gap width
        const gapW = gap > 0 ? gap : 1;
        ctx.beginPath();
        ctx.moveTo(ex - gapW/2 + 0.5, py + pad.t);
        ctx.lineTo(ex - gapW/2 + 0.5, py + ph - pad.b);
        ctx.stroke();
      }

      // Internal row separators
      for (let ri = 1; ri < rows.length - 1; ri++) {
        const ey = py + rows[ri];
        const gapH = rGap > 0 ? rGap : 1;
        ctx.beginPath();
        ctx.moveTo(px + pad.l, ey - gapH/2 + 0.5);
        ctx.lineTo(px + pw - pad.r, ey - gapH/2 + 0.5);
        ctx.stroke();
      }

      // ── Panel outer border ──
      ctx.setLineDash([5, 3]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.8)';
      ctx.strokeRect(px + pad.l + 0.75, py + pad.t + 0.75,
                     pw - pad.l - pad.r - 1.5, ph - pad.t - pad.b - 1.5);
      ctx.setLineDash([]);

      // ── Size annotations — outside the panel, in the padding zone ──
      ctx.font = 'bold 8px monospace';
      ctx.fillStyle = 'rgba(50, 50, 180, 0.9)';
      ctx.textBaseline = 'bottom';
      ctx.textAlign = 'center';

      // Column widths above each column (in top padding)
      if (pad.t >= 9) {
        for (let ci = 0; ci < cols.length - 1; ci++) {
          const cw2 = cols[ci+1] - cols[ci];
          if (cw2 < 20) continue;
          const midX = px + cols[ci] + cw2/2;
          ctx.fillText(`${Math.round(cw2)}`, midX, py + pad.t - 1);
        }
      }

      // Row heights in left padding
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      if (pad.l >= 10) {
        for (let ri = 0; ri < rows.length - 1; ri++) {
          const rh2 = rows[ri+1] - rows[ri];
          if (rh2 < 10) continue;
          const midY = py + rows[ri] + rh2/2;
          ctx.fillText(`${Math.round(rh2)}`, px + pad.l - 2, midY);
        }
      }

      ctx.restore();
    }

    // Legend badge
    ctx.save();
    const lx = 8, ly = this._canvas.height - 22;
    ctx.fillStyle = 'rgba(20,20,60,0.8)';
    ctx.beginPath(); ctx.roundRect(lx, ly, 228, 16, 4); ctx.fill();
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = 'rgba(180,180,255,1)';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('⊞ Grid overlay actif — Ctrl+G pour désactiver', lx+6, ly+8);
    ctx.restore();

    ctx.restore();
  }

  get fps(){return this._fps;}
}


// ════════════════════════════════════════════════════════════════════
// DataGrid v2 — Full-featured Canvas DataGrid
//
// Architecture: 4-zone rendering (fixed cols left/right, fixed rows top/bottom)
// ════════════════════════════════════════════════════════════════════

// ── DataGrid helper classes ────────────────────────────────────────

class DGColumnGroup {
  // Used for multi-level headers
  constructor(opts={}) {
    this.headerName  = opts.headerName || '';
    this.children    = opts.children   || [];
    this.groupId     = opts.groupId    || null;
    this.openByDefault = opts.openByDefault !== false;
  }
}

// ── Main DataGrid class ────────────────────────────────────────────
class DataGrid extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);

    // ── Data ─────────────────────────────────────────────────────
    this.rowData         = [];
    this.columnDefs      = [];   // flat or nested (DGColumnGroup)
    this.headerRows      = [];   // multi-level: [[{col,colspan,rowspan,label},...],...]
    this.footerDefs      = [];   // [{field, label, aggFunc, colspan, ...}]

    // ── Display options ──────────────────────────────────────────
    this.rowHeight        = 28;
    this.headerHeight     = 32;  // per header row
    this.filterRowHeight  = 26;
    this.footerHeight     = 28;  // per footer row
    this.showFilterRow    = false;
    this.showFooter       = false;

    // ── Fixed zones ──────────────────────────────────────────────
    // col.pinned = 'left'|'right'|null
    // row.pinned = 'top'|'bottom'|null  (for future row pinning)
    this._pinnedTopRows    = [];   // fixed rows at top (row data)
    this._pinnedBottomRows = [];   // fixed rows at bottom

    // ── Pagination ───────────────────────────────────────────────
    this.pagination  = false;
    this.pageSize    = 50;
    this._page       = 0;
    this._paginH     = 32;

    // ── Selection ────────────────────────────────────────────────
    this.rowSelection  = 'multiple';
    this._selectedRows = new Set();

    // ── Scroll ───────────────────────────────────────────────────
    this._scrollX = 0;
    this._scrollY = 0;

    // ── Sort / Filter / Group ────────────────────────────────────
    this._sortState    = [];
    this._filters      = {};
    this._globalFilter = '';
    this._groupBy      = [];  // [field, ...]
    this._groupState   = {};  // {groupKey: expanded:bool}
    this._pivotMode    = false;
    this._pivotCols    = [];
    this._valueCols    = [];  // [{field, aggFunc, headerName?}]

    // ── Pivot cache ──────────────────────────────────────────────
    this._pivotFlatCols    = null;  // colonnes leaf générées en mode pivot
    this._pivotHeaderRows  = null;  // header multi-niveau généré en mode pivot
    this._pivotRows        = null;  // lignes agrégées en mode pivot
    this._pivotColHidden   = new Map(); // field → bool, persisté entre regens

    // ── Tree Data ────────────────────────────────────────────────
    this.treeData      = false;
    this.getDataPath   = null; // (row) => string[]
    this._treeState    = {};   // {nodeKey: expanded}

    // ── Tool Panels ──────────────────────────────────────────────
    this.toolPanels    = [];   // ['columns','filters','stats','custom']
    this._toolPanelOpen = null;
    this._toolPanelW   = 220;

    // ── Editing ──────────────────────────────────────────────────
    this._editingCell  = null;

    // ── Filter popup ─────────────────────────────────────────────
    this._filterPopup  = null;

    // ── Hover ────────────────────────────────────────────────────
    this._hoverRow = -1;
    this._hoverCol = -1;

    // ── Column cache ─────────────────────────────────────────────
    this._flatCols     = null;  // flattened leaf columns
    this._colWidths    = null;
    this._colOffsets   = null;
    this._headerRowDefs = null; // computed multi-level header

    // ── Data cache ───────────────────────────────────────────────
    this._processedRows = null;  // after filter+sort+group+tree

    // ── Scrollbar ────────────────────────────────────────────────
    this._SB = 10;
    this._sbDragV = null;
    this._sbDragH = null;
    this._resizingCol = null;

    // ── Pagination buttons ───────────────────────────────────────
    this._paginBtns = [];

    // ── Callbacks ────────────────────────────────────────────────
    this.onRowClick         = null;
    this.onCellClick        = null;
    this.onSelectionChanged = null;
    this.onCellValueChanged = null;
    this.onRowGroupOpened   = null;

    this.cursor = 'default';
  }

  // ══ Public API ════════════════════════════════════════════════
  setRowData(data)    { this.rowData = data||[]; this._invalidate(); this.markDirty(); }
  setColumnDefs(cols) { this.columnDefs = cols||[]; this._flatCols=null; this._colWidths=null; this._headerRowDefs=null; this._pivotFlatCols=null; this._pivotHeaderRows=null; this._pivotRows=null; this._invalidate(); this.markDirty(); }
  getSelectedRows()   { return [...this._selectedRows]; }
  clearSelection()    { this._selectedRows.clear(); this.markDirty(); }
  setPage(p) {
    const max = Math.max(0, Math.ceil(this._getDisplayRows().length/this.pageSize)-1);
    this._page = Math.max(0,Math.min(p,max)); this.markDirty();
  }
  setGroupBy(fields)  { this._groupBy=fields; this._invalidate(); this.markDirty(); }
  expandAll()   { Object.keys(this._groupState).forEach(k=>this._groupState[k]=true);  this._invalidate(); this.markDirty(); }
  collapseAll() { Object.keys(this._groupState).forEach(k=>this._groupState[k]=false); this._invalidate(); this.markDirty(); }
  setPivotMode(on)    { this._pivotMode=on; this._invalidate(); this.markDirty(); }
  setPivotCols(flds)  { this._pivotCols=flds; this._pivotColHidden.clear(); this._invalidate(); this.markDirty(); }
  setValueCols(defs)  { this._valueCols=defs; this._pivotColHidden.clear(); this._invalidate(); this.markDirty(); }

  // ══ Column helpers ════════════════════════════════════════════
  _getFlatCols() {
    if (this._pivotMode && this._pivotCols.length && this._valueCols.length) {
      if (this._pivotFlatCols) return this._pivotFlatCols;
      this._buildPivotSchema();
      return this._pivotFlatCols;
    }
    if (this._flatCols) return this._flatCols;
    this._flatCols = [];
    const flatten = (defs) => {
      for (const d of defs) {
        if (d instanceof DGColumnGroup || d.children) {
          flatten(d.children || []);
        } else {
          this._flatCols.push(d);
        }
      }
    };
    flatten(this.columnDefs);
    return this._flatCols;
  }

  _computeColWidths() {
    if (this._colWidths) return;
    const cols = this._getFlatCols();
    this._colWidths  = cols.map(c => c.hide===true ? 0 : (c.width || 120));
    this._colOffsets = [];
    let x = 0;
    for (const w of this._colWidths) { this._colOffsets.push(x); x += w; }
  }

  _totalColWidth() { this._computeColWidths(); return this._colWidths.reduce((s,w)=>s+w,0); }

  // Columns split by pinned zone
  _getZoneCols() {
    const cols = this._getFlatCols();
    this._computeColWidths();
    const left   = [], center = [], right = [];
    cols.forEach((c,i) => {
      if (c.hide===true) return;
      const entry = {col:c, ci:i, x:this._colOffsets[i], w:this._colWidths[i]};
      if (c.pinned==='left')  left.push(entry);
      else if (c.pinned==='right') right.push(entry);
      else center.push(entry);
    });
    return {left, center, right};
  }

  _leftPinnedWidth()  { return this._getZoneCols().left.reduce((s,e)=>s+e.w,0); }
  _rightPinnedWidth() { return this._getZoneCols().right.reduce((s,e)=>s+e.w,0); }

  // ══ Multi-level header ════════════════════════════════════════
  _buildHeaderRows() {
    if (this._pivotMode && this._pivotCols.length && this._valueCols.length) {
      if (this._pivotHeaderRows) return this._pivotHeaderRows;
      this._buildPivotSchema();
      return this._pivotHeaderRows;
    }
    if (this._headerRowDefs) return this._headerRowDefs;
    const cols = this._getFlatCols();
    this._computeColWidths();

    // Check if any column has a group parent → multi-level
    const hasGroups = this.columnDefs.some(d => d instanceof DGColumnGroup || d.children);
    if (!hasGroups) {
      // Single row
      this._headerRowDefs = [cols.map((c,i) => ({
        col:c, ci:i, label:c.headerName??c.field, colspan:1, rowspan:1,
        x:this._colOffsets[i], w:this._colWidths[i]
      }))];
      return this._headerRowDefs;
    }

    // Multi-level: compute depth
    const maxDepth = (defs, d=0) => Math.max(d+1, ...defs.map(def =>
      (def instanceof DGColumnGroup || def.children) ? maxDepth(def.children||[], d+1) : d+1
    ));
    const depth = maxDepth(this.columnDefs);

    const rows = Array.from({length:depth}, () => []);
    const place = (defs, row) => {
      for (const def of defs) {
        if (def instanceof DGColumnGroup || def.children) {
          const leaves = this._countLeaves(def);
          const leafCols = this._getLeafCols(def);
          const firstIdx = leafCols.length > 0 ? cols.indexOf(leafCols[0]) : 0;
          const totalW   = leafCols.reduce((s,c,li) => s + this._colWidths[cols.indexOf(c)], 0);
          rows[row].push({
            group:def, label:def.headerName||'', colspan:leaves, rowspan:1,
            x: this._colOffsets[firstIdx], w: totalW, ci: firstIdx
          });
          place(def.children||[], row+1);
        } else {
          const ci = cols.indexOf(def);
          const remainRows = depth - row;
          rows[row].push({
            col:def, ci, label:def.headerName??def.field, colspan:1, rowspan:remainRows,
            x:this._colOffsets[ci], w:this._colWidths[ci]
          });
        }
      }
    };
    place(this.columnDefs, 0);
    this._headerRowDefs = rows;
    return rows;
  }

  _countLeaves(group) {
    let n = 0;
    for (const c of (group.children||[])) {
      if (c instanceof DGColumnGroup || c.children) n += this._countLeaves(c);
      else n++;
    }
    return n;
  }

  _getLeafCols(group) {
    const result = [];
    for (const c of (group.children||[])) {
      if (c instanceof DGColumnGroup || c.children) result.push(...this._getLeafCols(c));
      else result.push(c);
    }
    return result;
  }

  // ══ Layout ════════════════════════════════════════════════════
  _headerTotalH() {
    const rows = this._buildHeaderRows();
    return rows.length * this.headerHeight + (this.showFilterRow ? this.filterRowHeight : 0);
  }

  _footerTotalH() { return this.showFooter ? Math.max(1,this.footerDefs.length||1)*this.footerHeight : 0; }

  // The 4 main rendering zones (all in canvas absolute coords)
  _zones() {
    const b = this.bounds;
    const headerH = this._headerTotalH();
    const footerH = this._footerTotalH();
    const paginH  = this.pagination ? this._paginH : 0;
    const toolW   = this._toolPanelOpen ? this._toolPanelW : 0;
    const SB      = this._SB;
    const leftW   = this._leftPinnedWidth();
    const rightW  = this._rightPinnedWidth();
    const bodyW   = b.width - leftW - rightW - SB - toolW;
    const bodyH   = b.height - headerH - footerH - paginH - SB;

    return {
      // Fixed corner top-left
      cornerTL:  {x:b.x,         y:b.y,           w:leftW,  h:headerH},
      // Fixed corner top-right
      cornerTR:  {x:b.x+leftW+bodyW, y:b.y,        w:rightW, h:headerH},
      // Scrollable header center

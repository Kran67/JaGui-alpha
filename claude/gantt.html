    this.filterText = '';

    // ── Undo / redo ──
    this._undo = []; this._redo = [];

    // ── Columns ──
    this.columns = [
      { key:'wbs',          title:'WBS',       width:50,  align:'left',   frozen:true,  editable:false },
      { key:'name',         title:'Nom de tâche', width:200, align:'left', frozen:true, editable:true, tree:true },
      { key:'start',        title:'Début',     width:84,  align:'center', editable:true, type:'date' },
      { key:'end',          title:'Fin',       width:84,  align:'center', editable:true, type:'date' },
      { key:'duration',     title:'Durée',     width:58,  align:'center', editable:true, type:'number' },
      { key:'progress',     title:'%',         width:46,  align:'center', editable:true, type:'number' },
      { key:'predecessors', title:'Préd.',     width:74,  align:'center', editable:true, type:'pred' },
      { key:'resources',    title:'Ressources',width:140, align:'left',   editable:true, type:'res' },
    ];

    this.tasks = [];
    this.resources = [];
    this.holidays = [];       // [Date]
    this.eventMarkers = [];    // [{date, label, color}]

    if (opts.data) this.setData(opts.data.tasks, opts.data.resources, opts.data.holidays, opts.data.events);

    this.on('mousedown',  e => this._onDown(e));
    this.on('mousemove',  e => this._onMove(e));
    this.on('mouseup',    e => this._onUp(e));
    this.on('click',      e => this._onClick(e));
    this.on('dblclick',   e => this._onDblClick(e));
    this.on('wheel',      e => this._onWheel(e));
    this.on('scroll',     e => this._onWheel(e));
    this.on('keydown',    e => this._onKey(e));
    this.on('mouseleave', () => { if (this._hoverRow !== -1 || this._tipTask) { this._hoverRow = -1; this._tipTask = null; this.markDirty(); } });
  }

  // Build the Gantt palette from the active desktop theme. Chrome colours
  // (surfaces, lines, text, selection, accent) follow the theme; task bars are
  // tinted from the theme accent; semantic colours stay fixed.
  _buildPalette() {
    const T = getTheme();
    const css = c => colorToCSS(c);
    const mix = (a, b, t) => ({ r: Math.round(a.r+(b.r-a.r)*t), g: Math.round(a.g+(b.g-a.g)*t), b: Math.round(a.b+(b.b-a.b)*t), a: 1 });
    const rgba = (c, a) => `rgba(${c.r|0},${c.g|0},${c.b|0},${a})`;
    const WHITE = { r:255, g:255, b:255, a:1 }, BLACK = { r:0, g:0, b:0, a:1 };
    const accent = (T.textBox && T.textBox.focused && T.textBox.focused.border && T.textBox.focused.border.color) || { r:47, g:111, b:214, a:1 };
    const text   = (T.label && T.label.text) || { r:43, g:47, b:54, a:1 };
    const surf   = (T.listBox && T.listBox.background) || WHITE;            // grid / chart surface
    const border = (T.listBox && T.listBox.border && T.listBox.border.color) || { r:204, g:210, b:218, a:1 };
    const panel  = (T.window && T.window.body && T.window.body.background) || surf;
    const dark   = (surf.r + surf.g + surf.b) / 3 < 128;
    const toward = dark ? WHITE : BLACK;                                    // direction for subtle shades
    const accentA = { r: accent.r, g: accent.g, b: accent.b, a: 1 };        // strip alpha for mixing
    return {
      bg:         css(surf),
      panel:      css(panel),
      headerBg:   css(mix(panel, toward, 0.05)),
      headerBg2:  css(mix(panel, toward, 0.12)),
      line:       css(mix(surf, border, 0.55)),
      lineStrong: css(border),
      text:       css(text),
      muted:      css(mix(text, surf, 0.42)),
      rowAlt:     css(mix(surf, toward, 0.035)),
      rowSel:     rgba(accentA, 0.22),
      rowHover:   rgba(accentA, 0.10),
      selBorder:  css(accentA),
      accent:     css(accentA),
      bar:        css(mix(accentA, WHITE, 0.34)),
      barTop:     css(mix(accentA, WHITE, 0.50)),
      barBorder:  css(mix(accentA, BLACK, 0.10)),
      barProg:    css(mix(accentA, BLACK, 0.28)),
      parent:     css(mix(text, surf, 0.18)),
      parentProg: css(text),
      milestone:'#8e44ad', crit:'#e8595a', critProg:'#bb2e2f', baseline:'#caa54a', today:'#ff6b4a',
      link:       css(mix(text, surf, 0.40)),
      weekend:    rgba(toward, dark ? 0.05 : 0.045),
      holiday:    rgba({ r:232, g:89, b:90, a:1 }, dark ? 0.16 : 0.10),
      tbBg:       css(panel),
      scrollTrack:      css(mix(panel, toward, 0.07)),
      scrollThumb:      css(mix(surf, text, 0.32)),
      scrollThumbActive:css(mix(surf, text, 0.52)),
      histo:      css(mix(accentA, WHITE, 0.42)),
      histoOver:'#e8595a',
    };
  }

  // ═══════════════════════════ DATA ═══════════════════════════
  setData(tasks, resources, holidays, events) {
    this.resources = (resources || []).map((r, i) => ({
      id: r.id, name: r.name, capacity: r.capacity || 1,
      color: r.color || G_RES_COLORS[i % G_RES_COLORS.length],
    }));
    this.tasks = (tasks || []).map(t => this._normTask(t));
    this.holidays = (holidays || []).map(d => gSOD(d));
    this.eventMarkers = (events || []).map(e => ({ date: gSOD(e.date), label: e.label, color: e.color || '#7b61ff' }));
    this._recompute();
  }

  _normTask(t) {
    const start = gSOD(t.start ? new Date(t.start) : new Date());
    let end = t.end ? gSOD(new Date(t.end)) : null;
    let dur = t.duration != null ? t.duration : null;
    const milestone = !!t.milestone;
    if (milestone) { end = new Date(start); dur = 0; }
    return {
      id: t.id, name: t.name || 'Tâche',
      start, end, duration: dur,
      progress: Math.max(0, Math.min(100, t.progress ?? 0)),
      parentId: t.parentId ?? null,
      predecessors: (t.predecessors || []).map(p =>
        typeof p === 'object' ? { id: p.id, type: p.type || 'FS', lag: p.lag || 0 }
                              : { id: p, type: 'FS', lag: 0 }),
      resources: [...(t.resources || [])],
      expanded: t.expanded !== false,
      milestone,
      baselineStart: t.baselineStart ? gSOD(new Date(t.baselineStart)) : null,
      baselineEnd:   t.baselineEnd   ? gSOD(new Date(t.baselineEnd))   : null,
      segments: t.segments ? t.segments.map(s => ({ start: gSOD(new Date(s.start)), end: gSOD(new Date(s.end)) })) : null,
      indicators: (t.indicators || []).map(m => ({ date: gSOD(new Date(m.date)), icon: m.icon || '🚩', label: m.label || '', color: m.color })),
      notes: t.notes || '',
      _depth: 0, _wbs: '', _children: [], _isParent: false,
      _es: 0, _ef: 0, _ls: 0, _lf: 0, _slack: 0, _critical: false,
    };
  }

  _isWorking(d) {
    if (this.weekendsNonWorking && gIsWeekend(d)) return false;
    for (const h of this.holidays) if (gDays(h, d) === 0) return false;
    return true;
  }
  // End date = the date of the last working day, given a start + working-day count.
  _endFromDuration(start, dur) {
    if (dur <= 0) return new Date(start);
    let d = new Date(start), counted = 0;
    while (this.weekendsNonWorking && !this._isWorking(d)) d = gAddDays(d, 1);
    while (counted < dur) { if (this._isWorking(d)) counted++; if (counted >= dur) break; d = gAddDays(d, 1); }
    return d;
  }
  _durationBetween(start, end) {
    if (gDays(start, end) < 0) return 1;
    let d = new Date(start), n = 0;
    while (gDays(d, end) >= 0) { if (this._isWorking(d)) n++; d = gAddDays(d, 1); }
    return Math.max(1, n);
  }

  byId(id) { return this.tasks.find(t => t.id === id); }

  // Rebuild hierarchy, WBS numbering, summary roll-ups, schedule, CPM, flat rows.
  _recompute() {
    const map = new Map(this.tasks.map(t => [t.id, t]));
    for (const t of this.tasks) { t._children = []; t._isParent = false; }
    const roots = [];
    for (const t of this.tasks) {
      const p = t.parentId != null ? map.get(t.parentId) : null;
      if (p) { p._children.push(t); p._isParent = true; } else roots.push(t);
    }
    // Leaf scheduling: keep start/end/duration consistent
    for (const t of this.tasks) {
      if (t.milestone) { t.end = new Date(t.start); t.duration = 0; continue; }
      if (t._isParent) continue;
      if (t.duration == null && t.end) t.duration = this._durationBetween(t.start, t.end);
      if (t.duration == null) t.duration = 1;
      t.end = this._endFromDuration(t.start, t.duration);
    }
    // WBS + depth (DFS) and summary roll-up (post-order)
    let order = [];
    const dfs = (node, depth, prefix, idx) => {
      node._depth = depth;
      node._wbs = prefix ? `${prefix}.${idx}` : `${idx}`;
      order.push(node);
      node._children.sort((a, b) => a.start - b.start);
      let ci = 1;
      for (const c of node._children) dfs(c, depth + 1, node._wbs, ci++);
    };
    let ri = 1;
    roots.sort((a, b) => a.start - b.start);
    for (const r of roots) dfs(r, 0, '', ri++);
    // Roll up summaries (post-order via reverse of DFS order)
    for (let i = order.length - 1; i >= 0; i--) {
      const t = order[i];
      if (!t._isParent) continue;
      let mn = null, mx = null, wsum = 0, wtot = 0;
      for (const c of t._children) {
        if (mn == null || c.start < mn) mn = c.start;
        if (mx == null || c.end > mx) mx = c.end;
        const cd = Math.max(c.milestone ? 1 : (c.duration || 1), 1);
        wsum += (c.progress || 0) * cd; wtot += cd;
      }
      if (mn) t.start = new Date(mn);
      if (mx) t.end = new Date(mx);
      t.duration = this._durationBetween(t.start, t.end);
      t.progress = wtot ? Math.round(wsum / wtot) : 0;
    }
    this._order = order;
    this._computeCPM();
    this._buildRows();
    this.markDirty();
  }

  // Critical Path Method on leaf tasks using calendar-day positions.
  _computeCPM() {
    const leaves = this._order.filter(t => !t._isParent);
    if (!leaves.length) return;
    let minD = Infinity, maxD = -Infinity;
    for (const t of leaves) { minD = Math.min(minD, gDays(this.tasks[0]?.start || t.start, t.start)); }
    const base = leaves.reduce((m, t) => t.start < m ? t.start : m, leaves[0].start);
    const map = new Map(this.tasks.map(t => [t.id, t]));
    for (const t of leaves) {
      t._es = gDays(base, t.start);
      t._dur = Math.max(t.milestone ? 0 : 1, gDays(t.start, t.end) + (t.milestone ? 0 : 1));
      t._ef = t._es + t._dur;
    }
    let projEnd = Math.max(...leaves.map(t => t._ef));
    for (const t of leaves) { t._lf = projEnd; t._ls = projEnd - t._dur; }
    // Iterate to fixpoint (handles dependency chains regardless of order)
    for (let it = 0; it < leaves.length + 2; it++) {
      for (const t of leaves) {
        for (const p of t.predecessors) {
          const pr = map.get(p.id); if (!pr || pr._isParent) continue;
          // backward: predecessor must finish early enough
          pr._lf = Math.min(pr._lf, t._ls - (p.lag || 0) + (p.type === 'SS' || p.type === 'SF' ? pr._dur : 0));
          pr._ls = pr._lf - pr._dur;
        }
      }
    }
    for (const t of leaves) { t._slack = t._ls - t._es; t._critical = t._slack <= 0; }
    for (let i = this._order.length - 1; i >= 0; i--) {
      const t = this._order[i];
      if (t._isParent) t._critical = t._children.some(c => c._critical);
    }
  }

  _matches(t) {
    if (!this.filterText) return true;
    const q = this.filterText.toLowerCase();
    return (t.name || '').toLowerCase().includes(q) ||
           t._wbs.includes(q) ||
           t.resources.some(rid => (this.byId2res(rid)?.name || '').toLowerCase().includes(q));
  }
  byId2res(id) { return this.resources.find(r => r.id === id); }

  _buildRows() {
    this._rows = [];
    if (this.viewMode === 'resource') { this._buildResourceRows(); return; }
    const filtering = !!this.filterText;
    const subtreeMatch = (t) => this._matches(t) || t._children.some(subtreeMatch);
    const walk = (node) => {
      if (filtering && !subtreeMatch(node)) return;
      this._rows.push(node);
      if (node._isParent && (node.expanded || filtering)) {
        for (const c of node._children) walk(c);
      }
    };
    for (const t of this._order) if (t._depth === 0) walk(t);
  }

  // Resource view: synthetic parent rows per resource with assigned leaf tasks.
  _buildResourceRows() {
    this._rows = [];
    const groups = new Map();
    const unassigned = [];
    for (const t of this._order) {
      if (t._isParent) continue;
      if (!this._matches(t)) continue;
      if (!t.resources.length) { unassigned.push(t); continue; }
      for (const rid of t.resources) {
        if (!groups.has(rid)) groups.set(rid, []);
        groups.get(rid).push(t);
      }
    }
    let gi = 1;
    for (const r of this.resources) {
      const list = groups.get(r.id) || [];
      const head = { _resHeader: true, id: '__res_' + r.id, name: r.name, _res: r,
        _children: list, _depth: 0, _wbs: `${gi}`, _isParent: true, expanded: r._expanded !== false,
        start: list.length ? list.reduce((m, t) => t.start < m ? t.start : m, list[0].start) : new Date(),
        end:   list.length ? list.reduce((m, t) => t.end > m ? t.end : m, list[0].end) : new Date(),
        progress: 0, resources: [] };
      this._rows.push(head);
      if (head.expanded) for (const t of list) this._rows.push(t);
      gi++;
    }
    if (unassigned.length) {
      const head = { _resHeader: true, id: '__res_none', name: '(Non assigné)', _children: unassigned,
        _depth: 0, _wbs: `${gi}`, _isParent: true, expanded: true,
        start: unassigned.reduce((m, t) => t.start < m ? t.start : m, unassigned[0].start),
        end: unassigned.reduce((m, t) => t.end > m ? t.end : m, unassigned[0].end),
        progress: 0, resources: [] };
      this._rows.push(head);
      for (const t of unassigned) this._rows.push(t);
    }
  }

  // ═══════════════════════════ TIMELINE ═══════════════════════════
  _extent() {
    let mn = null, mx = null;
    for (const t of this.tasks) {
      if (mn == null || t.start < mn) mn = t.start;
      if (mx == null || t.end > mx) mx = t.end;
      if (t.baselineStart && t.baselineStart < mn) mn = t.baselineStart;
      if (t.baselineEnd && t.baselineEnd > mx) mx = t.baselineEnd;
    }
    const today = gSOD(new Date());
    if (mn == null) { mn = gAddDays(today, -3); mx = gAddDays(today, 20); }
    this.timelineStart = gAddDays(mn, -7);
    this.timelineEnd = gAddDays(mx, 14);
    this.totalDays = Math.max(1, gDays(this.timelineStart, this.timelineEnd));
  }
  dateToX(d) { return gDays(this.timelineStart, d) * this.dayWidth; }      // relative to timeline 0
  xToDate(x) { return gAddDays(this.timelineStart, Math.round(x / this.dayWidth)); }

  // ═══════════════════════════ LAYOUT ═══════════════════════════
  _layout() {
    const b = this.bounds;
    const L = {};
    L.x = b.x; L.y = b.y; L.w = b.width; L.h = b.height;
    L.toolbar = { x: b.x, y: b.y, w: b.width, h: this.toolbarH };
    const bodyTop = b.y + this.toolbarH;
    L.gridW = Math.max(this._minSplit, Math.min(this.splitX, b.width - 160));
    L.gridX = b.x;
    L.splitX = b.x + L.gridW;
    L.chartX = L.splitX + this.splitterW;
    L.chartW = b.x + b.width - L.chartX - this.vScrollW;
    L.headerY = bodyTop;
    L.bodyY = bodyTop + this.headerH;
    L.bodyH = b.y + b.height - L.bodyY - this.hScrollH;
    L.vScrollX = b.x + b.width - this.vScrollW;
    L.hScrollY = b.y + b.height - this.hScrollH;
    this._L = L;
    return L;
  }
  _frozenW() {
    let w = 0; for (const c of this.columns) if (c.frozen) w += c.width; return w;
  }
  _gridContentW() {
    let w = 0; for (const c of this.columns) w += c.width; return w;
  }
  _maxScrollY() {
    const L = this._L || this._layout();
    return Math.max(0, (this._rows.length * this.rowH) - L.bodyH);
  }
  _maxChartScroll() {
    const L = this._L || this._layout();
    return Math.max(0, this.totalDays * this.dayWidth - L.chartW);
  }
  _maxGridScroll() {
    const L = this._L || this._layout();
    // Non-frozen viewport = gridW - frozenW ; scrollable content = gridContentW - frozenW.
    // maxScroll = content - viewport = gridContentW - gridW (the frozen widths cancel).
    return Math.max(0, this._gridContentW() - L.gridW);
  }
  _clampScroll() {
    this.scrollY = Math.max(0, Math.min(this._maxScrollY(), this.scrollY));
    this.chartScrollX = Math.max(0, Math.min(this._maxChartScroll(), this.chartScrollX));
    this.gridScrollX = Math.max(0, Math.min(this._maxGridScroll(), this.gridScrollX));
  }

  // ═══════════════════════════ RENDER ═══════════════════════════
  render(ctx) {
    // Re-derive the palette when the desktop theme changes.
    if (this._themeName !== getTheme().name) { this._themeName = getTheme().name; this.C = this._buildPalette(); }
    this._extent();
    const L = this._layout();
    this._clampScroll();
    const b = this.bounds;
    ctx.save();
    ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height); ctx.clip();
    // Panel background + frame
    ctx.fillStyle = this.C.bg; ctx.fillRect(b.x, b.y, b.width, b.height);

    this._renderChart(ctx, L);     // chart first (right side)
    this._renderGrid(ctx, L);      // grid over (left, frozen)
    this._renderToolbar(ctx, L);
    this._renderScrollbars(ctx, L);

    // Outer border
    ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
    ctx.strokeRect(b.x + .5, b.y + .5, b.width - 1, b.height - 1);

    if (this._tipTask) this._renderTooltip(ctx);
    ctx.restore();
  }

  _visibleRowRange(L) {
    const first = Math.max(0, Math.floor(this.scrollY / this.rowH));
    const last = Math.min(this._rows.length - 1, Math.ceil((this.scrollY + L.bodyH) / this.rowH));
    return { first, last };
  }
  _rowTop(i, L) { return L.bodyY - this.scrollY + i * this.rowH; }

  // ── GRID (left tree-grid) ──
  _renderGrid(ctx, L) {
    ctx.save();
    ctx.beginPath(); ctx.rect(L.gridX, L.headerY, L.gridW, L.h - this.toolbarH); ctx.clip();
    // header
    ctx.fillStyle = this.C.headerBg;
    ctx.fillRect(L.gridX, L.headerY, L.gridW, this.headerH);
    // column headers + cells
    const frozenW = this._frozenW();
    // body background (rows)
    ctx.save();
    ctx.beginPath(); ctx.rect(L.gridX, L.bodyY, L.gridW, L.bodyH); ctx.clip();
    const { first, last } = this._visibleRowRange(L);
    for (let i = first; i <= last; i++) {
      const t = this._rows[i]; if (!t) continue;
      const ry = this._rowTop(i, L);
      const sel = t.id === this.selectedId;
      ctx.fillStyle = sel ? this.C.rowSel : (i === this._hoverRow ? this.C.rowHover : (i % 2 ? this.C.rowAlt : this.C.bg));
      ctx.fillRect(L.gridX, ry, L.gridW, this.rowH);
      ctx.strokeStyle = this.C.line; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(L.gridX, ry + this.rowH - .5); ctx.lineTo(L.gridX + L.gridW, ry + this.rowH - .5); ctx.stroke();
    }
    // cell content per column
    for (let i = first; i <= last; i++) {
      const t = this._rows[i]; if (!t) continue;
      const ry = this._rowTop(i, L);
      let cx = L.gridX;
      for (const col of this.columns) {
        const isFrozen = col.frozen;
        const colX = isFrozen ? cx : (cx - this.gridScrollX);
        if (!isFrozen && (colX + col.width < L.gridX + frozenW || colX > L.gridX + L.gridW)) { cx += col.width; continue; }
        this._renderCell(ctx, t, col, colX, ry, L, frozenW);
        cx += col.width;
      }
    }
    ctx.restore();
    // column separators + header labels (drawn after, on top)
    this._renderGridHeader(ctx, L, frozenW);
    // frozen separator shadow
    ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(L.gridX + frozenW + .5, L.headerY); ctx.lineTo(L.gridX + frozenW + .5, L.bodyY + L.bodyH); ctx.stroke();
    ctx.restore();

    // splitter — reuses the framework Splitter widget (themed via the Gantt palette)
    if (!this._splitter) this._splitter = new Splitter({ x:0, y:0, width:this.splitterW, height:1 }, { orientation:'vertical' });
    this._splitter.colors = { bar:this.C.headerBg2, barHover:this.C.rowHover, line:this.C.lineStrong, grip:this.C.muted, gripHover:this.C.accent };
    this._splitter._dragging = !!(this._drag && this._drag.type === 'splitter');
    this._splitter._hovered = (this._hoverRegion === 'splitter');
    this._splitter.bounds = { x:L.splitX, y:L.headerY, width:this.splitterW, height:L.h - this.toolbarH };
    this._splitter.render(ctx);
  }

  _renderGridHeader(ctx, L, frozenW) {
    ctx.font = "bold 12px 'Segoe UI', Arial, sans-serif";
    ctx.textBaseline = 'middle';
    // Pass 1 — scrollable (non-frozen) headers, clipped to their own region
    ctx.save();
    ctx.beginPath(); ctx.rect(L.gridX + frozenW, L.headerY, L.gridW - frozenW, this.headerH); ctx.clip();
    let cx = L.gridX;
    for (const col of this.columns) {
      if (!col.frozen) this._drawHeaderCol(ctx, col, cx - this.gridScrollX, L);
      cx += col.width;
    }
    ctx.restore();
    // Pass 2 — frozen headers, clipped to the frozen region and painted on top
    ctx.save();
    ctx.beginPath(); ctx.rect(L.gridX, L.headerY, frozenW, this.headerH); ctx.clip();
    ctx.fillStyle = this.C.headerBg; ctx.fillRect(L.gridX, L.headerY, frozenW, this.headerH);
    cx = L.gridX;
    for (const col of this.columns) {
      if (col.frozen) this._drawHeaderCol(ctx, col, cx, L);
      cx += col.width;
    }
    ctx.restore();
    // bottom border
    ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(L.gridX, L.headerY + this.headerH - .5); ctx.lineTo(L.gridX + L.gridW, L.headerY + this.headerH - .5); ctx.stroke();
  }
  _drawHeaderCol(ctx, col, colX, L) {
    ctx.fillStyle = this.C.text;
    ctx.textAlign = col.align === 'center' ? 'center' : 'left';
    const tx = col.align === 'center' ? colX + col.width / 2 : colX + 8;
    if (colX + col.width > L.gridX && colX < L.gridX + L.gridW)
      ctx.fillText(col.title, tx, L.headerY + this.headerH - 14, col.width - 10);
    ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(colX + col.width + .5, L.headerY + 6); ctx.lineTo(colX + col.width + .5, L.headerY + this.headerH - 4); ctx.stroke();
  }

  _cellText(t, col) {
    switch (col.key) {
      case 'wbs': return t._wbs;
      case 'name': return t.name;
      case 'start': return t._resHeader ? '' : gFmt(t.start);
      case 'end': return t._resHeader ? '' : gFmt(t.end);
      case 'duration': return t._resHeader ? '' : (t.milestone ? '0 j' : `${t.duration} j`);
      case 'progress': return t._resHeader ? '' : `${t.progress}%`;
      case 'predecessors': return (t.predecessors || []).map(p => {
          const pr = this.byId(p.id); const wbs = pr ? pr._wbs : p.id;
          return p.type === 'FS' && !p.lag ? wbs : `${wbs}${p.type}${p.lag ? (p.lag > 0 ? '+' + p.lag : p.lag) : ''}`;
        }).join(',');
      case 'resources': return (t.resources || []).map(rid => this.byId2res(rid)?.name || rid).join(', ');
    }
    return '';
  }

  _renderCell(ctx, t, col, colX, ry, L, frozenW) {
    ctx.save();
    // clip non-frozen cells to the scrollable region
    if (!col.frozen) { ctx.beginPath(); ctx.rect(L.gridX + frozenW, ry, L.gridW - frozenW, this.rowH); ctx.clip(); }
    ctx.font = (t._isParent ? "bold " : "") + "12px 'Segoe UI', Arial, sans-serif";
    ctx.textBaseline = 'middle';
    const cy = ry + this.rowH / 2;
    let textX = colX + 8;
    if (col.tree) {
      const indent = (t._depth || 0) * 15;
      textX = colX + 8 + indent + 16;
      if (t._isParent) {
        // expand/collapse triangle
        ctx.fillStyle = this.C.muted;
        const tx = colX + 8 + indent, tyc = cy;
        ctx.beginPath();
        if (t.expanded) { ctx.moveTo(tx, tyc - 3); ctx.lineTo(tx + 8, tyc - 3); ctx.lineTo(tx + 4, tyc + 3); }
        else            { ctx.moveTo(tx, tyc - 4); ctx.lineTo(tx + 6, tyc); ctx.lineTo(tx, tyc + 4); }
        ctx.closePath(); ctx.fill();
      }
      if (t._resHeader) { ctx.fillStyle = t._res?.color || this.C.accent; ctx.fillRect(colX + 4 + indent, cy - 5, 10, 10); textX = colX + 8 + indent + 18; }
    }
    // progress cell: mini bar
    if (col.key === 'progress' && !t._resHeader) {
      const pw = col.width - 14, px = colX + 7, py = cy - 5;
      ctx.fillStyle = this.C.headerBg2; drawRoundRect(ctx, px, py, pw, 10, 3); ctx.fill();
      ctx.fillStyle = t._critical && this.showCritical ? this.C.crit : this.C.barProg;
      drawRoundRect(ctx, px, py, pw * (t.progress / 100), 10, 3); ctx.fill();
      ctx.fillStyle = this.C.text; ctx.font = "10px 'Segoe UI', Arial"; ctx.textAlign = 'center';
      ctx.fillText(`${t.progress}%`, colX + col.width / 2, cy);
      ctx.restore(); return;
    }
    if (col.key === 'resources' && t.resources && t.resources.length) {
      let chipX = textX;
      ctx.font = "10px 'Segoe UI', Arial"; ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
      for (const rid of t.resources) {
        const r = this.byId2res(rid); if (!r) continue;
        const label = r.name; const w = ctx.measureText(label).width + 12;
        if (chipX + w > colX + col.width - 2) break;
        ctx.fillStyle = r.color; drawRoundRect(ctx, chipX, cy - 8, w, 16, 8); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillText(label, chipX + 6, cy);
        chipX += w + 4;
      }
      ctx.restore(); return;
    }
    const txt = this._cellText(t, col);
    ctx.fillStyle = t._isParent ? this.C.text : (col.key === 'wbs' ? this.C.muted : this.C.text);
    ctx.textAlign = col.align === 'center' ? 'center' : 'left';
    const drawX = col.align === 'center' ? colX + col.width / 2 : textX;
    ctx.fillText(txt, drawX, cy, col.width - (textX - colX) - 4);
    ctx.restore();
  }

  // ── CHART (right timeline) ──
  _renderChart(ctx, L) {
    ctx.save();
    ctx.beginPath(); ctx.rect(L.chartX, L.headerY, L.chartW, L.h - this.toolbarH); ctx.clip();
    ctx.fillStyle = this.C.bg; ctx.fillRect(L.chartX, L.headerY, L.chartW, L.h);
    const ox = L.chartX - this.chartScrollX;   // timeline origin x

    // ── column day backgrounds: weekends, holidays ──
    const d0 = Math.floor(this.chartScrollX / this.dayWidth);
    const d1 = Math.ceil((this.chartScrollX + L.chartW) / this.dayWidth);
    for (let di = d0; di <= d1; di++) {
      const day = gAddDays(this.timelineStart, di);
      const x = ox + di * this.dayWidth;
      const isHol = this.holidays.some(h => gDays(h, day) === 0);
      const isWe = gIsWeekend(day);
      if (isHol) { ctx.fillStyle = this.C.holiday; ctx.fillRect(x, L.bodyY, this.dayWidth, L.bodyH); }
      else if (isWe && this.weekendsNonWorking) { ctx.fillStyle = this.C.weekend; ctx.fillRect(x, L.bodyY, this.dayWidth, L.bodyH); }
    }

    // ── timeline header (two tiers) ──
    this._renderTimelineHeader(ctx, L, ox);

    // ── horizontal grid lines + vertical day lines ──
    ctx.strokeStyle = this.C.line; ctx.lineWidth = 1;
    const { first, last } = this._visibleRowRange(L);
    ctx.save();
    ctx.beginPath(); ctx.rect(L.chartX, L.bodyY, L.chartW, L.bodyH); ctx.clip();
    for (let i = first; i <= last; i++) {
      const t = this._rows[i]; if (!t) continue;
      const ry = this._rowTop(i, L);
      const sel = t.id === this.selectedId;
      if (sel) { ctx.fillStyle = this.C.rowSel; ctx.fillRect(L.chartX, ry, L.chartW, this.rowH); }
      else if (i === this._hoverRow) { ctx.fillStyle = this.C.rowHover; ctx.fillRect(L.chartX, ry, L.chartW, this.rowH); }
      else if (i % 2) { ctx.fillStyle = this.C.rowAlt; ctx.fillRect(L.chartX, ry, L.chartW, this.rowH); }
      ctx.strokeStyle = this.C.line;
      ctx.beginPath(); ctx.moveTo(L.chartX, ry + this.rowH - .5); ctx.lineTo(L.chartX + L.chartW, ry + this.rowH - .5); ctx.stroke();
    }
    // vertical day/week separators
    const step = this.dayWidth >= 10 ? 1 : 7;
    for (let di = d0; di <= d1; di += step) {
      const x = Math.round(ox + di * this.dayWidth) + .5;
      ctx.strokeStyle = this.C.line;
      ctx.beginPath(); ctx.moveTo(x, L.bodyY); ctx.lineTo(x, L.bodyY + L.bodyH); ctx.stroke();
    }

    // ── event markers (vertical lines) ──
    for (const ev of this.eventMarkers) {
      const x = ox + this.dateToX(ev.date);
      if (x < L.chartX - 2 || x > L.chartX + L.chartW + 2) continue;
      ctx.strokeStyle = ev.color; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
      ctx.beginPath(); ctx.moveTo(x, L.bodyY); ctx.lineTo(x, L.bodyY + L.bodyH); ctx.stroke(); ctx.setLineDash([]);
    }

    // ── dependency links (behind bars) ──
    this._renderLinks(ctx, L, ox, first, last);

    // ── task bars ──
    for (let i = first; i <= last; i++) {
      const t = this._rows[i]; if (!t) continue;
      this._renderBar(ctx, t, this._rowTop(i, L), ox, L);
    }

    // ── today line ──
    const today = gSOD(new Date());
    const tx = ox + this.dateToX(today);
    if (tx >= L.chartX && tx <= L.chartX + L.chartW) {
      ctx.strokeStyle = this.C.today; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(tx, L.bodyY); ctx.lineTo(tx, L.bodyY + L.bodyH); ctx.stroke();
    }
    ctx.restore();

    // ── resource allocation histogram ──
    if (this.showResourceHisto) this._renderHisto(ctx, L, ox, d0, d1);

    ctx.restore();
  }

  _renderTimelineHeader(ctx, L, ox) {
    const topH = 24, botH = this.headerH - topH;
    ctx.fillStyle = this.C.headerBg; ctx.fillRect(L.chartX, L.headerY, L.chartW, this.headerH);
    const d0 = Math.floor(this.chartScrollX / this.dayWidth);
    const d1 = Math.ceil((this.chartScrollX + L.chartW) / this.dayWidth);
    ctx.textBaseline = 'middle';
    // Bottom tier
    const dw = this.dayWidth;
    const bottomMode = dw >= 22 ? 'dayFull' : dw >= 9 ? 'dayNum' : 'week';
    ctx.font = "11px 'Segoe UI', Arial, sans-serif";
    for (let di = d0; di <= d1; di++) {
      const day = gAddDays(this.timelineStart, di);
      const x = ox + di * dw;
      if (bottomMode === 'week') {
        if (day.getDay() !== 1) continue; // mondays only
        ctx.strokeStyle = this.C.lineStrong;
        ctx.beginPath(); ctx.moveTo(x + .5, L.headerY + topH); ctx.lineTo(x + .5, L.headerY + this.headerH); ctx.stroke();
        ctx.fillStyle = this.C.muted; ctx.textAlign = 'left';
        ctx.fillText(`${day.getDate()}/${day.getMonth() + 1}`, x + 3, L.headerY + topH + botH / 2);
      } else {
        ctx.strokeStyle = this.C.line;
        ctx.beginPath(); ctx.moveTo(x + .5, L.headerY + topH); ctx.lineTo(x + .5, L.headerY + this.headerH); ctx.stroke();
        const we = gIsWeekend(day);
        ctx.fillStyle = we ? '#b9c0c9' : this.C.text; ctx.textAlign = 'center';
        if (bottomMode === 'dayFull') {
          ctx.fillText(G_DOW[day.getDay()], x + dw / 2, L.headerY + topH + botH / 2 - 7);
          ctx.fillText(String(day.getDate()), x + dw / 2, L.headerY + topH + botH / 2 + 7);
        } else {
          ctx.fillText(String(day.getDate()), x + dw / 2, L.headerY + topH + botH / 2);
        }
      }
    }
    // Top tier: months (or years when zoomed far out)
    const topMode = dw >= 4 ? 'month' : 'year';
    ctx.font = "bold 12px 'Segoe UI', Arial, sans-serif";
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    let di = d0;
    while (di <= d1) {
      const day = gAddDays(this.timelineStart, di);
      let segEnd;
      if (topMode === 'month') segEnd = gDays(this.timelineStart, new Date(day.getFullYear(), day.getMonth() + 1, 1));
      else segEnd = gDays(this.timelineStart, new Date(day.getFullYear() + 1, 0, 1));
      const x0 = ox + di * dw, x1 = ox + segEnd * dw;
      ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x1 + .5, L.headerY); ctx.lineTo(x1 + .5, L.headerY + topH); ctx.stroke();
      ctx.fillStyle = this.C.text;
      const label = topMode === 'month' ? `${G_MONTHS[day.getMonth()]} ${day.getFullYear()}` : String(day.getFullYear());
      const lx = Math.max(x0 + 5, L.chartX + 5);
      if (lx < x1 - 4) ctx.fillText(label, lx, L.headerY + topH / 2, x1 - lx - 4);
      di = segEnd;
    }
    ctx.strokeStyle = this.C.lineStrong; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(L.chartX, L.headerY + topH + .5); ctx.lineTo(L.chartX + L.chartW, L.headerY + topH + .5);
    ctx.moveTo(L.chartX, L.headerY + this.headerH - .5); ctx.lineTo(L.chartX + L.chartW, L.headerY + this.headerH - .5);
    ctx.stroke();
  }

  _barRect(t, ox, ry) {
    const x = ox + this.dateToX(t.start);
    const yMid = ry + this.rowH / 2;
    if (t.milestone) {
      const s = this.barH * 0.8;
      return { x: x - s, y: yMid - s, w: s * 2, h: s * 2, mid: yMid, milestone: true, cx: x };
    }
    const endX = ox + this.dateToX(t.end) + this.dayWidth;
    return { x, y: yMid - this.barH / 2, w: Math.max(this.dayWidth * (t.milestone ? 0 : 1) - 0, endX - x), h: this.barH, mid: yMid };
  }

  _renderBar(ctx, t, ry, ox, L) {
    const crit = this.showCritical && t._critical;
    // baseline (below the bar)
    if (this.showBaseline && t.baselineStart && t.baselineEnd && !t.milestone) {
      const bx = ox + this.dateToX(t.baselineStart);
      const bex = ox + this.dateToX(t.baselineEnd) + this.dayWidth;
      ctx.fillStyle = this.C.baseline;
      drawRoundRect(ctx, bx, ry + this.rowH / 2 + this.barH / 2 + 1, Math.max(2, bex - bx), 5, 2); ctx.fill();
    }
    const r = this._barRect(t, ox, ry);

    if (r.milestone) {
      ctx.save(); ctx.translate(r.cx, r.mid); ctx.rotate(Math.PI / 4);
      const s = this.barH * 0.62;
      ctx.fillStyle = crit ? this.C.crit : this.C.milestone;
      ctx.fillRect(-s, -s, s * 2, s * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.strokeRect(-s, -s, s * 2, s * 2);
      ctx.restore();
      this._renderIndicators(ctx, t, ox, ry);
      return;
    }
    if (r.x + r.w < L.chartX || r.x > L.chartX + L.chartW) { return; }

    if (t._isParent || t._resHeader) {
      // Summary bar (bracket style)
      ctx.fillStyle = t._resHeader ? (t._res?.color || this.C.parent) : (crit ? this.C.crit : this.C.parent);
      drawRoundRect(ctx, r.x, r.y + 1, r.w, r.h - 4, 2); ctx.fill();
      if (!t._resHeader) {
        ctx.fillStyle = crit ? this.C.critProg : this.C.parentProg;
        const pw = r.w * (t.progress / 100);
        drawRoundRect(ctx, r.x, r.y + 1, pw, r.h - 4, 2); ctx.fill();
      }
      // end caps (triangles)
      ctx.fillStyle = t._resHeader ? (t._res?.color || this.C.parent) : (crit ? this.C.crit : this.C.parent);
      ctx.beginPath(); ctx.moveTo(r.x, r.y + r.h - 3); ctx.lineTo(r.x + 6, r.y + r.h - 3); ctx.lineTo(r.x, r.y + r.h + 3); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(r.x + r.w, r.y + r.h - 3); ctx.lineTo(r.x + r.w - 6, r.y + r.h - 3); ctx.lineTo(r.x + r.w, r.y + r.h + 3); ctx.closePath(); ctx.fill();
      return;
    }

    // Leaf bar — split segments or single
    const segs = t.segments && t.segments.length ? t.segments : [{ start: t.start, end: t.end }];
    const baseCol = crit ? this.C.crit : this.C.bar;
    const progCol = crit ? this.C.critProg : this.C.barProg;
    for (const sg of segs) {
      const sx = ox + this.dateToX(sg.start);
      const ex = ox + this.dateToX(sg.end) + this.dayWidth;
      const w = Math.max(3, ex - sx);
      const grad = ctx.createLinearGradient(0, r.y, 0, r.y + r.h);
      grad.addColorStop(0, crit ? '#f07a7b' : this.C.barTop); grad.addColorStop(1, baseCol);
      ctx.fillStyle = grad;
      drawRoundRect(ctx, sx, r.y, w, r.h, 4); ctx.fill();
      ctx.strokeStyle = crit ? this.C.critProg : this.C.barBorder; ctx.lineWidth = 1;
      drawRoundRect(ctx, sx + .5, r.y + .5, w - 1, r.h - 1, 4); ctx.stroke();
    }
    // progress overlay across whole bar span
    const pw = r.w * (t.progress / 100);
    if (pw > 1) {
      ctx.save();
      ctx.beginPath(); drawRoundRect(ctx, r.x, r.y, r.w, r.h, 4); ctx.clip();
      ctx.fillStyle = progCol; ctx.fillRect(r.x, r.y, pw, r.h);
      ctx.restore();
    }
    // progress drag handle
    if (t.id === this.selectedId) {
      ctx.fillStyle = '#1f2d3d';
      ctx.beginPath(); ctx.arc(r.x + pw, r.mid, 3.5, 0, 7); ctx.fill();
    }
    // resource label to the right
    if (t.resources && t.resources.length && this.dayWidth >= 6) {
      ctx.fillStyle = this.C.muted; ctx.font = "10px 'Segoe UI', Arial"; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      const names = t.resources.map(rid => this.byId2res(rid)?.name || rid).join(', ');
      ctx.fillText(names, r.x + r.w + 6, r.mid, L.chartX + L.chartW - (r.x + r.w + 6));
    }
    this._renderIndicators(ctx, t, ox, ry);
  }

  _renderIndicators(ctx, t, ox, ry) {
    if (!t.indicators || !t.indicators.length) return;
    ctx.font = "12px 'Segoe UI', Arial"; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (const m of t.indicators) {
      const x = ox + this.dateToX(m.date) + this.dayWidth / 2;
      ctx.fillText(m.icon, x, ry + this.rowH / 2 - this.barH / 2 - 4);
    }
  }

  // Dependency arrows (FS/SS/FF/SF) with elbow routing.
  _renderLinks(ctx, L, ox, first, last) {
    const rowIndex = new Map(this._rows.map((t, i) => [t.id, i]));
    ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (let i = 0; i < this._rows.length; i++) {
      const t = this._rows[i];
      if (!t.predecessors) continue;
      for (const p of t.predecessors) {
        if (!rowIndex.has(p.id)) continue;
        const pr = this.byId(p.id); if (!pr) continue;
        const pi = rowIndex.get(p.id);
        const py = this._rowTop(pi, L) + this.rowH / 2;
        const ty = this._rowTop(i, L) + this.rowH / 2;
        const crit = this.showCritical && t._critical && pr._critical;
        const col = crit ? this.C.crit : this.C.link;
        const type = p.type || 'FS';
        const pStartX = ox + this.dateToX(pr.start);
        const pEndX = ox + this.dateToX(pr.end) + this.dayWidth;
        const tStartX = ox + this.dateToX(t.start);
        const tEndX = ox + this.dateToX(t.end) + this.dayWidth;
        const x0 = type[0] === 'S' ? pStartX : pEndX;   // predecessor exit edge
        const x3 = type[1] === 'S' ? tStartX : tEndX;   // successor entry edge
        const exitSign  = type[0] === 'S' ? -1 : 1;     // finish exits right, start exits left
        const entrySign = type[1] === 'S' ? -1 : 1;     // start entered from left, finish from right
        this._curveLink(ctx, x0, py, x3, ty, exitSign, entrySign, col);
      }
    }
  }
  // Smooth cubic-Bézier dependency connector with horizontal tangents at both
  // ends (no orthogonal zig-zag), plus a filled arrow head at the target edge.
  _curveLink(ctx, x0, y0, x3, y3, exitSign, entrySign, col) {
    ctx.strokeStyle = col; ctx.fillStyle = col;
    const off = Math.max(18, Math.min(64, Math.abs(x3 - x0) * 0.5 + Math.abs(y3 - y0) * 0.12));
    const c1x = x0 + exitSign * off, c2x = x3 + entrySign * off;
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.bezierCurveTo(c1x, y0, c2x, y3, x3, y3);
    ctx.stroke();
    // Arrow head points into the bar edge: dir +1 → into a Start, -1 → into a Finish
    const dir = -entrySign, ah = 5;
    ctx.beginPath();
    ctx.moveTo(x3, y3);
    ctx.lineTo(x3 - dir * ah * 1.6, y3 - ah * 0.85);
    ctx.lineTo(x3 - dir * ah * 1.6, y3 + ah * 0.85);
    ctx.closePath(); ctx.fill();
  }

  _renderHisto(ctx, L, ox, d0, d1) {
    const hH = 70;
    const y0 = L.bodyY + L.bodyH - hH;
    ctx.save();
    ctx.fillStyle = 'rgba(245,247,250,0.96)';
    ctx.fillRect(L.chartX, y0, L.chartW, hH);
    ctx.strokeStyle = this.C.lineStrong; ctx.beginPath(); ctx.moveTo(L.chartX, y0 + .5); ctx.lineTo(L.chartX + L.chartW, y0 + .5); ctx.stroke();
    // per-day allocation count (number of leaf tasks active, weighted by resource share)
    const cap = Math.max(1, this.resources.length || 1);
    let maxAlloc = 1;
    const alloc = {};
    for (let di = d0; di <= d1; di++) {
      const day = gAddDays(this.timelineStart, di);
      let a = 0;
      for (const t of this.tasks) {
        if (t._isParent || t.milestone) continue;
        if (gDays(t.start, day) >= 0 && gDays(day, t.end) >= 0 && this._isWorking(day))
          a += Math.max(1, t.resources.length);
      }
      alloc[di] = a; maxAlloc = Math.max(maxAlloc, a);
    }
    for (let di = d0; di <= d1; di++) {
      const x = ox + di * this.dayWidth;
      const a = alloc[di] || 0;
      const bh = (a / maxAlloc) * (hH - 14);
      ctx.fillStyle = a > cap ? this.C.histoOver : this.C.histo;
      ctx.fillRect(x + 1, y0 + hH - bh - 2, Math.max(1, this.dayWidth - 2), bh);
    }
    ctx.fillStyle = this.C.muted; ctx.font = "10px 'Segoe UI', Arial"; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('Allocation des ressources', L.chartX + 6, y0 + 4);
    ctx.restore();
  }

  // ── TOOLBAR ──
  _toolbarItems() {
    return [
      { key:'add',     icon:'＋', tip:'Ajouter une tâche' },
      { key:'del',     icon:'🗑', tip:'Supprimer' },
      { key:'indent',  icon:'⇥', tip:'Indenter' },
      { key:'outdent', icon:'⇤', tip:'Désindenter' },
      { sep:true },
      { key:'undo',    icon:'↶', tip:'Annuler (Ctrl+Z)' },
      { key:'redo',    icon:'↷', tip:'Rétablir (Ctrl+Y)' },
      { sep:true },
      { key:'zoomout', icon:'－', tip:'Zoom arrière' },
      { key:'zoomin',  icon:'＋', tip:'Zoom avant' },
      { key:'fit',     icon:'⊡', tip:'Ajuster' },
      { sep:true },
      { key:'critical', icon:'critique', text:true, tip:'Chemin critique', toggle:() => this.showCritical },
      { key:'baseline', icon:'référence', text:true, tip:'Lignes de référence', toggle:() => this.showBaseline },
      { key:'resAlloc', icon:'alloc.', text:true, tip:'Allocation ressources', toggle:() => this.showResourceHisto },
      { key:'resView',  icon:'vue Ress.', text:true, tip:'Vue par ressource', toggle:() => this.viewMode === 'resource' },
      { sep:true },
      { key:'filter',  icon:'🔎', tip:'Filtrer', field:true },
      { key:'export',  icon:'⤓ Export', text:true, tip:'Exporter' },
    ];
  }
  _layoutToolbar(L) {
    const items = this._toolbarItems();
    let x = L.x + 8; const y = L.y + 5; const h = this.toolbarH - 10;
    const out = [];
    for (const it of items) {
      if (it.sep) { out.push({ sep:true, x: x + 3 }); x += 9; continue; }
      let w;
      if (it.field) w = 150;
      else if (it.text) { this._mctx = this._mctx || document.createElement('canvas').getContext('2d'); this._mctx.font = "11px 'Segoe UI', Arial"; w = this._mctx.measureText(it.icon).width + 18; }
      else w = 30;
      out.push({ ...it, x, y, w, h });
      x += w + 4;
    }
    return out;
  }
  _renderToolbar(ctx, L) {
    ctx.save();
    ctx.fillStyle = this.C.tbBg; ctx.fillRect(L.x, L.y, L.w, this.toolbarH);
    ctx.strokeStyle = this.C.lineStrong; ctx.beginPath();
    ctx.moveTo(L.x, L.y + this.toolbarH - .5); ctx.lineTo(L.x + L.w, L.y + this.toolbarH - .5); ctx.stroke();
    const tb = this._layoutToolbar(L);
    ctx.textBaseline = 'middle';
    for (const it of tb) {
      if (it.sep) { ctx.strokeStyle = this.C.lineStrong; ctx.beginPath(); ctx.moveTo(it.x + .5, L.y + 8); ctx.lineTo(it.x + .5, L.y + this.toolbarH - 8); ctx.stroke(); continue; }
      if (it.field) {
        ctx.fillStyle = this.C.bg; drawRoundRect(ctx, it.x, it.y, it.w, it.h, 5); ctx.fill();
        ctx.strokeStyle = this._tbHover === 'filter' ? this.C.accent : this.C.lineStrong; ctx.lineWidth = 1;
        drawRoundRect(ctx, it.x + .5, it.y + .5, it.w - 1, it.h - 1, 5); ctx.stroke();
        ctx.fillStyle = this.C.muted; ctx.font = "12px 'Segoe UI', Arial"; ctx.textAlign = 'left';
        ctx.fillText('🔎', it.x + 6, it.y + it.h / 2);
        // While the overlay <input> is open, let it own the text so the two
        // don't render on top of each other (the input has a transparent bg).
        if (!(this._editor && this._editor.placeholder === 'Filtrer…')) {
          ctx.fillStyle = this.filterText ? this.C.text : '#aab0b8';
          ctx.fillText(this.filterText || 'Filtrer…', it.x + 24, it.y + it.h / 2, it.w - 30);
        }
        continue;
      }
      // Render a real framework Button (follows the active theme).
      const b = this._tbButtons.get(it.key);
      b.bounds.x = it.x; b.bounds.y = it.y; b.bounds.width = it.w; b.bounds.height = it.h;
      b.enabled  = it.key === 'undo' ? this._undo.length > 0
                 : it.key === 'redo' ? this._redo.length > 0 : true;
      b._hovered = this._tbHover === it.key;
      b._pressed = this._tbPressed === it.key;
      // Toggle buttons (critique, référence…) use the framework's "toggled" state.
      b.toggled = !!(it.toggle && it.toggle());
      b.render(ctx);
    }
    ctx.restore();
  }

  // ── SCROLLBARS ──
  _renderScrollbars(ctx, L) {
    // vertical (rows)
    const maxY = this._maxScrollY();
    if (maxY > 0) {
      const trackY = L.bodyY, trackH = L.bodyH;
      const thumbH = Math.max(24, trackH * trackH / (this._rows.length * this.rowH));
      const off = (this.scrollY / maxY) * (trackH - thumbH);
      ctx.fillStyle = this.C.scrollTrack; ctx.fillRect(L.vScrollX, trackY, this.vScrollW, trackH);
      ctx.fillStyle = this._drag?.type === 'vscroll' ? this.C.scrollThumbActive : this.C.scrollThumb;
      drawRoundRect(ctx, L.vScrollX + 2, trackY + off, this.vScrollW - 4, thumbH, 4); ctx.fill();
    }
    // chart horizontal
    const maxCX = this._maxChartScroll();
    if (maxCX > 0) {
      const trackX = L.chartX, trackW = L.chartW;
      const thumbW = Math.max(30, trackW * trackW / (this.totalDays * this.dayWidth));
      const off = (this.chartScrollX / maxCX) * (trackW - thumbW);
      ctx.fillStyle = this.C.scrollTrack; ctx.fillRect(trackX, L.hScrollY, trackW, this.hScrollH);
      ctx.fillStyle = this._drag?.type === 'hscroll' ? this.C.scrollThumbActive : this.C.scrollThumb;
      drawRoundRect(ctx, trackX + off, L.hScrollY + 2, thumbW, this.hScrollH - 4, 4); ctx.fill();
    }
    // grid horizontal
    const maxGX = this._maxGridScroll();
    if (maxGX > 0) {
      const trackX = L.gridX + this._frozenW(), trackW = L.gridW - this._frozenW();
      const thumbW = Math.max(30, trackW * trackW / (this._gridContentW() - this._frozenW()));
      const off = (this.gridScrollX / maxGX) * (trackW - thumbW);
      ctx.fillStyle = this.C.scrollTrack; ctx.fillRect(trackX, L.hScrollY, trackW, this.hScrollH);
      ctx.fillStyle = this._drag?.type === 'gscroll' ? this.C.scrollThumbActive : this.C.scrollThumb;
      drawRoundRect(ctx, trackX + off, L.hScrollY + 2, thumbW, this.hScrollH - 4, 4); ctx.fill();
    }
  }

  _renderTooltip(ctx) {
    const t = this._tipTask;
    const lines = [
      t.name,
      t._resHeader ? '' : `Début : ${gFmt(t.start)}`,
      t._resHeader ? '' : `Fin : ${gFmt(t.end)}`,
      t._resHeader ? '' : (t.milestone ? 'Jalon' : `Durée : ${t.duration} j   •   ${t.progress}%`),
    ].filter(Boolean);
    if (t.resources && t.resources.length) lines.push('Ressources : ' + t.resources.map(rid => this.byId2res(rid)?.name || rid).join(', '));
    ctx.save();
    ctx.font = "12px 'Segoe UI', Arial";
    let w = 0; for (const l of lines) w = Math.max(w, ctx.measureText(l).width);
    w += 18; const h = lines.length * 17 + 12;
    let x = this._tipXY.x + 14, y = this._tipXY.y + 14;
    const b = this.bounds;
    if (x + w > b.x + b.width) x = this._tipXY.x - w - 8;
    if (y + h > b.y + b.height) y = this._tipXY.y - h - 8;
    ctx.shadowColor = 'rgba(0,0,0,0.28)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 3;
    ctx.fillStyle = '#2b2f36'; drawRoundRect(ctx, x, y, w, h, 6); ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    for (let i = 0; i < lines.length; i++) {
      ctx.fillStyle = i === 0 ? '#fff' : '#cdd3da';
      ctx.font = i === 0 ? "bold 12px 'Segoe UI', Arial" : "12px 'Segoe UI', Arial";
      ctx.fillText(lines[i], x + 9, y + 13 + i * 17);
    }
    ctx.restore();
  }

  // ═══════════════════════════ HIT TESTING ═══════════════════════════
  _hit(x, y) {
    const L = this._L || this._layout();
    // toolbar
    if (y < L.y + this.toolbarH) {
      const tb = this._layoutToolbar(L);
      for (const it of tb) {
        if (it.sep) continue;
        if (x >= it.x && x <= it.x + it.w && y >= it.y && y <= it.y + it.h)
          return { region: it.field ? 'filter' : 'tb', key: it.key };
      }
      return { region: 'toolbar' };
    }
    // scrollbars
    if (y >= L.hScrollY) {
      if (x >= L.chartX && x <= L.chartX + L.chartW && this._maxChartScroll() > 0) return { region: 'hscroll' };
      if (x >= L.gridX + this._frozenW() && x < L.splitX && this._maxGridScroll() > 0) return { region: 'gscroll' };
      return { region: 'corner' };
    }
    if (x >= L.vScrollX) { if (this._maxScrollY() > 0) return { region: 'vscroll' }; return { region: 'corner' }; }
    // splitter
    if (x >= L.splitX && x < L.chartX) return { region: 'splitter' };
    // header
    if (y < L.bodyY) {
      if (x < L.splitX) {
        // column resize handle?
        let cx = L.gridX;
        for (const col of this.columns) {
          const colX = col.frozen ? cx : cx - this.gridScrollX;
          if (Math.abs(x - (colX + col.width)) < 4) return { region: 'colresize', col };
          cx += col.width;
        }
        return { region: 'gridheader' };
      }
      return { region: 'chartheader' };
    }
    // body — find row
    const rowI = Math.floor((y - L.bodyY + this.scrollY) / this.rowH);
    const t = this._rows[rowI];
    if (!t) return { region: x < L.splitX ? 'gridempty' : 'chartempty', rowI: -1 };
    if (x < L.splitX) {
      // grid cell + tree toggle
      let cx = L.gridX;
      for (const col of this.columns) {
        const colX = col.frozen ? cx : cx - this.gridScrollX;
        if (x >= colX && x < colX + col.width) {
          let toggle = false;
          if (col.tree && t._isParent) {
            const indent = (t._depth || 0) * 15;
            const tx = colX + 8 + indent;
            const ry = this._rowTop(rowI, this._L);
            if (x >= tx - 2 && x <= tx + 12 && Math.abs(y - (ry + this.rowH / 2)) < 9) toggle = true;
          }
          return { region: 'gridcell', rowI, t, col, toggle };
        }
        cx += col.width;
      }
      return { region: 'gridcell', rowI, t };
    }
    // chart body — bar zones
    const ox = L.chartX - this.chartScrollX;
    const ry = this._rowTop(rowI, L);
    const r = this._barRect(t, ox, ry);
    if (!t._isParent && !t._resHeader) {
      const pw = r.x + r.w * (t.progress / 100);
      if (!t.milestone) {
        if (Math.abs(x - pw) < 6 && Math.abs(y - r.mid) < 7) return { region: 'progress', rowI, t, r };
        if (Math.abs(x - r.x) < 5 && y >= r.y && y <= r.y + r.h) return { region: 'resizeL', rowI, t, r };
        if (Math.abs(x - (r.x + r.w)) < 5 && y >= r.y && y <= r.y + r.h) return { region: 'resizeR', rowI, t, r };
      }
      if (x >= r.x - (t.milestone ? r.w : 0) && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return { region: 'bar', rowI, t, r };
    } else {
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) return { region: 'bar', rowI, t, r };
    }
    return { region: 'chartcell', rowI, t };
  }

  // ═══════════════════════════ INTERACTION ═══════════════════════════
  _onDown(e) {
    e.stopPropagation();
    this._closeEditor();
    if (this._ctxMenu) { this._ctxMenu.close(); this._ctxMenu = null; }
    const hit = this._hit(e.x, e.y);
    if (e.button === 2) { this._showContextMenu(e.x, e.y, hit); return; }

    switch (hit.region) {
      case 'tb':     this._tbPressed = hit.key; this._toolbarAction(hit.key); this.markDirty(); return;
      case 'filter': this._editFilter(); return;
      case 'splitter': this._drag = { type: 'splitter', startX: e.x, startSplit: this.splitX }; return;
      case 'colresize': this._drag = { type: 'colresize', col: hit.col, startX: e.x, startW: hit.col.width }; return;
      case 'vscroll': this._drag = { type: 'vscroll', startY: e.y, startScroll: this.scrollY }; this._scrollByThumb('v', e.y); return;
      case 'hscroll': this._drag = { type: 'hscroll', startX: e.x, startScroll: this.chartScrollX }; this._scrollByThumb('h', e.x); return;
      case 'gscroll': this._drag = { type: 'gscroll', startX: e.x, startScroll: this.gridScrollX }; this._scrollByThumb('g', e.x); return;
      case 'gridcell':
        if (hit.toggle) { this._pushUndo(); hit.t.expanded = !hit.t.expanded; this._buildRows(); this.markDirty(); return; }
        this._select(hit.t, hit.rowI); return;
      case 'bar':
        this._select(hit.t, hit.rowI);
        if (!hit.t._isParent && !hit.t._resHeader)
          this._drag = { type: 'movebar', t: hit.t, startX: e.x, startStart: new Date(hit.t.start), moved: false };
        return;
      case 'resizeL': this._select(hit.t, hit.rowI); this._drag = { type: 'resizeL', t: hit.t, startX: e.x, startStart: new Date(hit.t.start), startDur: hit.t.duration }; return;
      case 'resizeR': this._select(hit.t, hit.rowI); this._drag = { type: 'resizeR', t: hit.t, startX: e.x, startDur: hit.t.duration }; return;
      case 'progress': this._select(hit.t, hit.rowI); this._drag = { type: 'progress', t: hit.t, r: hit.r }; return;
      case 'chartcell': this._select(hit.t, hit.rowI); return;
      default: return;
    }
  }

  _onMove(e) {
    // hover for toolbar
    const hit = this._hit(e.x, e.y);
    if (this._hoverRegion !== hit.region) { this._hoverRegion = hit.region; this.markDirty(); }
    const newTbHover = (hit.region === 'tb' || hit.region === 'filter') ? hit.key : null;
    if (newTbHover !== this._tbHover) { this._tbHover = newTbHover; this.markDirty(); }
    // cursor — while dragging, keep a cursor that matches the active gesture
    if (this._drag) {
      const dc = { splitter: 'col-resize', colresize: 'col-resize', resizeL: 'ew-resize',
        resizeR: 'ew-resize', progress: 'ew-resize', movebar: 'grabbing' };
      this.cursor = dc[this._drag.type] || 'default';
      this._dragMove(e);
      return;
    }
    let cur = 'default';
    if (hit.region === 'splitter') cur = 'col-resize';
    else if (hit.region === 'colresize') cur = 'col-resize';
    else if (hit.region === 'resizeL' || hit.region === 'resizeR') cur = 'ew-resize';
    else if (hit.region === 'progress') cur = 'ew-resize';
    else if (hit.region === 'bar') cur = 'grab';
    else if (hit.region === 'tb' || hit.region === 'filter' || (hit.region === 'gridcell' && hit.toggle)) cur = 'pointer';
    if (this.cursor !== cur) { this.cursor = cur; }

    // row hover
    const rowI = (hit.rowI != null) ? hit.rowI : -1;
    const inBody = e.y >= this._L.bodyY && e.y < this._L.hScrollY;
    const hr = inBody ? rowI : -1;
    if (hr !== this._hoverRow) { this._hoverRow = hr; this.markDirty(); }

    // tooltip over bars
    if (hit.region === 'bar' && hit.t) {
      this._tipTask = hit.t; this._tipXY = { x: e.x, y: e.y }; this.markDirty();
    } else if (this._tipTask) { this._tipTask = null; this.markDirty(); }
  }

  _dragMove(e) {
    const d = this._drag;
    const L = this._L;
    switch (d.type) {
      case 'splitter': this.splitX = Math.max(this._minSplit, Math.min(this.bounds.width - 160, d.startSplit + (e.x - d.startX))); break;
      case 'colresize': d.col.width = Math.max(36, d.startW + (e.x - d.startX)); break;
      case 'vscroll': this._scrollByThumb('v', e.y); break;
      case 'hscroll': this._scrollByThumb('h', e.x); break;
      case 'gscroll': this._scrollByThumb('g', e.x); break;
      case 'movebar': {
        if (!d.committed) { this._pushUndo(); d.committed = true; }
        const days = Math.round((e.x - d.startX) / this.dayWidth);
        d.t.start = gAddDays(d.startStart, days);
        d.t.end = this._endFromDuration(d.t.start, d.t.duration);
        d.moved = true; this._recompute(); break;
      }
      case 'resizeL': {
        if (!d.committed) { this._pushUndo(); d.committed = true; }
        const days = Math.round((e.x - d.startX) / this.dayWidth);
        const ns = gAddDays(d.startStart, days);
        if (gDays(ns, d.t.end) >= 0) { d.t.start = ns; d.t.duration = this._durationBetween(d.t.start, d.t.end); this._recompute(); }
        break;
      }
      case 'resizeR': {
        if (!d.committed) { this._pushUndo(); d.committed = true; }
        const days = Math.round((e.x - d.startX) / this.dayWidth);
        d.t.duration = Math.max(1, d.startDur + days);
        d.t.end = this._endFromDuration(d.t.start, d.t.duration); this._recompute();
        break;
      }
      case 'progress': {
        if (!d.committed) { this._pushUndo(); d.committed = true; }
        const r = d.r;
        d.t.progress = Math.max(0, Math.min(100, Math.round(((e.x - r.x) / r.w) * 100)));
        this._recompute(); break;
      }
    }
    this.markDirty();
  }

  _onUp(e) {
    if (this._tbPressed) { this._tbPressed = null; this.markDirty(); }
    if (this._drag) {
      if (this._drag.type === 'movebar' && !this._drag.moved) { /* click only */ }
      this._drag = null; this.markDirty();
    }
  }
  _onClick(e) { /* selection handled in mousedown */ }

  _onDblClick(e) {
    const hit = this._hit(e.x, e.y);
    if (hit.region === 'gridcell' && hit.col && hit.col.editable && !hit.t._resHeader) {
      this._beginEdit(hit.rowI, hit.col);
    } else if (hit.region === 'bar' && hit.t && !hit.t._isParent && !hit.t._resHeader) {
      // double-click bar → edit name in grid
      const nameCol = this.columns.find(c => c.key === 'name');
      this._select(hit.t, hit.rowI);
      this._beginEdit(hit.rowI, nameCol);
    } else if ((hit.region === 'chartcell' || hit.region === 'chartempty') && hit.region !== 'bar') {
      // double-click empty timeline → add task at that date
      this._addTaskAt(this.xToDate(e.x - (this._L.chartX - this.chartScrollX)));
    }
  }

  _onWheel(e) {
    const dy = e.deltaY || 0, dx = e.deltaX || 0;
    if (e.ctrlKey) { this._zoom(dy < 0 ? 1.15 : 1 / 1.15, e.x); e.stopPropagation && e.stopPropagation(); return; }
    if (dx !== 0) { this.chartScrollX += dx; }
    else if (e.shiftKey) { this.chartScrollX += dy; }
    else { this.scrollY += dy; }
    this._clampScroll(); this.markDirty();
    e.stopPropagation && e.stopPropagation();
  }

  _scrollByThumb(which, pos) {
    const L = this._L;
    if (which === 'v') {
      const trackH = L.bodyH, thumbH = Math.max(24, trackH * trackH / (this._rows.length * this.rowH));
      const ratio = (pos - L.bodyY - thumbH / 2) / Math.max(1, trackH - thumbH);
      this.scrollY = ratio * this._maxScrollY();
    } else if (which === 'h') {
      const trackW = L.chartW, thumbW = Math.max(30, trackW * trackW / (this.totalDays * this.dayWidth));
      const ratio = (pos - L.chartX - thumbW / 2) / Math.max(1, trackW - thumbW);
      this.chartScrollX = ratio * this._maxChartScroll();
    } else if (which === 'g') {
      const fw = this._frozenW(), trackW = L.gridW - fw, thumbW = Math.max(30, trackW * trackW / (this._gridContentW() - fw));
      const ratio = (pos - (L.gridX + fw) - thumbW / 2) / Math.max(1, trackW - thumbW);
      this.gridScrollX = ratio * this._maxGridScroll();
    }
    this._clampScroll(); this.markDirty();
  }

  _select(t, rowI) {
    this.selectedId = t.id;
    this.markDirty();
    if (t && !t._resHeader) this._scrollToBar(t);   // auto scroll to taskbar
  }
  _scrollToBar(t) {
    const L = this._L || this._layout();
    const bx = this.dateToX(t.start);
    const bw = (t.milestone ? this.dayWidth : this.dateToX(t.end) + this.dayWidth - bx);
    if (bx < this.chartScrollX) this._autoScroll = { target: Math.max(0, bx - 40) };
    else if (bx + bw > this.chartScrollX + L.chartW) this._autoScroll = { target: bx + bw - L.chartW + 40 };
  }

  // ═══════════════════════════ EDITING ═══════════════════════════
  _screenRect(localX, localY, w, h) {
    const ab = this.getAbsoluteBounds();
    const r = canvas.getBoundingClientRect();
    const sx = r.width / canvas.width, sy = r.height / canvas.height;
    const devX = ab.x + (localX - this.bounds.x);
    const devY = ab.y + (localY - this.bounds.y);
    return { left: r.left + devX * sx, top: r.top + devY * sy, width: w * sx, height: h * sy };
  }
  _colX(col) {
    const L = this._L || this._layout();
    let cx = L.gridX;
    for (const c of this.columns) { if (c === col) return c.frozen ? cx : cx - this.gridScrollX; cx += c.width; }
    return cx;
  }
  _beginEdit(rowI, col) {
    this._closeEditor();
    const t = this._rows[rowI]; if (!t) return;
    this._select(t, rowI);
    const L = this._L || this._layout();
    const colX = this._colX(col);
    const ry = this._rowTop(rowI, L);
    let curVal = '';
    if (col.key === 'name') curVal = t.name;
    else if (col.key === 'start') curVal = gFmt(t.start);
    else if (col.key === 'end') curVal = gFmt(t.end);
    else if (col.key === 'duration') curVal = String(t.duration);
    else if (col.key === 'progress') curVal = String(t.progress);
    else if (col.key === 'predecessors') curVal = this._cellText(t, col);
    else if (col.key === 'resources') curVal = t.resources.map(rid => this.byId2res(rid)?.name || rid).join(', ');

    const sr = this._screenRect(colX + 1, ry + 2, col.width - 2, this.rowH - 4);
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = curVal;
    Object.assign(inp.style, {
      position: 'fixed', left: sr.left + 'px', top: sr.top + 'px',
      width: sr.width + 'px', height: sr.height + 'px',
      font: "12px 'Segoe UI', Arial", padding: '0 5px', margin: '0',
      border: '2px solid ' + this.C.accent, borderRadius: '3px', outline: 'none',
      background: '#fff', color: '#222', zIndex: 99999, boxSizing: 'border-box',
    });
    document.body.appendChild(inp);
    inp.focus(); inp.select();
    inp.addEventListener('keydown', ev => {
      ev.stopPropagation();   // keep engine global keydown from hijacking arrows
      if (ev.key === 'Enter') { this._commitEdit(t, col, inp.value); this._closeEditor(); }
      else if (ev.key === 'Escape') this._closeEditor();
    });
    inp.addEventListener('blur', () => { if (this._editor) { this._commitEdit(t, col, inp.value); this._closeEditor(); } });
    this._editor = inp;
  }
  _editFilter() {
    this._closeEditor();
    const L = this._L || this._layout();
    const tb = this._layoutToolbar(L).find(i => i.field);
    if (!tb) return;
    const sr = this._screenRect(tb.x + 22, tb.y, tb.w - 24, tb.h);
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = this.filterText; inp.placeholder = 'Filtrer…';
    Object.assign(inp.style, {
      position: 'fixed', left: sr.left + 'px', top: sr.top + 'px',
      width: sr.width + 'px', height: sr.height + 'px',
      font: "12px 'Segoe UI', Arial", padding: '0 4px', margin: '0',
      border: 'none', outline: 'none', background: 'transparent', color: this.C.text, zIndex: 99999, boxSizing: 'border-box',
    });
    document.body.appendChild(inp);
    // Focus must be deferred past this turn of the event loop. The canvas
    // mousedown that opened the filter runs the browser's native focus-fixup,
    // which would otherwise steal focus straight back to the canvas — blurring
    // (and through the blur handler, removing) this input before a single
    // character can be typed. rAF lets that default action finish first.
    requestAnimationFrame(() => { if (this._editor === inp) { inp.focus(); inp.select(); } });
    const apply = () => { this.filterText = inp.value.trim(); this._buildRows(); this.markDirty(); };
    inp.addEventListener('keydown', ev => { ev.stopPropagation(); apply(); if (ev.key === 'Enter' || ev.key === 'Escape') this._closeEditor(); });
    inp.addEventListener('input', apply);
    inp.addEventListener('blur', () => { apply(); this._closeEditor(); });
    this._editor = inp;
  }
  _closeEditor() { if (this._editor) { const i = this._editor; this._editor = null; i.remove(); this.markDirty(); } }

  _commitEdit(t, col, raw) {
    this._pushUndo();
    const v = raw.trim();
    switch (col.key) {
      case 'name': t.name = v || t.name; break;
      case 'start': { const d = gParse(v); if (d) { t.start = d; if (!t.milestone) t.end = this._endFromDuration(t.start, t.duration); } break; }
      case 'end': { const d = gParse(v); if (d && gDays(t.start, d) >= 0) { t.end = d; t.duration = this._durationBetween(t.start, t.end); } break; }
      case 'duration': { const n = parseInt(v, 10); if (!isNaN(n) && n >= 0) { t.duration = n; if (n === 0) { t.milestone = true; t.end = new Date(t.start); } else { t.milestone = false; t.end = this._endFromDuration(t.start, n); } } break; }
      case 'progress': { const n = parseInt(v, 10); if (!isNaN(n)) t.progress = Math.max(0, Math.min(100, n)); break; }
      case 'predecessors': t.predecessors = this._parsePreds(v); break;
      case 'resources': t.resources = this._parseRes(v); break;
    }
    this._recompute();
  }
  _parsePreds(v) {
    if (!v.trim()) return [];
    const out = [];
    for (const part of v.split(',')) {
      const m = part.trim().match(/^([\d.]+)\s*(FS|SS|FF|SF)?\s*([+\-]\d+)?$/i);
      if (!m) continue;
      const pr = this._order.find(t => t._wbs === m[1]) || this.byId(m[1]);
      if (!pr) continue;
      out.push({ id: pr.id, type: (m[2] || 'FS').toUpperCase(), lag: m[3] ? parseInt(m[3], 10) : 0 });
    }
    return out;
  }
  _parseRes(v) {
    if (!v.trim()) return [];
    const out = [];
    for (const part of v.split(',')) {
      const name = part.trim(); if (!name) continue;
      const r = this.resources.find(r => r.name.toLowerCase() === name.toLowerCase());
      if (r) out.push(r.id);
    }
    return out;
  }

  // ═══════════════════════════ COMMANDS ═══════════════════════════
  _nextId() { let m = 0; for (const t of this.tasks) { const n = +String(t.id).replace(/\D/g, ''); if (n > m) m = n; } return 'T' + (m + 1); }
  _addTaskAt(start) {
    this._pushUndo();
    const sel = this.selectedId ? this.byId(this.selectedId) : null;
    const t = this._normTask({ id: this._nextId(), name: 'Nouvelle tâche', start: start || gSOD(new Date()), duration: 3, progress: 0,
      parentId: sel && sel._isParent ? sel.id : (sel ? sel.parentId : null) });
    this.tasks.push(t);
    this._recompute();
    this._select(t, this._rows.indexOf(t));
  }
  _deleteSelected() {
    const t = this.selectedId ? this.byId(this.selectedId) : null;
    if (!t) return;
    this._pushUndo();
    const ids = new Set();
    const collect = n => { ids.add(n.id); for (const c of n._children) collect(c); };
    collect(t);
    this.tasks = this.tasks.filter(x => !ids.has(x.id));
    for (const x of this.tasks) x.predecessors = x.predecessors.filter(p => !ids.has(p.id));
    this.selectedId = null;
    this._recompute();
  }
  _indent() {
    const t = this.selectedId ? this.byId(this.selectedId) : null; if (!t) return;
    const rowI = this._rows.indexOf(t);
    // New parent = nearest preceding task at the same depth (its previous sibling).
    let p = null;
    for (let i = rowI - 1; i >= 0; i--) {
      const r = this._rows[i];
      if (r._resHeader) break;
      if (r._depth === t._depth) { p = r; break; }
      if (r._depth < t._depth) break;
    }
    if (!p || p.id === t.id) return;
    this._pushUndo();
    t.parentId = p.id;
    this._recompute();
  }
  _outdent() {
    const t = this.selectedId ? this.byId(this.selectedId) : null; if (!t || t.parentId == null) return;
    this._pushUndo();
    const parent = this.byId(t.parentId);
    t.parentId = parent ? parent.parentId : null;
    this._recompute();
  }
  _splitSelected() {
    const t = this.selectedId ? this.byId(this.selectedId) : null;
    if (!t || t._isParent || t.milestone) return;
    this._pushUndo();
    const mid = Math.floor((t.duration || 2) / 2);
    const splitDay = this._endFromDuration(t.start, Math.max(1, mid));
    t.segments = [
      { start: new Date(t.start), end: splitDay },
      { start: this._endFromDuration(gAddDays(splitDay, 2), 1), end: t.end },
    ];
    this._recompute();
  }
  _mergeSelected() {
    const t = this.selectedId ? this.byId(this.selectedId) : null;
    if (!t || !t.segments) return;
    this._pushUndo(); t.segments = null; this._recompute();
  }
  _toggleMilestone() {
    const t = this.selectedId ? this.byId(this.selectedId) : null; if (!t || t._isParent) return;
    this._pushUndo();
    t.milestone = !t.milestone;
    if (t.milestone) { t.duration = 0; t.end = new Date(t.start); } else { t.duration = 1; t.end = this._endFromDuration(t.start, 1); }
    this._recompute();
  }

  // ── Undo / Redo (snapshot based) ──
  _cloneTasks(src) {
    return (src || this.tasks).map(t => ({
      ...t, start: new Date(t.start), end: new Date(t.end),
      baselineStart: t.baselineStart ? new Date(t.baselineStart) : null,
      baselineEnd: t.baselineEnd ? new Date(t.baselineEnd) : null,
      predecessors: t.predecessors.map(p => ({ ...p })),
      resources: [...t.resources],
      segments: t.segments ? t.segments.map(s => ({ start: new Date(s.start), end: new Date(s.end) })) : null,
      indicators: (t.indicators || []).map(m => ({ ...m, date: new Date(m.date) })),
      _children: [],
    }));
  }
  _pushUndo() { this._undo.push(this._cloneTasks()); if (this._undo.length > 80) this._undo.shift(); this._redo.length = 0; }
  undo() { if (!this._undo.length) return; this._redo.push(this._cloneTasks()); this.tasks = this._undo.pop(); this._recompute(); }
  redo() { if (!this._redo.length) return; this._undo.push(this._cloneTasks()); this.tasks = this._redo.pop(); this._recompute(); }

  _zoom(factor, anchorX) {
    const L = this._L || this._layout();
    const ax = (anchorX != null ? anchorX : L.chartX + L.chartW / 2) - L.chartX + this.chartScrollX;
    const dayAtAnchor = ax / this.dayWidth;
    this.dayWidth = Math.max(this._zoomMin, Math.min(this._zoomMax, this.dayWidth * factor));
    this.chartScrollX = dayAtAnchor * this.dayWidth - ((anchorX != null ? anchorX : L.chartX + L.chartW / 2) - L.chartX);
    this._clampScroll(); this.markDirty();
  }
  _fit() {
    const L = this._L || this._layout();
    this.dayWidth = Math.max(this._zoomMin, Math.min(this._zoomMax, (L.chartW - 10) / this.totalDays));
    this.chartScrollX = 0; this._clampScroll(); this.markDirty();
  }

  _toolbarAction(key) {
    switch (key) {
      case 'add': this._addTaskAt(); break;
      case 'del': this._deleteSelected(); break;
      case 'indent': this._indent(); break;
      case 'outdent': this._outdent(); break;
      case 'undo': this.undo(); break;
      case 'redo': this.redo(); break;
      case 'zoomin': this._zoom(1.25); break;
      case 'zoomout': this._zoom(1 / 1.25); break;
      case 'fit': this._fit(); break;
      case 'critical': this.showCritical = !this.showCritical; this.markDirty(); break;
      case 'baseline': this.showBaseline = !this.showBaseline; if (this.showBaseline) this._ensureBaselines(); this.markDirty(); break;
      case 'resAlloc': this.showResourceHisto = !this.showResourceHisto; this.markDirty(); break;
      case 'resView': this.viewMode = this.viewMode === 'resource' ? 'task' : 'resource'; this.selectedId = null; this._buildRows(); this.markDirty(); break;
      case 'export': this._exportMenu(); break;
    }
  }
  _ensureBaselines() {
    for (const t of this.tasks) {
      if (!t._isParent && !t.baselineStart) { t.baselineStart = new Date(t.start); t.baselineEnd = new Date(t.end); }
    }
  }

  // ═══════════════════════════ CONTEXT MENU ═══════════════════════════
  _showContextMenu(x, y, hit) {
    const t = (hit.t) || (this.selectedId ? this.byId(this.selectedId) : null);
    if (t) this._select(t, hit.rowI);
    const has = !!t && !t._resHeader;
    const isLeaf = has && !t._isParent;
    const items = [
      { label: 'Ajouter une tâche', icon: '＋', shortcut: 'Ins', action: () => this._addTaskAt() },
      { label: 'Ajouter une sous-tâche', icon: '↳', disabled: !has, action: () => { if (t) { this._addTaskAt(); const nt = this.byId(this.selectedId); if (nt) { nt.parentId = t.id; this._recompute(); } } } },
      { label: 'Supprimer', icon: '🗑', disabled: !has, shortcut: 'Suppr', action: () => this._deleteSelected() },
      { separator: true },
      { label: 'Indenter', icon: '⇥', disabled: !has, action: () => this._indent() },
      { label: 'Désindenter', icon: '⇤', disabled: !has, action: () => this._outdent() },
      { separator: true },
      { label: 'Convertir en jalon', icon: '◆', disabled: !isLeaf, checked: isLeaf && t.milestone, action: () => this._toggleMilestone() },
      { label: t && t.segments ? 'Fusionner la tâche' : 'Scinder la tâche', icon: '✂', disabled: !isLeaf, action: () => t && t.segments ? this._mergeSelected() : this._splitSelected() },
      { separator: true },
      { label: 'Affichage', icon: '⚙', submenu: [
        { label: 'Chemin critique', checked: this.showCritical, action: () => this._toolbarAction('critical') },
        { label: 'Lignes de référence', checked: this.showBaseline, action: () => this._toolbarAction('baseline') },
        { label: 'Allocation ressources', checked: this.showResourceHisto, action: () => this._toolbarAction('resAlloc') },
        { label: 'Vue par ressource', checked: this.viewMode === 'resource', action: () => this._toolbarAction('resView') },
      ] },
      { label: 'Exporter', icon: '⤓', submenu: [
        { label: 'CSV (.csv)', action: () => this._exportCSV() },
        { label: 'Excel (.xls)', action: () => this._exportExcel() },
        { label: 'PDF (impression)', action: () => this._exportPDF() },
      ] },
      { separator: true },
      { label: 'Annuler', icon: '↶', shortcut: 'Ctrl+Z', disabled: !this._undo.length, action: () => this.undo() },
      { label: 'Rétablir', icon: '↷', shortcut: 'Ctrl+Y', disabled: !this._redo.length, action: () => this.redo() },
    ];
    // Open as a TOP-LEVEL overlay (absolute canvas coords) so it is dismissed by
    // a click anywhere — including outside this window — and is reusable globally.
    const a = this._toAbs(x, y);
    this._ctxMenu = ContextMenu.open(engine.windowManager, a.x, a.y, items, { onClose: () => { this._ctxMenu = null; } });
  }
  // content-space (this.bounds space) → absolute canvas coords
  _toAbs(localX, localY) {
    const ab = this.getAbsoluteBounds();
    return { x: ab.x + (localX - this.bounds.x), y: ab.y + (localY - this.bounds.y) };
  }
  _exportMenu() {
    const L = this._L || this._layout();
    const tb = this._layoutToolbar(L).find(i => i.key === 'export');
    const items = [
      { label: 'CSV (.csv)', icon: '📄', action: () => this._exportCSV() },
      { label: 'Excel (.xls)', icon: '📊', action: () => this._exportExcel() },
      { label: 'PDF (impression)', icon: '🖨', action: () => this._exportPDF() },
    ];
    const a = this._toAbs(tb ? tb.x : 100, this.bounds.y + this.toolbarH);
    this._ctxMenu = ContextMenu.open(engine.windowManager, a.x, a.y, items, { onClose: () => { this._ctxMenu = null; } });
  }

  // ═══════════════════════════ EXPORT ═══════════════════════════
  _exportRows() {
    const cols = ['WBS', 'Nom', 'Début', 'Fin', 'Durée(j)', 'Progrès(%)', 'Prédécesseurs', 'Ressources'];
    const rows = [cols];
    for (const t of this._order) {
      rows.push([
        t._wbs, '  '.repeat(t._depth) + t.name, gFmt(t.start), gFmt(t.end),
        t.milestone ? 0 : t.duration, t.progress,
        (t.predecessors || []).map(p => { const pr = this.byId(p.id); return pr ? pr._wbs : p.id; }).join(' '),
        (t.resources || []).map(r => this.byId2res(r)?.name || r).join('; '),
      ]);
    }
    return rows;
  }
  _exportCSV() {
    const esc = v => { const s = String(v ?? ''); return /[",;\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
    const csv = this._exportRows().map(r => r.map(esc).join(';')).join('\r\n');
    gDownload('gantt.csv', 'text/csv;charset=utf-8', '﻿' + csv);
  }
  _exportExcel() {
    const rows = this._exportRows();
    const esc = v => String(v ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    let html = '<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8"></head><body><table border="1">';
    rows.forEach((r, i) => {
      html += '<tr>' + r.map(c => `<${i ? 'td' : 'th'}>${esc(c)}</${i ? 'td' : 'th'}>`).join('') + '</tr>';
    });
    html += '</table></body></html>';
    gDownload('gantt.xls', 'application/vnd.ms-excel', html);
  }
  _exportPDF() {
    // Snapshot the currently rendered widget area from the live canvas → printable page.
    const ab = this.getAbsoluteBounds();
    const sx = Math.max(0, ab.x | 0), sy = Math.max(0, ab.y | 0);
    const sw = Math.min(canvas.width - sx, this.bounds.width | 0);
    const sh = Math.min(canvas.height - sy, this.bounds.height | 0);
    const off = document.createElement('canvas'); off.width = sw; off.height = sh;
    off.getContext('2d').drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);
    const url = off.toDataURL('image/png');
    const w = window.open('', '_blank');
    if (!w) return;
    w.document.write(`<html><head><title>Gantt</title><style>@page{size:landscape;margin:8mm}body{margin:0}img{width:100%}</style></head><body><img src="${url}" onload="setTimeout(()=>{window.focus();window.print();},250)"></body></html>`);
    w.document.close();
  }

  // ═══════════════════════════ KEYBOARD ═══════════════════════════
  _onKey(e) {
    if (this._editor) return;
    const k = e.key;
    if (e.ctrlKey && (k === 'z' || k === 'Z')) { this.undo(); e.stopPropagation(); return; }
    if (e.ctrlKey && (k === 'y' || k === 'Y' || (e.shiftKey && (k === 'z' || k === 'Z')))) { this.redo(); e.stopPropagation(); return; }
    const rowI = this._rows.findIndex(t => t.id === this.selectedId);
    switch (k) {
      case 'ArrowDown': if (rowI < this._rows.length - 1) this._select(this._rows[rowI + 1], rowI + 1); this._ensureRowVisible(rowI + 1); break;
      case 'ArrowUp': if (rowI > 0) this._select(this._rows[rowI - 1], rowI - 1); this._ensureRowVisible(rowI - 1); break;
      case 'ArrowLeft': { const t = this._rows[rowI]; if (t && t._isParent && t.expanded) { t.expanded = false; this._buildRows(); } else if (t && t.parentId != null) { const p = this.byId(t.parentId); if (p) this._select(p, this._rows.indexOf(p)); } break; }
      case 'ArrowRight': { const t = this._rows[rowI]; if (t && t._isParent && !t.expanded) { t.expanded = true; this._buildRows(); } break; }
      case 'Enter': case 'F2': { const t = this._rows[rowI]; if (t && !t._resHeader) this._beginEdit(rowI, this.columns.find(c => c.key === 'name')); break; }
      case 'Delete': this._deleteSelected(); break;
      case 'Insert': this._addTaskAt(); break;
      case 'PageDown': this.scrollY += (this._L || this._layout()).bodyH; this._clampScroll(); break;
      case 'PageUp': this.scrollY -= (this._L || this._layout()).bodyH; this._clampScroll(); break;
      default: return;
    }
    e.stopPropagation(); this.markDirty();
  }
  _ensureRowVisible(i) {
    if (i < 0) return;
    const L = this._L || this._layout();
    const top = i * this.rowH, bot = top + this.rowH;
    if (top < this.scrollY) this.scrollY = top;
    else if (bot > this.scrollY + L.bodyH) this.scrollY = bot - L.bodyH;
    this._clampScroll();
  }

  // ═══════════════════════════ ANIMATION ═══════════════════════════
  update(dt) {
    super.update(dt);
    let dirty = false;
    if (this._autoScroll) {
      const target = Math.max(0, Math.min(this._maxChartScroll(), this._autoScroll.target));
      const d = target - this.chartScrollX;
      if (Math.abs(d) < 0.5) { this.chartScrollX = target; this._autoScroll = null; }
      else this.chartScrollX += d * Math.min(1, dt * 0.012);
      dirty = true;
    }
    if (dirty) this.markDirty();
  }

  destroy() { this._closeEditor(); if (this._ctxMenu) this._ctxMenu.close(); }
}

// ── Sample project data for the Gantt demo ──────────────────────────────────
function _ganttSampleData() {
  const today = gSOD(new Date());
  const D = n => gAddDays(today, n);
  const resources = [
    { id: 'r1', name: 'Alice' }, { id: 'r2', name: 'Bob' }, { id: 'r3', name: 'Chloé' },
    { id: 'r4', name: 'David' }, { id: 'r5', name: 'Emma' },
  ];
  const tasks = [
    { id: 'P1', name: 'Conception du produit', start: D(-2), parentId: null, expanded: true },
    { id: 'T1', name: 'Cahier des charges', start: D(-2), duration: 3, progress: 100, parentId: 'P1', resources: ['r1'] },
    { id: 'T2', name: 'Étude de faisabilité', start: D(1), duration: 4, progress: 80, parentId: 'P1', predecessors: ['T1'], resources: ['r2', 'r3'] },
    { id: 'M1', name: 'Validation concept', start: D(5), milestone: true, parentId: 'P1', predecessors: ['T2'] },
    { id: 'P2', name: 'Développement', start: D(5), parentId: null, expanded: true },
    { id: 'T3', name: 'Architecture', start: D(5), duration: 5, progress: 60, parentId: 'P2', predecessors: [{ id: 'M1', type: 'FS' }], resources: ['r2'] },
    { id: 'T4', name: 'Module front-end', start: D(10), duration: 8, progress: 30, parentId: 'P2', predecessors: ['T3'], resources: ['r4'] },
    { id: 'T5', name: 'Module back-end', start: D(10), duration: 10, progress: 25, parentId: 'P2', predecessors: ['T3'], resources: ['r3', 'r5'] },
    { id: 'T6', name: 'Intégration', start: D(20), duration: 4, progress: 0, parentId: 'P2', predecessors: ['T4', 'T5'], resources: ['r2'] },
    { id: 'P3', name: 'Tests & Recette', start: D(24), parentId: null, expanded: true },
    { id: 'T7', name: 'Tests unitaires', start: D(24), duration: 4, progress: 0, parentId: 'P3', predecessors: ['T6'], resources: ['r4'] },
    { id: 'T8', name: 'Tests d\'intégration', start: D(28), duration: 3, progress: 0, parentId: 'P3', predecessors: ['T7'], resources: ['r5'] },
    { id: 'M2', name: 'Livraison', start: D(32), milestone: true, parentId: 'P3', predecessors: ['T8'] },
  ];
  // Baselines: original plan, slightly shifted from current schedule (shows variance)
  for (const t of tasks) {
    if (t.milestone || !t.duration) continue;
    t.baselineStart = gAddDays(t.start, -1);
    t.baselineEnd = gAddDays(t.start, (t.duration || 1) - 1 + 1); // ~plan end, 1 day shorter span
  }
  const events = [{ date: D(15), label: 'Revue sprint', color: '#7b61ff' }];
  const holidays = [D(7), D(8)];
  return { tasks, resources, holidays, events };
}

// ── Open Gantt Window ───────────────────────────────────────────────────────
window.openGanttWindow = function() {
  const { width: w, height: h, x, y } = winBounds(1040, 620);
  const win = new GUIWindow('Diagramme de Gantt', { x, y, width: w, height: h });
  const ca = win.contentArea;
  const cab = ca.bounds;

  // The Gantt fills the content area and handles ALL its own scrolling, so we
  // neutralise window-level scrollbars (otherwise the +10px content margin in
  // WindowContent would spawn phantom window scrollbars).
  ca._contentSize = () => ({ w: 0, h: 0 });

  const gantt = new GanttChart({ x: 0, y: 0, width: cab.width, height: cab.height }, {
    data: _ganttSampleData(),
  });
  ca.addChild(gantt);

  // Keep the Gantt sized to the content area on resize / maximize
  const origUpdateLayout = win._updateLayout.bind(win);
  win._updateLayout = function() {
    origUpdateLayout();
    const b = win.contentArea.bounds;
    gantt.setSize(b.width, b.height);
    gantt.markDirty();
  };

  // Tear down DOM editor / menus when the window closes
  const origOnClose = win._onClose.bind(win);
  win._onClose = function() { gantt.destroy(); origOnClose(); };

  engine.windowManager.addWindow(win);
  return win;
};

// ── Launch default windows ────────────────────────────────────────────────
openGanttWindow();

engine.start();
</script>

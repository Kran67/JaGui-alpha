<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas GUI Framework</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; touch-action: none; }
  body { background: #1a1a2e; display: flex; flex-direction: column; font-family: system-ui; }

  /* ---- TOOLBAR ---- */
  #toolbar {
    background: rgba(0,0,0,0.6);
    width: 100%;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    z-index: 10;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  #toolbar label { color: #aaa; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  #themeSelect {
    background: #2a2a4a; color: #ddd; border: 1px solid #555;
    border-radius: 4px; padding: 6px 8px; font-size: 12px; cursor: pointer;
    flex-shrink: 0; min-height: 34px;
    -webkit-appearance: none; appearance: none;
  }
  .tb-btn {
    background: #2a2a4a; color: #ccc; border: 1px solid #555;
    border-radius: 4px; padding: 6px 10px; font-size: 12px; cursor: pointer;
    transition: background 0.15s, color 0.15s; white-space: nowrap;
    flex-shrink: 0; min-height: 34px; user-select: none;
    -webkit-user-select: none;
  }
  .tb-btn:hover, .tb-btn:active { background: #3a3a6a; color: #fff; border-color: #888; }

  /* Mobile: icon-only labels for space */
  @media (max-width: 480px) {
    .tb-btn { padding: 6px 8px; font-size: 11px; }
    .tb-label { display: none; }
  }

  /* ---- CANVAS ---- */
  #canvasContainer { flex: 1; width: 100%; position: relative; overflow: hidden; min-height: 0; }
  canvas { display: block; touch-action: none; cursor: default; outline: none; }

  /* ---- OVERLAYS ---- */
  #fps { position: fixed; bottom: 6px; right: 10px; color: rgba(255,255,255,0.35); font-size: 10px; font-family: monospace; pointer-events: none; }
  #info { position: fixed; bottom: 6px; left: 10px; color: rgba(255,255,255,0.25); font-size: 10px; font-family: monospace; pointer-events: none; }
  @media (max-width: 480px) { #info { display: none; } }

  /* ---- HIDDEN INPUT for mobile keyboard ---- */
  #mobileInput {
    position: fixed; top: -200px; left: 0;
    width: 1px; height: 1px; opacity: 0;
    border: none; outline: none; background: transparent;
    font-size: 16px; /* prevent iOS zoom */
  }
</style>
</head>
<body>
<div id="toolbar">
  <label class="tb-label">🎨</label>
  <select id="themeSelect">
    <option value="windows-xp">Windows XP</option>
    <option value="macos">macOS</option>
    <option value="windows-vista">Vista Aero</option>
    <option value="modern-dark">Dark</option>
  </select>
  <button class="tb-btn" onclick="openGanttWindow()">📊 <span class="tb-label">Gantt</span></button>
</div>
<div id="canvasContainer">
  <canvas id="canvas" tabindex="0"></canvas>
</div>
<input id="mobileInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
<div id="fps">FPS: --</div>
<div id="info">Canvas GUI Framework v1.0 — TypeScript + HTML Canvas</div>

<script type="module">
// ============================================================
// CANVAS GUI FRAMEWORK - Bundled inline version
// ============================================================

// ---- TYPES ----
const _colorCSSCache0 = new Map();
function colorToCSS(c) {
  if (!c) return 'transparent';
  if (typeof c === 'string') return c;
  const a = c.a !== undefined ? c.a : 1;
  const key = c.r * 100000000 + c.g * 100000 + c.b * 1000 + Math.round(a * 999);
  let v = _colorCSSCache0.get(key);
  if (v === undefined) {
    v = a < 1 ? `rgba(${c.r},${c.g},${c.b},${a})` : `rgb(${c.r},${c.g},${c.b})`;
    if (_colorCSSCache0.size > 256) _colorCSSCache0.clear();
    _colorCSSCache0.set(key, v);
  }
  return v;
}
function hexToColor(hex) {
  let clean = hex.replace('#', '');
  if (clean.length === 3) clean = clean[0]+clean[0]+clean[1]+clean[1]+clean[2]+clean[2];
  return { r: parseInt(clean.substring(0, 2), 16), g: parseInt(clean.substring(2, 4), 16), b: parseInt(clean.substring(4, 6), 16), a: 1 };
}
function _easeOut(t)      { return 1-(1-t)*(1-t); }
function _easeOutCubic(t) { return 1-(1-t)*(1-t)*(1-t); }
function _easeInOut(t)    { return t<0.5 ? 2*t*t : 1-2*(1-t)*(1-t); }
function _easeSpring(t)   { // slight overshoot
  const c4 = (2*Math.PI)/3;
  return t===0?0:t===1?1:Math.pow(2,-8*t)*Math.sin((t*10-0.75)*c4)+1;
}
function _animStyle() {
  return 'bmw:' + _bmwPick();
}

// ============================================================
// BURN-MY-WINDOWS EFFECTS — WebGL + Canvas2D
// Re-implementations inspired by https://github.com/Schneegans/Burn-My-Windows (GPL-3.0)
// ============================================================
// ── BMW WebGL helpers ──────────────────────────────────────────
function _bmwTex(gl,img,ex){
  const t=ex||gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);return t;
}
function _bmwU(gl,prog,name){return gl.getUniformLocation(prog,name);}
const _BMW_VERT=`attribute vec2 aPos;varying vec2 vUV;void main(){vUV=aPos*.5+.5;gl_Position=vec4(aPos,0,1);}`;

// Common GLSL library (ported from common.glsl) embedded as a string prefix
const _BMW_COMMON=`
precision mediump float;
varying vec2 vUV;
uniform sampler2D uTex;
uniform float uP;   // uProgress 0->1
uniform float uDur; // duration seconds
uniform float uW,uH;// window pixel size
uniform bool uOpen; // true if opening

// iTexCoord: window-space (0,0)=top-left (1,1)=bottom-right
#define iTexCoord vec2(vUV.x, 1.0-vUV.y)

// --- hash / noise (MIT, David Hoskins) ---
float hash11(float p){p=fract(p*.1031);p*=p+33.33;p*=p+p;return fract(p);}
float hash12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
vec2  hash22(vec2 p){vec3 p3=fract(vec3(p.xyx)*vec3(.1031,.1030,.0973));p3+=dot(p3,p3.yzx+33.33);return fract((p3.xx+p3.yz)*p3.zy);}

// --- simplex 2D (MIT, Inigo Quilez) ---
float simplex2D(vec2 p){
  const float K1=0.366025404,K2=0.211324865;
  vec2 i=floor(p+(p.x+p.y)*K1);
  vec2 a=p-i+(i.x+i.y)*K2;
  float m=step(a.y,a.x);
  vec2 o=vec2(m,1.-m),b=a-o+K2,c=a-1.+2.*K2;
  vec3 h=max(.5-vec3(dot(a,a),dot(b,b),dot(c,c)),0.);
  vec3 n=h*h*h*h*vec3(dot(a,-1.+2.*hash22(i)),dot(b,-1.+2.*hash22(i+o)),dot(c,-1.+2.*hash22(i+1.)));
  return .5+.5*dot(n,vec3(70.));}
float simplex2DFractal(vec2 p){
  mat2 m=mat2(1.6,1.2,-1.2,1.6);
  float f=.5*simplex2D(p);p=m*p;f+=.25*simplex2D(p);p=m*p;
  f+=.125*simplex2D(p);p=m*p;f+=.0625*simplex2D(p);return f;}

// --- easing ---
float easeOutQuad(float x){return -x*(x-2.);}
float easeInQuad(float x){return x*x;}

// --- compositing ---
vec4 alphaOver(vec4 under,vec4 over){
  float a=mix(under.a,1.,over.a);
  if(a==0.)return vec4(0.);
  return vec4(mix(under.rgb*under.a,over.rgb,over.a)/a,a);}

// --- color helpers ---
vec3 tritone(float v,vec3 s,vec3 m,vec3 h){
  if(v<.5)return mix(s,m,smoothstep(0.,1.,v*2.));
  return mix(m,h,smoothstep(0.,1.,v*2.-1.));}

// --- getInputColor: straight alpha from texture (Y already flipped via iTexCoord) ---
vec4 getInputColor(vec2 uv){
  vec4 c=texture2D(uTex,uv);
  if(c.a>0.)c.rgb/=c.a;
  return c;}

// --- edge masks ---
float getEdgeMask(vec2 uv,vec2 maxUV,float fw){
  float mask=1.;
  mask*=smoothstep(0.,1.,clamp(uv.x/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp(uv.y/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp((maxUV.x-uv.x)/fw,0.,1.));
  mask*=smoothstep(0.,1.,clamp((maxUV.y-uv.y)/fw,0.,1.));
  return mask;}
float getAbsoluteEdgeMask(float fp,float offset){
  float padding=max(0.,0.-fp*offset);
  vec2 uv2=iTexCoord*vec2(uW,uH)-padding;
  return getEdgeMask(uv2,vec2(uW,uH)-2.*padding,fp);}
float getRelativeEdgeMask(float fa){return getEdgeMask(iTexCoord,vec2(1.),fa);}

// --- setOutputColor: premultiplied output ---
void setOutputColor(vec4 c){gl_FragColor=vec4(c.rgb*c.a,c.a);}

// --- whirl ---
vec2 whirl(vec2 coords,float warping,float rotation){
  float angle=pow(1.-length(coords),2.)*warping+rotation;
  return vec2(dot(coords,vec2(cos(angle),-sin(angle))),dot(coords,vec2(sin(angle),cos(angle))));}

// --- uProgress aliases ---
#define uProgress uP
#define uDuration uDur
#define uForOpening uOpen
#define uSize vec2(uW,uH)
`;

function _bmwGL(w,h,fragBody){
  const oc=new OffscreenCanvas(Math.max(1,w|0),Math.max(1,h|0));
  const gl=oc.getContext('webgl',{premultipliedAlpha:false,alpha:true});
  if(!gl)return null;
  const mk=(type,src)=>{
    const sh=gl.createShader(type);gl.shaderSource(sh,src);gl.compileShader(sh);
    if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS))console.error('Shader err:',gl.getShaderInfoLog(sh));
    return sh;};
  const prog=gl.createProgram();
  gl.attachShader(prog,mk(gl.VERTEX_SHADER,_BMW_VERT));
  gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,_BMW_COMMON+fragBody));
  gl.linkProgram(prog);gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  const loc=gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  gl.enable(gl.BLEND);gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
  gl.viewport(0,0,w|0,h|0);
  return {gl,oc,prog,tex:null,w,h};
}

// Shared uniform setup for standard effects
function _bmwStdUniforms(st,p,t,isOpen){
  st.gl.uniform1f(st.uP,p);
  st.gl.uniform1f(st.uDur,t/1000);
  st.gl.uniform1i(st.uOpen,isOpen?1:0);
  st.gl.uniform1f(st.uW,st.w);
  st.gl.uniform1f(st.uH,st.h);
}
function _bmwGetStdLocs(gl,prog){
  return {
    uP:  _bmwU(gl,prog,'uP'),
    uDur:_bmwU(gl,prog,'uDur'),
    uOpen:_bmwU(gl,prog,'uOpen'),
    uW:  _bmwU(gl,prog,'uW'),
    uH:  _bmwU(gl,prog,'uH'),
    uTex:_bmwU(gl,prog,'uTex'),
  };
}

const BMW={};

// ── FIRE 🔥 ───────────────────────────────────────────────────────────────
BMW.fire={duration:{open:700,close:800},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float vn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    float fbm(vec2 p){mat2 m=mat2(1.6,1.2,-1.2,1.6);
      float f=.5*vn(p);p=m*p;f+=.25*vn(p);p=m*p;f+=.125*vn(p);p=m*p;f+=.0625*vn(p);return f;}
    vec4 fireColor(float v){
      vec4 c0=vec4(.298,.200,.098,0.),c1=vec4(.706,.216,.118,.7),
           c2=vec4(1.,.298,.149,.9),c3=vec4(1.,.651,.098,1.),c4=vec4(1.,1.,1.,1.);
      if(v<.2) return mix(c0,c1,vec4(v/.2));
      if(v<.35) return mix(c1,c2,vec4((v-.2)/.15));
      if(v<.5)  return mix(c2,c3,vec4((v-.35)/.15));
      if(v<.8)  return mix(c3,c4,vec4((v-.5)/.3));
      return c4;}

    float edgeFade(vec2 uv,float w){
      return smoothstep(0.,w,uv.x)*smoothstep(0.,w,1.-uv.x)*smoothstep(0.,w,uv.y)*smoothstep(0.,w,1.-uv.y);}
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float prog=uP*uP*(2.-uP);
      float burnP=clamp(prog/.4,0.,1.),afterP=clamp((prog-.4)/.6,0.,1.);
      float t=uv.y*(1.-.1);
      float winMask=1.-clamp((burnP-t)/.1,0.,1.);
      float effMask=clamp(t*(1.-winMask)/max(burnP,.001),0.,1.);
      if(prog>.4){float fade=sqrt(1.-afterP*afterP);effMask*=mix(1.,1.-t,afterP)*fade;}
      effMask*=edgeFade(uv,.10);
      vec2 nuv=uv; nuv.y+=prog*.8*.5;
      float noise=fbm(nuv*4.)*effMask;
      vec4 fire=fireColor(noise);
      vec4 win=texture2D(uTex,uv);
      if(win.a>0.) win.rgb/=win.a;
      win.a*=winMask;
      vec4 col=alphaOver(win,fire);
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── TV 📺 ─────────────────────────────────────────────────────────────────
BMW.tv={duration:{open:400,close:400},make(bw,bh){
  const st=_bmwGL(bw,bh,`    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float prog=uP*(2.-uP);
      float scale=1./mix(1.,.5,prog)-1.;
      vec2 coords=uv; coords.y=coords.y*(scale+1.)-scale*.5;
      float tbP=smoothstep(0.,1.,clamp(prog/.7,0.,1.));
      float lrP=smoothstep(0.,1.,clamp((prog-.6)/.4,0.,1.));
      float ffP=smoothstep(0.,1.,clamp((prog-.9)/.1,0.,1.));
      float tb=coords.y*2.; tb=tb<1.?tb:2.-tb;
      float lr=coords.x*2.; lr=lr<1.?lr:2.-lr;
      float tbM=1.-smoothstep(0.,1.,clamp((tbP-tb)/.01,0.,1.));
      float lrM=1.-smoothstep(0.,1.,clamp((lrP-lr)/.01,0.,1.));
      float ffM=1.-smoothstep(0.,1.,ffP);
      float mask=tbM*lrM*ffM;
      vec4 col=texture2D(uTex,vec2(coords.x,1.-coords.y));
      if(col.a>0.) col.rgb/=col.a;
      col.a*=mask;
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── GLITCH ⚡ ──────────────────────────────────────────────────────────────
BMW.glitch={duration:{open:400,close:400},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP*uP;
      float time=progress*uT*300.;
      float displace=1000.*progress/800.;
      float yPos=uv.y*800.;
      float noise=clamp(sn(vec2(time*.001,yPos*.002))-.5,0.,1.);
      noise+=(sn(vec2(time*.01,yPos*.05))-.5)*.15;
      float xPos=clamp(uv.x-displace*noise*noise,0.,1.);
      vec4 col=texture2D(uTex,vec2(xPos,1.-uv.y));
      if(col.a>0.) col.rgb/=col.a;
      float offset=.1*noise*displace;
      float g=texture2D(uTex,vec2(clamp(xPos+offset,0.,1.),1.-uv.y)).g;
      float b2=texture2D(uTex,vec2(clamp(xPos-offset,0.,1.),1.-uv.y)).b;
      col.g=mix(col.g,g,.25); col.b=mix(col.b,b2,.25);
      float fadeDelay=1.5;
      float alpha=clamp(noise+1.+fadeDelay-(3.+fadeDelay)*progress,0.,1.);
      col.a*=alpha;
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── HEXAGON 🔷 ────────────────────────────────────────────────────────────
BMW.hexagon={duration:{open:600,close:600},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    vec4 getHex(vec2 p){
      float el=sqrt(4./3.);
      vec2 sc=vec2(3.*el,2.),a=mod(p,sc)-sc*.5,b=mod(p+sc*.5,sc)-sc*.5;
      vec2 aa=abs(a),ba=abs(b);
      float dA=max(aa.x/el+aa.y*.5,aa.y),dB=max(ba.x/el+ba.y*.5,ba.y);
      float dist=1.-min(dA,dB);
      float glow=min(dot(a,a),dot(b,b))/1.5;
      return vec4(dA<dB?a:b,dist,glow);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float noise=sn(uv*3.+vec2(uT*.001));
      float p=clamp(mix(noise-1.,noise+1.,uP),0.,1.);
      float glowP=smoothstep(0.,1.,clamp(p/.5,0.,1.));
      float tileP=smoothstep(0.,1.,clamp((p-.5)/.5,0.,1.));
      vec2 ts=0.1*vec2(800.,600.)/3.;
      vec4 hex=getHex(uv*ts);
      vec4 col=vec4(0.);
      if(tileP<hex.z){
        vec2 off=tileP*hex.xy/ts/(1.-max(tileP,.001));
        col=texture2D(uTex,clamp(uv+off,0.,1.));
        if(col.a>0.) col.rgb/=col.a;
        float ga=glowP*(pow(hex.w,20.)*10.+pow(hex.w,10.)*5.+pow(hex.w,2.)*.5)*col.a;
        col.rgb+=vec3(.4,.8,1.)*ga;
        float la=glowP*(1.-smoothstep(.005,.01,hex.z))*col.a;
        col.rgb=mix(col.rgb,vec3(.6,.9,1.),la*.5);}
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

BMW.matrix={duration:{open:1200,close:1200},make(bw,bh){
  const LETTER_SIZE=18,TRAIL_LENGTH=0.2,FADE_WIDTH=150;
  const KANA='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  const cols=Math.ceil(bw/LETTER_SIZE);
  const rows=Math.ceil(bh/LETTER_SIZE)+2;
  const colData=[];
  for(let c=0;c<cols;c++) colData.push({
    delay:Math.random(),speed:1.5+Math.random()*.5,
    letters:Array.from({length:rows},()=>KANA[Math.floor(Math.random()*KANA.length)])
  });
  return {colData,LETTER_SIZE,TRAIL_LENGTH,FADE_WIDTH,cols,rows,KANA};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{colData,LETTER_SIZE,TRAIL_LENGTH,FADE_WIDTH,cols,rows,KANA}=st;
  const w=b.width,h=b.height;
  const tmp=new OffscreenCanvas(w,h);
  const g=tmp.getContext('2d');
  const FINAL_FADE=0.8;
  const finalFade=1-Math.max(0,Math.min(1,(p-FINAL_FADE)/(1-FINAL_FADE)));
  for(let c=0;c<cols;c++){
    const cd=colData[c];
    const x=c*LETTER_SIZE;
    const distToDrop=(p*2-cd.delay)*cd.speed;
    const winAlpha=1-Math.min(1,Math.max(0,h*distToDrop)/FADE_WIDTH);
    g.save();g.globalAlpha=winAlpha;
    g.drawImage(off,x,0,LETTER_SIZE,h,x,0,LETTER_SIZE,h);
    g.restore();
    g.font=`${LETTER_SIZE-1}px monospace`;
    for(let r=0;r<rows;r++){
      const yFrac=r*LETTER_SIZE/h;
      const dist2=distToDrop-yFrac;
      let rainAlpha=dist2>=0?Math.exp(-dist2/TRAIL_LENGTH):0;
      rainAlpha*=finalFade;
      if(rainAlpha<0.01) continue;
      const isTip=dist2<0.05&&dist2>=0;
      if(Math.random()<.03) cd.letters[r]=KANA[Math.floor(Math.random()*KANA.length)];
      g.save();
      g.globalAlpha=rainAlpha;
      g.fillStyle=isTip?`rgb(180,255,180)`:`rgb(0,${Math.floor(200*rainAlpha+55)},0)`;
      g.fillText(cd.letters[r]||'ア',x+1,r*LETTER_SIZE+LETTER_SIZE-2);
      g.restore();
    }
  }
  ctx.drawImage(tmp,b.x,b.y);}};

BMW.incinerate={duration:{open:800,close:1000},make(bw,bh){

// ── BROKEN GLASS 🔮 ───────────────────────────────────────────────────────
BMW.glass={duration:{open:700,close:800},make(bw,bh){
  const N=28,LAYERS=5;
  const shards=[];
  for(let i=0;i<N;i++){
    const cx=.1+.8*Math.random(),cy=.1+.8*Math.random();
    const dx=cx-.5,dy=cy-.5,len=Math.sqrt(dx*dx+dy*dy)||.01;
    shards.push({cx,cy,vx:dx/len,vy:dy/len,
      layer:i%LAYERS,rot:(Math.random()-.5)*.4});
  }
  return {shards,N,LAYERS};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{shards}=st;
  const w=b.width,h=b.height;
  ctx.save();
  for(let i=0;i<shards.length;i++){
    const sd=shards[i];
    const layerF=(sd.layer+2)/7;
    const blow=p*layerF*.4;
    const gravity=.1*(sd.layer+1)*p*p;
    const tx=sd.vx*blow,ty=sd.vy*blow+gravity;
    const rot=(i%2===0?1:-1)*.2*p;
    const threshold=Math.pow(p+.1,2);
    if(sd.layer/5>1-threshold+.2*(Math.sin(i*7.3)*.5+.5)) continue;
    const px=(sd.cx+tx)*w,py=(sd.cy+ty)*h;
    const R=Math.min(w,h)*.13;
    ctx.save();
    ctx.translate(b.x+px,b.y+py);
    ctx.rotate(rot+sd.rot*p);
    ctx.beginPath();
    const sides=5+i%3;
    for(let k=0;k<sides;k++){
      const a=k*Math.PI*2/sides+(i*.7);
      k===0?ctx.moveTo(Math.cos(a)*R,Math.sin(a)*R):ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R);
    }
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(off,-px,-py,w,h);
    ctx.restore();
  }
  ctx.restore();}};

// ── PORTAL 🌀 ─────────────────────────────────────────────────────────────

BMW.portal={duration:{open:1200,close:1200},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}

      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}

    uniform float uT;

// Chromatic glow crops window into circle (aura-glow.frag)
BMW.aura_glow={duration:{open:700,close:700},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float sn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP; // opening 0->1
      // scale UV from 1:1 aspect toward window UV
      vec2 uv2=uv;
      vec2 oneToOne=uv-.5;
      if(800.>600.) oneToOne.y*=600./800.;
      else oneToOne.x*=800./600.;
      oneToOne+=.5;
      uv2=mix(oneToOne,uv2,progress);
      // gradient shape: circle->square
      float shape=mix(2.,100.,pow(progress,5.));
      float gradient=pow(abs(uv2.x-.5)*2.,shape)+pow(abs(uv2.y-.5)*2.,shape);
      gradient+=sn(uv+vec2(.3,.7))*.5;
      // glow overlay
      float glowMask=(progress-gradient)/(.3+.1);
      glowMask=1.-clamp(glowMask,0.,1.);
      float fadeOut=min(1.,(1.-progress)*4.);
      glowMask*=fadeOut<0.?0.:sqrt(fadeOut);
      // window color (opening: scale from 1.1->1.0)
      vec2 wuv=(uv-.5)*mix(1.1,1.0,progress*(2.-progress))+.5;
      vec4 win=texture2D(uTex,clamp(wuv,0.,1.));
      if(win.a>0.) win.rgb/=win.a;
      glowMask*=win.a;
      // rainbow glow color
      vec3 glowColor=cos(progress*5.+uv2.xyx+vec3(0.,2.,4.)).xyz;
      glowColor=clamp(glowColor*1.2,0.,1.);
      win.rgb+=glowColor*glowMask;
      // crop to circle/shape
      float softCrop=1.-smoothstep(progress-.5,progress+.5,gradient);
      float hardCrop=1.-smoothstep(progress-.05,progress+.05,gradient);
      float cropMask=mix(softCrop,hardCrop,.5);
      cropMask*=min(1.,progress*2.);
      cropMask=max(cropMask,1.-sqrt(fadeOut));
      win.a*=cropMask;
      gl_FragColor=vec4(win.rgb*win.a,win.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uT=_bmwU(st.gl,st.prog,'uT');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);st.gl.uniform1f(st.uT,t/1000);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── T-REX 🦖 ──────────────────────────────────────────────────────────────
// Scratch/claw marks reveal destruction (trex.frag) — Canvas2D approx
BMW.trex={duration:{open:800,close:1000},make(bw,bh){
  // Generate claw scratch lines
  const claws=[];
  for(let i=0;i<5;i++){
    const cx=.2+.6*Math.random(),cy=.1+.4*Math.random();
    const angle=-Math.PI/4+(Math.random()-.5)*.6;
    const len=.4+.4*Math.random();
    claws.push({cx,cy,angle,len,delay:i/5*.6,
      lines:Array.from({length:3+Math.floor(Math.random()*3)},(_,j)=>({
        ox:(j-(1))*0.02,oy:j*.01,w:1.5+Math.random()*2
      }))});
  }
  return {claws};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const{claws}=st;
  const w=b.width,h=b.height;
  // warp window
  const tmp=new OffscreenCanvas(w,h);
  const g=tmp.getContext('2d');
  const warp=p*.15;
  g.save();
  g.translate(w/2,h/2);
  g.scale(1+warp*.5,1+warp*.5);
  g.translate(-w/2,-h/2);
  g.drawImage(off,0,0,w,h);
  g.restore();
  // clip out scratched regions
  const scratch=new OffscreenCanvas(w,h);
  const sg=scratch.getContext('2d');
  sg.drawImage(tmp,0,0);
  for(const cl of claws){
    const localP=Math.max(0,Math.min(1,(p-cl.delay)/(1-cl.delay)));
    if(localP<=0) continue;
    const px=cl.cx*w,py=cl.cy*h;
    const dx=Math.cos(cl.angle)*cl.len*w,dy=Math.sin(cl.angle)*cl.len*h;
    for(const ln of cl.lines){
      sg.save();
      sg.globalCompositeOperation='destination-out';
      sg.beginPath();
      sg.moveTo(px+ln.ox*w,py+ln.oy*h);
      sg.lineTo(px+dx*localP+ln.ox*w,py+dy*localP+ln.oy*h);
      sg.lineWidth=ln.w*(1+p*3);
      sg.strokeStyle='rgba(0,0,0,1)';
      sg.stroke();
      sg.restore();
      // flash on scratch front
      if(localP<.98){
        const fx=px+dx*localP+ln.ox*w,fy=py+dy*localP+ln.oy*h;
        sg.save();sg.globalCompositeOperation='source-over';
        const gr=scratch.getContext('2d').createRadialGradient(fx,fy,0,fx,fy,8);
        gr.addColorStop(0,'rgba(255,200,100,0.9)');
        gr.addColorStop(1,'rgba(255,100,50,0)');
        sg.fillStyle=gr;sg.beginPath();sg.arc(fx,fy,8,0,Math.PI*2);sg.fill();
        sg.restore();
      }
    }
  }
  // fade remaining shards
  const fadeP=Math.max(0,(p-.4)/.6);
  ctx.save();
  ctx.globalAlpha=Math.sqrt(1-fadeP*fadeP);
  ctx.drawImage(scratch,b.x,b.y);
  ctx.restore();}};

// ── PAINT BRUSH 🖌️ ────────────────────────────────────────────────────────
// Procedural paint-brush reveal (paint-brush.frag approx)
BMW.paint_brush={duration:{open:600,close:600},make(bw,bh){
  const st=_bmwGL(bw,bh,`    float h12(vec2 p){vec3 p3=fract(vec3(p.xyx)*.1031);p3+=dot(p3,p3.yzx+33.33);return fract((p3.x+p3.y)*p3.z);}
    float vn(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
      return mix(mix(h12(i),h12(i+vec2(1,0)),u.x),mix(h12(i+vec2(0,1)),h12(i+vec2(1,1)),u.x),u.y);}
    float fbm(vec2 p){mat2 m=mat2(1.6,1.2,-1.2,1.6);
      float f=.5*vn(p);p=m*p;f+=.25*vn(p);p=m*p;f+=.125*vn(p);p=m*p;f+=.0625*vn(p);return f;}
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      // brush-like reveal: angled stripes with fbm variation
      float brush=fbm(uv*vec2(3.,8.)+vec2(.7,.3));
      brush=brush*.7+uv.x*.3; // slight horizontal sweep
      float mask=step(brush,uP);
      vec4 col=texture2D(uTex,uv);
      if(col.a>0.) col.rgb/=col.a;
      // paint-style shadow on edge
      float shadow=0.;
      for(float i=1.;i<=5.;i++){
        vec2 sUV=uv-vec2(0.,i*.006);
        float sb=fbm(sUV*vec2(3.,8.)+vec2(.7,.3));
        sb=sb*.7+sUV.x*.3;
        if(step(sb,uP)>0.&&mask==0.) shadow=max(shadow,(1.-i/5.)*.3);}
      if(mask==0.){col=vec4(0.,0.,0.,shadow);}
      else{col.a*=mask;}
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── MUSHROOM 🍄 ───────────────────────────────────────────────────────────
// 8-bit scale + sparks + rays + 5-point stars (mushroom.frag)
BMW.mushroom={duration:{open:900,close:900},make(bw,bh){
  return {seed:[Math.random(),Math.random()]};
},render(ctx,off,b,p,t,st){
  if(!st)return;
  const w=b.width,h=b.height;
  const prog=p;
  // 8-bit scale steps
  const steps=[.25,.5,.25,.5,.25,.5,1.,.25,.5,1.];
  const stepIdx=Math.min(9,Math.floor(prog*10));
  const scale8=steps[stepIdx];
  // smooth scale
  const scaleS=prog<.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;
  const scale=scaleS*.8+scale8*.2;
  // draw scaled window
  const sw=w*scale,sh=h*scale;
  ctx.save();
  ctx.drawImage(off,b.x+(w-sw)/2,b.y+(h-sh)/2,sw,sh);
  ctx.restore();
  // draw sparks (4-pointed stars) flying up
  const N=8;
  const colors=['#ff9','#f90','#ff0','#fff'];
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<N;i++){
    const f=i/N;
    const sx=(Math.sin(st.seed[0]*13.3*f+t*.001)*.6+.5);
    const yStart=1+(.5+f*.5);
    const sy=Math.max(0,Math.min(1,yStart-prog*(2+f)));
    if(sy<=0||sy>=1) continue;
    const fade=sy*(1-sy)*4;
    const px=b.x+sx*w,py=b.y+sy*h;
    const r=Math.max(1,(3+4*f)*fade*2);
    ctx.fillStyle=colors[i%colors.length];
    ctx.globalAlpha=fade*.8;
    ctx.beginPath();
    // 4-pointed star
    for(let k=0;k<8;k++){
      const a=k*Math.PI/4;
      const rr=(k%2===0)?r:r*.4;
      k===0?ctx.moveTo(px+Math.cos(a)*rr,py+Math.sin(a)*rr)
           :ctx.lineTo(px+Math.cos(a)*rr,py+Math.sin(a)*rr);
    }
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
  // draw rays (vertical shimmer)
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const rayAlpha=Math.sin(prog*Math.PI)*.3;
  if(rayAlpha>0.01){
    for(let r=0;r<6;r++){
      const rx=b.x+w*((r+.5)/6);
      const gr=ctx.createLinearGradient(rx,b.y,rx,b.y+h);
      gr.addColorStop(0,'rgba(255,200,100,0)');
      gr.addColorStop(.5,`rgba(255,200,100,${rayAlpha})`);
      gr.addColorStop(1,'rgba(255,200,100,0)');
      ctx.fillStyle=gr;
      ctx.fillRect(rx-3,b.y,6,h);
    }
  }
  ctx.restore();}};

// ── TEAM ROCKET 🚀 ────────────────────────────────────────────────────────
// Window warps/shrinks toward sparkle point (team-rocket.frag)
BMW.team_rocket={duration:{open:700,close:700},make(bw,bh){
  const st=_bmwGL(bw,bh,`    uniform float uT;
    void main(){
      vec2 uv=vec2(vUV.x,1.-vUV.y);
      float progress=uP;
      float SPLIT=.6;
      float scalep=clamp(progress/(SPLIT+.1),0.,1.);
      scalep=scalep*(2.-scalep);
      float sparkp=clamp((progress-(SPLIT-.1))/(1.-(SPLIT-.1)),0.,1.);
      // target position (upper-right sparkle)
      vec2 target=vec2(.3,-.3);
      vec2 scaleOffset=target*.5*scalep;
      vec2 uv2=uv*2.-1.;
      uv2-=scaleOffset/vec2(1.,.8)*scalep;
      uv2/=max(.001,1.-scalep);
      uv2=uv2*.5+.5;
      vec4 col=texture2D(uTex,clamp(uv2,0.,1.));
      if(col.a>0.) col.rgb/=col.a;
      // sparkle flash
      float sparkFade=-1.*pow((sparkp-.5)/.5,2.)+1.;
      float sparkR=length(uv-vec2(.5+.3*.5,.5-.3*.5));
      float spark=sparkFade*max(0.,1.-sparkR*8.);
      col.rgb+=vec3(spark);col.a=max(col.a,spark);
      col=clamp(col,0.,1.);
      gl_FragColor=vec4(col.rgb*col.a,col.a);}
  `);
  if(!st)return null;
  st.uP=_bmwU(st.gl,st.prog,'uP');st.uTex=_bmwU(st.gl,st.prog,'uTex');
  return st;
},render(ctx,off,b,p,t,st){
  if(!st)return;
  st.tex=_bmwTex(st.gl,off,st.tex);
  st.gl.uniform1i(st.uTex,0);st.gl.uniform1f(st.uP,p);
  st.gl.drawArrays(st.gl.TRIANGLE_STRIP,0,4);
  ctx.drawImage(st.oc,b.x,b.y);}};

// ── HitTest debug overlay ────────────────────────────────────
let _debugHitTest = false;

function rectContains(rect, x, y) {
  return x >= rect.x && x < rect.x + rect.width && y >= rect.y && y < rect.y + rect.height;
}
function rectIntersects(a, b) {
  return !(a.x + a.width <= b.x || b.x + b.width <= a.x || a.y + a.height <= b.y || b.y + b.height <= a.y);
}
function rectUnion(a, b) {
  const x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
  return { x, y, width: Math.max(a.x + a.width, b.x + b.width) - x, height: Math.max(a.y + a.height, b.y + b.height) - y };
}
function rectInflate(r, dx, dy) {
  const dxy = dy !== undefined ? dy : dx;
  return { x: r.x - dx, y: r.y - dxy, width: r.width + dx * 2, height: r.height + dxy * 2 };
}

// ---- THEMES ----
function fontToCSS(f) {
  return `${f.style||'normal'} ${f.weight||'normal'} ${f.size}px ${f.family}`;
}
function drawGradient(ctx, x, y, w, h, bg, vertical=true) {
  if (Array.isArray(bg)) {
    const grad = vertical ? ctx.createLinearGradient(x, y, x, y+h) : ctx.createLinearGradient(x, y, x+w, y);
    bg.forEach(s => grad.addColorStop(s.offset, colorToCSS(s.color)));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = colorToCSS(bg);
  }
}
function applyShadow(ctx, s) {
  if (s) { ctx.shadowOffsetX = s.x; ctx.shadowOffsetY = s.y; ctx.shadowBlur = s.blur; ctx.shadowColor = colorToCSS(s.color); }
}
function clearShadow(ctx) {
  ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
}
// r can be: number | {tl,tr,br,bl} | [tl,tr,br,bl]
function _resolveRadii(r, w, h) {
  const max = Math.max(0, Math.min(w, h) / 2);
  const clamp = v => Math.min(Math.max(v||0, 0), max);
  if (typeof r === 'number') { const c=clamp(r); return [c,c,c,c]; }
  if (Array.isArray(r)) return r.map(clamp);
  return [clamp(r.tl), clamp(r.tr), clamp(r.br), clamp(r.bl)];
}
// Test if point (px,py) is inside a rounded rect — matches drawRoundRect exactly
function pointInRoundRect(px, py, x, y, w, h, r) {
  if (px < x || px > x+w || py < y || py > y+h) return false;
  if (!r) return true;
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  // Check each corner: if point is in the corner bounding square, test circle
  // Top-left
  if (px < x+tl && py < y+tl && (px-x-tl)**2+(py-y-tl)**2 > tl*tl) return false;
  // Top-right
  if (px > x+w-tr && py < y+tr && (px-x-w+tr)**2+(py-y-tr)**2 > tr*tr) return false;
  // Bottom-right
  if (px > x+w-br && py > y+h-br && (px-x-w+br)**2+(py-y-h+br)**2 > br*br) return false;
  // Bottom-left
  if (px < x+bl && py > y+h-bl && (px-x-bl)**2+(py-y-h+bl)**2 > bl*bl) return false;
  return true;
}

function drawRoundRect(ctx, x, y, w, h, r) {
  if (w <= 0 || h <= 0) { ctx.beginPath(); return; }
  const [tl, tr, br, bl] = _resolveRadii(r, w, h);
  ctx.beginPath();
  ctx.moveTo(x+tl, y);
  ctx.lineTo(x+w-tr, y);    ctx.arcTo(x+w, y,   x+w, y+tr,   tr);
  ctx.lineTo(x+w, y+h-br);  ctx.arcTo(x+w, y+h, x+w-br, y+h, br);
  ctx.lineTo(x+bl, y+h);    ctx.arcTo(x,   y+h, x,   y+h-bl, bl);
  ctx.lineTo(x, y+tl);      ctx.arcTo(x,   y,   x+tl, y,     tl);
  ctx.closePath();
}

class Label extends BaseWidget {
  /*
   * Properties:
   *   text          string (supports \n)
   *   align         'left'|'center'|'right'|'justify'
   *   verticalAlign 'top'|'middle'|'bottom'
   *   wordWrap      bool  (auto-wrap at bounds.width)
   *   lineHeight    number (px, 0 = auto from font size)
   *   color         CSS string | null (uses theme)
   *   background    color-value | gradient-array | null
   *   borderRadius  number | {tl,tr,br,bl} | [tl,tr,br,bl]
   *   padding       {x,y} in px  (default {x:0,y:0})
   *   font          {family,size} | null (uses theme)
   *   autoSize      false | 'width' | 'height' | 'both'
   *                 Ajuste bounds après chaque rendu pour coller au contenu.
   *                 En mode 'width', wordWrap est ignoré (le texte fixe la largeur).
   *                 En mode 'height', la largeur est fixe (wordWrap peut s'appliquer).
   */
  constructor(text, bounds) {
    super(undefined, bounds);
    this.text          = text;
    this.align         = 'left';
    this.verticalAlign = 'middle';
    this.wordWrap      = false;
    this.lineHeight    = 0;
    this.color         = null;
    this.background    = null;
    this.borderRadius  = 0;
    this.padding       = { x:0, y:0 };
    this.font          = null;
    this.autoSize      = false; // false | 'width' | 'height' | 'both'
  }

  // ── Mesure la taille idéale sans modifier les bounds ─────────────────────
  measureSize(ctx) {
    const t   = getTheme().label;
    const fnt = this.font ?? t.font;
    ctx.font  = fontToCSS(fnt);
    const fsize = typeof fnt.size === 'number' ? fnt.size : parseInt(fnt.size);
    const lh    = this.lineHeight > 0 ? this.lineHeight : fsize * 1.4;
    const px = this.padding.x, py = this.padding.y;

    // Pour mesurer la largeur on ne wrap pas (on veut la largeur naturelle)
    const raw   = String(this.text ?? '').split('\n');
    const lines = (this.wordWrap && this.autoSize !== 'width' && this.autoSize !== 'both')
                  ? this._getLines(ctx, this.bounds)
                  : raw;

    const maxLineW = lines.reduce((m, l) => Math.max(m, ctx.measureText(l).width), 0);
    return {
      width:  Math.ceil(maxLineW) + px * 2,
      height: Math.ceil(lines.length * lh) + py * 2,
      lines,
      lh,
    };
  }

  // Split text into lines, with optional word-wrap
  _getLines(ctx, b) {
    const raw = String(this.text ?? '').split('\n');
    if (!this.wordWrap) return raw;
    const maxW = b.width - this.padding.x * 2;
    const lines = [];
    for (const para of raw) {
      const words = para.split(' ');
      let cur = '';
      for (const w of words) {
        const test = cur ? cur + ' ' + w : w;
        if (ctx.measureText(test).width <= maxW) { cur = test; }
        else { if (cur) lines.push(cur); cur = w; }
      }
      lines.push(cur);
    }
    return lines;
  }

  render(ctx) {
    const t  = getTheme().label;
    const px = this.padding.x, py = this.padding.y;
    ctx.save();

    // Font (doit être posé avant measureSize / _getLines)
    const fnt = this.font ?? t.font;
    ctx.font  = fontToCSS(fnt);
    const fsize = typeof fnt.size === 'number' ? fnt.size : parseInt(fnt.size);
    const lh    = this.lineHeight > 0 ? this.lineHeight : fsize * 1.4;

    // ── AutoSize : ajuste bounds avant le rendu ───────────────────────────
    if (this.autoSize) {
      const m = this.measureSize(ctx);
      let changed = false;
      if ((this.autoSize === 'width' || this.autoSize === 'both') && this.bounds.width !== m.width) {
        this.bounds.width = m.width; changed = true;
      }
      if ((this.autoSize === 'height' || this.autoSize === 'both') && this.bounds.height !== m.height) {
        this.bounds.height = m.height; changed = true;
      }
      if (changed) this.markDirty();
    }

    const b = this.bounds;

    // Background
    if (this.background !== null) {
      drawGradient(ctx, b.x, b.y, b.width, b.height, this.background);
      drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius);
      ctx.fill();
    }

    // Clip to bounds
    ctx.beginPath(); ctx.rect(b.x, b.y, b.width, b.height); ctx.clip();

    const lines  = this._getLines(ctx, b);
    const totalH = lines.length * lh;

    // Color
    const textColor = this.color != null
      ? (typeof this.color === 'string' ? this.color : colorToCSS(this.color))
      : colorToCSS(this.enabled ? t.text : t.disabledText);

    // Vertical origin
    let originY;
    if      (this.verticalAlign === 'top')    originY = b.y + py + lh / 2;
    else if (this.verticalAlign === 'bottom') originY = b.y + b.height - py - totalH + lh / 2;
    else                                      originY = b.y + (b.height - totalH) / 2 + lh / 2;

    ctx.textBaseline = 'middle';

    lines.forEach((line, i) => {
      const lineY  = originY + i * lh;
      const innerW = b.width - px * 2;

      if (this.align === 'justify' && i < lines.length - 1 && line.trim()) {
        const words = line.split(' ');
        if (words.length > 1) {
          const totalWordW = words.reduce((acc, w) => acc + ctx.measureText(w).width, 0);
          const gap = (innerW - totalWordW) / (words.length - 1);
          let cx = b.x + px;
          ctx.fillStyle = textColor;
          words.forEach(w => { ctx.fillText(w, cx, lineY); cx += ctx.measureText(w).width + gap; });
          return;
        }
      }

      let tx;
      if      (this.align === 'center') { ctx.textAlign = 'center'; tx = b.x + b.width / 2; }
      else if (this.align === 'right')  { ctx.textAlign = 'right';  tx = b.x + b.width - px; }
      else                              { ctx.textAlign = 'left';   tx = b.x + px; }

      ctx.fillStyle = textColor;
      ctx.fillText(line, tx, lineY);
    });

    ctx.restore();
  }
}

  render(ctx) {
    const t=getTheme().listBox, b=this.bounds, sb=t.scrollBar, r=t.borderRadius, itemH=t.itemHeight;
    const totalH=this.items.length*itemH, hasScroll=totalH>b.height, cw=hasScroll?b.width-sb.width:b.width;
    ctx.save();
    drawGradient(ctx, b.x, b.y, b.width, b.height, this.background ?? t.background);
    drawRoundRect(ctx,b.x,b.y,b.width,b.height,r); ctx.fill();
    ctx.beginPath(); ctx.rect(b.x,b.y,cw,b.height); ctx.clip();
    ctx.font=fontToCSS(t.font);
    const first=Math.floor(this._scrollY/itemH), last=Math.min(this.items.length-1,first+Math.ceil(b.height/itemH)+1);
    for(let i=first;i<=last;i++){
      const iy=b.y+i*itemH-this._scrollY, isSel=i===this._selectedIndex, isHov=i===this._hoverIndex;
      if(isSel){ctx.fillStyle=colorToCSS(t.item.selected);ctx.fillRect(b.x,iy,cw,itemH);}
      else if(isHov){ctx.fillStyle=colorToCSS(t.item.hover);ctx.fillRect(b.x,iy,cw,itemH);}
      ctx.fillStyle=colorToCSS(isSel?t.itemText.selected:t.itemText.normal); ctx.textBaseline='middle';
      ctx.fillText(this.items[i],b.x+8,iy+itemH/2);
    }
    ctx.restore();
    ctx.save();
    ctx.strokeStyle=colorToCSS(t.border.color); ctx.lineWidth=t.border.width;
    drawRoundRect(ctx,b.x+.5,b.y+.5,b.width-1,b.height-1,r); ctx.stroke();
    if(hasScroll){
      const sbX=b.x+b.width-sb.width-1, scrollRatio=b.height/totalH, thumbH=Math.max(20,scrollRatio*b.height), thumbY=b.y+(this._scrollY/(totalH-b.height))*(b.height-thumbH);
      ctx.fillStyle=colorToCSS(sb.track); ctx.fillRect(sbX,b.y+1,sb.width,b.height-2);
      const thumbCol=this._scrollbarDragging?sb.thumbActive:(this._scrollbarHovered?sb.thumbHover:sb.thumb);
      drawGradient(ctx,sbX+2,thumbY+2,sb.width-4,thumbH-4,thumbCol); drawRoundRect(ctx,sbX+2,thumbY+2,sb.width-4,thumbH-4,sb.borderRadius); ctx.fill();
    }
    ctx.restore();
  }
}

class Separator extends BaseWidget {

class WinButton extends BaseWidget {
  constructor(role, bounds) {
    super(undefined, bounds);
    this.role = role; this.hovered = false; this.pressed = false;
    this.on('mouseenter', () => { this.hovered=true; if(this.parent)this.parent.markDirty(); });
    this.on('mouseleave', () => { this.hovered=false; this.pressed=false; if(this.parent)this.parent.markDirty(); });
    this.on('mousedown',  () => { this.pressed=true; if(this.parent)this.parent.markDirty(); });
    this.on('mouseup',   () => { this.pressed=false; if(this.parent)this.parent.markDirty(); });
  }
  render() {}
}

// ════════════════════════════════════════════════════════════════════
// WindowContent — scrollbars H+V, show on hover
// ════════════════════════════════════════════════════════════════════
class WindowContent extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._scrollX = 0; this._scrollY = 0;
    this._SB = 12; this._hovered = false; this._sbDrag = null;
  }

  hitTest(x, y) {
    if (!this.visible) return false;
    if (this._anim && (this._anim.type==='close'||this._anim.type==='minimize')) return false;
    return rectContains(this.getAbsoluteBounds(), x, y);
  }

  _contentSize() {
    let maxX=0, maxY=0;
    for (const c of this.children) {
      if (!c.visible) continue;
      maxX = Math.max(maxX, c.bounds.x+c.bounds.width);
      maxY = Math.max(maxY, c.bounds.y+c.bounds.height);
    }
    return { w:maxX+10, h:maxY+10 };
  }

  _bars(b) {
    const cs=this._contentSize(), SB=this._SB;
    const needV=cs.h>b.height;
    const needH=cs.w>b.width-(needV?SB:0);
    return { needH, needV, SB,
      viewW:b.width-(needV?SB:0), viewH:b.height-(needH?SB:0), cw:cs.w, ch:cs.h };
  }

  _clamp(b) {
    const{viewW,viewH,cw,ch}=this._bars(b);
    this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX));
    this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY));
  }

  _thumbInfo(dir,viewSz,contentSz,scroll) {
    const len=Math.max(24,viewSz*Math.min(1,viewSz/contentSz));
    const maxScroll=Math.max(1,contentSz-viewSz);
    return { off:(scroll/maxScroll)*(viewSz-len), len, maxScroll };
  }

  _onScroll(ev) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,viewW,viewH,cw,ch}=this._bars(b);
    const dy=ev.deltaY||0, dx=ev.deltaX||0;
    if (dx!==0) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dx));
    } else if (ev.shiftKey||(!needV&&needH)) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    } else {
      if (needV)      this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY+dy));
      else if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    }
    this.markDirty();
  }

  _hitSB(ax,ay) {
    const b=this.bounds, ab=this.getAbsoluteBounds();
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    if (needV) {
      const tx=ab.x+viewW, ty=ab.y;
      if (ax>=tx&&ax<=tx+SB&&ay>=ty&&ay<=ty+viewH) {
        const ti=this._thumbInfo('v',viewH,ch,this._scrollY);
        return{dir:'v',trackStart:ty,trackLen:viewH,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    if (needH) {
      const tx=ab.x, ty=ab.y+viewH;
      if (ax>=tx&&ax<=tx+viewW&&ay>=ty&&ay<=ty+SB) {
        const ti=this._thumbInfo('h',viewW,cw,this._scrollX);
        return{dir:'h',trackStart:tx,trackLen:viewW,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    return null;
  }

  setHovered(v)        { if (this._hovered!==v){this._hovered=v;this.markDirty();} }
  isOverScrollbar(ax,ay){ return !!this._hitSB(ax,ay); }

  onMouseDownAbs(ax,ay) {
    const sb=this._hitSB(ax,ay); if (!sb) return false;
    this._clamp(this.bounds);
    const mousePos=sb.dir==='v'?ay:ax, curScroll=sb.dir==='v'?this._scrollY:this._scrollX;
    const inThumb=mousePos>=sb.trackStart+sb.thumbOff&&mousePos<=sb.trackStart+sb.thumbOff+sb.thumbLen;
    if (inThumb) {
      this._sbDrag={dir:sb.dir,startScroll:curScroll,startMouse:mousePos,
        trackLen:sb.trackLen,thumbLen:sb.thumbLen,maxScroll:sb.maxScroll};
    } else {
      const ratio=(mousePos-sb.trackStart-sb.thumbLen/2)/Math.max(1,sb.trackLen-sb.thumbLen);
      const ns=Math.max(0,Math.min(sb.maxScroll,ratio*sb.maxScroll));
      if (sb.dir==='v') this._scrollY=ns; else this._scrollX=ns;
      this.markDirty();
    }
    return true;
  }

  onMouseMoveAbs(ax,ay) {
    if (!this._sbDrag) return false;
    const d=this._sbDrag, pos=d.dir==='v'?ay:ax;
    const range=d.trackLen-d.thumbLen;
    const ns=d.startScroll+(range>0?(pos-d.startMouse)*d.maxScroll/range:0);
    if (d.dir==='v') this._scrollY=Math.max(0,Math.min(d.maxScroll,ns));
    else             this._scrollX=Math.max(0,Math.min(d.maxScroll,ns));
    this.markDirty(); return true;
  }

  onMouseUpAbs() { const had=!!this._sbDrag; this._sbDrag=null; return had; }

  dispatchEvent(ev) {
    // Handle scroll/wheel events specially - don't depend on hitTest
    if (ev.type === 'scroll' || ev.type === 'wheel') {
      // For scroll/wheel, distribute to all visible children at the event position
      const b = this.bounds;
      const lx = ev.x - b.x, ly = ev.y - b.y;
      const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
      
      for (const c of sorted) {
        if (!c.visible) continue;
        // Check if point is in child bounds
        const cb = c.bounds;
        if (lx >= cb.x && lx <= cb.x + cb.width && ly >= cb.y && ly <= cb.y + cb.height) {
          const re = { ...ev, x: lx, y: ly };
          c.dispatchEvent(re);
          // Don't break for scroll events - let them propagate
        }
      }
      // Also handle scroll at WindowContent level (e.g. for window scrollbars)
      this._onScroll(ev);
      return true;
    }
    
    // Default behavior for other events
    const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
    for (const c of sorted) {
      if (c.visible && c.hitTest(ev.x, ev.y)) {
        const re = { ...ev, x: ev.x - this.bounds.x, y: ev.y - this.bounds.y };
        c.dispatchEvent(re);
        if (ev.stopped) return true;
      }
    }
    this.emit(ev);
    return !ev.stopped;
  }

  render(ctx) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    const sx=this._scrollX, sy=this._scrollY;
    const showSB=this._hovered||!!this._sbDrag;
    const sorted=[...this.children].sort((a,b2)=>a.zIndex-b2.zIndex);

    // Children rendered in scrolled content space
    // ctx is in WINDOW space (absolute). Children bounds are in CONTENT space (0-based).
    // WindowContent.render is called with ctx translated to window origin (by GUIWindow.render).
    // So we need to position children at (b.x - sx + child.bounds.x, b.y - sy + child.bounds.y).
    ctx.save();
    ctx.beginPath(); ctx.rect(b.x,b.y,viewW,viewH); ctx.clip();
    ctx.translate(b.x-sx, b.y-sy);

    for (const child of sorted) {
      if (!child.visible) continue;
      const _noDS=child instanceof RadioButton||child instanceof Slider||child instanceof ListBox||child instanceof ProgressBar;
      const effOp=(!child.enabled&&_noDS?0.38:1)*(child.opacity??1);
      const needC=effOp<0.9999||child.tint!=null||!!child.rotation;
      if (needC) {
        const bw=Math.ceil(child.bounds.width),bh=Math.ceil(child.bounds.height);
        if (bw>0&&bh>0) {
          const off=new OffscreenCanvas(bw,bh); const octx=off.getContext('2d');
          octx.translate(-child.bounds.x,-child.bounds.y); child.render(octx);
          if (child.tint) {
            octx.setTransform(1,0,0,1,0,0); octx.globalCompositeOperation='source-atop';
            octx.fillStyle=`rgba(${child.tint.r},${child.tint.g},${child.tint.b},${child.tint.a??0.3})`;
            octx.fillRect(0,0,bw,bh);
          }
          ctx.save(); ctx.globalAlpha*=effOp;
          if (child.rotation) {
            const cx=child.bounds.x+bw/2,cy=child.bounds.y+bh/2;
            ctx.translate(cx,cy); ctx.rotate(child.rotation); ctx.drawImage(off,-bw/2,-bh/2);
          } else ctx.drawImage(off,child.bounds.x,child.bounds.y);
          ctx.restore();
        }
      } else child.render(ctx);
    }
    ctx.restore();

    if (showSB) {
      if (needV) this._drawBar(ctx,b,'v',viewW,viewH,sy,ch,SB);
      if (needH) this._drawBar(ctx,b,'h',viewW,viewH,sx,cw,SB);
      //if (needV&&needH){ctx.fillStyle='rgba(200,200,200,0.5)';ctx.fillRect(b.x+viewW,b.y+viewH,SB,SB);}
    }

    // Unclipped dropdowns
    for (const child of sorted) {
      if (!child.visible||!(child instanceof DropDown)||!child._open) continue;
      ctx.save(); ctx.translate(b.x-sx,b.y-sy); child._renderList(ctx); ctx.restore();
    }


    if (_debugHitTest) {
      ctx.save(); ctx.translate(b.x-sx,b.y-sy);
      for (const child of sorted) {
        if (!child.visible) continue;
        if (child.rotation) {
          const bx=child.bounds.x,by2=child.bounds.y,bw2=child.bounds.width,bh2=child.bounds.height;
          const cx2=bx+bw2/2,cy2=by2+bh2/2,cos=Math.cos(child.rotation),sin=Math.sin(child.rotation);
          const corners=[{x:bx,y:by2},{x:bx+bw2,y:by2},{x:bx+bw2,y:by2+bh2},{x:bx,y:by2+bh2}]
            .map(p=>({x:cx2+(p.x-cx2)*cos-(p.y-cy2)*sin,y:cy2+(p.x-cx2)*sin+(p.y-cy2)*cos}));
          ctx.beginPath();ctx.moveTo(corners[0].x,corners[0].y);
          for(let i=1;i<corners.length;i++)ctx.lineTo(corners[i].x,corners[i].y);
          ctx.closePath();ctx.strokeStyle='rgba(0,255,0,0.9)';ctx.lineWidth=1.5;ctx.setLineDash([4,2]);ctx.stroke();ctx.setLineDash([]);
        } else {
          const{x:bx,y:by2,width:bw2,height:bh2}=child.bounds;
          ctx.strokeStyle='rgba(0,180,255,0.8)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
          ctx.strokeRect(bx+0.5,by2+0.5,bw2-1,bh2-1);ctx.setLineDash([]);
        }
      }
      ctx.restore();
    }
  }

  _drawBar(ctx,b,dir,viewW,viewH,scroll,contentSz,SB) {
    const t=getTheme().window.scrollBar;
    const isV=dir==='v';
    const trackX=isV?b.x+viewW:b.x, trackY=isV?b.y:b.y+viewH;
    const trackW=isV?SB:viewW, trackH=isV?viewH:SB;
    const viewSz=isV?viewH:viewW;
    const{off,len}=this._thumbInfo(dir,viewSz,contentSz,scroll);
    const isDrag=this._sbDrag?.dir===dir;
    ctx.fillStyle='rgba(220,220,220,0.6)'; ctx.fillRect(trackX,trackY,trackW,trackH);
    ctx.fillStyle=isDrag?'rgba(70,70,70,0.7)':'rgba(100,100,100,0.45)';
    const tr=SB/2-1; ctx.beginPath();
        const thumbColor = isDrag ? t.thumbActive : (this._hoveredBar===dir ? t.thumbHover : t.thumb);

    if (isV) {
      drawGradient(ctx, trackX+2, trackY+off, SB-4, len, thumbColor, true);
      ctx.roundRect(trackX+2,trackY+off,SB-4,len,tr);
    }
    else {
      drawGradient(ctx, trackX+off, trackY+2, len, SB-4, thumbColor, false);
      ctx.roundRect(trackX+off,trackY+2,len,SB-4,tr);
    }
    ctx.fill();
  }
}

class GUIWindow extends BaseWidget {
  constructor(title, bounds) {
    super(undefined, bounds);
    this.title = title;
    this.resizable = true; this.closable = true;
    this.minimizable = true; this.maximizable = true; this.modal = false;
    this._active = false; this._state = 'normal';
    this._prevBounds = null;
    // Animation
    this._anim = null;
    this._animScale = 1;
    this._animOpacity = 1;
    this._dragging = false; this._dragOffset = { x:0, y:0 };
    this._resizing = false; this._resizeEdge = ''; this._resizeStart = null;
    this._titleBarHover = '';

    const t = getTheme().window;
    const th = t.titleBar.height;
    const btnStyle = t.buttonStyle;
    const btnSize = btnStyle === 'circle' ? 14 : 16;
    const btnY = (th - btnSize) / 2;

    // Content area: position relative to window origin
    this._contentArea = new WindowContent({
      x: t.border.width, y: th,
      width:  bounds.width  - t.border.width * 2,
      height: bounds.height - th - t.border.width
    });
    this._contentArea.parent = this;

    // Title-bar buttons (coords relative to window origin)
    if (btnStyle === 'circle') {
      this._closeBtn = new WinButton('close',    { x:10,    y:btnY, width:btnSize, height:btnSize });
      this._minBtn   = new WinButton('minimize', { x:28,    y:btnY, width:btnSize, height:btnSize });
      this._maxBtn   = new WinButton('maximize', { x:46,    y:btnY, width:btnSize, height:btnSize });
    } else {
      const bx = bounds.width - 3*(btnSize+2) - 4;
      this._closeBtn = new WinButton('close',    { x:bx + 2*(btnSize+2), y:btnY, width:btnSize, height:btnSize });
      this._minBtn   = new WinButton('minimize', { x:bx,                 y:btnY, width:btnSize, height:btnSize });
      this._maxBtn   = new WinButton('maximize', { x:bx + btnSize+2,     y:btnY, width:btnSize, height:btnSize });
    }
    this._closeBtn.parent = this._minBtn.parent = this._maxBtn.parent = this;

    this._closeBtn.on('click', () => this._onClose());
    this._minBtn.on('click',   () => this._onMin());
    this._maxBtn.on('click',   () => this._onMax());

    this.on('dblclick', e => {
      const ab = this.getAbsoluteBounds();
      if (e.y >= ab.y && e.y < ab.y + getTheme().window.titleBar.height && this.maximizable)
        this._onMax();
    });
  }

  get active()  { return this._active; }
  set active(v) { this._active = v; this.markDirty(); }
  get state()       { return this._state; }
  get contentArea() { return this._contentArea; }

  // Returns true if absolute point (ax,ay) hits a title-bar button
  _hitBtn(btn, ax, ay) {
    const ab = this.getAbsoluteBounds();
    return rectContains({
      x: ab.x + btn.bounds.x, y: ab.y + btn.bounds.y,
      width: btn.bounds.width, height: btn.bounds.height
    }, ax, ay);
  }

  // Returns resize edge string ('n','s','e','w','ne'…) or '' if not on an edge
  _getEdge(ax, ay) {
    if (!this.resizable || this._state !== 'normal') return '';
    const t = getTheme().window, rh = t.resizeHandle;
    const ab = this.getAbsoluteBounds(), { x, y, width:w, height:h } = ab;
    let edge = '';
    if      (ay < y + rh)     edge += 'n';
    else if (ay > y + h - rh) edge += 's';
    if      (ax < x + rh)     edge += 'w';
    else if (ax > x + w - rh) edge += 'e';
    const onEdge = ax < x+rh || ax > x+w-rh || ay < y+rh || ay > y+h-rh;
    return onEdge ? edge : '';
  }

  // Called by WindowManager directly (not via dispatchEvent) to start drag/resize
  startDrag(ax, ay, button) {
    if (button !== 0) return;
    const t = getTheme().window, th = t.titleBar.height;
    const ab = this.getAbsoluteBounds();

    // Title bar drag
    if (ay >= ab.y && ay < ab.y + th && this._state !== 'maximized') {
      this._dragging = true;
      this._dragOffset = { x: ax - this.bounds.x, y: ay - this.bounds.y };
      return;
    }
    // Edge resize
    const edge = this._getEdge(ax, ay);
    if (edge) {
      this._resizing = true;
      this._resizeEdge = edge;
      this._resizeStart = { mouse: { x:ax, y:ay }, bounds: { ...this.bounds } };
    }
  }

  // Called by WindowManager on every mousemove (even outside window)
  continueDrag(ax, ay) {
    if (this._dragging) {
      const nx = ax - this._dragOffset.x;
      const ny = Math.max(0, ay - this._dragOffset.y);
      this.bounds.x = nx; this.bounds.y = ny;
      this._contentArea.markDirty();
      return;
    }
    if (this._resizing && this._resizeStart) {
      const dx = ax - this._resizeStart.mouse.x;
      const dy = ay - this._resizeStart.mouse.y;
      const orig = this._resizeStart.bounds;
      const minW = 180, minH = 80;
      let nx = orig.x, ny = orig.y, nw = orig.width, nh = orig.height;
      if (this._resizeEdge.includes('e')) nw = Math.max(minW, orig.width  + dx);
      if (this._resizeEdge.includes('s')) nh = Math.max(minH, orig.height + dy);
      if (this._resizeEdge.includes('w')) { nw = Math.max(minW, orig.width  - dx); nx = orig.x + orig.width  - nw; }
      if (this._resizeEdge.includes('n')) { nh = Math.max(minH, orig.height - dy); ny = orig.y + orig.height - nh; }
      this.bounds.x = nx; this.bounds.y = ny;
      this.bounds.width = nw; this.bounds.height = nh;
      this._updateLayout();
    }
  }

  // Called by WindowManager on mouseup
  endDrag() {
    this._dragging = false;
    this._resizing = false;
    this._resizeStart = null;
  }

  get isDragging() { return this._dragging || this._resizing; }

  // Returns the CSS cursor to show for this absolute position
  getCursorAt(ax, ay) {
    if (this._dragging) return 'grabbing';
    if (this._resizing) {
      const m = { n:'n-resize', s:'s-resize', e:'e-resize', w:'w-resize',
                  ne:'ne-resize', nw:'nw-resize', se:'se-resize', sw:'sw-resize' };
      return m[this._resizeEdge] || 'default';
    }
    const edge = this._getEdge(ax, ay);
    if (edge) {
      const m = { n:'n-resize', s:'s-resize', e:'e-resize', w:'w-resize',
                  ne:'ne-resize', nw:'nw-resize', se:'se-resize', sw:'sw-resize' };
      return m[edge] || 'default';
    }
    return 'default';
  }

  update(dt) {
    super.update(dt);
    this._contentArea.update(dt);
    if (!this._anim) return;
    const a = this._anim;
    a.t = Math.min(1, a.t + dt / a.duration);
    // Choose easing per style
    let p;
    if (a.style === 'genie')     p = _easeInOut(a.t);
    else if (a.style === 'zoom') p = _easeSpring(a.t);
    else                         p = _easeOutCubic(a.t);
    a.p = p; // store for render
    if (a.type === 'maximize' || a.type === 'unmaximize') {
      const lerp = (f,t2) => f+(t2-f)*p;
      this.setBounds({ x:lerp(a.from.x,a.to.x), y:lerp(a.from.y,a.to.y),
        width:lerp(a.from.width,a.to.width), height:lerp(a.from.height,a.to.height) });
      this._updateLayout();
    } else if (a.style && a.style.startsWith('bmw:')) {
      // BMW effect: progress goes 0→1 for open, stored in a.p
      a.p = a.t; // already in 0→1 range
    } else {
      // Fallback zoom: scale/opacity driven by render

class WindowManager extends BaseWidget {

    this._mouseDown = false;

    win._bmwEffName = effName;

          if (cw2 < 20) continue;
          const midX = px + cols[ci] + cw2/2;
          ctx.fillText(`${Math.round(cw2)}`, midX, py + pad.t - 1);
        }
      }

      // Row heights in left padding
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      if (pad.l >= 10) {
        for (let ri = 0; ri < rows.length - 1; ri++) {
          const rh2 = rows[ri+1] - rows[ri];
          if (rh2 < 10) continue;
          const midY = py + rows[ri] + rh2/2;
          ctx.fillText(`${Math.round(rh2)}`, px + pad.l - 2, midY);
        }
      }

      ctx.restore();
    }

    // Legend badge
    ctx.save();
    const lx = 8, ly = this._canvas.height - 22;
    ctx.fillStyle = 'rgba(20,20,60,0.8)';
    ctx.beginPath(); ctx.roundRect(lx, ly, 228, 16, 4); ctx.fill();
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = 'rgba(180,180,255,1)';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('⊞ Grid overlay actif — Ctrl+G pour désactiver', lx+6, ly+8);
    ctx.restore();

    ctx.restore();
  }

  get fps(){return this._fps;}
}

const isTouchDevice = () => navigator.maxTouchPoints > 0 || 'ontouchstart' in window;

// ── Adaptive window sizing ───────────────────────────────────────────────
// Returns { w, h, x, y } that fits the current viewport
function winBounds(desiredW, desiredH, offsetX=0, offsetY=0) {
  const vw = canvas.width, vh = canvas.height;
  const margin = isTouchDevice() ? 8 : 20;
  const w = Math.min(desiredW, vw - margin*2);
  const h = Math.min(desiredH, vh - margin*2);
  const x = Math.max(margin, Math.min(offsetX || Math.floor((vw-w)/2), vw-w-margin));
  const y = Math.max(margin, Math.min(offsetY || Math.floor((vh-h)/2), vh-h-margin));
  return {x, y, width:w, height:h};
}

function resizeCanvas() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;

    engine.windowManager.bounds.height = canvas.height;
    engine._offscreen.width  = canvas.width;
    engine._offscreen.height = canvas.height;
    engine._fullRedraw = true;
    // Nudge any windows that are now out of bounds back into view
    for (const win of engine.windowManager.windows) {
      const b = win.bounds, m = 10;
      if (b.x + b.width  > canvas.width  - m) win.bounds.x = Math.max(m, canvas.width  - b.width  - m);
      if (b.y + b.height > canvas.height - m) win.bounds.y = Math.max(m, canvas.height - b.height - m);
      if (b.x < m) win.bounds.x = m;
      if (b.y < m) win.bounds.y = m;
    }
  }
}

// ============================================================
// REUSABLE CONTEXT MENU COMPONENT
// ============================================================
// A self-contained, themeable pop-up menu usable by ANY widget. It attaches a
// dimming backdrop + the menu panel as children of a container (a WindowContent
// or any BaseWidget), in content-space coordinates. Supports: icons, shortcuts,
// separators, disabled items, checkbox items, and one level of sub-menus.
//
//   ContextMenu.open(container, x, y, items)
//   items: [{ label, icon?, shortcut?, disabled?, separator?, checked?,
//             submenu?:[...], action?:fn }]
class ContextMenu extends BaseWidget {
  constructor(items, opts = {}) {
    super('ctxmenu_' + (++_idCounter), { x: 0, y: 0, width: 0, height: 0 });
    this.items = items || [];
    this.zIndex = 9000;
    this._rowH = 26;
    this._sepH = 9;
    this._padY = 4;
    this._iconW = 24;
    this._minW = opts.minWidth || 180;
    this._hover = -1;
    this._sub = null;          // open sub-menu (child ContextMenu)
    this._backdrop = null;
    this._onClose = opts.onClose || null;
    this._parentMenu = opts.parentMenu || null;
    this._measCtx = document.createElement('canvas').getContext('2d');
    this.capturesDrag = false;
    this._measure();

    this._openTime = performance.now();
    this.on('mousemove', e => this._onMove(e.x, e.y));
    this.on('mousedown', e => e.stopPropagation());
    this.on('click',     e => {
      e.stopPropagation();
      // Ignore the click that belongs to the opening gesture (the same
      // right-click / toolbar press that spawned the menu).
      if (e.button === 2) return;
      if (performance.now() - (this._rootMenu || this)._openTime < 250) return;
      this._onClick(e.x, e.y);
    });
  }

  static open(container, x, y, items, opts = {}) {
    const m = new ContextMenu(items, opts);
    m._attach(container, x, y);
    return m;
  }

  _measure() {
    this._measCtx.font = "13px 'Segoe UI', Arial, sans-serif";
    let w = this._minW, h = this._padY * 2;
    for (const it of this.items) {
      if (it.separator) { h += this._sepH; continue; }
      const lbl = it.label || '';
      const sc  = it.shortcut ? '    ' + it.shortcut : '';
      const tw = this._iconW + this._measCtx.measureText(lbl).width + 28 +
                 (it.shortcut ? this._measCtx.measureText(sc).width : 0) + (it.submenu ? 16 : 0);
      w = Math.max(w, tw);
      h += this._rowH;
    }
    this.bounds.width = Math.ceil(w);
    this.bounds.height = Math.ceil(h);
  }

  _attach(container, x, y) {
    this._container = container;
    // Clamp inside the container so it stays fully visible
    const cw = container.bounds.width, ch = container.bounds.height;
    let px = x, py = y;
    if (px + this.bounds.width > cw)  px = Math.max(2, cw - this.bounds.width - 2);
    if (py + this.bounds.height > ch) py = Math.max(2, ch - this.bounds.height - 2);
    this.bounds.x = px; this.bounds.y = py;

    // Top-level menu installs a transparent backdrop to catch outside clicks.
    if (!this._parentMenu) {
      const bd = new BaseWidget('ctxmenu_bd', { x: 0, y: 0, width: cw, height: ch });
      bd.zIndex = 8999;
      bd.render = () => {};
      bd.on('mousedown', e => e.stopPropagation());
      bd.on('click', e => {
        e.stopPropagation();
        if (performance.now() - this._openTime < 250) return; // opening gesture
        this.close();
      });
      bd.on('contextmenu', e => e.stopPropagation());
      this._backdrop = bd;
      container.addChild(bd);
    }
    container.addChild(this);
    this.markDirty();
  }

  _rowAt(localY) {
    let yy = this.bounds.y + this._padY;
    for (let i = 0; i < this.items.length; i++) {
      const it = this.items[i];
      const h = it.separator ? this._sepH : this._rowH;
      if (localY >= yy && localY < yy + h) return it.separator ? -1 : i;
      yy += h;
    }
    return -1;
  }
  _rowTop(idx) {
    let yy = this.bounds.y + this._padY;
    for (let i = 0; i < idx; i++) yy += this.items[i].separator ? this._sepH : this._rowH;
    return yy;
  }

  _onMove(x, y) {
    const i = this._rowAt(y);
    if (i !== this._hover) {
      this._hover = i;
      this.markDirty();
      // Sub-menu management
      if (this._sub) { this._container.removeChild(this._sub); this._sub = null; }
      const it = this.items[i];
      if (it && it.submenu && !it.disabled) {
        const sub = new ContextMenu(it.submenu, { parentMenu: this, onClose: this._onClose });
        sub._rootMenu = this._rootMenu || this;
        sub._openTime = (this._rootMenu || this)._openTime;
        sub.zIndex = this.zIndex + 1;
        // Windows-style placement: a sub-menu opens to the RIGHT of its parent,
        // but if it would spill past the container's right edge it flips to the
        // LEFT of the parent instead of overlapping it. The chosen side is
        // inherited so sub-sub-menus keep cascading the same way.
        const cw = this._container.bounds.width, ch = this._container.bounds.height;
        const sw = sub.bounds.width, sh = sub.bounds.height;
        const overlap = 3;
        const rightX = this.bounds.x + this.bounds.width - overlap;
        const leftX  = this.bounds.x - sw + overlap;
        const fitsRight = rightX + sw <= cw - 2;
        const fitsLeft  = leftX >= 2;
        let sx, chosenDir;
        if ((this._openDir || 'right') === 'left') {
          if (fitsLeft)       { sx = leftX;  chosenDir = 'left';  }
          else if (fitsRight) { sx = rightX; chosenDir = 'right'; }
          else                { sx = Math.max(2, cw - sw - 2); chosenDir = 'left'; }
        } else {
          if (fitsRight)      { sx = rightX; chosenDir = 'right'; }
          else if (fitsLeft)  { sx = leftX;  chosenDir = 'left';  }
          else                { sx = Math.max(2, cw - sw - 2); chosenDir = 'right'; }
        }
        sub._openDir = chosenDir;
        let sy = this._rowTop(i) - this._padY;
        if (sy + sh > ch - 2) sy = Math.max(2, ch - sh - 2);
        sub._attach(this._container, sx, sy);
        this._sub = sub;
      }
    }
  }

  _onClick(x, y) {
    const i = this._rowAt(y);
    if (i < 0) return;
    const it = this.items[i];
    if (!it || it.disabled) return;
    if (it.submenu) return;           // hover opens it; click does nothing
    const act = it.action;
    this.close();
    if (typeof act === 'function') act(it);
  }

  close() {
    const root = this._rootMenu || this;
    root._destroyTree();
    if (root._onClose) root._onClose();
  }
  _destroyTree() {
    if (this._sub) { this._sub._destroyTree(); this._sub = null; }
    if (this._container) {
      this._container.removeChild(this);
      if (this._backdrop) this._container.removeChild(this._backdrop);
    }
    this.markDirty();
  }

  render(ctx) {
    const b = this.bounds;
    ctx.save();
    // Panel + shadow
    ctx.shadowColor = 'rgba(0,0,0,0.30)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 4;
    ctx.fillStyle = '#ffffff';
    drawRoundRect(ctx, b.x, b.y, b.width, b.height, 7); ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = 'rgba(0,0,0,0.14)'; ctx.lineWidth = 1;
    drawRoundRect(ctx, b.x + .5, b.y + .5, b.width - 1, b.height - 1, 7); ctx.stroke();

    let yy = b.y + this._padY;
    ctx.textBaseline = 'middle';
    for (let i = 0; i < this.items.length; i++) {
      const it = this.items[i];
      if (it.separator) {
        ctx.strokeStyle = '#e3e7ec'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(b.x + 8, yy + this._sepH / 2 + .5);
        ctx.lineTo(b.x + b.width - 8, yy + this._sepH / 2 + .5); ctx.stroke();
        yy += this._sepH; continue;
      }
      const hovered = i === this._hover && !it.disabled;
      if (hovered) {
        ctx.fillStyle = '#2f6fd6';
        drawRoundRect(ctx, b.x + 3, yy + 1, b.width - 6, this._rowH - 2, 4); ctx.fill();
      }
      const txtCol = it.disabled ? '#b3b9c2' : hovered ? '#ffffff' : '#2b2f36';
      // icon / check
      ctx.font = "13px 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = 'center';
      if (it.checked) {
        ctx.fillStyle = txtCol;
        ctx.fillText('✓', b.x + this._iconW / 2 + 4, yy + this._rowH / 2);
      } else if (it.icon) {
        ctx.fillStyle = it.disabled ? '#c2c7cf' : (hovered ? '#ffffff' : (it.iconColor || '#5a6573'));
        ctx.fillText(it.icon, b.x + this._iconW / 2 + 4, yy + this._rowH / 2);
      }
      // label
      ctx.textAlign = 'left';
      ctx.fillStyle = txtCol;
      ctx.fillText(it.label || '', b.x + this._iconW + 10, yy + this._rowH / 2);
      // shortcut
      if (it.shortcut) {
        ctx.textAlign = 'right';
        ctx.fillStyle = it.disabled ? '#c2c7cf' : hovered ? 'rgba(255,255,255,0.85)' : '#9aa1ab';
        ctx.font = "11px 'Segoe UI', Arial, sans-serif";
        ctx.fillText(it.shortcut, b.x + b.width - (it.submenu ? 22 : 12), yy + this._rowH / 2);
      }
      // submenu arrow
      if (it.submenu) {
        ctx.textAlign = 'right'; ctx.fillStyle = txtCol;
        ctx.font = "10px 'Segoe UI', Arial, sans-serif";
        ctx.fillText('▶', b.x + b.width - 8, yy + this._rowH / 2);
      }
      yy += this._rowH;
    }
    ctx.restore();
  }
}

// Date helpers — day-granular, working-calendar aware. All math is local-time
// and clamped to start-of-day to avoid DST/timezone drift.
const G_DAY = 86400000;
function gSOD(d)            { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function gAddDays(d, n)     { return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n); }
function gDays(a, b)        { return Math.round((gSOD(b) - gSOD(a)) / G_DAY); }
function gIsWeekend(d)      { const g = d.getDay(); return g === 0 || g === 6; }
function gFmt(d)            { return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function gParse(s) {
  if (!s) return null;
  const m = String(s).trim().match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
  if (!m) { const d = new Date(s); return isNaN(d) ? null : gSOD(d); }
  let [_, dd, mm, yy] = m; yy = +yy < 100 ? 2000 + +yy : +yy;
  const d = new Date(+yy, +mm - 1, +dd); return isNaN(d) ? null : d;
}
const G_MONTHS = ['Janv','Févr','Mars','Avr','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
const G_DOW    = ['D','L','M','M','J','V','S'];
const G_RES_COLORS = ['#4e79a7','#59a14f','#e15759','#f28e2b','#76b7b2','#b07aa1','#ff9da7','#9c755f','#edc948','#bab0ac'];

function gDownload(filename, mime, content) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

// ── Splitter : draggable divider bar that splits an area into two resizable
//    panes. Reusable primitive — use standalone via .bind(pane1, pane2) or embed
//    inside a bespoke widget (here: the Gantt grid/chart divider).
//    orientation 'vertical'   = vertical bar, resizes horizontally (col-resize)
//    orientation 'horizontal' = horizontal bar, resizes vertically (row-resize)
class Splitter extends BaseWidget {
  constructor(bounds, opts = {}) {
    super('splitter_' + (++_idCounter), bounds);
    this.orientation = opts.orientation || 'vertical';
    const vert = this.orientation === 'vertical';
    this.thickness = opts.thickness ?? (vert ? bounds.width : bounds.height) ?? 6;
    this.colors = opts.colors || null;        // {bar,barHover,line,grip,gripHover} override (else theme)
    this.min1 = opts.min1 ?? 60;              // min size of the pane BEFORE the bar
    this.min2 = opts.min2 ?? 60;              // min size of the pane AFTER the bar
    this._pane1 = opts.pane1 || null;
    this._pane2 = opts.pane2 || null;
    this._hovered = false; this._dragging = false; this._d0 = 0; this._p0 = 0;
    this.capturesDrag = true;
    this.cursor = vert ? 'col-resize' : 'row-resize';
    this.on('mouseenter', () => { this._hovered = true; this.markDirty(); });
    this.on('mouseleave', () => { if (!this._dragging) { this._hovered = false; this.markDirty(); } });
    this.on('mousedown', e => {
      if (!this.enabled || e.button !== 0) return;
      this._dragging = true;
      this._d0 = vert ? e.x : e.y;
      this._p0 = vert ? this.bounds.x : this.bounds.y;
      this.markDirty();
    });
    this.on('mousemove', e => { if (this._dragging) this._drag(this.orientation === 'vertical' ? e.x : e.y); });
    this.on('mouseup', () => { if (this._dragging) { this._dragging = false; this.markDirty(); } });
  }
  bind(p1, p2) { this._pane1 = p1; this._pane2 = p2; return this; }
  get position() { return this.orientation === 'vertical' ? this.bounds.x : this.bounds.y; }
  set position(v) { if (this.orientation === 'vertical') this.bounds.x = v; else this.bounds.y = v; this.markDirty(); }
  _emit(pos, delta) {
    this.emit({ type: 'resize', target: this, position: pos, delta, x: 0, y: 0,
      stopPropagation() { this.stopped = true; }, preventDefault() { this.defaultPrevented = true; },
      stopped: false, defaultPrevented: false });
  }
  _drag(coord) {
    const vert = this.orientation === 'vertical';
    const cur = vert ? this.bounds.x : this.bounds.y;
    let np = this._p0 + (coord - this._d0);
    if (this._pane1 && this._pane2) {
      const p1 = this._pane1.bounds, p2 = this._pane2.bounds;
      const lo = (vert ? p1.x : p1.y) + this.min1;
      const hi = (vert ? p2.x + p2.width : p2.y + p2.height) - this.min2 - this.thickness;
      np = Math.max(lo, Math.min(hi, np));
      const end = vert ? p2.x + p2.width : p2.y + p2.height;
      if (vert) { this.bounds.x = np; p1.width = np - p1.x; p2.x = np + this.thickness; p2.width = end - p2.x; }
      else      { this.bounds.y = np; p1.height = np - p1.y; p2.y = np + this.thickness; p2.height = end - p2.y; }
      this._pane1.markDirty(); this._pane2.markDirty();
    } else {
      if (vert) this.bounds.x = np; else this.bounds.y = np;
    }
    this._emit(np, np - cur);
    this.markDirty(); if (this.parent) this.parent.markDirty();
  }
  render(ctx) {
    const b = this.bounds, vert = this.orientation === 'vertical';
    const c = this.colors || getTheme().splitter;
    const on = this._dragging || this._hovered;
    ctx.save();
    ctx.fillStyle = colorToCSS(on ? c.barHover : c.bar);
    ctx.fillRect(b.x, b.y, b.width, b.height);
    ctx.strokeStyle = colorToCSS(c.line); ctx.lineWidth = 1; ctx.beginPath();
    if (vert) {
      ctx.moveTo(b.x + .5, b.y);             ctx.lineTo(b.x + .5, b.y + b.height);
      ctx.moveTo(b.x + b.width - .5, b.y);   ctx.lineTo(b.x + b.width - .5, b.y + b.height);
    } else {
      ctx.moveTo(b.x, b.y + .5);             ctx.lineTo(b.x + b.width, b.y + .5);
      ctx.moveTo(b.x, b.y + b.height - .5);  ctx.lineTo(b.x + b.width, b.y + b.height - .5);
    }
    ctx.stroke();
    ctx.fillStyle = colorToCSS(on ? c.gripHover : c.grip);
    const cx = b.x + b.width / 2, cy = b.y + b.height / 2;
    for (let k = -1; k <= 1; k++) {
      ctx.beginPath();
      if (vert) ctx.arc(cx, cy + k * 5, 1.1, 0, 7); else ctx.arc(cx + k * 5, cy, 1.1, 0, 7);
      ctx.fill();
    }
    ctx.restore();
  }
}

class GanttChart extends BaseWidget {
  constructor(bounds, opts = {}) {
    super('gantt_' + (++_idCounter), bounds);
    this.cursor = 'default';
    this.tabIndex = 0;
    this.capturesDrag = true;

    // ── Visual palette — derived from the ACTIVE desktop theme so the Gantt
    //    matches the rest of the UI. Rebuilt automatically on theme change
    //    (see render()). Semantic colours (critical/baseline/milestone/today)
    //    stay fixed so they remain recognisable across themes.
    this._themeName = null;
    this.C = this._buildPalette();

    this.rowH = opts.rowHeight || 30;
    this.barH = opts.taskbarHeight || 16;
    this.toolbarH = 38;
    this.headerH = 48;
    this.hScrollH = 12;
    this.vScrollW = 12;
    this.splitterW = 6;
    this.splitX = opts.splitX || 470;       // grid width
    this._minSplit = 120;

    // ── Timeline / zoom ──
    this.dayWidth = 28;
    this._zoomMin = 3; this._zoomMax = 64;

    // ── Scroll state ──
    this.scrollY = 0;        // vertical (rows)
    this.chartScrollX = 0;   // timeline horizontal
    this.gridScrollX = 0;    // grid columns horizontal

    // ── Feature toggles ──
    this.showCritical = false;
    this.showBaseline = false;
    this.showResourceHisto = false;
    this.viewMode = 'task';  // 'task' | 'resource'
    this.weekendsNonWorking = true;

    // ── Interaction state ──
    this.selectedId = null;
    this._hoverRow = -1;
    this._drag = null;       // active drag descriptor
    this._editor = null;     // DOM <input> for inline editing
    this._ctxMenu = null;
    this._tipTask = null; this._tipXY = { x: 0, y: 0 }; this._tipT = 0;
    this._tbHover = null;
    this._tbPressed = null;
    // Toolbar buttons are REAL framework Button widgets (themed). One per
    // actionable item; separators and the filter field stay custom-drawn.
    this._tbButtons = new Map();
    for (const it of this._toolbarItems()) {
      if (it.sep || it.field) continue;
      const b = new Button(it.icon, { x: 0, y: 0, width: 0, height: 0 });
      b.borderRadius = 5;
      this._tbButtons.set(it.key, b);
    }
    this._colResize = null;
    this._autoScroll = null; // {targetX} animated chart scroll

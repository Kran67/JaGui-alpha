// ---- WINDOW BUTTON ----
class WinButton extends BaseWidget {
  constructor(role, bounds) {
    super(undefined, bounds);
    this.role = role; this.hovered = false; this.pressed = false;
    this.on('mouseenter', () => { this.hovered=true; if(this.parent)this.parent.markDirty(); });
    this.on('mouseleave', () => { this.hovered=false; this.pressed=false; if(this.parent)this.parent.markDirty(); });
    this.on('mousedown',  () => { this.pressed=true; if(this.parent)this.parent.markDirty(); });
    this.on('mouseup',   () => { this.pressed=false; if(this.parent)this.parent.markDirty(); });
  }
  render() {}
}

// ---- WINDOW CONTENT (clipping layer) ----
// Children are stored in window-local coords (relative to content area origin).
// render() is called with ctx already translated to window origin.

// ═══════════════════════════════════════════════════════════════════
// FLEXPANEL
// CSS-Flexbox layout container. Children are laid out automatically.
// child.flex = { grow, shrink, basis, alignSelf, order }
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// FlexPanel — Coordinate model:
//   this.bounds.x/y  = position in PARENT space
//   _rects[i].x/y    = position of child i in LOCAL panel space (0-based)
//   render(ctx): ctx is in PARENT space → translate to panel-local for children
//   dispatchEvent(ev): ev.x/y in PARENT space → subtract this.bounds → local
// ═══════════════════════════════════════════════════════════════════
class FlexPanel extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this.direction      = 'row';
    this.wrap           = 'nowrap';
    this.justifyContent = 'flex-start';
    this.alignItems     = 'stretch';
    this.alignContent   = 'stretch';
    this.gap            = 0;
    this.rowGap         = null;
    this.columnGap      = null;
    this.padding        = 0;
    this.background     = null;
    this.borderRadius   = 0;
    this._rects         = [];   // {x,y,w,h} in LOCAL panel space
    this._dirty         = true;
  }

  _pad() {
    const p = this.padding;
    return typeof p === 'number' ? {t:p,r:p,b:p,l:p} : {t:p.t||0,r:p.r||0,b:p.b||0,l:p.l||0};
  }
  _cGap() { return (this.columnGap !== null ? this.columnGap : this.gap) || 0; }
  _rGap() { return (this.rowGap    !== null ? this.rowGap    : this.gap) || 0; }
  _fi(c)  {
    const f = c.flex || {};
    return { grow:f.grow??0, shrink:f.shrink??1, basis:f.basis??null, alignSelf:f.alignSelf??null, order:f.order??0 };
  }

  markDirty(r) { this._dirty = true; super.markDirty(r); }

  _doLayout() {
    this._dirty = false;
    const pad   = this._pad();
    const W     = this.bounds.width  - pad.l - pad.r;
    const H     = this.bounds.height - pad.t - pad.b;
    const isRow = !this.direction.startsWith('column');
    const isRev = this.direction.endsWith('reverse');
    const main  = isRow ? W : H;
    const cGap  = isRow ? this._cGap() : this._rGap();
    const rGap  = isRow ? this._rGap() : this._cGap();

    const vis    = this.children.filter(c => c.visible);
    const sorted = [...vis].sort((a,b) => this._fi(a).order - this._fi(b).order);
    if (isRev) sorted.reverse();

    const items = sorted.map(c => {
      const fi = this._fi(c);
      // CSS "flex: N" → flex-basis: 0. When grow>0 and no explicit basis, start from 0
      // so all main-axis space is fully distributed by grow ratio.
      const naturalSize = isRow ? c.bounds.width : c.bounds.height;
      const mSize = fi.basis !== null ? fi.basis : (fi.grow > 0 ? 0 : naturalSize);
      return { c, fi,
        mSize,
        xSize: isRow ? c.bounds.height : c.bounds.width,
        finalM: 0 };
    });

    // Wrap lines
    let lines = [];
    if (this.wrap === 'nowrap') { lines = [items]; }
    else {
      let line = [], used = 0;
      for (const it of items) {
        const need = line.length ? it.mSize + cGap : it.mSize;
        if (line.length && used + need > main + 0.5) { lines.push(line); line = []; used = 0; }
        line.push(it); used += (line.length > 1 ? cGap : 0) + it.mSize;
      }
      if (line.length) lines.push(line);
      if (this.wrap === 'wrap-reverse') lines.reverse();
    }

    // Main-axis sizes
    for (const line of lines) {
      const totalBasis  = line.reduce((s,i) => s+i.mSize, 0);
      const free        = main - cGap*(line.length-1) - totalBasis;
      const totalGrow   = line.reduce((s,i) => s+i.fi.grow, 0);
      const totalShrink = line.reduce((s,i) => s+i.fi.shrink*i.mSize, 0);
      for (const it of line) {
        if      (free > 0 && totalGrow   > 0) it.finalM = it.mSize + free * it.fi.grow / totalGrow;
        else if (free < 0 && totalShrink > 0) it.finalM = Math.max(0, it.mSize + free*(it.fi.shrink*it.mSize)/totalShrink);
        else it.finalM = it.mSize;
      }
    }

    const lineCross  = lines.map(line => Math.max(1, ...line.map(i => i.xSize)));
    const crossFree  = (isRow ? H : W) - lineCross.reduce((s,v)=>s+v,0) - rGap*(lines.length-1);
    const lineY0     = this._distribute(crossFree, lines.length, this.alignContent, rGap, lineCross);

    const map = new Map();
    for (let li = 0; li < lines.length; li++) {
      const line    = lines[li];
      const lineX   = lineCross[li];
      const lineOff = lineY0[li];
      const totalM  = line.reduce((s,i) => s+i.finalM, 0);
      const mFree   = main - totalM - cGap*(line.length-1);
      const mOffs   = this._distribute(mFree, line.length, this.justifyContent, cGap, line.map(i=>i.finalM));
      for (let ii = 0; ii < line.length; ii++) {
        const it = line[ii], ai = it.fi.alignSelf || this.alignItems;
        let xOff = lineOff, xSz = it.xSize;
        if      (ai === 'stretch')  { xSz = lineX; }
        else if (ai === 'flex-end') { xOff = lineOff + lineX - it.xSize; }
        else if (ai === 'center')   { xOff = lineOff + (lineX - it.xSize) / 2; }
        map.set(it.c, isRow
          ? { x: pad.l+mOffs[ii], y: pad.t+xOff, w: it.finalM, h: xSz }
          : { x: pad.l+xOff,      y: pad.t+mOffs[ii], w: xSz, h: it.finalM });
      }
    }
    this._rects = this.children.map(c => map.get(c) || null);
  }

  _distribute(free, count, mode, gap, sizes) {
    if (!count) return [];
    const offs = []; let pos = 0;
    if      (mode === 'flex-end') pos = free;
    else if (mode === 'center')   pos = free / 2;
    else if (mode === 'space-between' && count > 1) {
      const extra = free/(count-1);
      for (let i=0;i<count;i++){offs.push(pos);pos+=sizes[i]+gap+extra;} return offs;
    } else if (mode === 'space-around') {
      const each = free/count; pos=each/2;
      for (let i=0;i<count;i++){offs.push(pos);pos+=sizes[i]+gap+each;} return offs;
    } else if (mode === 'space-evenly') {
      const each = free/(count+1); pos=each;
      for (let i=0;i<count;i++){offs.push(pos);pos+=sizes[i]+gap+each;} return offs;
    }
    for (let i=0;i<count;i++){offs.push(pos);pos+=sizes[i]+gap;} return offs;
  }

  hitTest(x, y) {
    if (this._dirty) this._doLayout();  // ensure child bounds are current
    return this.visible && this.enabled && rectContains(this.bounds, x, y);
  }

  // ev.x/y in PARENT space (same as this.bounds)
  dispatchEvent(ev) {
    if (this._dirty) this._doLayout();
    const b = this.bounds;
    // Convert to LOCAL panel coords
    const lx = ev.x - b.x, ly = ev.y - b.y;

    // Special case: open DropDown lists can extend outside the panel bounds.
    // Route events to them even when the point is outside the dropdown widget's normal bounds.
    for (let i = this.children.length-1; i >= 0; i--) {
      const c = this.children[i];
      if (c.visible  && c._open) {
        const lr = c._listRect();
        if (rectContains(lr, lx, ly)) {
          const re = { ...ev, x: lx, y: ly };
          c.dispatchEvent(re);
          if (re.stopped) { ev.stopped = true; return true; }
        }
      }
    }

    // For scroll/wheel events, send to all visible children that intersect, not just first hit
    const isScrollEvent = ev.type === 'scroll' || ev.type === 'wheel';
    
    for (let i = this.children.length-1; i >= 0; i--) {
      const c = this.children[i], r = this._rects[i];
      if (!c.visible || !r) continue;
      if (lx >= r.x && lx <= r.x+r.w && ly >= r.y && ly <= r.y+r.h) {
        // child.bounds are panel-local (r.x,r.y), pass panel-local coords
        const re = { ...ev, x: lx, y: ly };
        c.dispatchEvent(re);
        if (!isScrollEvent && re.stopped) { ev.stopped = true; return true; }
      }
    }
    this.emit(ev); return !ev.stopped;
  }

  // ctx is in PARENT space. Translate to panel origin, render children in panel-local.
  render(ctx) {
    if (this._dirty) this._doLayout();
    const b = this.bounds;
    ctx.save();
    if (this.background !== null) {
      drawGradient(ctx, b.x, b.y, b.width, b.height, this.background);
      drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius); ctx.fill();
    }
    ctx.beginPath(); drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius); ctx.clip();
    // Translate so children render at their panel-local bounds
    ctx.save(); ctx.translate(b.x, b.y);
    for (let i = 0; i < this.children.length; i++) {
      const c = this.children[i], r = this._rects[i];
      if (!c.visible || !r) continue;
      // Keep child.bounds in PANEL-LOCAL space (so hitTest in dispatchEvent works)
      c.bounds.x = r.x; c.bounds.y = r.y; c.bounds.width = r.w; c.bounds.height = r.h;
      c.render(ctx);
    }
    ctx.restore();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════════════
// TablePanel — Same coordinate model as FlexPanel.
//   this.bounds.x/y  = position in PARENT space
//   _layout[i].x/y   = cell position in LOCAL panel space
//   dispatchEvent: ev.x/y in PARENT space
// ═══════════════════════════════════════════════════════════════════
class TablePanel extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this.borderCollapse   = false;
    this.borderSpacing    = 2;
    this.border           = null;
    this.cellBorder       = null;
    this.cellPadding      = { t:5, r:8, b:5, l:8 };
    this.headerBackground = '#E8E8E8';
    this.background       = null;
    this.borderRadius     = 0;
    this._cols            = [];
    this._rows            = [];
    this._layout          = null;
    this._rowY            = null;
    this._rowH            = null;
    this._colW            = null;
    this._totalH          = 0;
  }

  setColumns(widths) {
    this._cols = (widths||[]).map(w => ({ width: typeof w === 'number' ? w : null }));
    this._layout = null; this.markDirty();
  }

  addRow(opts = {}) {
    const row = { cells:[], opts };
    this._rows.push(row); this._layout = null; this.markDirty();
    return row;
  }

  addCell(row, widget, opts = {}) {
    if (widget) widget.parent = this;
    row.cells.push({ widget,
      colspan: opts.colspan??1, rowspan: opts.rowspan??1,
      align:   opts.align??'left', valign: opts.valign??'middle',
      background: opts.background??null, border: opts.border??null,
      padding: opts.padding??null });
    this._layout = null; this.markDirty();
  }

  markDirty(r) { this._layout = null; /*super.markDirty(r);*/ }

  _doLayout() {
    const sep   = this.borderCollapse ? 0 : this.borderSpacing;
    const nRows = this._rows.length;
    let nCols   = this._cols.length;
    for (const row of this._rows) {
      let c = 0; for (const cell of row.cells) c += cell.colspan; nCols = Math.max(nCols, c);
    }
    while (this._cols.length < nCols) this._cols.push({ width: null });

    const avail = this.bounds.width - (nCols+1)*sep;
    let fixed = 0; const nullIdx = [];
    for (let i=0;i<nCols;i++) { if (this._cols[i].width!==null) fixed+=this._cols[i].width; else nullIdx.push(i); }
    const defW = nullIdx.length ? Math.max(10, (avail-fixed)/nullIdx.length) : 0;
    const colW = Array.from({length:nCols}, (_,i) => this._cols[i].width ?? defW);

    const occupied = Array.from({length:nRows}, () => new Array(nCols).fill(false));
    const rowH     = new Array(nRows).fill(0);
    const cells    = [];

    for (let ri=0; ri<nRows; ri++) {
      let ci = 0;
      for (const cell of this._rows[ri].cells) {
        while (ci < nCols && occupied[ri][ci]) ci++;
        const cs = cell.colspan, rs = cell.rowspan;
        const cw  = colW.slice(ci,ci+cs).reduce((s,v)=>s+v,0) + (cs-1)*sep;
        const pad = cell.padding || this.cellPadding;
        const iw  = Math.max(1, cw - pad.l - pad.r);
        let wh = 0;
        if (cell.widget) { cell.widget.bounds.width = iw; wh = cell.widget.bounds.height; }
        if (rs === 1) rowH[ri] = Math.max(rowH[ri], wh + pad.t + pad.b);
        for (let dr=0;dr<rs;dr++) for (let dc=0;dc<cs;dc++) if (ri+dr<nRows) occupied[ri+dr][ci+dc]=true;
        cells.push({ ri, ci, cs, rs, cell, cw, pad });
        ci += cs;
      }
    }
    const minRowH = this.cellPadding.t + 16 + this.cellPadding.b;
    for (let ri=0;ri<nRows;ri++) if (rowH[ri] < minRowH) rowH[ri] = minRowH;

    const rowY = []; let cy = sep;
    for (let ri=0;ri<nRows;ri++) { rowY.push(cy); cy += rowH[ri]+sep; }
    this._totalH = cy;
    this.bounds.height = cy;

    this._layout = cells.map(({ri,ci,cs,rs,cell,cw,pad}) => {
      const cx    = sep + colW.slice(0,ci).reduce((s,v)=>s+v,0) + ci*sep;
      const spanH = rowH.slice(ri,ri+rs).reduce((s,v)=>s+v,0) + (rs-1)*sep;
      return { cell, ri, ci, x:cx, y:rowY[ri], w:cw, h:Math.max(spanH,rowH[ri]), pad };
    });
    this._colW=colW; this._rowY=rowY; this._rowH=rowH; this._nCols=nCols;
  }

  hitTest(x, y) {
    if (!this._layout) this._doLayout();  // ensure cell widget bounds are current
    return this.visible && this.enabled && rectContains(this.bounds, x, y);
  }

  // ev.x/y in PARENT space
  dispatchEvent(ev) {
    if (!this._layout) this._doLayout();
    const bx = this.bounds.x, by = this.bounds.y;
    const lx = ev.x-bx, ly = ev.y-by;   // LOCAL panel coords
    for (let i=this._layout.length-1;i>=0;i--) {
      const it = this._layout[i];
      if (!it.cell.widget || !it.cell.widget.visible) continue;
      if (lx>=it.x && lx<=it.x+it.w && ly>=it.y && ly<=it.y+it.h) {
        // Widget bounds are panel-local (set in render). Pass panel-local coords.
        const re = { ...ev, x: lx, y: ly };
        it.cell.widget.dispatchEvent(re);
        if (re.stopped) { ev.stopped=true; return true; }
      }
    }
    this.emit(ev); return !ev.stopped;
  }

  // ctx in PARENT space
  render(ctx) {
    if (!this._layout) this._doLayout();
    const b = this.bounds, sep = this.borderCollapse ? 0 : this.borderSpacing;
    ctx.save();
    if (this.background !== null) {
      drawGradient(ctx,b.x,b.y,b.width,b.height,this.background);
      drawRoundRect(ctx,b.x,b.y,b.width,b.height,this.borderRadius); ctx.fill();
    }
    ctx.beginPath(); drawRoundRect(ctx,b.x,b.y,b.width,b.height,this.borderRadius); ctx.clip();

    // Translate to panel-local space for all content
    ctx.save(); ctx.translate(b.x, b.y);

    for (let ri=0;ri<this._rows.length;ri++) {
      const bg = this._rows[ri].opts?.background;
      if (!bg) continue;
      ctx.fillStyle = typeof bg==='string' ? bg : colorToCSS(bg);
      ctx.fillRect(0, this._rowY[ri], b.width, this._rowH[ri]||20);
    }

    for (const it of this._layout) {
      const {cell,x,y,w,h,pad} = it;
      const ax=x, ay=y;   // panel-local
      const cellBg = cell.background ?? (this._rows[it.ri].opts?.header ? this.headerBackground : null);
      if (cellBg) {
        ctx.fillStyle=typeof cellBg==='string'?cellBg:colorToCSS(cellBg);
        ctx.fillRect(ax,ay,w,h);
      }
      const cb = cell.border ?? this.cellBorder;
      if (cb) {
        ctx.strokeStyle=typeof cb.color==='string'?cb.color:colorToCSS(cb.color);
        ctx.lineWidth=cb.width??1; ctx.strokeRect(ax+0.5,ay+0.5,w-1,h-1);
      }
      if (cell.widget && cell.widget.visible) {
        const iw=w-pad.l-pad.r, ih=h-pad.t-pad.b;
        const cw=cell.widget.bounds.width, ch=cell.widget.bounds.height;
        let wy=ay+pad.t;
        if      (cell.valign==='middle') wy=ay+(h-ch)/2;
        else if (cell.valign==='bottom') wy=ay+h-ch-pad.b;
        let wx=ax+pad.l;
        if      (cell.align==='center')  wx=ax+(w-cw)/2;
        else if (cell.align==='right')   wx=ax+w-cw-pad.r;
        else if (cell.align==='stretch') { cell.widget.bounds.width=iw; wx=ax+pad.l; }
        // Keep widget bounds in PANEL-LOCAL space for dispatchEvent hitTest
        cell.widget.bounds.x=wx; cell.widget.bounds.y=wy;
        ctx.save(); cell.widget.render(ctx); ctx.restore();
      }
    }
    ctx.restore(); // end panel-local translate
    if (this.border) {
      ctx.strokeStyle=typeof this.border.color==='string'?this.border.color:colorToCSS(this.border.color);
      ctx.lineWidth=this.border.width??1; ctx.strokeRect(b.x+0.5,b.y+0.5,b.width-1,b.height-1);
    }
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════════════════
// WindowContent — scrollbars H+V, show on hover
// ════════════════════════════════════════════════════════════════════
class WindowContent extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._scrollX = 0; this._scrollY = 0;
    this._SB = 12; this._hovered = false; this._sbDrag = null;
  }

  hitTest(x, y) {
    if (!this.visible) return false;
    if (this._anim && (this._anim.type==='close'||this._anim.type==='minimize')) return false;
    return rectContains(this.getAbsoluteBounds(), x, y);
  }

  _contentSize() {
    let maxX=0, maxY=0;
    for (const c of this.children) {
      if (!c.visible) continue;
      maxX = Math.max(maxX, c.bounds.x+c.bounds.width);
      maxY = Math.max(maxY, c.bounds.y+c.bounds.height);
    }
    return { w:maxX+10, h:maxY+10 };
  }

  _bars(b) {
    const cs=this._contentSize(), SB=this._SB;
    const needV=cs.h>b.height;
    const needH=cs.w>b.width-(needV?SB:0);
    return { needH, needV, SB,
      viewW:b.width-(needV?SB:0), viewH:b.height-(needH?SB:0), cw:cs.w, ch:cs.h };
  }

  _clamp(b) {
    const{viewW,viewH,cw,ch}=this._bars(b);
    this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX));
    this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY));
  }

  _thumbInfo(dir,viewSz,contentSz,scroll) {
    const len=Math.max(24,viewSz*Math.min(1,viewSz/contentSz));
    const maxScroll=Math.max(1,contentSz-viewSz);
    return { off:(scroll/maxScroll)*(viewSz-len), len, maxScroll };
  }

  _onScroll(ev) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,viewW,viewH,cw,ch}=this._bars(b);
    const dy=ev.deltaY||0, dx=ev.deltaX||0;
    if (dx!==0) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dx));
    } else if (ev.shiftKey||(!needV&&needH)) {
      if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    } else {
      if (needV)      this._scrollY=Math.max(0,Math.min(Math.max(0,ch-viewH),this._scrollY+dy));
      else if (needH) this._scrollX=Math.max(0,Math.min(Math.max(0,cw-viewW),this._scrollX+dy));
    }
    this.markDirty();
  }

  _hitSB(ax,ay) {
    const b=this.bounds, ab=this.getAbsoluteBounds();
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    if (needV) {
      const tx=ab.x+viewW, ty=ab.y;
      if (ax>=tx&&ax<=tx+SB&&ay>=ty&&ay<=ty+viewH) {
        const ti=this._thumbInfo('v',viewH,ch,this._scrollY);
        return{dir:'v',trackStart:ty,trackLen:viewH,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    if (needH) {
      const tx=ab.x, ty=ab.y+viewH;
      if (ax>=tx&&ax<=tx+viewW&&ay>=ty&&ay<=ty+SB) {
        const ti=this._thumbInfo('h',viewW,cw,this._scrollX);
        return{dir:'h',trackStart:tx,trackLen:viewW,thumbOff:ti.off,thumbLen:ti.len,maxScroll:ti.maxScroll};
      }
    }
    return null;
  }

  setHovered(v)        { if (this._hovered!==v){this._hovered=v;this.markDirty();} }
  isOverScrollbar(ax,ay){ return !!this._hitSB(ax,ay); }

  onMouseDownAbs(ax,ay) {
    const sb=this._hitSB(ax,ay); if (!sb) return false;
    this._clamp(this.bounds);
    const mousePos=sb.dir==='v'?ay:ax, curScroll=sb.dir==='v'?this._scrollY:this._scrollX;
    const inThumb=mousePos>=sb.trackStart+sb.thumbOff&&mousePos<=sb.trackStart+sb.thumbOff+sb.thumbLen;
    if (inThumb) {
      this._sbDrag={dir:sb.dir,startScroll:curScroll,startMouse:mousePos,
        trackLen:sb.trackLen,thumbLen:sb.thumbLen,maxScroll:sb.maxScroll};
    } else {
      const ratio=(mousePos-sb.trackStart-sb.thumbLen/2)/Math.max(1,sb.trackLen-sb.thumbLen);
      const ns=Math.max(0,Math.min(sb.maxScroll,ratio*sb.maxScroll));
      if (sb.dir==='v') this._scrollY=ns; else this._scrollX=ns;
      this.markDirty();
    }
    return true;
  }

  onMouseMoveAbs(ax,ay) {
    if (!this._sbDrag) return false;
    const d=this._sbDrag, pos=d.dir==='v'?ay:ax;
    const range=d.trackLen-d.thumbLen;
    const ns=d.startScroll+(range>0?(pos-d.startMouse)*d.maxScroll/range:0);
    if (d.dir==='v') this._scrollY=Math.max(0,Math.min(d.maxScroll,ns));
    else             this._scrollX=Math.max(0,Math.min(d.maxScroll,ns));
    this.markDirty(); return true;
  }

  onMouseUpAbs() { const had=!!this._sbDrag; this._sbDrag=null; return had; }

  dispatchEvent(ev) {
    // Handle scroll/wheel events specially - don't depend on hitTest
    if (ev.type === 'scroll' || ev.type === 'wheel') {
      // For scroll/wheel, distribute to all visible children at the event position
      const b = this.bounds;
      const lx = ev.x - b.x, ly = ev.y - b.y;
      const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
      
      for (const c of sorted) {
        if (!c.visible) continue;
        // Check if point is in child bounds
        const cb = c.bounds;
        if (lx >= cb.x && lx <= cb.x + cb.width && ly >= cb.y && ly <= cb.y + cb.height) {
          const re = { ...ev, x: lx, y: ly };
          c.dispatchEvent(re);
          // Don't break for scroll events - let them propagate
        }
      }
      // Also handle scroll at WindowContent level (e.g. for window scrollbars)
      this._onScroll(ev);
      return true;
    }
    
    // Default behavior for other events
    const sorted = [...this.children].sort((a, b2) => b2.zIndex - a.zIndex);
    for (const c of sorted) {
      if (c.visible && c.hitTest(ev.x, ev.y)) {
        const re = { ...ev, x: ev.x - this.bounds.x, y: ev.y - this.bounds.y };
        c.dispatchEvent(re);
        if (ev.stopped) return true;
      }
    }
    this.emit(ev);
    return !ev.stopped;
  }

  render(ctx) {
    const b=this.bounds; this._clamp(b);
    const{needH,needV,SB,viewW,viewH,cw,ch}=this._bars(b);
    const sx=this._scrollX, sy=this._scrollY;
    const showSB=this._hovered||!!this._sbDrag;
    const sorted=[...this.children].sort((a,b2)=>a.zIndex-b2.zIndex);

    // Children rendered in scrolled content space
    // ctx is in WINDOW space (absolute). Children bounds are in CONTENT space (0-based).
    // WindowContent.render is called with ctx translated to window origin (by GUIWindow.render).
    // So we need to position children at (b.x - sx + child.bounds.x, b.y - sy + child.bounds.y).
    ctx.save();
    ctx.beginPath(); ctx.rect(b.x,b.y,viewW,viewH); ctx.clip();
    ctx.translate(b.x-sx, b.y-sy);

    for (const child of sorted) {
      if (!child.visible) continue;
      const _noDS=child instanceof Slider;
      const effOp=(!child.enabled&&_noDS?0.38:1)*(child.opacity??1);
      const needC=effOp<0.9999||child.tint!=null||!!child.rotation;
      if (needC) {
        const bw=Math.ceil(child.bounds.width),bh=Math.ceil(child.bounds.height);
        if (bw>0&&bh>0) {
          const off=new OffscreenCanvas(bw,bh); const octx=off.getContext('2d');
          octx.translate(-child.bounds.x,-child.bounds.y); child.render(octx);
          if (child.tint) {
            octx.setTransform(1,0,0,1,0,0); octx.globalCompositeOperation='source-atop';
            octx.fillStyle=`rgba(${child.tint.r},${child.tint.g},${child.tint.b},${child.tint.a??0.3})`;
            octx.fillRect(0,0,bw,bh);
          }
          ctx.save(); ctx.globalAlpha*=effOp;
          if (child.rotation) {
            const cx=child.bounds.x+bw/2,cy=child.bounds.y+bh/2;
            ctx.translate(cx,cy); ctx.rotate(child.rotation); ctx.drawImage(off,-bw/2,-bh/2);
          } else ctx.drawImage(off,child.bounds.x,child.bounds.y);
          ctx.restore();
        }
      } else child.render(ctx);
    }
    ctx.restore();

    if (showSB) {
      if (needV) this._drawBar(ctx,b,'v',viewW,viewH,sy,ch,SB);
      if (needH) this._drawBar(ctx,b,'h',viewW,viewH,sx,cw,SB);
      //if (needV&&needH){ctx.fillStyle='rgba(200,200,200,0.5)';ctx.fillRect(b.x+viewW,b.y+viewH,SB,SB);}
    }

    // Unclipped dropdowns
    for (const child of sorted) {
      if (!child.visible||!child._open) continue;
      ctx.save(); ctx.translate(b.x-sx,b.y-sy); child._renderList(ctx); ctx.restore();
    }


    if (_debugHitTest) {
      ctx.save(); ctx.translate(b.x-sx,b.y-sy);
      for (const child of sorted) {
        if (!child.visible) continue;
        if (child.rotation) {
          const bx=child.bounds.x,by2=child.bounds.y,bw2=child.bounds.width,bh2=child.bounds.height;
          const cx2=bx+bw2/2,cy2=by2+bh2/2,cos=Math.cos(child.rotation),sin=Math.sin(child.rotation);
          const corners=[{x:bx,y:by2},{x:bx+bw2,y:by2},{x:bx+bw2,y:by2+bh2},{x:bx,y:by2+bh2}]
            .map(p=>({x:cx2+(p.x-cx2)*cos-(p.y-cy2)*sin,y:cy2+(p.x-cx2)*sin+(p.y-cy2)*cos}));
          ctx.beginPath();ctx.moveTo(corners[0].x,corners[0].y);
          for(let i=1;i<corners.length;i++)ctx.lineTo(corners[i].x,corners[i].y);
          ctx.closePath();ctx.strokeStyle='rgba(0,255,0,0.9)';ctx.lineWidth=1.5;ctx.setLineDash([4,2]);ctx.stroke();ctx.setLineDash([]);
        } else {
          const{x:bx,y:by2,width:bw2,height:bh2}=child.bounds;
          ctx.strokeStyle='rgba(0,180,255,0.8)';ctx.lineWidth=1;ctx.setLineDash([3,2]);
          ctx.strokeRect(bx+0.5,by2+0.5,bw2-1,bh2-1);ctx.setLineDash([]);
        }
      }
      ctx.restore();
    }
  }

  _drawBar(ctx,b,dir,viewW,viewH,scroll,contentSz,SB) {
    const t=getTheme().window.scrollBar;
    const isV=dir==='v';
    const trackX=isV?b.x+viewW:b.x, trackY=isV?b.y:b.y+viewH;
    const trackW=isV?SB:viewW, trackH=isV?viewH:SB;
    const viewSz=isV?viewH:viewW;
    const{off,len}=this._thumbInfo(dir,viewSz,contentSz,scroll);
    const isDrag=this._sbDrag?.dir===dir;
    ctx.fillStyle='rgba(220,220,220,0.6)'; ctx.fillRect(trackX,trackY,trackW,trackH);
    ctx.fillStyle=isDrag?'rgba(70,70,70,0.7)':'rgba(100,100,100,0.45)';
    const tr=SB/2-1; ctx.beginPath();
        const thumbColor = isDrag ? t.thumbActive : (this._hoveredBar===dir ? t.thumbHover : t.thumb);

    if (isV) {
      drawGradient(ctx, trackX+2, trackY+off, SB-4, len, thumbColor, true);
      ctx.roundRect(trackX+2,trackY+off,SB-4,len,tr);
    }
    else {
      drawGradient(ctx, trackX+off, trackY+2, len, SB-4, thumbColor, false);
      ctx.roundRect(trackX+off,trackY+2,len,SB-4,tr);
    }
    ctx.fill();
  }
}

class HtmlLabel extends BaseWidget {
  constructor(html, bounds) {
    super(undefined, bounds);
    this._html       = html || '';
    this.padding     = { x:6, y:6 };
    this.background  = null;
    this.borderRadius = 0;
    this.autoHeight  = false;
    this.scrollable  = false;
    this._scrollY    = 0;
    this.defaultFont = { family:'Tahoma,Arial', size:11, color:'#000000' };
    this.widgets     = new Map();   // id → widget (user-registered)
    this._panels     = [];          // auto-created FlexPanel/TablePanel widgets
    this._layout     = null;
    this._contentH   = 0;
    this._hoverLink  = null;
    this._activeLink = null;
    this._imgCache   = new Map();
    this.cursor      = 'default';
    this._capturedWidget = null;
    this._embeddedHovered = null;
    this.on('mousemove',  e => this._onMouseMove(e));
    this.on('mousedown',  e => this._onMouseDown(e));
    this.on('mouseup',    e => this._onMouseUp(e));
    this.on('mouseleave', () => { this._hoverLink=null; this._activeLink=null; this.cursor='default'; if(this._embeddedHovered){this._embeddedHovered.emit({type:'mouseleave',stopPropagation(){},preventDefault(){},stopped:false});this._embeddedHovered=null;} this.markDirty(); /* pas de reset _layout */ });
    this.on('wheel',      e => this._onWheel(e));
  }

  set html(v) { this._html=v; this._layout=null; this._panels=[]; this.markDirty(); }
  get html()  { return this._html; }
  registerWidget(id, w) { this.widgets.set(id,w); this._layout=null; this.markDirty(); }

  // ── PARSER ─────────────────────────────────────────────────────
  _parse(html) {
    const VOID = new Set(['br','hr','img','input','widget']);
    const tokens = [];
    let i = 0;
    const src = html.replace(/\r\n/g,'\n')
      .replace(/&nbsp;/g,' ').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
    while (i < src.length) {
      if (src[i] === '<') {
        const end = src.indexOf('>', i); if (end < 0) { tokens.push({type:'text',val:src.slice(i)}); break; }
        const raw = src.slice(i+1,end).trim();
        if (raw.startsWith('!--')) { i = (src.indexOf('-->',i)+3) || src.length; continue; }
        const close = raw.startsWith('/');
        const body  = close ? raw.slice(1).trim() : raw;
        const spIdx = body.search(/[\s/]/);
        const tag   = (spIdx >= 0 ? body.slice(0,spIdx) : body).toLowerCase();
        const attrs = this._parseAttrs(spIdx >= 0 ? body.slice(spIdx) : '');
        tokens.push({ type: close?'close':'open', tag, attrs, selfClose: raw.endsWith('/')||VOID.has(tag) });
        i = end + 1;
      } else {
        const next = src.indexOf('<', i);
        const text = next < 0 ? src.slice(i) : src.slice(i, next);
        if (text) tokens.push({ type:'text', val:text });
        i = next < 0 ? src.length : next;
      }
    }
    const root = { tag:'#root', attrs:{}, children:[], style:{} };
    let cur = root;
    for (const tok of tokens) {
      if (tok.type === 'text') { cur.children.push({ tag:'#text', val:tok.val, children:[], attrs:{}, style:{} }); }
      else if (tok.type === 'open') {
        const node = { tag:tok.tag, attrs:tok.attrs, children:[], style:this._parseStyle(tok.attrs.style||'') };
        cur.children.push(node);
        if (!tok.selfClose) { node.parent = cur; cur = node; }
      } else {
        let p = cur; while (p && p.tag !== tok.tag) p = p.parent; if (p) cur = p.parent || root;
      }
    }
    return root;
  }

  _parseAttrs(str) {
    const attrs = {};
    const re = /(\w[\w-]*)(?:\s*=\s*(?:"([^"]*)"|'([^']*)'|(\S+)))?/g;
    let m; while ((m = re.exec(str)) !== null) attrs[m[1].toLowerCase()] = m[2]??m[3]??m[4]??true;
    return attrs;
  }
  _parseStyle(str) {
    const s = {};
    for (const part of str.split(';')) {
      const idx = part.indexOf(':'); if (idx < 0) continue;
      const k = part.slice(0,idx).trim().toLowerCase(), v = part.slice(idx+1).trim();
      if (k && v) s[k] = v;
    }
    return s;
  }

  // ── CSS HELPERS ────────────────────────────────────────────────
  _px(val, base=100) {
    if (val === undefined || val === null) return 0;
    val = String(val).trim();
    if (val.endsWith('px')) return parseFloat(val)||0;
    if (val.endsWith('em')) return (parseFloat(val)||0)*14;
    if (val.endsWith('%'))  return (parseFloat(val)||0)/100*(base||100);
    return parseFloat(val)||0;
  }
  _parsePad(style, prefix='padding') {
    // Handle CSS shorthand: "4px 8px" = top/bottom 4, left/right 8
    const raw = style[prefix] || '';
    const parts = raw.trim().split(/\s+/);
    const v0 = parts[0] ? this._px(parts[0]) : 0;
    const v1 = parts[1] ? this._px(parts[1]) : v0;
    const all_t = v0, all_b = parts[2] ? this._px(parts[2]) : v0;
    const all_l = v1, all_r = v1;
    return {
      t: style[`${prefix}-top`]    !== undefined ? this._px(style[`${prefix}-top`])    : all_t,
      r: style[`${prefix}-right`]  !== undefined ? this._px(style[`${prefix}-right`])  : all_r,
      b: style[`${prefix}-bottom`] !== undefined ? this._px(style[`${prefix}-bottom`]) : all_b,
      l: style[`${prefix}-left`]   !== undefined ? this._px(style[`${prefix}-left`])   : all_l,
    };
  }
  _cssColor(val, fallback) {
    if (!val) return fallback;
    val = String(val).trim();
    if (val === 'transparent') return null;
    if (val.startsWith('#') || val.startsWith('rgb') || val.startsWith('hsl')) return val;
    const N = { red:'#FF0000',green:'#008000',blue:'#0000FF',yellow:'#FFFF00',white:'#FFFFFF',
      black:'#000000',gray:'#808080',grey:'#808080',orange:'#FFA500',purple:'#800080',pink:'#FFC0CB',
      cyan:'#00FFFF',lime:'#00FF00',teal:'#008080',silver:'#C0C0C0',gold:'#FFD700',
      lightyellow:'#FFFFE0',lightblue:'#ADD8E6',lightgreen:'#90EE90',lightgray:'#D3D3D3',
      coral:'#FF7F50',salmon:'#FA8072',lavender:'#E6E6FA',turquoise:'#40E0D0',
      steelblue:'#4682B4',forestgreen:'#228B22',crimson:'#DC143C',tomato:'#FF6347',
      darkorange:'#FF8C00',navy:'#000080',maroon:'#800000',olive:'#808000' };
    return N[val.toLowerCase()] || fallback;
  }

  // ── FONT INHERITANCE ───────────────────────────────────────────
  _inheritFont(node, parent) {
    const s=node.style||{}, a=node.attrs||{}, tag=node.tag;
    let f = { ...parent };
    if (s['font-family']) f.family = s['font-family'].replace(/['"]/g,'').trim();
    if (a.face) f.family = a.face;
    if (s['font-size']) {
      const v = s['font-size'].trim();
      if (v.endsWith('px')) f.size=parseFloat(v);
      else if (v.endsWith('em')) f.size=f.size*parseFloat(v);
      else if (v.endsWith('%'))  f.size=f.size*parseFloat(v)/100;
      else { const rel={small:10,medium:12,large:16,'x-large':20,'xx-large':24}; f.size=rel[v]||parseFloat(v)||f.size; }
    }
    if (a.size) { const n=parseInt(a.size); if(!isNaN(n)) f.size=[8,10,12,14,18,24,36][Math.max(0,Math.min(6,n-1))]; }
    if (tag==='b'||tag==='strong'||s['font-weight']==='bold'||(parseInt(s['font-weight'])||0)>=700) f.bold=true;
    if (s['font-weight']==='normal') f.bold=false;
    if (tag==='i'||tag==='em'||s['font-style']==='italic') f.italic=true;
    if (s['font-style']==='normal') f.italic=false;
    if (tag==='u') f.underline=true;
    if (tag==='s'||tag==='strike') f.strike=true;
    if (s['text-decoration']) {
      if (s['text-decoration'].includes('underline'))   f.underline=true;
      if (s['text-decoration'].includes('line-through'))f.strike=true;
      if (s['text-decoration']==='none')                { f.underline=false; f.strike=false; }
    }
    if (s['color'])            f.color = this._cssColor(s['color'], f.color);
    if (a.color)               f.color = this._cssColor(a.color, f.color);
    f.bg = null;
    if (s['background-color']) f.bg = this._cssColor(s['background-color'], null);
    if (s['background'] && !s['background-color']) f.bg = this._cssColor(s['background'], null);
    if (tag==='mark' && !f.bg) f.bg = '#FFFF00';
    if (tag==='code') { f.family='Courier New,monospace'; if(!f.bg) f.bg='#F0F0F0'; }
    f.sup = tag==='sup' ? true : tag==='sub' ? false : (f.sup||false);
    f.sub = tag==='sub' ? true : tag==='sup' ? false : (f.sub||false);
    return f;
  }
  _ctxFont(f) { return `${f.italic?'italic ':''} ${f.bold?'bold ':''} ${f.size}px ${f.family}`.trim(); }
  _linkColor(href) {
    if (this._activeLink===href) return '#CC0000';
    if (this._hoverLink===href)  return '#0066CC';
    return '#0000EE';
  }

  // ── INLINE STATE ───────────────────────────────────────────────
  _makeIS(x, y, ta, lh) { return { x, y, items:[], href:null, textAlign:ta||'left', lineH:lh||0 }; }

  _flushLine(is, bkX, bkW, boxes) {
    if (!is.items.length) return;
    const lineH = is.lineH > 0 ? is.lineH : Math.max(14, ...is.items.map(i=>i.h));
    const used  = is.items.reduce((s,i)=>s+i.w, 0);
    const ta    = is.textAlign || 'left';
    let startX  = bkX;
    let justGap = 0;
    if      (ta==='center')  startX = bkX + (bkW-used)/2;
    else if (ta==='right')   startX = bkX + bkW - used;
    else if (ta==='justify' && is.items.length>1) justGap = (bkW-used)/(is.items.length-1);
    let ix = startX;
    for (const item of is.items) {
      const iy = is.y + (lineH - item.h) / 2;
      boxes.push({ ...item, x:ix, y:iy, href: item.href || is.href || null });
      ix += item.w + justGap;
    }
    is.y += lineH; is.x = bkX; is.items = [];
  }

  // ── FLEX/TABLE → panel delegation ─────────────────────────────
  // Converts a <div style="display:flex"> node into a FlexPanel widget
  _buildFlexPanel(node, st, childFont, x, w, y) {
    const pad = this._parsePad(st);
    const mar = this._parsePad(st, 'margin');
    const pw  = w - mar.l - mar.r;
    const panel = new FlexPanel({ x, y: y + mar.t, width: pw, height: 0 });
    panel.parent = this;

    // Flex properties
    panel.direction      = st['flex-direction'] || 'row';
    panel.wrap           = st['flex-wrap']       || 'nowrap';
    panel.justifyContent = st['justify-content'] || 'flex-start';
    panel.alignItems     = st['align-items']     || 'stretch';
    panel.alignContent   = st['align-content']   || 'stretch';
    const gapV = this._px(st['gap'] || st['column-gap'] || 0);
    panel.gap  = gapV;
    if (st['row-gap'])    panel.rowGap    = this._px(st['row-gap']);
    if (st['column-gap']) panel.columnGap = this._px(st['column-gap']);
    panel.padding      = { t: pad.t, r: pad.r, b: pad.b, l: pad.l };
    panel.background   = this._cssColor(st['background-color'] || st['background'], null);
    panel.borderRadius = st['border-radius'] ? this._px(st['border-radius']) : 0;

    // Build children (only direct element children, skip whitespace)
    let maxH = 0;
    const isRow = !panel.direction.startsWith('column');
    for (const child of node.children) {
      if (child.tag === '#text' && !child.val.trim()) continue;
      const cs = child.style || {};
      const cf = this._inheritFont(child, childFont);
      // Create a HtmlLabel for each flex child
      const childHtml = this._nodeToHtml(child);
      // Width: style first, then attribute (e.g. <img width="150">), then default
      const attrW = child.attrs && child.attrs['width'] ? this._px(child.attrs['width']) : 0;
      const childH  = cs['height'] ? this._px(cs['height']) : 60;
      const childW  = cs['width']  ? this._px(cs['width'])
                    : attrW        ? attrW
                    : (isRow ? 80 : pw - pad.l - pad.r);
      const lbl = new HtmlLabel(childHtml, { x:0, y:0, width: childW, height: childH });
      lbl.defaultFont  = { ...this.defaultFont, ...{ size: cf.size, color: cf.color, family: cf.family } };
      lbl.background   = this._cssColor(cs['background-color'] || cs['background'], null);
      lbl.borderRadius = cs['border-radius'] ? this._px(cs['border-radius']) : 0;
      const p2 = this._parsePad(cs);
      lbl.padding = { x: p2.l || 4, y: p2.t || 4 };
      lbl.autoHeight = true;
      // Pass through registered widgets
      for (const [id, w2] of this.widgets) lbl.registerWidget(id, w2);
      // Flex item props
      lbl.flex = {
        grow:      parseFloat(cs['flex-grow'] || (cs['flex'] && !cs['flex'].includes(' ') ? cs['flex'] : '0') || 0),
        shrink:    parseFloat(cs['flex-shrink'] || 1),
        basis:     cs['flex-basis'] ? this._px(cs['flex-basis']) : null,
        alignSelf: cs['align-self'] || null,
        order:     parseInt(cs['order'] || 0),
      };
      panel.children.push(lbl);
      lbl.parent = panel;
      maxH = Math.max(maxH, childH);
    }

    // Run FlexPanel layout FIRST to get correct child bounds.width before building child layouts
    panel.bounds.height = 200; // temporary height so _doLayout can distribute widths
    panel._doLayout();
    // Apply computed rects to child bounds so _buildLayout uses correct width
    for (let i = 0; i < panel.children.length; i++) {
      const r = panel._rects[i];
      if (r) { panel.children[i].bounds.width = r.w; panel.children[i].bounds.height = r.h; }
    }

    // Now build child layouts with the correct (post-flex) widths
    const offCtx = new OffscreenCanvas(pw, 2000).getContext('2d');
    for (const child of panel.children) {
      if (child instanceof HtmlLabel && child.autoHeight) {
        child._layout = child._buildLayout(offCtx);  // forces real height with correct width
      }
    }
    // Recompute panel height from actual child sizes
    const baseH = isRow
      ? Math.max(...panel.children.map(c=>c.bounds.height), 20) + pad.t + pad.b
      : panel.children.reduce((s,c)=>s+c.bounds.height, 0) + pad.t + pad.b + gapV*(panel.children.length-1);
    panel.bounds.height = Math.max(20, baseH);
    // Re-run layout with final height so positions are correct
    panel._doLayout();
    this._panels.push(panel);
    return { panel, totalH: panel.bounds.height + mar.t + mar.b };
  }

  // Converts a <table> node into a TablePanel widget
  _buildTablePanel(node, st, childFont, x, w, y) {
    const mar = this._parsePad(st, 'margin');
    let pw  = w - mar.l - mar.r;
    if (st['width']) {
      const wVal = String(st['width']).trim();
      if (wVal.endsWith('%')) pw = Math.min(pw, (parseFloat(wVal)/100) * pw);
      else pw = Math.min(pw, this._px(wVal));
    }
    const panel = new TablePanel({ x, y: y + mar.t, width: pw, height: 0 });
    panel.parent = this;
    panel.borderCollapse = (st['border-collapse'] || 'separate') === 'collapse';
    panel.borderSpacing  = this._px(st['border-spacing'] || (panel.borderCollapse ? 0 : 2));
    const tBorder = this._cssColor(st['border-color'] || st['border'], null);
    if (tBorder) panel.border = { color: tBorder, width: parseInt(st['border'])||1 };
    panel.background = this._cssColor(st['background-color'] || st['background'], null);

    // Collect rows
    const rows = [];
    const walk = (n) => { if (n.tag==='tr') rows.push(n); else for (const c of n.children) walk(c); };
    walk(node);

    // Count cols
    let nCols = 0;
    for (const row of rows) {
      let c = 0; for (const cell of row.children) if (cell.tag==='td'||cell.tag==='th') c += parseInt(cell.attrs.colspan||1);
      nCols = Math.max(nCols, c);
    }
    panel.setColumns(new Array(nCols).fill(null));

    // Add rows and cells
    let totalH = 2;
    for (const rowNode of rows) {
      const rst = rowNode.style || {};
      const isHeader = rows.indexOf(rowNode) === 0 || rowNode.children.some(c=>c.tag==='th');
      const rowBg = this._cssColor(rst['background-color'] || rst['background'], isHeader ? '#E8E8E8' : null);
      const row = panel.addRow({ background: rowBg, header: isHeader });
      for (const cellNode of rowNode.children) {
        if (cellNode.tag !== 'td' && cellNode.tag !== 'th') continue;
        const cs_n = cellNode.style || {};
        const cf   = this._inheritFont(cellNode, cellNode.tag==='th' ? {...childFont,bold:true} : childFont);
        const childHtml = this._innerHtml(cellNode);
        const estH = cellNode.attrs.height ? this._px(cellNode.attrs.height) : 28;
        const colspan = parseInt(cellNode.attrs.colspan||1);
        const rowspan = parseInt(cellNode.attrs.rowspan||1);
        const lbl = new HtmlLabel(childHtml, { x:0, y:0, width:80, height:estH });
        lbl.defaultFont = { ...this.defaultFont, size: cf.size, color: cf.color, family: cf.family, bold: cf.bold };
        lbl.padding = { x:0, y:0 };
        lbl.autoHeight = true;
        for (const [id, w2] of this.widgets) lbl.registerWidget(id, w2);
        const align  = cs_n['text-align'] || (cellNode.tag==='th' ? 'center' : 'left');
        const valign = cs_n['vertical-align'] || 'middle';
        const cellBg = this._cssColor(cs_n['background-color'] || cs_n['background'], null);
        const bColor = this._cssColor(cs_n['border-color'] || cs_n['border'], null);
        const pad_n  = cs_n['padding'] ? { t:this._px(cs_n['padding']), r:this._px(cs_n['padding']), b:this._px(cs_n['padding']), l:this._px(cs_n['padding']) }
                     : { t:this._px(cs_n['padding-top']||4), r:this._px(cs_n['padding-right']||8), b:this._px(cs_n['padding-bottom']||4), l:this._px(cs_n['padding-left']||8) };
        panel.addCell(row, lbl, { colspan, rowspan, align, valign,
          background: cellBg,
          border: bColor ? { color: bColor, width: 1 } : null,
          padding: pad_n });
        totalH = Math.max(totalH, estH + 8);
      }
      totalH += 28;
    }
    // Re-measure with actual layout to get correct heights
    const offCtx2 = new OffscreenCanvas(pw, 2000).getContext('2d');
    for (const r2 of panel._rows) {
      for (const cell of r2.cells) {
        if (cell.widget instanceof HtmlLabel && cell.widget.autoHeight) {
          cell.widget._layout = cell.widget._buildLayout(offCtx2);
        }
      }
    }
    // Force table re-layout with correct heights
    panel._layout = null;
    panel._doLayout();
    this._panels.push(panel);
    return { panel, totalH: panel.bounds.height + mar.t + mar.b };
  }

  // Serialize a DOM node back to HTML string (for child HtmlLabels)
  _nodeToHtml(node) {
    if (node.tag === '#text') return node.val;
    if (node.tag === '#root') return node.children.map(c=>this._nodeToHtml(c)).join('');
    const VOID = new Set(['br','hr','img','input','widget']);
    const attrs = Object.entries(node.attrs||{})
      .map(([k,v])=>v===true ? k : `${k}="${v}"`).join(' ');
    const styleStr = Object.entries(node.style||{}).map(([k,v])=>`${k}:${v}`).join(';');
    const allAttrs = [attrs, styleStr ? `style="${styleStr}"` : ''].filter(Boolean).join(' ');
    if (VOID.has(node.tag)) return `<${node.tag}${allAttrs?' '+allAttrs:''}>`;
    return `<${node.tag}${allAttrs?' '+allAttrs:''}>${node.children.map(c=>this._nodeToHtml(c)).join('')}</${node.tag}>`;
  }

  _innerHtml(node) {
    return node.children.map(c => this._nodeToHtml(c)).join('');
  }

  // ── LAYOUT ENGINE ──────────────────────────────────────────────
  _buildLayout(ctx) {
    this._panels = [];
    const b     = this.bounds;
    const avail = b.width - this.padding.x * 2;
    const defFont = { family:this.defaultFont.family, size:this.defaultFont.size,
      color:this.defaultFont.color||'#000000', bold:false, italic:false, underline:false,
      strike:false, bg:null, sup:false, sub:false };
    const boxes = [];
    const root  = this._parse(this._html || '');

    const layoutBlock = (node, font, bkX, bkW, startY, parentIS) => {
      const tag=node.tag, st=node.style||{}, a=node.attrs||{};
      const disp = (st['display']||'').toLowerCase();

      // ── #text ────────────────────────────────────────────────
      if (tag === '#text') {
        let text = node.val.replace(/\n/g,' ').replace(/\s+/g,' ');
        if (!parentIS && !text.trim()) return startY;
        if (!text) return startY;
        ctx.font = this._ctxFont(font);
        const words = text.split(' ');
        for (let wi=0; wi<words.length; wi++) {
          const word = (wi>0 && parentIS ? ' ' : '') + words[wi];
          if (!word) continue;
          const ww = ctx.measureText(word).width;
          if (parentIS && parentIS.x + ww > bkX + bkW && parentIS.items.length > 0)
            this._flushLine(parentIS, bkX, bkW, boxes);
          const item = { type:'text', text:word, font:{...font},
            x: parentIS?parentIS.x:bkX, w:ww, h:font.size*1.4, baseline:0,
            href: parentIS ? (parentIS.href||null) : null };
          if (parentIS) { parentIS.items.push(item); parentIS.x += ww; }
          else boxes.push({ ...item, y:startY });
        }
        return startY;
      }

      // ── <br> ─────────────────────────────────────────────────
      if (tag === 'br') { if (parentIS) this._flushLine(parentIS, bkX, bkW, boxes); return startY; }

      // ── <hr> ─────────────────────────────────────────────────
      if (tag === 'hr') {
        if (parentIS) this._flushLine(parentIS, bkX, bkW, boxes);
        const hy = (parentIS ? parentIS.y : startY) + 6;
        boxes.push({ type:'hr', x:bkX, y:hy, w:bkW, h:1, color:this._cssColor(st['color'],'#AAAAAA') });
        if (parentIS) parentIS.y = hy + 8;
        return hy + 8;
      }

      // ── <img> ────────────────────────────────────────────────
      if (tag === 'img') {
        const src=a.src||'';
        const iw=a.width?this._px(a.width):(st['width']?this._px(st['width']):80);
        const ih=a.height?this._px(a.height):(st['height']?this._px(st['height']):60);
        this._loadImage(src);
        const item = { type:'img', src, x:parentIS?parentIS.x:bkX, y:parentIS?parentIS.y:startY, w:iw, h:ih };
        if (parentIS) {
          if (parentIS.x+iw > bkX+bkW && parentIS.items.length>0) this._flushLine(parentIS,bkX,bkW,boxes);
          parentIS.items.push({...item,x:parentIS.x}); parentIS.x+=iw;
        } else { boxes.push(item); return startY+ih+4; }
        return startY;
      }

      // ── <widget> (user-registered) ───────────────────────────
      if (tag === 'widget') {
        const widget = this.widgets.get(a.id||'');
        if (!widget) return startY;
        const ww=widget.bounds.width, wh=widget.bounds.height;
        const item = { type:'widget', widget, x:parentIS?parentIS.x:bkX, y:parentIS?parentIS.y:startY, w:ww, h:wh, href:null };
        if (parentIS) {
          if (parentIS.x+ww > bkX+bkW && parentIS.items.length>0) this._flushLine(parentIS,bkX,bkW,boxes);
          parentIS.items.push({...item,x:parentIS.x}); parentIS.x+=ww+4;
        } else { boxes.push(item); return startY+wh+4; }
        return startY;
      }

      // ── <a> ──────────────────────────────────────────────────
      if (tag === 'a') {
        const href = a.href||'#';
        const savedHref = parentIS && parentIS.href;
        const aFont = { ...this._inheritFont(node,font), underline:true, color:this._linkColor(href), _href:href };
        if (parentIS) parentIS.href = href;
        let y = startY;
        for (const c of node.children) y = layoutBlock(c, aFont, bkX, bkW, y, parentIS);
        if (parentIS) parentIS.href = savedHref || null;
        return y;
      }

      const BLOCK_TAGS = new Set(['p','div','h1','h2','h3','h4','h5','h6',
        'ul','ol','blockquote','pre','header','footer','section','article','main','nav','aside','table']);
      const isBlock = BLOCK_TAGS.has(tag) || disp==='block' || disp==='flex' || disp==='inline-flex' || disp==='grid';
      const childFont = this._inheritFont(node, font);

      // ── Inline (span, b, i, mark, code…) ─────────────────────
      if (!isBlock) {
        let y = startY;
        for (const c of node.children) y = layoutBlock(c, childFont, bkX, bkW, y, parentIS);
        return y;
      }

      // Flush pending inline before any block
      if (parentIS && parentIS.items.length > 0) this._flushLine(parentIS, bkX, bkW, boxes);
      let y = parentIS ? parentIS.y : startY;
      const mar  = this._parsePad(st, 'margin');
      const pad  = this._parsePad(st);
      y += mar.t;
      let bkW2 = bkW - mar.l - mar.r;
      // For % widths, resolve against bkW (not the default base=100). For tables width:100% should mean full available width.
      if (st['width']) {
        const wVal = String(st['width']).trim();
        if (wVal.endsWith('%')) bkW2 = Math.min(bkW2, (parseFloat(wVal)/100) * bkW2);
        else bkW2 = Math.min(bkW2, this._px(st['width']));
      }
      const innerX = bkX + mar.l + pad.l;
      const innerW = bkW2 - pad.l - pad.r;
      const bgColor   = this._cssColor(st['background-color']||st['background'], null);
      const bdrR      = st['border-radius'] ? this._px(st['border-radius']) : 0;
      const textAlign = st['text-align'] || 'left';
      const lineH_css = st['line-height'] ? this._px(st['line-height'], childFont.size) : 0;

      // ── TABLE → TablePanel ────────────────────────────────────
      if (tag === 'table') {
        const { panel, totalH } = this._buildTablePanel(node, st, childFont, bkX+mar.l, bkW2, y);
        boxes.push({ type:'panel', panel, x: bkX+mar.l, y, w: bkW2, h: panel.bounds.height });
        y += totalH;
        if (parentIS) parentIS.y = y;
        return y;
      }

      // ── FLEX → FlexPanel ──────────────────────────────────────
      if (disp === 'flex' || disp === 'inline-flex') {
        const { panel, totalH } = this._buildFlexPanel(node, st, childFont, bkX+mar.l, bkW2, y);
        boxes.push({ type:'panel', panel, x: bkX+mar.l, y, w: bkW2, h: panel.bounds.height });
        y += totalH;
        if (parentIS) parentIS.y = y;
        return y;
      }

      // ── LIST (ul/ol) ──────────────────────────────────────────
      if (tag === 'ul' || tag === 'ol') {
        const listStyle = st['list-style-type'] || (tag==='ol' ? 'decimal' : 'disc');
        if (bgColor) boxes.push({ type:'bg', x:bkX+mar.l, y, w:bkW2, h:0, color:bgColor, borderRadius:bdrR, _fH:boxes.length });
        let idx = parseInt(a.start||1);
        const bgLI = bgColor ? boxes.length-1 : -1;
        const listStart = y + pad.t;
        y = listStart;
        for (const child of node.children) {
          if (child.tag !== 'li') continue;
          const liSt = child.style||{};
          const liPad = this._parsePad(liSt);
          y += liPad.t;
          const bulletX=innerX, contentX=innerX+18, contentW=innerW-18;
          const lineStart = y;
          const is = this._makeIS(contentX, y, liSt['text-align']||textAlign, lineH_css);
          for (const sub of child.children) layoutBlock(sub, childFont, contentX, contentW, y, is);
          if (is.items.length > 0) this._flushLine(is, contentX, contentW, boxes);
          const lh = childFont.size * 1.4;
          if      (listStyle==='decimal')     boxes.push({ type:'text', text:`${idx}.`, font:{...childFont}, x:bulletX, y:lineStart, w:16, h:lh, baseline:0, href:null });
          else if (listStyle==='lower-alpha') boxes.push({ type:'text', text:`${String.fromCharCode(96+idx)}.`, font:{...childFont}, x:bulletX, y:lineStart, w:16, h:lh, baseline:0, href:null });
          else if (listStyle==='upper-alpha') boxes.push({ type:'text', text:`${String.fromCharCode(64+idx)}.`, font:{...childFont}, x:bulletX, y:lineStart, w:16, h:lh, baseline:0, href:null });
          else boxes.push({ type:'bullet', shape:listStyle, x:bulletX+4, y:lineStart+lh/2, size:4 });
          y = is.y !== undefined ? is.y : y + lh;
          y += liPad.b + 3;
          idx++;
        }
        y += pad.b;
        if (bgLI >= 0) boxes[bgLI].h = y - listStart + pad.t;
        y += mar.b;
        if (parentIS) parentIS.y = y;
        return y;
      }

      // ── HEADING ───────────────────────────────────────────────
      if (/^h[1-6]$/.test(tag)) {
        const level = parseInt(tag[1]);
        const sizes = [0,22,18,16,14,13,12];
        const hFont = { ...childFont, size: sizes[level]||childFont.size, bold:true };
        y += 4;
        const is = this._makeIS(innerX, y, textAlign, lineH_css);
        for (const c of node.children) layoutBlock(c, hFont, innerX, innerW, y, is);
        if (is.items.length > 0) this._flushLine(is, innerX, innerW, boxes);
        y = (is.y || y) + 6;
        if (parentIS) parentIS.y = y + mar.b;
        return y + mar.b;
      }

      // ── Generic block (p, div, blockquote…) ───────────────────
      const bgIdx = bgColor ? boxes.length : -1;
      if (bgColor) boxes.push({ type:'bg', x:bkX+mar.l, y, w:bkW2, h:0, color:bgColor, borderRadius:bdrR });
      const contentStart = y + pad.t;
      const is = this._makeIS(innerX, contentStart, textAlign, lineH_css);
      let cy = contentStart;
      for (const c of node.children) cy = layoutBlock(c, childFont, innerX, innerW, cy, is);
      if (is.items.length > 0) this._flushLine(is, innerX, innerW, boxes);
      const endY = (is.y || cy) + pad.b;
      if (bgIdx >= 0) boxes[bgIdx].h = endY - y;
      y = endY + mar.b;
      if (parentIS) parentIS.y = y;
      return y;
    };

    const topIS = this._makeIS(this.padding.x, this.padding.y, 'left', 0);
    for (const c of root.children) {
      const r = layoutBlock(c, defFont, this.padding.x, avail, topIS.y, topIS);
      if (typeof r === 'number' && r > topIS.y) topIS.y = r;
    }
    if (topIS.items.length > 0) this._flushLine(topIS, this.padding.x, avail, boxes);

    this._contentH = (topIS.y || this.padding.y) + this.padding.y;
    if (this.autoHeight) { this.bounds.height = this._contentH; this.markDirty(); }
    return boxes;
  }

  // ── IMAGE LOADING ──────────────────────────────────────────────
  _loadImage(src) {
    if (!src || this._imgCache.has(src)) return;
    this._imgCache.set(src, 'loading');
    const img = new Image(); img.crossOrigin='anonymous';
    img.onload  = () => { this._imgCache.set(src,img); this._layout=null; this.markDirty(); };
    img.onerror = () => { this._imgCache.set(src,'error'); };
    img.src = src;
  }

  // ── RENDER ─────────────────────────────────────────────────────
  render(ctx) {
    const b = this.bounds;
    ctx.save();

    // Build layout FIRST — autoHeight may update bounds.height before we draw/clip
    if (!this._layout) this._layout = this._buildLayout(ctx);
    const scrollY = this.scrollable ? (this._scrollY||0) : 0;

    if (this.background !== null) {
      drawGradient(ctx, b.x, b.y, b.width, b.height, this.background);
      drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius);
      ctx.fill();
    }
    ctx.beginPath(); drawRoundRect(ctx, b.x, b.y, b.width, b.height, this.borderRadius); ctx.clip();

    ctx.save(); ctx.translate(b.x, b.y - scrollY);
    for (const box of this._layout) this._renderBox(ctx, box, scrollY, b.height);
    // Panels (flex/table)
    for (const panel of this._panels) {
      ctx.save(); panel.render(ctx); ctx.restore();
    }
    // User-registered widgets
    for (const box of this._layout) {
      if (box.type === 'widget' && box.widget) {
        ctx.save(); box.widget.bounds.x=box.x; box.widget.bounds.y=box.y; box.widget.render(ctx); ctx.restore();
      }
    }
    ctx.restore();

    if (this.scrollable && this._contentH > b.height) this._renderScrollbar(ctx, b, scrollY);
    ctx.restore();
  }

  _renderBox(ctx, box, scrollY, clipH) {
    if (box.y - scrollY > clipH || (box.y + (box.h||1)) < scrollY) return;
    switch (box.type) {
      case 'panel': {
        // Panel renders itself via this._panels loop; here just position it
        box.panel.bounds.x = box.x; box.panel.bounds.y = box.y;
        break;
      }
      case 'bg':
        drawGradient(ctx, box.x, box.y, box.w, box.h, box.color);
        drawRoundRect(ctx, box.x, box.y, box.w, box.h, box.borderRadius||0);
        ctx.fill(); break;
      case 'hr':
        ctx.strokeStyle=box.color||'#AAAAAA'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(box.x,box.y+0.5); ctx.lineTo(box.x+box.w,box.y+0.5); ctx.stroke(); break;
      case 'bullet': {
        ctx.fillStyle='#444';
        if (box.shape==='circle') { ctx.beginPath(); ctx.arc(box.x,box.y,box.size,0,Math.PI*2); ctx.stroke(); }
        else if (box.shape==='square') ctx.fillRect(box.x-box.size,box.y-box.size,box.size*2,box.size*2);
        else { ctx.beginPath(); ctx.arc(box.x,box.y,box.size,0,Math.PI*2); ctx.fill(); }
        break;
      }
      case 'text': {
        const f = box.font;
        const rf = (f.sup||f.sub) ? {...f,size:Math.round(f.size*0.7)} : f;
        ctx.font = this._ctxFont(rf);
        const baseY = box.y + box.h/2;
        const iy = f.sup ? baseY-f.size*0.28 : f.sub ? baseY+f.size*0.2 : baseY;
        if (f.bg) { ctx.fillStyle=f.bg; ctx.fillRect(box.x,box.y,box.w,box.h); }
        const linkHref = box.href || f._href || null;
        const color = linkHref ? this._linkColor(linkHref) : (f.color||'#000000');
        ctx.fillStyle=color; ctx.textBaseline='middle'; ctx.textAlign='left';
        ctx.fillText(box.text, box.x, iy);
        if (f.underline || linkHref) {
          ctx.strokeStyle=color; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(box.x,iy+rf.size*0.45); ctx.lineTo(box.x+box.w,iy+rf.size*0.45); ctx.stroke();
        }
        if (f.strike) {
          ctx.strokeStyle=color; ctx.lineWidth=1;
          ctx.beginPath(); ctx.moveTo(box.x,iy-rf.size*0.08); ctx.lineTo(box.x+box.w,iy-rf.size*0.08); ctx.stroke();
        }
        break;
      }
      case 'img': {
        const img = this._imgCache.get(box.src);
        if (img && img!=='error' && img!=='loading') {
          ctx.drawImage(img, box.x, box.y, box.w, box.h);
        } else {
          ctx.strokeStyle='#BBB'; ctx.lineWidth=1; ctx.strokeRect(box.x,box.y,box.w,box.h);
          ctx.fillStyle='#F5F5F5'; ctx.fillRect(box.x+1,box.y+1,box.w-2,box.h-2);
          ctx.fillStyle='#999'; ctx.font='11px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText(img==='error'?'✖':'⏳', box.x+box.w/2, box.y+box.h/2);
          this._loadImage(box.src);
        }
        break;
      }
    }
  }

  _renderScrollbar(ctx, b, scrollY) {
    const t = getTheme().window.scrollBar;
    const ratio  = b.height / this._contentH;
    const thumbH = Math.max(20, b.height * ratio);
    const thumbY = (scrollY / (this._contentH - b.height)) * (b.height - thumbH);
    
    // Draw track
    ctx.fillStyle = colorToCSS(t.track);
    ctx.fillRect(b.width - t.width, 0, t.width, b.height);
    
    // Draw thumb with gradient
    const thumbX = b.width - t.width + 2;
    const thumbW = t.width - 4;
    drawGradient(ctx, thumbX, thumbY + 2, thumbW, thumbH - 4, t.thumb);
    drawRoundRect(ctx, thumbX, thumbY + 2, thumbW, thumbH - 4, t.borderRadius);
    ctx.fill();
  }

  // ── EVENTS ─────────────────────────────────────────────────────
  dispatchEvent(ev) {
    // Snapshot panels/layout BEFORE super fires handlers that may reset _layout
    const panels  = this._panels ? [...this._panels] : [];
    const layout  = this._layout ? [...this._layout] : [];
    const type    = ev.type;

    // Let HtmlLabel's own handlers run (link hover, cursor, activeLink tracking)
    super.dispatchEvent(ev);
    if (ev.stopped) return true;

    const MOUSE_EVENTS = type==='mousedown'||type==='mouseup'||type==='mousemove'||type==='click';
    const SCROLL_EVENTS = type==='scroll'||type==='wheel';
    if (!MOUSE_EVENTS && !SCROLL_EVENTS) return false;

    const scrollY = this._scrollY||0;
    const bx=this.bounds.x, by=this.bounds.y;

    // Forward to FlexPanel / TablePanel children
    for (const panel of panels) {
      const px=bx+panel.bounds.x, py=by+panel.bounds.y-scrollY;
      if (ev.x>=px && ev.x<=px+panel.bounds.width && ev.y>=py && ev.y<=py+panel.bounds.height) {
        const re = { ...ev, x: ev.x-bx, y: ev.y-by+scrollY };
        panel.dispatchEvent(re);
        // Hover tracking for panel children via mousemove
        if (type==='mousemove') this._trackEmbeddedHover(ev, panels, layout);
        this.markDirty(); return true;
      }
    }

    // Forward to user-registered widget boxes
    for (const box of layout) {
      if (box.type!=='widget'||!box.widget) continue;
      const wx=bx+box.x, wy=by+box.y-scrollY;
      if (ev.x>=wx && ev.x<=wx+box.w && ev.y>=wy && ev.y<=wy+box.h) {
        box.widget.bounds.x=box.x; box.widget.bounds.y=box.y;
        const re = { ...ev, x: ev.x-bx, y: ev.y-by+scrollY };
        // On mousedown: capture for drag/mouseup delivery
        if (type==='mousedown') this._capturedWidget = box.widget;
        box.widget.dispatchEvent(re);
        if (type==='mousemove') this._trackEmbeddedHover(ev, panels, layout);
        this.markDirty(); return true;
      }
    }

    // Mousemove: deliver to captured widget for drag (e.g. Slider)
    if (type==='mousemove' && this._capturedWidget) {
      const re = { ...ev, x: ev.x-bx, y: ev.y-by+scrollY };
      this._capturedWidget.dispatchEvent(re);
      this.markDirty(); return true;
    }

    // Mouseup: deliver to captured widget even if cursor moved off
    if (type==='mouseup' && this._capturedWidget) {
      const w=this._capturedWidget; this._capturedWidget=null;
      w.bounds.x = w.bounds.x; // already set from mousedown
      const re = { ...ev, x: ev.x-bx, y: ev.y-by+scrollY };
      w.dispatchEvent(re); this.markDirty(); return true;
    }
    // No panel/widget hit — clear hover
    if (type==='mousemove') this._trackEmbeddedHover(ev, panels, layout);
    return false;
  }

  // Retourne le widget embarqué sous les coords contenu-espace (pour _findInWidget du WM)
  _findEmbeddedAt(cx, cy) {
    if (!this._layout && !this._panels) return null;
    const panels = this._panels || [];
    const layout = this._layout || [];
    const scrollY = this._scrollY||0;
    const bx=this.bounds.x, by=this.bounds.y;
    // Panels (FlexPanel/TablePanel)
    for (const panel of panels) {
      const px=bx+panel.bounds.x, py=by+panel.bounds.y-scrollY;
      if (cx>=px && cx<=px+panel.bounds.width && cy>=py && cy<=py+panel.bounds.height) {
        if (panel._rects) {
          const lx=cx-bx-panel.bounds.x, ly=cy-by+scrollY-panel.bounds.y;
          for (let i=panel.children.length-1;i>=0;i--) {
            const c=panel.children[i], r=panel._rects[i];
            if (r && c.visible && lx>=r.x && lx<=r.x+r.w && ly>=r.y && ly<=r.y+r.h) return c;
          }
        }
        return null;
      }
    }
    // Inline widgets
    for (const box of layout) {
      if (box.type!=='widget'||!box.widget) continue;
      const wx=bx+box.x, wy=by+box.y-scrollY;
      if (cx>=wx && cx<=wx+box.w && cy>=wy && cy<=wy+box.h) {
        // Mark as embedded so WindowManager does not capture drag (coords would be wrong)
        box.widget._embeddedInHtmlLabel = true;
        return box.widget;
      }
    }
    return null;
  }

  // Hover tracking for embedded widgets (they are not in the widget tree seen by WM)
  _trackEmbeddedHover(ev, panels, layout) {
    const scrollY=this._scrollY||0, bx=this.bounds.x, by=this.bounds.y;
    let found = null;
    // Check panel children
    for (const panel of panels) {
      const px=bx+panel.bounds.x, py=by+panel.bounds.y-scrollY;
      if (ev.x>=px && ev.x<=px+panel.bounds.width && ev.y>=py && ev.y<=py+panel.bounds.height) {
        // Drill into panel to find the hovered child
        if (panel._rects) {
          const lx=ev.x-bx-panel.bounds.x, ly=ev.y-by+scrollY-panel.bounds.y;
          for (let i=panel.children.length-1;i>=0;i--) {
            const c=panel.children[i], r=panel._rects[i];
            if (r && c.visible && lx>=r.x && lx<=r.x+r.w && ly>=r.y && ly<=r.y+r.h) { found=c; break; }
          }
        }
        break;
      }
    }
    // Check inline widgets
    if (!found) {
      for (const box of layout) {
        if (box.type!=='widget'||!box.widget) continue;
        const wx=bx+box.x, wy=by+box.y-scrollY;
        if (ev.x>=wx && ev.x<=wx+box.w && ev.y>=wy && ev.y<=wy+box.h) { found=box.widget; break; }
      }
    }
    if (found !== this._embeddedHovered) {
      const mk = (t) => ({ ...ev, type:t, stopPropagation(){this.stopped=true;}, preventDefault(){this.defaultPrevented=true;}, stopped:false });
      if (this._embeddedHovered) this._embeddedHovered.dispatchEvent(mk('mouseleave'));
      if (found) found.dispatchEvent(mk('mouseenter'));
      this._embeddedHovered = found;
    }
  }

  _localCoords(e) { return { x: e.x-this.bounds.x, y: e.y-this.bounds.y }; }

  _boxAt(lx, ly) {
    if (!this._layout) return null;
    const sy = this._scrollY||0;
    for (let i=this._layout.length-1; i>=0; i--) {
      const box=this._layout[i];
      if (!box.href && !(box.font && box.font._href) && box.type!=='widget') continue;
      if (lx>=box.x&&lx<=box.x+box.w&&ly+sy>=box.y&&ly+sy<=box.y+(box.h||16)) return box;
    }
    return null;
  }

  _boxHref(box) { return box ? (box.href || (box.font && box.font._href) || null) : null; }

  _onMouseMove(e) {
    const {x,y}=this._localCoords(e);
    const box=this._boxAt(x,y);
    const nh = this._boxHref(box);
    const nc = nh ? 'pointer' : 'default';
    if (nh!==this._hoverLink||nc!==this.cursor) {
      this._hoverLink=nh; this.cursor=nc; this.markDirty(); // pas de reset _layout
    }
  }
  _onMouseDown(e) {
    if (e.button!==0) return;
    const {x,y}=this._localCoords(e);
    const box=this._boxAt(x,y);
    const href = this._boxHref(box);
    if (box && href) { this._activeLink=href; this.markDirty(); }
  }
  _onMouseUp(e) {
    if (e.button!==0) return;
    const {x,y}=this._localCoords(e);
    const box=this._boxAt(x,y);
    const href = this._boxHref(box);
    const was=this._activeLink; this._activeLink=null;
    this.markDirty(); // repaint lien (état actif → normal)
    if (box && href && href===was) {
      const ev={type:'linkClick',href,target:this,x:0,y:0,
        stopPropagation(){this.stopped=true;},preventDefault(){this.defaultPrevented=true;},
        stopped:false,defaultPrevented:false};
      this.emit(ev);
      if (!ev.defaultPrevented && href!=='#' && !href.startsWith('custom:'))
        window.open(href,'_blank','noopener');
    }
  }
  _onWheel(e) {
    if (!this.scrollable) return;
    this._scrollY = Math.max(0, Math.min(Math.max(0,this._contentH-this.bounds.height), (this._scrollY||0)+(e.deltaY||0)*0.5));
    this.markDirty();
  }
}


class GUIWindow extends BaseWidget {
  constructor(title, bounds) {
    super(undefined, bounds);
    this.title = title;
    this.resizable = true; this.closable = true;
    this.minimizable = true; this.maximizable = true; this.modal = false;
    this._active = false; this._state = 'normal';
    this._prevBounds = null;
    // Animation
    this._anim = null;
    this._animScale = 1;
    this._animOpacity = 1;
    this._dragging = false; this._dragOffset = { x:0, y:0 };
    this._resizing = false; this._resizeEdge = ''; this._resizeStart = null;
    this._titleBarHover = '';

    const t = getTheme().window;
    const th = t.titleBar.height;
    const btnStyle = t.buttonStyle;
    const btnSize = btnStyle === 'circle' ? 14 : 16;
    const btnY = (th - btnSize) / 2;

    // Content area: position relative to window origin
    this._contentArea = new WindowContent({
      x: t.border.width, y: th,
      width:  bounds.width  - t.border.width * 2,
      height: bounds.height - th - t.border.width
    });
    this._contentArea.parent = this;

    // Title-bar buttons (coords relative to window origin)
    if (btnStyle === 'circle') {
      this._closeBtn = new WinButton('close',    { x:10,    y:btnY, width:btnSize, height:btnSize });
      this._minBtn   = new WinButton('minimize', { x:28,    y:btnY, width:btnSize, height:btnSize });
      this._maxBtn   = new WinButton('maximize', { x:46,    y:btnY, width:btnSize, height:btnSize });
    } else {
      const bx = bounds.width - 3*(btnSize+2) - 4;
      this._closeBtn = new WinButton('close',    { x:bx + 2*(btnSize+2), y:btnY, width:btnSize, height:btnSize });
      this._minBtn   = new WinButton('minimize', { x:bx,                 y:btnY, width:btnSize, height:btnSize });
      this._maxBtn   = new WinButton('maximize', { x:bx + btnSize+2,     y:btnY, width:btnSize, height:btnSize });
    }
    this._closeBtn.parent = this._minBtn.parent = this._maxBtn.parent = this;

    this._closeBtn.on('click', () => this._onClose());
    this._minBtn.on('click',   () => this._onMin());
    this._maxBtn.on('click',   () => this._onMax());

    this.on('dblclick', e => {
      const ab = this.getAbsoluteBounds();
      if (e.y >= ab.y && e.y < ab.y + getTheme().window.titleBar.height && this.maximizable)
        this._onMax();
    });
  }

  get active()  { return this._active; }
  set active(v) { this._active = v; this.markDirty(); }
  get state()       { return this._state; }
  get contentArea() { return this._contentArea; }

  // Returns true if absolute point (ax,ay) hits a title-bar button
  _hitBtn(btn, ax, ay) {
    const ab = this.getAbsoluteBounds();
    return rectContains({
      x: ab.x + btn.bounds.x, y: ab.y + btn.bounds.y,
      width: btn.bounds.width, height: btn.bounds.height
    }, ax, ay);
  }

  // Returns resize edge string ('n','s','e','w','ne'…) or '' if not on an edge
  _getEdge(ax, ay) {
    if (!this.resizable || this._state !== 'normal') return '';
    const t = getTheme().window, rh = t.resizeHandle;
    const ab = this.getAbsoluteBounds(), { x, y, width:w, height:h } = ab;
    let edge = '';
    if      (ay < y + rh)     edge += 'n';
    else if (ay > y + h - rh) edge += 's';
    if      (ax < x + rh)     edge += 'w';
    else if (ax > x + w - rh) edge += 'e';
    const onEdge = ax < x+rh || ax > x+w-rh || ay < y+rh || ay > y+h-rh;
    return onEdge ? edge : '';
  }

  // Called by WindowManager directly (not via dispatchEvent) to start drag/resize
  startDrag(ax, ay, button) {
    if (button !== 0) return;
    const t = getTheme().window, th = t.titleBar.height;
    const ab = this.getAbsoluteBounds();

    // Title bar drag
    if (ay >= ab.y && ay < ab.y + th && this._state !== 'maximized') {
      this._dragging = true;
      this._dragOffset = { x: ax - this.bounds.x, y: ay - this.bounds.y };
      return;
    }
    // Edge resize
    const edge = this._getEdge(ax, ay);
    if (edge) {
      this._resizing = true;
      this._resizeEdge = edge;
      this._resizeStart = { mouse: { x:ax, y:ay }, bounds: { ...this.bounds } };
    }
  }

  // Called by WindowManager on every mousemove (even outside window)
  continueDrag(ax, ay) {
    if (this._dragging) {
      const nx = ax - this._dragOffset.x;
      const ny = Math.max(0, ay - this._dragOffset.y);
      this.bounds.x = nx; this.bounds.y = ny;
      this._contentArea.markDirty();
      return;
    }
    if (this._resizing && this._resizeStart) {
      const dx = ax - this._resizeStart.mouse.x;
      const dy = ay - this._resizeStart.mouse.y;
      const orig = this._resizeStart.bounds;
      const minW = 180, minH = 80;
      let nx = orig.x, ny = orig.y, nw = orig.width, nh = orig.height;
      if (this._resizeEdge.includes('e')) nw = Math.max(minW, orig.width  + dx);
      if (this._resizeEdge.includes('s')) nh = Math.max(minH, orig.height + dy);
      if (this._resizeEdge.includes('w')) { nw = Math.max(minW, orig.width  - dx); nx = orig.x + orig.width  - nw; }
      if (this._resizeEdge.includes('n')) { nh = Math.max(minH, orig.height - dy); ny = orig.y + orig.height - nh; }
      this.bounds.x = nx; this.bounds.y = ny;
      this.bounds.width = nw; this.bounds.height = nh;
      this._updateLayout();
    }
  }

  // Called by WindowManager on mouseup
  endDrag() {
    this._dragging = false;
    this._resizing = false;
    this._resizeStart = null;
  }

  get isDragging() { return this._dragging || this._resizing; }

  // Returns the CSS cursor to show for this absolute position
  getCursorAt(ax, ay) {
    if (this._dragging) return 'grabbing';
    if (this._resizing) {
      const m = { n:'n-resize', s:'s-resize', e:'e-resize', w:'w-resize',
                  ne:'ne-resize', nw:'nw-resize', se:'se-resize', sw:'sw-resize' };
      return m[this._resizeEdge] || 'default';
    }
    const edge = this._getEdge(ax, ay);
    if (edge) {
      const m = { n:'n-resize', s:'s-resize', e:'e-resize', w:'w-resize',
                  ne:'ne-resize', nw:'nw-resize', se:'se-resize', sw:'sw-resize' };
      return m[edge] || 'default';
    }
    return 'default';
  }

  update(dt) {
    super.update(dt);
    this._contentArea.update(dt);
    if (!this._anim) return;
    const a = this._anim;
    a.t = Math.min(1, a.t + dt / a.duration);
    // Choose easing per style
    let p;
    if (a.style === 'genie')     p = _easeInOut(a.t);
    else if (a.style === 'zoom') p = _easeSpring(a.t);
    else                         p = _easeOutCubic(a.t);
    a.p = p; // store for render
    if (a.type === 'maximize' || a.type === 'unmaximize') {
      const lerp = (f,t2) => f+(t2-f)*p;
      this.setBounds({ x:lerp(a.from.x,a.to.x), y:lerp(a.from.y,a.to.y),
        width:lerp(a.from.width,a.to.width), height:lerp(a.from.height,a.to.height) });
      this._updateLayout();
    } else if (a.style && a.style.startsWith('bmw:')) {
      // BMW effect: progress goes 0→1 for open, stored in a.p
      a.p = a.t; // already in 0→1 range
    } else {
      // Fallback zoom: scale/opacity driven by render
      this._animScale   = a.from.scale   + (a.to.scale   - a.from.scale)   * p;
      this._animOpacity = a.from.opacity + (a.to.opacity - a.from.opacity) * p;
    }
    this.markDirty();
    if (a.t >= 1) {
      const type = a.type;
      this._anim = null; this._animScale = 1; this._animOpacity = 1;
      if (type === 'close') {
        // Mark the entire window area as dirty before hiding
        this.markDirty(this.getAbsoluteBounds());
        this.visible = false;
        // Remove from window manager
        if (this.parent && this.parent instanceof WindowManager) {
          this.parent.removeWindow(this);
        }
      }
    }
  }
  _onClose() {
    // Pick same effect as current or a new one
    const effName = this._bmwEffName || _bmwPick();
    const eff = BMW[effName];
    const dur = eff ? eff.duration.close : 300;
    this._bmwEffName = effName;
    this._bmwState = null;  // reset so render re-inits
    this._anim = { style:'bmw:'+effName, type:'close', t:0, duration:dur, p:1 };
    this._animScale = 1; this._animOpacity = 1;
    this.markDirty();
  }
  _onMin() {
    if (this._state === 'minimized') {
      this._state = 'normal';
      if (this._prevBounds) this.setBounds(this._prevBounds);

class WindowManager extends BaseWidget {
  constructor(bounds) {
    super(undefined, bounds);
    this._windows = []; this._activeWindow = null; this._focusedWidget = null;
    this._hoveredWidget = null; this._draggedWindow = null;
    this._tooltipWidget = null; this._tooltipTimer = 0;
    this._tooltipVisible = false; this._tooltipPos = { x:0, y:0 };
    this._tooltipAppearTime = 0; this._tooltipAppearDuration = 300;
    this._tooltipFadingOut = false; this._tooltipFadeDuration = 150;
    this._mousePos = { x:0, y:0 };
    this._mouseDown = false;
  }

  addWindow(win) {
    this._windows.push(win); win.parent=this; this._activate(win);
    const style = _animStyle();  // 'bmw:effectname'
    const effName = style.split(':')[1];
    const eff = BMW[effName];
    const dur = eff ? eff.duration.open : 300;
    win._bmwEffName = effName;
    win._bmwState = null;  // lazy-init on first render
    win._anim = { style, type:'open', t:0, duration:dur, p:0 };
    win._animScale = 1; win._animOpacity = 1;

  }
  removeWindow(win) {
    const i = this._windows.indexOf(win);
    if (i < 0) return;
    this._windows.splice(i, 1); win.parent = null;

      this._activeWindow = this._windows.length > 0 ? this._windows[this._windows.length-1] : null;
      if (this._activeWindow) this._activeWindow.active = true;
    }

  }

  _activate(win) {

    win.active = true; this._activeWindow = win;
    const i = this._windows.indexOf(win);

    this.markDirty();

    const hitClose = topWin._hitBtn(topWin._closeBtn, x, y);
    const hitMin   = topWin._hitBtn(topWin._minBtn,   x, y);
    const hitMax   = topWin._hitBtn(topWin._maxBtn,   x, y);

    // Dispatch mousedown into the window (handles content children + title bar btns)

    const target = this._getDeepestInWindow(topWin, x, y);

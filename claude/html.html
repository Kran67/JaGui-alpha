    if (win._hitBtn(win._maxBtn,   ax, ay)) return win._maxBtn;
    // Content area: convert to relative coords (scroll-adjusted)
    if (win._state !== 'minimized' && win._contentArea.hitTest(ax, ay)) {
      const wab = win.getAbsoluteBounds();
      const ca  = win._contentArea;
      // If over a scrollbar, don't descend into children
      if (ca.isOverScrollbar(ax, ay)) return null;
      const relX = ax - wab.x - ca.bounds.x + ca._scrollX;
      const relY = ay - wab.y - ca.bounds.y + ca._scrollY;
      return this._findInWidget(ca, relX, relY) || win;
    }
    return win;
  }

  _findInWidget(widget, rx, ry) {
    const sorted = [...widget.children].sort((a, b) => b.zIndex - a.zIndex);
    for (const c of sorted) {
      if (!c.visible || !c.hitTest(rx, ry)) continue;
      // HtmlLabel: déléguer la recherche aux widgets embarqués (FlexPanel enfants, inline widgets)
      // rx,ry sont en content-space (0,0 = origine du contenu de la fenêtre)
      // _findEmbeddedAt attend les mêmes coords content-space
      if (c._findEmbeddedAt) {
        const emb = c._findEmbeddedAt(rx, ry);
        if (emb) return emb;
        return c; // HtmlLabel lui-même (zone de lien ou fond)
      }
      if (c.children && c.children.length > 0) {
        // Recurse: transform to child-local coords for container widgets
        const lp = c.rotation ? c.localPoint(rx, ry) : { x: rx, y: ry };
        return this._findInWidget(c, lp.x - c.bounds.x, lp.y - c.bounds.y) || c;
      }
      return c;
    }
    return null;
  }

  _cssCursor(c) {
    const m = { 'default':'default','pointer':'pointer','text':'text','move':'move',
      'grab':'grab','grabbing':'grabbing','crosshair':'crosshair',
      'n-resize':'n-resize','s-resize':'s-resize',
      'e-resize':'e-resize','w-resize':'w-resize','ne-resize':'ne-resize',
      'nw-resize':'nw-resize','se-resize':'se-resize','sw-resize':'sw-resize',
      'ns-resize':'ns-resize','ew-resize':'ew-resize','col-resize':'col-resize' };
    return m[c] || 'default';
  }

  update(dt) {
    // Tooltip fading in (waiting for delay)
    if (this._tooltipWidget && !this._tooltipVisible && !this._tooltipFadingOut) {
      this._tooltipTimer += dt;
      if (this._tooltipTimer > 500) {
        this._tooltipVisible = true;
        this._tooltipPos = { ...this._mousePos };
        this._tooltipAppearTime = 0;
        this.markDirty();
      }
    }
    // Tooltip fade-in animation — only markDirty while still animating
    if (this._tooltipWidget && this._tooltipVisible && !this._tooltipFadingOut) {
      if (this._tooltipAppearTime < this._tooltipAppearDuration) {
        this._tooltipAppearTime = Math.min(this._tooltipAppearTime + dt, this._tooltipAppearDuration);
        this.markDirty();
      }
    }
    // Tooltip fading out
    if (this._tooltipFadingOut) {
      this._tooltipAppearTime = Math.max(this._tooltipAppearTime - dt, 0);
      this.markDirty();
      if (this._tooltipAppearTime <= 0) {
        this._tooltipFadingOut = false;
        this._tooltipVisible = false;
        this._tooltipWidget = null;
      }
    }
    for (const win of this._windows) {
      if (win._state === 'maximized' && (!win._anim || win._anim.type !== 'maximize')) {
        win.setBounds({ x:0, y:0, width:this.bounds.width, height:this.bounds.height });
        win._updateLayout();
      }
      win.update(dt);
    }
  }

  render(ctx) {
    const b = this.bounds, t = getTheme();
    ctx.fillStyle = colorToCSS(t.desktop.background);
    ctx.fillRect(b.x, b.y, b.width, b.height);
    ctx.save(); ctx.globalAlpha = 0.04; ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 1;
    for (let gx=0; gx<b.width;  gx+=40) { ctx.beginPath(); ctx.moveTo(b.x+gx,b.y); ctx.lineTo(b.x+gx,b.y+b.height); ctx.stroke(); }
    for (let gy=0; gy<b.height; gy+=40) { ctx.beginPath(); ctx.moveTo(b.x,b.y+gy); ctx.lineTo(b.x+b.width,b.y+gy); ctx.stroke(); }
    ctx.restore();
    for (const win of this._windows) if (win.visible) win.render(ctx);
    if (this._tooltipVisible && this._tooltipWidget?.tooltip)
      this._renderTooltip(ctx, this._tooltipWidget.tooltip, this._tooltipPos);
  }

  _renderTooltip(ctx, text, pos) {
    const t = getTheme().tooltip; 
    const opacity = this._tooltipAppearTime / this._tooltipAppearDuration;
    ctx.save();
    ctx.globalAlpha *= opacity;
    ctx.font = fontToCSS(t.font);
    const tw = ctx.measureText(text).width, th2 = t.font.size + t.padding.y*2, tw2 = tw + t.padding.x*2;
    let tx = pos.x+12, ty = pos.y+20;
    if (tx+tw2 > this.bounds.width)  tx = pos.x - tw2 - 4;
    if (ty+th2 > this.bounds.height) ty = pos.y - th2 - 4;
    if (t.shadow) applyShadow(ctx, t.shadow);
    ctx.fillStyle = colorToCSS(t.background);
    drawRoundRect(ctx, tx, ty, tw2, th2, t.borderRadius); ctx.fill();
    clearShadow(ctx);
    ctx.strokeStyle = colorToCSS(t.border.color); ctx.lineWidth = t.border.width;
    drawRoundRect(ctx, tx+.5, ty+.5, tw2-1, th2-1, t.borderRadius); ctx.stroke();
    ctx.fillStyle = colorToCSS(t.text); ctx.textBaseline = 'middle';
    ctx.fillText(text, tx+t.padding.x, ty+th2/2);
    ctx.restore();
  }
  scrollOpenDropDown(x,y,steps){
    for(let wi=this._windows.length-1;wi>=0;wi--){
      const win=this._windows[wi];if(!win.visible)continue;
      const wab=win.getAbsoluteBounds();
      const ca=win._contentArea;
      const dds=this._collectOpenDDs(ca.children||[]);
      for(const dd of dds){
        const lr=dd._listRect();
        const ax=wab.x+ca.bounds.x+lr.x,ay=wab.y+ca.bounds.y+lr.y;
        if(x>=ax&&x<=ax+lr.width&&y>=ay&&y<=ay+lr.height){
          const vis=Math.min(dd._maxVisibleItems,dd.items.length);
          dd._scrollOffset=Math.max(0,Math.min(dd._scrollOffset+steps,dd.items.length-vis));
          dd.markDirty();return true;
        }
      }
    }
    return false;
  }
  _collectOpenDDs(children){
    const r=[];
    for(const c of children){
      if(c._open===true)r.push(c);
      if(c.children&&c.children.length)r.push(...this._collectOpenDDs(c.children));
    }
    return r;
  }

}


class GUIEngine {
  constructor(canvas) {
    this._canvas=canvas;
    const ctx=canvas.getContext('2d'); if(!ctx)throw new Error('No 2D context');
    this._ctx=ctx;
    this._offscreen=document.createElement('canvas');
    this._offscreen.width=canvas.width; this._offscreen.height=canvas.height;
    this._offCtx=this._offscreen.getContext('2d');
    this._wm=new WindowManager({x:0,y:0,width:canvas.width,height:canvas.height});
    this._wm._cursorEl=canvas;
    this._wm._cursorEl=canvas;
    this._fullRedraw=true; this._rafId=0; this._lastTime=0;
    this._fps=0; this._frameCount=0; this._fpsTimer=0;
    this.showDirtyRects = false; // debug overlay of dirty regions
    this.showGridOverlay = false; // Ctrl+G: grid lines on GridPanels
    this._setupInput();
  }
  get windowManager(){return this._wm;}
  _setupInput(){
    const c=this._canvas;
    const pos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};};
    const posT=t=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};};

    // ── Mouse (desktop) ────────────────────────────────────────────────────
    // mousedown on canvas only — starts interactions
    c.addEventListener('mousedown',e=>{
      if(this._touchActive)return;
      c.focus({preventScroll:true});
      const {x,y}=pos(e);
      this._mouseDown=true;
      this._wm.handleMouseDown(x,y,e.button);
      this._fullRedraw=true;
    });
    // mouseup / mousemove on window so drag keeps working outside canvas
    window.addEventListener('mouseup',e=>{
      if(this._touchActive)return;
      const {x,y}=pos(e);
      if(this._mouseDown){
        this._mouseDown=false;
        this._wm.handleMouseUp(x,y,e.button);
        this._fullRedraw=true;
      }
    });
    window.addEventListener('mousemove',e=>{
      if(this._touchActive)return;
      const {x,y}=pos(e);
      this._wm.handleMouseMove(x,y);
      this._fullRedraw=true;
    });
    c.addEventListener('dblclick', e=>{if(this._touchActive)return;const {x,y}=pos(e);this._wm.handleDblClick(x,y);this._fullRedraw=true;});
    c.addEventListener('wheel',e=>{e.preventDefault();const {x,y}=pos(e);this._wm.handleWheel(x,y,e.deltaX||0,e.deltaY,e.shiftKey);this._fullRedraw=true;},{passive:false});
    c.addEventListener('contextmenu',e=>e.preventDefault());
    c.addEventListener('mouseleave',()=>{
      for (const win of this._wm._windows) { if (win.visible) win._contentArea.setHovered(false); }
      this._fullRedraw=true;
    });

    // ── Touch (mobile / tablet) ────────────────────────────────────────────
    let _tid=null,_ts=null,_lastTap=0,_lastPos={x:0,y:0},_twoY=null,_lpTimer=null;
    this._touchActive=false;

    c.addEventListener('touchstart',e=>{
      e.preventDefault();
      this._touchActive=true;
      if(e.touches.length===1){
        const t=e.touches[0]; const {x,y}=posT(t);
        _tid=t.identifier; _ts={x,y};
        if(_lpTimer)clearTimeout(_lpTimer);
        _lpTimer=setTimeout(()=>{ _lpTimer=null; },600);
        this._ddScrollAcc=0;this._wm.handleMouseDown(x,y,0); this._fullRedraw=true;
        const now=Date.now();
        if(now-_lastTap<320&&Math.abs(x-_lastPos.x)<24&&Math.abs(y-_lastPos.y)<24){
          this._wm.handleDblClick(x,y); this._fullRedraw=true;
        }
        _lastTap=now; _lastPos={x,y};
      } else if(e.touches.length===2){
        if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
        if(_ts)this._wm.handleMouseUp(_ts.x,_ts.y,0);
        _twoY=(e.touches[0].clientY+e.touches[1].clientY)/2;
      }
    },{passive:false});

    c.addEventListener('touchmove',e=>{
      e.preventDefault();
      if(e.touches.length===1){
        const t=[...e.touches].find(t=>t.identifier===_tid)||e.touches[0];
        const {x,y}=posT(t);
        if(_lpTimer&&_ts&&(Math.abs(x-_ts.x)>8||Math.abs(y-_ts.y)>8)){clearTimeout(_lpTimer);_lpTimer=null;}
        // Touch-scroll open DropDown list
        if(_ts && this._wm.scrollOpenDropDown){
          const _dy=y-_ts.y;
          this._ddScrollAcc=(this._ddScrollAcc||0)+_dy;
          if(Math.abs(this._ddScrollAcc)>=22){
            const _steps=-Math.round(this._ddScrollAcc/22);
            if(this._wm.scrollOpenDropDown(x,y,_steps)){
              this._ddScrollAcc=0;_ts={x,y};this._fullRedraw=true;return;
            }
            this._ddScrollAcc=0;
          }
        }
        this._wm.handleMouseMove(x,y); this._fullRedraw=true;
      } else if(e.touches.length===2){
        const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
        const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
        const r=c.getBoundingClientRect(),sx=c.width/r.width,sy2=c.height/r.height;
        if(_twoY!==null){this._wm.handleWheel((cx-r.left)*sx,(cy-r.top)*sy2,(cy-_twoY)*-4);this._fullRedraw=true;}
        _twoY=cy;
      }
    },{passive:false});

    c.addEventListener('touchend',e=>{
      e.preventDefault();
      if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
      _twoY=null;
      const ch=[...e.changedTouches].find(t=>t.identifier===_tid)||e.changedTouches[0];
      const {x,y}=posT(ch);
      this._wm.handleMouseUp(x,y,0);
      // Dismiss hover state after touch
      setTimeout(()=>{this._wm.handleMouseMove(-999,-999);this._fullRedraw=true;},50);
      _tid=null; _ts=null;
      setTimeout(()=>{this._touchActive=false;},300);
      this._fullRedraw=true;
    },{passive:false});

    c.addEventListener('touchcancel',e=>{
      if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
      _twoY=null; _tid=null; _ts=null; this._touchActive=false; this._fullRedraw=true;
    },{passive:false});

    // ── Keyboard (desktop direct, mobile via hidden input) ─────────────────
    const _kd=e=>{
      // Ctrl+Shift+D: toggle dirty-rect debug overlay
      if (e.ctrlKey && e.shiftKey && (e.key === 'd' || e.key === 'D')) {
        this.showDirtyRects = !this.showDirtyRects;
        this._fullRedraw = true;
        e.preventDefault();
        return;
      }
      // Ctrl+G: toggle grid lines overlay on all GridPanels
      if (e.ctrlKey && !e.shiftKey && !e.altKey && (e.key === 'g' || e.key === 'G')) {
        this.showGridOverlay = !this.showGridOverlay;
        this._fullRedraw = true;
        e.preventDefault();
        return;
      }

      this._wm.handleKey('keydown',e.key,e.keyCode,e.ctrlKey,e.shiftKey,e.altKey);
      this._fullRedraw=true;
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Tab'].includes(e.key))e.preventDefault();
    };
    window.addEventListener('keydown',_kd);
    window.addEventListener('keyup',e=>this._wm.handleKey('keyup',e.key,e.keyCode,e.ctrlKey,e.shiftKey,e.altKey));
  }


  start(){this._lastTime=performance.now();this._loop(this._lastTime);}
  _loop=ts=>{
    const dt=Math.min(ts-this._lastTime,50); this._lastTime=ts;
    this._fpsTimer+=dt; this._frameCount++;
    if(this._fpsTimer>=1000){this._fps=this._frameCount;this._frameCount=0;this._fpsTimer=0;}
    this._wm.update(dt);
    // Only redraw what is marked dirty (or the full canvas if forced).
    const dirty = this._fullRedraw
    ? { x: 0, y: 0, width: this._canvas.width, height: this._canvas.height }
    : this._wm.getDirtyRect();
    
    let dirtyRects = null;
    if (this.showDirtyRects) {
      dirtyRects = this._wm.collectDirtyRects([]);
    }
    
    if (dirty) {
      const x = Math.max(0, Math.floor(dirty.x));
      const y = Math.max(0, Math.floor(dirty.y));
      const w = Math.max(0, Math.min(this._canvas.width - x, Math.ceil(dirty.width)));
      const h = Math.max(0, Math.min(this._canvas.height - y, Math.ceil(dirty.height)));

      this._offCtx.save();
      this._offCtx.beginPath();
      this._offCtx.rect(x, y, w, h);
      this._offCtx.clip();
      this._offCtx.clearRect(x, y, w, h);
      this._wm.render(this._offCtx);

      // Ctrl+G grid overlay — drawn on top of everything
      if (this.showGridOverlay) {
        this._renderGridOverlay(this._offCtx);
      }

      this._offCtx.restore();

      this._wm.markClean();

      this._ctx.clearRect(x, y, w, h);
      this._ctx.drawImage(this._offscreen, x, y, w, h, x, y, w, h);

      if (dirtyRects && dirtyRects.length) {
        this._ctx.save();
        this._ctx.strokeStyle = 'rgba(255,0,0,0.8)';
        this._ctx.lineWidth = 1;
        this._ctx.fillStyle = 'rgba(255,0,0,0.15)';
        for (const r of dirtyRects) {
          const rx = Math.max(0, Math.floor(r.x));
          const ry = Math.max(0, Math.floor(r.y));
          const rw = Math.max(0, Math.min(this._canvas.width - rx, Math.ceil(r.width)));
          const rh = Math.max(0, Math.min(this._canvas.height - ry, Math.ceil(r.height)));
          this._ctx.fillRect(rx, ry, rw, rh);
          this._ctx.strokeRect(rx + 0.5, ry + 0.5, Math.max(0, rw - 1), Math.max(0, rh - 1));
        }
        this._ctx.restore();
      }
    }

    this._fullRedraw = false;
    this._rafId=requestAnimationFrame(this._loop);
  };
  // Recursively collect all visible GridPanels with their absolute positions
  _collectGridPanels(widget, absX, absY, result) {
    if (!widget || !widget.visible) return;
    const bx = absX + (widget.bounds?.x || 0);
    const by = absY + (widget.bounds?.y || 0);
    if (widget instanceof GridPanel && widget._rects) {
      result.push({ gp: widget, ax: absX, ay: absY });
    }
    for (const child of (widget.children || [])) {
      // WindowContent children are shifted by scroll
      const scrollX = widget._scrollX || 0;
      const scrollY = widget._scrollY || 0;
      this._collectGridPanels(child, bx - scrollX, by - scrollY, result);
    }
  }

  _renderGridOverlay(ctx) {
    const panels = [];
    for (const win of (this._wm._windows || [])) {
      if (!win.visible) continue;
      const wb = win.getAbsoluteBounds?.() || win.bounds;
      const ca = win._contentArea;
      if (ca) {
        const caAbsX = wb.x + ca.bounds.x;
        const caAbsY = wb.y + ca.bounds.y - (ca._scrollY || 0);
        for (const child of (ca.children || []))
          this._collectGridPanels(child, caAbsX, caAbsY, panels);
      }
    }
    if (panels.length === 0) return;

    ctx.save();

    for (const { gp, ax, ay } of panels) {
      if (!gp._rects || gp._dirty) continue;

      const px = ax + gp.bounds.x;
      const py = ay + gp.bounds.y;
      const pw = gp.bounds.width;
      const ph = gp.bounds.height;
      const pad = gp._pad ? gp._pad() : {t:0,r:0,b:0,l:0};
      const gap = gp._cGap ? gp._cGap() : (gp.gap || 0);
      const rGap = gp._rGap ? gp._rGap() : (gp.gap || 0);

      // Collect unique edges from rects
      const colEdges = new Set([pad.l, pw - pad.r]);
      const rowEdges = new Set([pad.t, ph - pad.b]);
      for (const r of gp._rects) {
        if (!r) continue;
        colEdges.add(r.x); colEdges.add(r.x + r.w);
        rowEdges.add(r.y); rowEdges.add(r.y + r.h);
      }
      const cols = [...colEdges].sort((a,b)=>a-b);
      const rows = [...rowEdges].sort((a,b)=>a-b);

      ctx.save();
      // Clip to panel
      ctx.beginPath(); ctx.rect(px, py, pw, ph); ctx.clip();

      // ── Draw lines only inside gaps (between cells) ──
      ctx.setLineDash([3, 3]);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.55)';

      // Internal column separators — only draw the gap zone, not over cells
      for (let ci = 1; ci < cols.length - 1; ci++) {
        const ex = px + cols[ci];
        // Is this edge a right-edge of a cell? → gap starts here
        // Draw dashed line through the gap width
        const gapW = gap > 0 ? gap : 1;
        ctx.beginPath();
        ctx.moveTo(ex - gapW/2 + 0.5, py + pad.t);
        ctx.lineTo(ex - gapW/2 + 0.5, py + ph - pad.b);
        ctx.stroke();
      }

      // Internal row separators
      for (let ri = 1; ri < rows.length - 1; ri++) {
        const ey = py + rows[ri];
        const gapH = rGap > 0 ? rGap : 1;
        ctx.beginPath();
        ctx.moveTo(px + pad.l, ey - gapH/2 + 0.5);
        ctx.lineTo(px + pw - pad.r, ey - gapH/2 + 0.5);
        ctx.stroke();
      }

      // ── Panel outer border ──
      ctx.setLineDash([5, 3]);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = 'rgba(80, 80, 220, 0.8)';
      ctx.strokeRect(px + pad.l + 0.75, py + pad.t + 0.75,
                     pw - pad.l - pad.r - 1.5, ph - pad.t - pad.b - 1.5);
      ctx.setLineDash([]);

      // ── Size annotations — outside the panel, in the padding zone ──
      ctx.font = 'bold 8px monospace';
      ctx.fillStyle = 'rgba(50, 50, 180, 0.9)';
      ctx.textBaseline = 'bottom';
      ctx.textAlign = 'center';

      // Column widths above each column (in top padding)
      if (pad.t >= 9) {
        for (let ci = 0; ci < cols.length - 1; ci++) {
          const cw2 = cols[ci+1] - cols[ci];
          if (cw2 < 20) continue;
          const midX = px + cols[ci] + cw2/2;
          ctx.fillText(`${Math.round(cw2)}`, midX, py + pad.t - 1);
        }
      }

      // Row heights in left padding
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      if (pad.l >= 10) {
        for (let ri = 0; ri < rows.length - 1; ri++) {
          const rh2 = rows[ri+1] - rows[ri];
          if (rh2 < 10) continue;
          const midY = py + rows[ri] + rh2/2;
          ctx.fillText(`${Math.round(rh2)}`, px + pad.l - 2, midY);
        }
      }

      ctx.restore();
    }

    // Legend badge
    ctx.save();
    const lx = 8, ly = this._canvas.height - 22;
    ctx.fillStyle = 'rgba(20,20,60,0.8)';
    ctx.beginPath(); ctx.roundRect(lx, ly, 228, 16, 4); ctx.fill();
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = 'rgba(180,180,255,1)';
    ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
    ctx.fillText('⊞ Grid overlay actif — Ctrl+G pour désactiver', lx+6, ly+8);
    ctx.restore();

    ctx.restore();
  }

  get fps(){return this._fps;}
}

const canvas = document.getElementById('canvas');
const container = document.getElementById('canvasContainer');
const mobileInput = document.getElementById('mobileInput');

// ── Detect touch device ──────────────────────────────────────────────────
const isTouchDevice = () => navigator.maxTouchPoints > 0 || 'ontouchstart' in window;

// ── Adaptive window sizing ───────────────────────────────────────────────
// Returns { w, h, x, y } that fits the current viewport
function winBounds(desiredW, desiredH, offsetX=0, offsetY=0) {
  const vw = canvas.width, vh = canvas.height;
  const margin = isTouchDevice() ? 8 : 20;
  const w = Math.min(desiredW, vw - margin*2);
  const h = Math.min(desiredH, vh - margin*2);
  const x = Math.max(margin, Math.min(offsetX || Math.floor((vw-w)/2), vw-w-margin));
  const y = Math.max(margin, Math.min(offsetY || Math.floor((vh-h)/2), vh-h-margin));
  return {x, y, width:w, height:h};
}

// ── Canvas resize ─────────────────────────────────────────────────────────
let engine = null;

function resizeCanvas() {
  canvas.width  = container.clientWidth;
  canvas.height = container.clientHeight;
  if (engine) {
    engine.windowManager.bounds.width  = canvas.width;
    engine.windowManager.bounds.height = canvas.height;
    engine._offscreen.width  = canvas.width;
    engine._offscreen.height = canvas.height;
    engine._fullRedraw = true;
    // Nudge any windows that are now out of bounds back into view
    for (const win of engine.windowManager.windows) {
      const b = win.bounds, m = 10;
      if (b.x + b.width  > canvas.width  - m) win.bounds.x = Math.max(m, canvas.width  - b.width  - m);
      if (b.y + b.height > canvas.height - m) win.bounds.y = Math.max(m, canvas.height - b.height - m);
      if (b.x < m) win.bounds.x = m;
      if (b.y < m) win.bounds.y = m;
    }
  }
}

// ── Mobile keyboard via hidden input ─────────────────────────────────────
// When a TextBox/TextArea is focused, proxy the hidden input's events
mobileInput.addEventListener('input', e => {
  // On mobile, 'input' fires with e.data = the new character(s)
  if (!e.data) return;
  for (const ch of e.data) {
    engine.windowManager.handleKey('keydown', ch, ch.charCodeAt(0), false, false, false);
    engine._fullRedraw = true;
  }
  // Clear so next input isn't cumulative
  mobileInput.value = '';
});

mobileInput.addEventListener('keydown', e => {
  // Handle special keys: Backspace, Enter, Arrow*
  const specials = ['Backspace','Delete','Enter','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End','Tab'];
  if (specials.includes(e.key)) {
    e.preventDefault();
    engine.windowManager.handleKey('keydown', e.key, e.keyCode, e.ctrlKey, e.shiftKey, e.altKey);
    engine._fullRedraw = true;
  }
});

// Focus hidden input whenever a TextBox / TextArea gains canvas focus
// Patch _setFocus on WindowManager
const _origSetFocus = engine.windowManager._setFocus.bind(engine.windowManager);
engine.windowManager._setFocus = function(widget) {
  _origSetFocus(widget);
  if (isTouchDevice() && (widget instanceof TextBox || widget instanceof TextArea)) {
    mobileInput.value = '';
    mobileInput.focus({ preventScroll: true });
  }
};

  s4Label.font = {family:'Tahoma', size:11, weight:'bold'};
  place(s4Label, 20);

  // Row flex: boutons justifyContent
  const flex1 = new FlexPanel({x:10, y:yOff, width:cw-20, height:50});
  flex1.direction='row'; flex1.justifyContent='space-between'; flex1.alignItems='center';
  flex1.gap=8; flex1.padding=8;
  flex1.background = hexToColor('#E8F0FE'); flex1.borderRadius=6;
  const fColors = ['#4285F4','#34A853','#FBBC05','#EA4335'];
  const fLabels = ['flex-start','center','space-between','space-evenly'];
  for(let i=0;i<4;i++){
    const btn = new Button(fLabels[i], {x:0,y:0,width:110,height:32});
    const jc = fLabels[i];
    btn.on('click', () => {
      flex1.justifyContent = jc;
      flex1.markDirty();
      engine.windowManager.markDirty();
    });
    flex1.children.push(btn); btn.parent=flex1;
  }
  place(flex1, 50);

  // Column flex — colored boxes showing flex:1/2/1 growth
  const flex2 = new FlexPanel({x:10, y:yOff, width:cw-20, height:120});
  flex2.direction='column'; flex2.gap=6; flex2.padding=8;
  flex2.background = hexToColor('#E8F5E9'); flex2.borderRadius=6;
  const colDefs = [
    {text:'flex: 1', grow:1, bg:'#A8D5A2'},
    {text:'flex: 2  (double height)', grow:2, bg:'#5FB95A'},
    {text:'flex: 1', grow:1, bg:'#A8D5A2'},
  ];
  for(const d of colDefs){
    const lbl = new Label(d.text, {x:0,y:0,width:200,height:28});
    lbl.flex = { grow: d.grow };
    lbl.font = {family:'Tahoma',size:11};
    lbl.background = hexToColor(d.bg);
    lbl.borderRadius = 4;
    lbl.padding = {x:8, y:4};
    flex2.children.push(lbl); lbl.parent=flex2;
  }
  place(flex2, 120);

  // ── Section 5 : TablePanel natif ─────────────────────────────
  const s5Label = new Label('TablePanel natif — colspan, rowspan, alignement', {x:10, y:yOff, width:cw-20, height:20});
  s5Label.font = {family:'Tahoma', size:11, weight:'bold'};
  place(s5Label, 20);

  const table = new TablePanel({x:10, y:yOff, width:cw-20, height:180});
  table.borderCollapse = true;
  table.cellBorder = {width:1, color:'#CCCCCC'};
  table.setColumns([null, 80, 80, 90]);

  const makeL = (text, bold=false, color=null) => {
    const l = new Label(text, {x:0,y:0,width:80,height:20});
    const f = {family:'Tahoma', size:11};
    if (bold) f.weight = 'bold';
    l.font = f;
    if (color) l.color = color;
    return l;
  };

  const r0 = table.addRow({header:true});
  table.addCell(r0, makeL('Produit',true,'#FFF'), {colspan:1, align:'center', background:'#4472C4', padding:{t:5,r:8,b:5,l:8}});
  table.addCell(r0, makeL('Qté',true,'#FFF'),     {align:'center', background:'#4472C4', padding:{t:5,r:8,b:5,l:8}});
  table.addCell(r0, makeL('PU',true,'#FFF'),      {align:'center', background:'#4472C4', padding:{t:5,r:8,b:5,l:8}});
  table.addCell(r0, makeL('Total',true,'#FFF'),   {align:'center', background:'#4472C4', padding:{t:5,r:8,b:5,l:8}});

  const products = [['Widget Alpha',12,24.00],[' Widget Beta',7,49.90],[' Gadget Pro',3,129.00]];
  products.forEach(([name,qty,pu], i) => {
    const r = table.addRow({background: i%2===0?null:'#F5F7FF'});
    table.addCell(r, makeL(name));
    table.addCell(r, makeL(String(qty)), {align:'center'});
    table.addCell(r, makeL(pu.toFixed(2)+' €'), {align:'right'});
    table.addCell(r, makeL((qty*pu).toFixed(2)+' €',true), {align:'right'});
  });
  const rTot = table.addRow({background:'#E8F0FE'});
  table.addCell(rTot, makeL('Total',true), {colspan:3, padding:{t:5,r:8,b:5,l:8}});
  table.addCell(rTot, makeL('1 218,80 €',true), {align:'right', padding:{t:5,r:8,b:5,l:8}});
  place(table, 180);

  // ── Section 6 : Widgets embarqués ────────────────────────────
  const slW  = new Slider({x:0,y:0,width:130,height:20});
  slW.min=0; slW.max=100; slW.value=60;
  const cbW  = new CheckBox('Activer', {x:0,y:0,width:90,height:22});
  const btnW = new Button('Cliquer',   {x:0,y:0,width:65,height:24});
  let wclicks = 0;
  const d6Html = n => `<p><b>Widgets embarqués</b> — clics: ${n}</p><p>Slider : <widget id="sl1"/>  <widget id="cb1"/>  <widget id="btn1"/></p>`;
  const s6 = new HtmlLabel(d6Html(0), {x:10, y:yOff, width:cw-20, height:66});
  s6.background=hexToColor('#F0FFF0'); s6.borderRadius=6; s6.padding={x:10,y:8};
  s6.registerWidget('sl1', slW);
  s6.registerWidget('cb1', cbW);
  s6.registerWidget('btn1', btnW);
  btnW.on('click', ()=>{ wclicks++; s6.html=d6Html(wclicks); });
  place(s6, 66);

  // Window: don't cap height — let scrollbars handle overflow
  w._updateLayout();
  engine.windowManager.addWindow(w);
};

// ── Launch default windows ────────────────────────────────────────────────
openHtmlLabelWindow();

engine.start();
</script>
</body>
</html>
